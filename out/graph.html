tems are the institutional frameworks that produce agricultural statistics.", "bs": "Los sistemas estadísticos agrícolas son los marcos institucionales que producen estadísticas agrícolas."}, {"id": "national-statistical-offices", "be": "National Statistical Offices operate agricultural statistical systems to generate official data.", "bs": "Las Oficinas Nacionales de Estadística operan sistemas estadísticos agrícolas para generar datos oficiales."}], "children": [], "chain": ["data", "statistics", "agricultural-statistics", "official-agricultural-statistics", "national-statistical-offices", "agricultural-statistical-systems"]}, {"id": "table", "name_en": "Table", "name_es": "Tabla", "def_en": "A table is a structured arrangement of data in rows and columns. In the sits package, a tibble (a type of table) stores time series samples with metadata such as labels, coordinates, and temporal observations.", "def_es": "Una tabla es una disposición estructurada de datos en filas y columnas. En el paquete sits, un tibble (un tipo de tabla) almacena muestras de series temporales con metadatos como etiquetas, coordenadas y observaciones temporales.", "level": 1, "category": "primitive", "kind": "concept", "freq": 167, "sources": "th_data_cubes", "parents": [{"id": "data", "be": "A table organizes data into rows and columns for easy analysis.", "bs": "Una tabla organiza los datos en filas y columnas para facilitar el análisis."}, {"id": "tibble", "be": "In R, a tibble is a modern table structure that simplifies data manipulation.", "bs": "En R, un tibble es una estructura de tabla moderna que simplifica la manipulación de datos."}], "children": [], "chain": ["data", "table"]}, {"id": "crop-classification-models", "name_en": "Crop classification models", "name_es": "Modelos de clasificación de cultivos", "def_en": "Crop classification models are machine learning algorithms trained to identify crop types from satellite image time series. Examples include Random Forest, XGBoost, _en": "Resources are the computational, financial, and human assets required for Earth Observation-based agricultural statistics, including cloud computing, satellite data access, trained personnel, and software tools.", "def_es": "Los recursos son los activos computacionales, financieros y humanos requeridos para las estadísticas agrícolas basadas en observación de la Tierra, incluyendo computación en la nube, acceso a datos satelitales, personal capacitado y herramientas de software.", "level": 1, "category": "primitive", "kind": "concept", "freq": 81, "sources": "howto", "parents": [{"id": "data", "be": "Data resources are the satellite and ground data required for analysis.", "bs": "Los recursos de datos son los datos satelitales y de campo necesarios para el análisis."}], "children": ["infrastructure"], "chain": ["data", "resources"]}, {"id": "crop-mapping", "name_en": "Crop mapping", "name_es": "Mapeo de cultivos", "def_en": "Crop mapping is the process of generating spatial maps that show the distribution of different crop types across a landscape, typically using satellite imagery and machine learning classification.", "def_es": "El mapeo de cultivos es el proceso de generar mapas espaciales que muestran la distribución de diferentes tipos de cultivos en un paisaje, típicamente utilizando imágenes satelitales y clasificación de aprendizaje automático.", "level": 5, "category": "method", "kind": "concept", "freq": 22, "sources": "ct_zimbabwe", "parents": [{"id": "crop", "be": "Crop mapping applies mapping techniques to identify and delineate cultivated plant species, using crop knowledge.", "bs": "El mapeo de cultivos aplica técnicas de cartografía para identificar y delimitar especies de plantas cultivadas, utilizando conocimiento de cultivos."}, {"id": "classification", "be": "Crop mapping relies on classification methods to assign crop type labels to pixels or parcels in satellite imagery.", "bs": "El mapeo de cultivos se basa en métodos de clasificación para asignar etiquetas de tipo de cultivo a píxeles o parcelas en imágenes satelitales."}, {"id": "mapping", "be": "Crop mapping is the process of producing thematic maps showing crop types, building on the general mapping concept.", "bs": "El mapeo de cultivos es el proceso de producir mapas temáticos que muestran tipos de cultivos, basándose en el concepto general de mapeo."}], "children": [], "chain": ["data", "samples", "classification", "map", "mapping", "crop-mapping"]}, {"id": "data-analysis", "name_en": "Data Analysis", "name_es": "Análisis de datos", "def_en": "Data analysis involves examining, cleaning, transforming, and modeling data to discover useful information and support decision-making. In this handbook, it refers to statistical and machine learning techniques applied to satellite time series.", "def_es": "El análisis de datos implica examinar, limpiar, transformar y modelar datos para descubrir información útil y apoyar la toma de decisiones. En este manual, se refiere a técnicas estadísticas y de aprendizaje automático aplicadas a series temporales satelitales.", "level": 3, "category": "method", "kind": "concept", "freq": 2, "sources": "th_machine_learning", "parents": [{"id": "data", "be": "Data analysis systematically examines data to extract information, starting from raw factual information.", "bs": "El análisis de datos examina sistemáticamente los datos para extraer información, partiendo de datos factuales en bruto."}, {"id": "analysis", "be": "Data analysis is the systematic examination of data, extending the general concept of analysis to data.", "bs": "El análisis de datos es el examen sistemático de los datos, extendiendo el concepto general de análisis a los datos."}], "children": ["statistical-analysis"], "chain": ["system", "methods", "analysis", "data-analysis"]}, {"id": "land-use-mapping", "name_en": "Land use mapping", "name_es": "Mapeo de uso del suelo", "def_en": "Land use mapping classifies land according to its socioeconomic function, such as agriculture, forestry, or urban areas, using satellite imagery and ancillary data. It differs from land cover mapping by inferring human activity.", "def_es": "El mapeo de uso del suelo clasifica la tierra según su función socioeconómica, como agricultura, silvicultura o áreas urbanas, utilizando imágenes satelitales y datos auxiliares. Se diferencia del mapeo de cobertura terrestre al inferir la actividad humana.", "level": 5, "category": "method", "kind": "concept", "freq": 3, "sources": "th_lucc", "parents": [{"id": "land", "be": "Land use mapping classifies land according to its use, based on understanding the Earth's surface.", "bs": "El mapeo de uso del suelo clasifica la tierra según su uso, basándose en el conocimiento de la superficie de la Tierra."}, {"id": "mapping", "be": "Land use mapping produces themes showing socioeconomic functions, building on general mapping processes.", "bs": "El mapeo de uso del suelo produce temas que muestran funciones socioeconómicas, basándose en procesos generales de mapeo."}, {"id": "land-cover-land-use-mapping", "be": "LULC mapping integrates both biophysical cover and human-use categories into a single thematic map.", "bs": "El mapeo LULC integra tanto la cobertura biofísica como las categorías de uso humano en un único mapa temático."}], "children": [], "chain": ["data", "samples", "classification", "map", "mapping", "land-use-mapping"]}, {"id": "satellite-imagery", "name_en": "Satellite imagery", "name_es": "Imágenes satelitales", "def_en": "Satellite imagery refers to data collected by sensors mounted on satellite platforms that capture electromagnetic radiation reflected or emitted from the Earth's surface, used for observing and analyzing land cover and crop conditions.", "def_es": "Las imágenes satelitales se refieren a datos recolectados por sensores montados en plataformas satelitales que capturan la radiación electromagnética reflejada o emitida desde la superficie de la Tierra, utilizadas para ame_en": "Training dataset", "name_es": "Conjunto de datos de entrenamiento", "def_en": "A training dataset is a set of labeled samples used to teach a machine learning model to recognize patterns. In remote sensing, it consists of satellite image time series with known land cover or crop type labels.", "def_es": "Un conjunto de datos de entrenamiento es un conjunto de muestras etiquetadas utilizado para enseñar a un modelo de aprendizaje automático a reconocer patrones. En teledetección, consiste en series temporales de imágenes satelitales con etiquetas conocidas de cobertura del suelo o tipo de cultivo.", "level": 3, "category": "data", "kind": "concept", "freq": 11, "sources": "th_quality_control", "parents": [{"id": "dataset", "be": "A training dataset is a labeled dataset used to train models, extending the general dataset concept.", "bs": "Un conjunto de datos de entrenamiento es un conjunto de datos etiquetado utilizado para entrenar modelos, ampliando el concepto general de conjunto de datos."}, {"id": "training", "be": "A training dataset is the data used during the training process of a machine learning model.", "bs": "Un conjunto de datos de entrenamiento son los datos utilizados durante el proceso de entrenamiento de un modelo de aprendizaje automático."}], "children": ["better-reference-data-series", "quality-control", "undersampling", "labeled-samples"], "chain": ["data", "samples", "training", "training-dataset"]}, {"id": "extensive-ground-samples", "name_en": "Extensive ground samples", "name_es": "Muestras extensivas de campo", "def_en": "Extensive ground samples refer to a large number of field observations collected across a study area to train and validate classification models, ensuring representativeness and reducing bias in crop type mapping.", "def_es": "Las muestras extensivas de campo se refieren a un gran número de observaciones de campo recolectadas en un área de estudio para entrenar y validar modelos de clasificación, asegurando repres oducing official statistics.", "bs": "Los sistemas estadísticos son los marcos estructurados para producir estadísticas oficiales."}, {"id": "statistics", "be": "They encompass methods, data, and institutions for generating reliable agricultural statistics.", "bs": "Abarcan métodos, datos e instituciones para generar estadísticas agrícolas fiables."}, {"id": "national-statistical-systems", "be": "National statistical systems are the country-level implementations of statistical systems to produce official statistics.", "bs": "Los sistemas estadísticos nacionales son las implementaciones a nivel de país de los sistemas estadísticos para producir estadísticas oficiales."}, {"id": "national-statistical-offices", "be": "National Statistical Offices are government agencies within national statistical systems that produce official statistics.", "bs": "Las Oficinas Nacionales de Estadística son agencias gubernamentales dentro de los sistemas estadísticos nacionales que producen estadísticas oficiales."}], "children": ["un-statistical-commission"], "chain": ["data", "statistics", "agricultural-statistics", "official-agricultural-statistics", "national-statistical-offices", "statistical-systems"]}, {"id": "chart", "name_en": "Chart", "name_es": "Gráfico", "def_en": "A graphical representation of data, such as a bar chart, line plot, or confusion matrix, used to visualize results like accuracy metrics or area estimates.", "def_es": "Una representación gráfica de datos, como un gráfico de barras, un gráfico de líneas o una matriz de confusión, utilizada para visualizar resultados como métricas de precisión o estimaciones de área.", "level": 2, "category": "primitive", "kind": "concept", "freq": 71, "sources": "th_quality_control", "parents": [{"id": "data", "be": "It displays data in a graphical format, such as bar charts or line plots.", "bs": "Muestra datos en un formato gráfico, como gráficos de barras o gráficos de líneas."}, {"id": "figure", "be": "A chart is a visual element that graphically represents data trends or comparisons.", "bs": "Un gráfico es un elemento visual que representa gráficamente tendencias o comparaciones de datos."}], "children": [], "chain": ["results", "figure", "chart"]}, {"id": "agricultural-surveys", "name_en": "Agricultural surveys", "name_es": "Encuestas agrícolas", "def_en": "Systematic data collection programs conducted by national statistical offices to gather information on crop areas, yields, and farming practices. They provide the ground-truth observations needed to train and validate remote sensing models.", "def_es": "Programas sistemáticos de recopilación de datos realizados por las oficinas nacionales de estadística para recabar información sobre áreas de cultivo, rendimientos y prácticas agrícolas. Proporcionan las observaciones de verdad terreno necesarias para entrenar y validar modelos de teledetección.", "level": 2, "category": "method", "kind": "concept", "freq": 13, "sources": "th_alignment · th_design_frames", "parents": [{"id": "statistics", "be": "Agricultural surveys provide the raw data from which official agricultural statistics are derived through statistical estimation.", "bs": "Las encuestas agrícolas proporcionan los datos brutos a partir de los cuales se derivan las estadísticas agrícolas oficiales mediante estimación estadística."}, {"id": "survey", "be": "Agricultural surveys are systematic survey programs that gather crop area and yield data, extending the general survey method to a specific agricultural context.", "bs": "Las encuestas agrícolas son programas sistemáticos de encuesta que recopilan datos de área y rendimiento de cultivos, extendiendo el método general de encuesta a un contexto agrícola específico."}], "children": [], "chain": ["data", "statistics", "agricultural-surveys"]}, {"id": "assessment", "name_en": "Assessment", "name_es": "Evaluación", "def_en": "A primitive term used for evaluating the quality, accuracy, or suitability of data, maps, or methods. In t ks are specific activities designed to achieve the objectives of a remote sensing project.", "bs": "Las tareas son actividades específicas diseñadas para lograr los objetivos de un proyecto de teledetección."}], "children": [], "chain": ["objectives", "tasks"]}, {"id": "landsat", "name_en": "Landsat", "name_es": "Landsat", "def_en": "A series of Earth-observing satellite missions jointly managed by NASA and USGS, providing free multispectral imagery since 1972. Landsat-9 is the latest, carrying OLI-2 and TIRS-2 sensors with 30 m resolution.", "def_es": "Una serie de misiones satelitales de observación de la Tierra gestionadas conjuntamente por la NASA y el USGS, que proporcionan imágenes multiespectrales gratuitas desde 1972. Landsat-9 es el más reciente, con sensores OLI-2 y TIRS-2 y una resolución de 30 m.", "level": 2, "category": "platform", "kind": "concept", "freq": 60, "sources": "th_remote_sensing", "parents": [{"id": "images", "be": "Landsat satellites capture images that are used for land cover and crop type mapping.", "bs": "Los satélites Landsat capturan imágenes que se utilizan para el mapeo de cobertura del suelo y tipos de cultivo."}, {"id": "satellite", "be": "Landsat is a series of Earth-observing satellite missions providing free multispectral imagery for land monitoring.", "bs": "Landsat es una serie de misiones satelitales de observación de la Tierra que proporcionan imágenes multiespectrales gratuitas para el monitoreo."}], "children": ["harmonized-landsat-sentinel"], "chain": ["images", "satellite", "landsat"]}, {"id": "model-generalization-capabilities", "name_en": "Model generalization capabilities", "name_es": "Capacidades de generalización del modelo", "def_en": "The ability of a machine learning model to perform accurately on new, unseen data from different regions, time periods, or conditions. Strong transferability and robustness to domain shifts are key aspects.", "def_es": "La capacidad de un modelo de aprendizaje automático para desem ales que resaltan la vegetación u otras características."}], "children": [], "chain": ["images", "satellite", "remote-sensing", "sensors", "satellite-sensors", "spectral-bands", "spectral-index"]}, {"id": "near-infrared", "name_en": "Near-infrared", "name_es": "Infrarrojo cercano", "def_en": "Portion of the electromagnetic spectrum (0.75-1.0 µm) beyond visible red, strongly reflected by healthy vegetation and used in vegetation indices.", "def_es": "Porción del espectro electromagnético (0.75-1.0 µm) más allá del rojo visible, fuertemente reflejada por la vegetación sana y utilizada en índices de vegetación.", "level": 0, "category": "other", "kind": "concept", "freq": 1, "sources": "", "parents": [], "children": [], "chain": ["near-infrared"]}, {"id": "red-reflectance", "name_en": "Red reflectance", "name_es": "Reflectancia roja", "def_en": "The proportion of incident solar radiation reflected by a surface in the red portion of the visible spectrum (approximately 620–700 nm). It is inversely related to chlorophyll absorption and is used to compute vegetation indices.", "def_es": "La proporción de radiación solar incidente reflejada por una superficie en la porción roja del espectro visible (aproximadamente 620–700 nm). Es inversamente proporcional a la absorción de clorofila y se utiliza para calcular índices de vegetación.", "level": 6, "category": "data", "kind": "concept", "freq": 1, "sources": "th_remote_sensing#sentinel-2 · uav_wheat_growth#machine-learning-algorithms", "parents": [{"id": "spectral-bands", "be": "The red spectral band (around 600-700 nm) measures red reflectance from the Earth's surface.", "bs": "La banda espectral roja (alrededor de 600-700 nm) mide la reflectancia roja de la superficie de la Tierra."}, {"id": "reflectance", "be": "Red reflectance is the portion of incident light reflected in the red spectral region, a key input for vegetation indices.", "bs": "La reflectancia roja es la porción de luz incidente reflejada en la región espectral roja, una entrada clave para los índices de vegetación."}], "children": ["chlorophyll-absorption"], "chain": ["images", "satellite", "remote-sensing", "sensors", "satellite-sensors", "spectral-bands", "red-reflectance"]}, {"id": "representativeness", "name_en": "Representativeness", "name_es": "Representatividad", "def_en": "The degree to which a sample or dataset accurately reflects the diversity of the target population (e.g., land cover classes). High representativeness ensures that model training data covers the full variability of the area of interest.", "def_es": "El grado en que una muestra o conjunto de datos refleja con precisión la diversidad de la población objetivo (por ejemplo, clases de cobertura terrestre). Una alta representatividad asegura que los datos de entrenamiento del modelo cubran toda la variabilidad del área de interés.", "level": 5, "category": "statistic", "kind": "concept", "freq": 1, "sources": "th_design_frames#matching-in-situ-survey-data-to-remote-sensing-analysis-needs · th_quality_control#validation", "parents": [{"id": "samples", "be": "Representativeness ensures that the collected samples reflect the diversity of the entire population for accurate estimates.", "bs": "La representatividad asegura que las muestras recolectadas reflejen la diversidad de toda la población para obtener estimaciones precisas."}, {"id": "sampling", "be": "Sampling designs aim to achieve representativeness so that sample statistics can be generalized to the whole area.", "bs": "Los diseños muestrales buscan lograr representatividad para que las estadísticas muestrales puedan generalizarse a toda el área."}, {"id": "robust-sampling-frame", "be": "Robust sampling frames ensure representativeness of the target population for valid inference.", "bs": "Los marcos muestrales robustos aseguran la representatividad de la población objetivo para una inferencia válida."}], "children": [], "chain": ["data", "samples", "classification", "design", "sampling", "representativeness"]}, {"id": "thematic-map", "name_en": "Thematic map", "name_es": "Mapa temático", "def_en": "A map that displays the spatial distribution of a specific theme or class, such as land cover, crop type, or yield. Thematic maps are the primary output of satellite image classification for agricultural statistics.", "def_es": "Un mapa que muestra la distribución espacial de un tema o clase específica, como cobertura del suelo, tipo de cultivo o rendimiento. Los mapas temáticos son el resultado principal de la clasificación de imágenes satelitales para estadísticas agrícolas.", "level": 4, "category": "product", "kind": "concept", "freq": 1, "sources": "th_validation#introduction · ct_chile#generation-of-land-use-and-land-cover-maps-using-time-series-of-satellite-images", "parents": [{"id": "classification", "be": "Classification labels are used to create a thematic map that displays the spatial distribution of a specific theme.", "bs": "Las etiquetas de clasificación se utilizan para crear un mapa temático que muestra la distribución espacial de un tema específico."}, {"id": "map", "be": "A map that shows the distribution of classes such as land cover or crop types is called a thematic map.", "bs": "Un mapa que muestra la distribución de clases como la cobertura del suelo o tipos de cultivo se denomina mapa temático."}], "children": [], "chain": ["data", "samples", "classification", "map", "thematic-map"]}, {"id": "satellite-derived-models", "name_en": "Satellite-derived models", "name_es": "Modelos derivados de satélite", "def_en": "Computational models that use satellite imagery as input to predict biophysical variables (e.g., crop yield, plant area index) or classify land surface types. They are calibrated with ground observations and can be statistical or machine-learning based.", "def_es": "Modelos computacionales que utilizan imágenes satelitales como entrada para predecir variables biofísicas (por ejemplo, rendimiento de cultivos, índice de área foliar) o clasificar tipos de superficie terrestre. Se basan en observaciones de campo y pueden ser estadísticos o de aprendizaje automático.", "level": 5, "category": "method", "kind": "concept", "freq": 1, "sources": "crop_statistics_ppi#example-yield-estimation · cy_finland#machine-learning", "parents": [{"id": "model", "be": "Satellite-derived models use satellite imagery as input to predict biophysical variables like crop yield or biomass.", "bs": "Los modelos derivados de satélite utilizan imágenes satelitales como entrada para predecir variables biofísicas como el rendimiento de cultivos o la biomasa."}, {"id": "satellite-imagery", "be": "Satellite imagery provides the input data for training and applying satellite-derived models to estimate agricultural parameters.", "bs": "Las imágenes satelitales proporcionan los datos de entrada para entrenar y aplicar modelos derivados de satélite para estimar parámetros agrícolas."}], "children": [], "chain": ["images", "satellite", "remote-sensing", "sensors", "satellite-imagery", "satellite-derived-models"]}, {"id": "ground-truth-data", "name_en": "Ground-truth data", "name_es": "Datos de verdad terreno", "def_en": "Synonym of ground-truth. Information collected on the Earth's surface through field visits, surveys, or high-resolution image interpretation, used to calibrate and validate satellite-based classifications and models.", "def_es": "Sinónimo de verdad terreno. Información recopilada en la superficie de la Tierra mediante visitas de campo, encuestas o interpretación de imágenes de alta resolución, utilizada para calibrar y validar clasificaciones y modelos basados en satélites.", "level": 7, "category": "data", "kind": "concept", "freq": 1, "sources": "th_validation#introduction · crop_statistics_area#sec-introduction", "parents": [{"id": "ground-truth", "be": "Ground-truth data is the set of observations collected on the Earth's surface, used to calibrate and validate remote sensing results.", "bs": "Los datos de verdad terreno son el conjunto de observaciones recolectadas en la superficie de la Tierra, utilizados para calibrar y validar los resultados de teledetección."}], "children": [], "chain": ["data", "samples", "classification", "design", "sampling", "survey-approach", "ground-truth", "ground-truth-data"]}, {"id": "confusion-matrix", "name_en": "Confusion matrix", "name_es": "Matriz de confusión", "def_en": "A table that compares predicted class labels (from a map or model) against reference labels, showing the number of correct and incorrect predictions per class. It is the basis for accuracy metrics such as user's and producer's accuracy.", "def_es": "Una tabla que compara las etiquetas de clase predichas (de un mapa o modelo) con las etiquetas de referencia, mostrando el número de predicciones correctas e incorrectas por clase. Es la base para métricas de precisión como la precisión del usuario y del productor.", "level": 5, "category": "metric", "kind": "concept", "freq": 1, "sources": "th_validation#accuracy-assessment-of-classified-images · th_quality_control#validation", "parents": [{"id": "classes", "be": "Each cell of the confusion matrix counts the number of samples for specific predicted versus actual class combinations.", "bs": "Cada celda de la matriz de confusión cuenta el número de muestras para combinaciones específicas de clase predicha versus real."}, {"id": "classification", "be": "A confusion matrix tabulates the agreement between predicted classes from a classification and actual reference classes.", "bs": "Una matriz de confusión tabula la concordancia entre las clases predichas de una clasificación y las clases de referencia reales."}, {"id": "accuracy", "be": "Accuracy metrics like overall accuracy are derived from the confusion matrix by comparing predictions to ground truth.", "bs": "Métricas de precisión como la precisión general se derivan de la matriz de confusión al comparar predicciones con verdad terreno."}, {"id": "metrics", "be": "They are derived from a confusion matrix to compute overall accuracy, precision, recall, and F1-score.", "bs": "Se derivan de una matriz de confusión para calcular precisión general, precisión, exhaustividad y puntuación F1."}, {"id": "overall-accuracy", "be": "It is calculated from the confusion matrix as the sum of true positives and true negatives divided by total.", "bs": "Se calcula a partir de la matriz de confusión como la suma de verdaderos positivos y verdaderos negativos dividida por el total."}, {"id": "accuracy-assessment", "be": "Accuracy assessment is typically based on the confusion matrix comparing predicted vs. reference labels.", "bs": "La evaluación de precisión se basa típicamente en la matriz de confusión que compara etiquetas predichas con las de referencia."}], "children": ["producer-s-accuracy", "accuracy-metrics", "confusion-matrices", "omission", "commission", "area-weighted-error-matrices", "kappa-coefficient", "recall", "false-negative", "false-positive", "chance-agreement", "cohen-s-kappa"], "chain": ["data", "samples", "accuracy", "validation", "accuracy-assessment", "confusion-matrix"]}, {"id": "f1-score", "name_en": "F1-score", "name_es": "puntuación F1", "def_en": "The harmonic mean of precision and recall, providing a single measure of a classification model's performance for a given class. F1 balances commission and omission errors.", "def_es": "Media armónica de la precisión y la exhaustividad, que proporciona una medida única del rendimiento de un modelo de clasificación para una clase determinada. La puntuación F1 equilibra los errores de comisión y omisión.", "level": 7, "category": "metric", "kind": "concept", "freq": 1, "sources": "th_validation#accuracy-assessment-of-classified-images · ct_zimbabwe#accuracy-assessment", "parents": [{"id": "precision", "be": "F1-score is the harmonic mean of precision and recall, providing a balanced measure of classification performance.", "bs": "La puntuación F1 es la media armónica de la precisión y la exhaustividad, proporcionando una medida equilibrada del rendimiento de clasificación."}, {"id": "recall", "be": "Recall, together with precision, forms the basis for computing the F1-score in classification evaluation.", "bs": "La exhaustividad, junto con la precisión, forma la base para calcular la puntuación F1 en la evaluación de clasificación."}], "children": [], "chain": ["data", "samples", "accuracy", "validation", "accuracy-assessment", "confusion-matrix", "recall", "f1-score"]}, {"id": "fallow", "name_en": "Fallow", "name_es": "Barbecho", "def_en": "A temporary state of agricultural land where no crop is grown, usually to allow the soil to recover moisture or nutrients. In remote sensing, fallow is a temporal phase rather than a static land cover class.", "def_es": "Estado temporal de la tierra agrícola donde no se cultiva ningún cultivo, generalmente para permitir que el suelo recupere humedad o nutrientes. En teledetección, el barbecho es una fase temporal más que una clase de cobertura del suelo estática.", "level": 3, "category": "phenomenon", "kind": "concept", "freq": 1, "sources": "th_lucc#specific-challenges-in-agricultural-classification · ct_chile#classification-scheme", "parents": [{"id": "crop", "be": "Fallow land is temporarily without a crop, but remains part of agricultural land use.", "bs": "La tierra en barbecho está temporalmente sin cultivo, pero sigue siendo parte del uso agrícola del suelo."}, {"id": "cropland", "be": "Fallow is a state of cropland where no crop is grown, usually to allow soil recovery before the next planting season.", "bs": "El barbecho es un estado de las tierras de cultivo donde no se cultiva, usualmente para permitir la recuperación del suelo antes de la próxima temporada de siembra."}], "children": [], "chain": ["area", "land", "cropland", "fallow"]}, {"id": "sample-based-estimators", "name_en": "Sample-based estimators", "name_es": "Estimadores basados en muestras", "def_en": "Statistical methods that derive area or other population totals from a probability sample of reference units, often using a map for stratification. They provide unbiased, design-consistent estimates with quantifiable uncertainty.", "def_es": "Métodos estadísticos que derivan el área u otros totales poblacionales a partir de una muestra probabilística de unidades de referencia, utilizando a menudo un mapa para la estratificación. Proporcionan estimaciones insesgadas, consistentes con el diseño y con incertidumbre cuantificable.", "level": 6, "category": "statistic", "kind": "concept", "freq": 1, "sources": "crop_statistics_area#sec-methods · th_validation#sampling-design", "parents": [{"id": "estimation", "be": "Sample-based estimators use data from a probability sample to estimate population parameters like total area.", "bs": "Los estimadores basados en muestras utilizan datos de una muestra probabilística para estimar parámetros poblacionales como el área total."}, {"id": "sampling", "be": "The sampling design determines the properties of the sample-based estimator, such as unbiasedness and variance.", "bs": "El diseño muestral determina las propiedades del estimador basado en muestras, como la insesgadez y la varianza."}, {"id": "unbiased-area-estimates", "be": "They rely on sample-based estimators that incorporate sampling design to remove bias from map predictions.", "bs": "Se basan en estimadores basados en muestras que incorporan el diseño muestral para eliminar el sesgo de las predicciones del mapa."}], "children": [], "chain": ["data", "statistics", "estimates", "estimation", "area-estimation", "unbiased-area-estimates", "sample-based-estimators"]}, {"id": "confusion-matrices", "name_en": "Confusion matrices", "name_es": "Matrices de confusión", "def_en": "Synonym of confusion matrix. A cross-tabulation of predicted versus reference class labels used to assess classification accuracy.", "def_es": "Sinónimo de matriz de confusión. Tabulación cruzada de las etiquetas de clase predichas frente a las de referencia que se utiliza para evaluar la precisión de la clasificación.", "level": 6, "category": "metric", "kind": "concept", "freq": 1, "sources": "th_validation#accuracy-assessment-of-classified-images · ct_zimbabwe#accuracy-assessment", "parents": [{"id": "confusion-matrix", "be": "Confusion matrices are the plural of confusion matrix; multiple confusion matrices can be used for different regions or classes.", "bs": "Las matrices de confusión son el plural de matriz de confusión; se pueden usar múltiples matrices de confusión para diferentes regiones o clases."}], "children": [], "chain": ["data", "samples", "accuracy", "validation", "accuracy-assessment", "confusion-matrix", "confusion-matrices"]}, {"id": "yield-forecasting", "name_en": "Yield forecasting", "name_es": "Pronóstico de rendimiento", "def_en": "The process of predicting crop yield (mass per unit area) before harvest, using satellite imagery, weather data, and/or crop models. It supports food security planning and policy decisions.", "def_es": "Proceso de predicción del rendimiento de cultivos (masa por unidad de área) antes de la cosecha, utilizando imágenes satelitales, datos meteorológicos y/o modelos de cultivo. Apoya la planificación de la seguridad alimentaria y las decisiones políticas.", "level": 2, "category": "method", "kind": "concept", "freq": 1, "sources": "cy_finland#introduction · cy_poland#introduction", "parents": [{"id": "time-series", "be": "Satellite image time series capture temporal crop growth patterns essential for yield forecasting models.", "bs": "Las series temporales de imágenes satelitales capturan patrones temporales de crecimiento de cultivos esenciales para modelos de pronóstico de rendimiento."}, {"id": "yield", "be": "Yield forecasting predicts future crop yield per unit area, using historical yield data and satellite observations.", "bs": "El pronóstico de rendimiento predice el rendimiento futuro de cultivos por unidad de área, utilizando datos históricos de rendimiento y observaciones satelitales."}], "children": [], "chain": ["images", "time-series", "yield-forecasting"]}, {"id": "reference-samples", "name_en": "Reference samples", "name_es": "Muestras de referencia", "def_en": "Subset of ground observations used to train a classification model or validate its output. They must be representative, well-labeled, and independent of the model's training data for unbiased accuracy assessment.", "def_es": "Subconjunto de observaciones de campo utilizado para entrenar un modelo de clasificación o validar su resultado. Deben ser representativas, estar bien etiquetadas y ser independientes de los datos de entrenamiento del modelo para una evaluación de precisión insesgada.", "level": 7, "category": "data", "kind": "concept", "freq": 1, "sources": "th_quality_control#outline · th_validation#sampling-design", "parents": [{"id": "samples", "be": "Reference samples are a subset of samples with known ground truth labels used for training or validating models.", "bs": "Las muestras de referencia son un subconjunto de muestras con etiquetas de verdad terreno conocidas, utilizadas para entrenar o validar modelos."}, {"id": "ground-truth", "be": "Reference samples come from ground-truth data and are used to assess classification accuracy.", "bs": "Las muestras de referencia provienen de datos de verdad terreno y se utilizan para evaluar la precisión de clasificación."}], "children": [], "chain": ["data", "samples", "classification", "design", "sampling", "survey-approach", "ground-truth", "reference-samples"]}, {"id": "phenological-patterns", "name_en": "Phenological patterns", "name_es": "Patrones fenológicos", "def_en": "Repeating sequences of plant growth stages (e.g., emergence, flowering, senescence) observable as temporal changes in satellite-derived vegetation indices. They are unique to each crop and form the basis for crop type discrimination.", "def_es": "Secuencias repetitivas de etapas de crecimiento de las plantas (p. ej., emergencia, floración, senescencia) observables como cambios temporales en los índices de vegetación derivados de satélite. Son únicos para cada cultivo y forman la base para la discriminación de tipos de cultivo.", "level": 4, "category": "phenomenon", "kind": "concept", "freq": 1, "sources": "th_lucc#the-key-role-of-time-series · ct_chile#satellite-image-time-series", "parents": [{"id": "time-series", "be": "Satellite time series data reveal phenological patterns through changes in vegetation indices over the growing season.", "bs": "Los datos de series temporales satelitales revelan patrones fenológicos a través de cambios en índices de vegetación durante la temporada de crecimiento."}, {"id": "phenology", "be": "Phenological patterns are the repetitive sequences of plant growth stages observed in phenology, such as leaf emergence.", "bs": "Los patrones fenológicos son las secuencias repetitivas de etapas de crecimiento de las plantas observadas en la fenología, como la emergencia de hojas."}], "children": [], "chain": ["crop", "growth", "crop-development-stage", "phenology", "phenological-patterns"]}, {"id": "in-situ-observations", "name_en": "In-situ observations", "name_es": "Observaciones in situ", "def_en": "Measurements or descriptions recorded directly at a location on the Earth's surface, typically collected by field surveys. They serve as ground truth for calibrating and validating remote sensing products.", "def_es": "Mediciones o descripciones registradas directamente en una ubicación de la superficie terrestre, típicamente recopiladas mediante encuestas de campo. Sirven como verdad terreno para calibrar y validar productos de teledetección.", "level": 5, "category": "data", "kind": "concept", "freq": 1, "sources": "th_alignment#introduction · th_design_frames#matching-in-situ-survey-data-to-remote-sensing-analysis-needs", "parents": [{"id": "field", "be": "In-situ observations are collected directly in agricultural fields to record crop type, condition, and other attributes.", "bs": "Las observaciones in situ se recolectan directamente en campos agrícolas para registrar tipo de cultivo, condición y otros atributos."}, {"id": "ground-observations", "be": "In-situ observations are measurements or descriptions recorded directly at field locations, same as ground observations.", "bs": "Las observaciones in situ son mediciones o descripciones registradas directamente en ubicaciones de campo, igual que las observaciones de campo."}, {"id": "fao-situ-quality-framework", "be": "The FAO situ quality framework evaluates the compatibility of in-situ observations with satellite data needs.", "bs": "El Marco de calidad in situ de la FAO evalúa la compatibilidad de las observaciones in situ con las necesidades de datos satelitales."}], "children": [], "chain": ["data", "samples", "reference", "ground", "ground-observations", "in-situ-observations"]}, {"id": "spatiotemporal-array", "name_en": "Spatiotemporal array", "name_es": "Arreglo espacio-temporal", "def_en": "A three-dimensional array of Earth observation data with two spatial dimensions and one temporal dimension, where each cell has a fixed spatial resolution, temporal duration, and set of spectral attributes.", "def_es": "Arreglo tridimensional de datos de observación de la Tierra con dos dimensiones espaciales y una dimensión temporal, donde cada celda tiene una resolución espacial fija, una duración temporal y un conjunto de atributos espectrales.", "level": 7, "category": "data", "kind": "concept", "freq": 1, "sources": "th_data_cubes", "parents": [{"id": "time", "be": "A spatiotemporal array organizes satellite imagery along both spatial coordinates and a time dimension, enabling analysis of change.", "bs": "Un arreglo espacio-temporal organiza las imágenes satelitales a lo largo de coordenadas espaciales y una dimensión temporal, lo que permite el análisis de cambios."}, {"id": "satellite-data-cube", "be": "A spatiotemporal array is a data cube where layers represent time slices of registered satellite images.", "bs": "Un arreglo espacio-temporal es un cubo de datos donde las capas representan cortes temporales de imágenes satelitales registradas."}], "children": [], "chain": ["images", "satellite", "remote-sensing", "sensors", "satellite-imagery", "data-cube", "satellite-data-cube", "spatiotemporal-array"]}, {"id": "stratified-random-sampling", "name_en": "Stratified random sampling", "name_es": "Muestreo aleatorio estratificado", "def_en": "A method dividing the population into homogeneous subgroups (strata) and then randomly sampling within each stratum. It is recommended for selecting reference data for map validation to produce unbiased estimates.", "def_es": "Método que divide la población en subgrupos homogéneos (estratos) y luego muestrea aleatoriamente dentro de cada estrato. Se recomienda para seleccionar datos de referencia para la validación de mapas con el fin de producir estimaciones insesgadas.", "level": 7, "category": "method", "kind": "concept", "freq": 1, "sources": "th_validation", "parents": [{"id": "sampling", "be": "Stratified random sampling extends simple random sampling by partitioning the population into homogeneous subgroups.", "bs": "El muestreo aleatorio estratificado extiende el muestreo aleatorio simple al dividir la población en subgrupos homogéneos."}, {"id": "sample-design", "be": "Sample design often uses stratified random sampling to increase precision of estimates.", "bs": "El diseño muestral a menudo utiliza muestreo aleatorio estratificado para aumentar la precisión de las estimaciones."}], "children": ["strata", "sampling-strategies"], "chain": ["data", "statistics", "estimates", "estimation", "estimator", "design-estimator", "sample-design", "stratified-random-sampling"]}, {"id": "temporal-resolution", "name_en": "Temporal resolution", "name_es": "Resolución temporal", "def_en": "The frequency with which a satellite sensor revisits the same location on Earth, determining how often imagery is acquired for a given area over time.", "def_es": "Frecuencia con la que un sensor satelital revisita la misma ubicación en la Tierra, determinando con qué frecuencia se adquieren imágenes para un área determinada a lo largo del tiempo.", "level": 2, "category": "metric", "kind": "concept", "freq": 1, "sources": "", "parents": [{"id": "time", "be": "Temporal resolution describes how frequently a satellite revisits the same location, i.e., the time between successive images.", "bs": "La resolución temporal describe con qué frecuencia un satélite vuelve a visitar la misma ubicación, es decir, el tiempo entre imágenes sucesivas."}, {"id": "satellite", "be": "Temporal resolution of a satellite mission is determined by its orbit and swath, affecting the revisit frequency.", "bs": "La resolución temporal de una misión satelital está determinada por su órbita y franja, afectando la frecuencia de revisita."}], "children": [], "chain": ["images", "satellite", "temporal-resolution"]}, {"id": "object-based-classification", "name_en": "Object-based classification", "name_es": "Clasificación basada en objetos", "def_en": "A classification approach that analyzes image objects (segments) rather than individual pixels. Objects are created by aggregating pixels into homogeneous regions, often corresponding to real-world features like agricultural parcels.", "def_es": "Enfoque de clasificación que analiza objetos de imagen (segmentos) en lugar de píxeles individuales. Los objetos se crean agregando píxeles en regiones homogéneas, a menudo correspondientes a características del mundo real como parcelas agrícolas.", "level": 3, "category": "method", "kind": "concept", "freq": 1, "sources": "ct_mexico", "parents": [{"id": "classification", "be": "Object-based classification improves upon pixel-based classification by using image objects as the unit of analysis.", "bs": "La clasificación basada en objetos mejora la clasificación basada en píxeles al usar objetos eorreferenciada."}, {"id": "satellite", "be": "Geometric correction adjusts the raw coordinates of satellite imagery to align with a reference coordinate system.", "bs": "La corrección geométrica ajusta las coordenadas brutas de las imágenes satelitales para alinearlas con un sistema de referencia de coordenadas."}], "children": [], "chain": ["images", "satellite", "geometric-correction"]}, {"id": "cloud-masking", "name_en": "Cloud Masking", "name_es": "Enmascaramiento de nubes", "def_en": "Cloud masking is the process of identifying and removing pixels affected by clouds or cloud shadows in satellite imagery, often using spectral tests or pre-computed quality bands, to ensure clear observations.", "def_es": "El enmascaramiento de nubes es el proceso de identificar y eliminar píxeles afectados por nubes o sombras de nubes en imágenes satelitales, a menudo usando pruebas espectrales o bandas de calidad precalculadas, para garantizar observaciones claras.", "level": 2, "category": "method", "kind": "concept", "freq": 1, "sources": "th_data_sources#ard-image-collections", "parents": [{"id": "images", "be": "Cloud masking identifies and removes cloudy pixels in satellite images to ensure clear observations.", "bs": "El enmascaramiento de nubes identifica y elimina píxeles nubosos en imágenes satelitales para asegurar observaciones claras."}, {"id": "cloud", "be": "Cloud masking uses cloud detection algorithms to remove cloud-affected pixels from satellite imagery.", "bs": "El enmascaramiento de nubes utiliza algoritmos de detección de nubes para eliminar píxeles afectados por nubes de las imágenes satelitales."}], "children": ["temporal-compositing"], "chain": ["images", "cloud", "cloud-masking"]}, {"id": "temporal-compositing", "name_en": "Temporal Compositing", "name_es": "Composición temporal", "def_en": "Temporal compositing is the process of combining multiple satellite images over a specified time period into a single image by selecting the best available pixel (e.g., median, minimum cloud cover) to reduce noise and cloud interference.", "def_es": "La composición temporal es el proceso de combinar múltiples imágenes satelitales durante un período de tiempo específico en una sola imagen seleccionando el mejor píxel disponible (por ejemplo, mediana, mínima cobertura de nubes) para reducir ruido e interferencia de nubes.", "level": 3, "category": "method", "kind": "concept", "freq": 1, "sources": "th_data_cubes#generating-regular-data-cubes", "parents": [{"id": "time-series", "be": "Temporal compositing merges multiple images over a time period into a single composite by selecting the best observation per pixel.", "bs": "La composición temporal fusiona múltiples imágenes durante un período de tiempo en un único compuesto seleccionando la mejor observación por píxel."}, {"id": "cloud-masking", "be": "After cloud masking, temporal compositing combines clear pixels from several dates to produce a cloud-free synthesis.", "bs": "Tras el enmascaramiento de nubes, la composición temporal combina píxeles despejados de varias fechas para producir una síntesis sin nubes."}], "children": [], "chain": ["images", "cloud", "cloud-masking", "temporal-compositing"]}, {"id": "omission", "name_en": "Omission", "name_es": "Omisión", "def_en": "Omission error (false negative) occurs when a pixel or area that belongs to a class in reality is not classified as that class by the map, leading to underestimation of that class's extent.", "def_es": "El error de omisión (falso negativo) ocurre cuando un píxel o área que pertenece a una clase en la realidad no es clasificado como esa clase por el mapa, lo que lleva a una subestimación de la extensión de esa clase.", "level": 6, "category": "metric", "kind": "concept", "freq": 1, "sources": "th_validation#accuracy-assessment-of-classified-images", "parents": [{"id": "classification", "be": "Omission error occurs when a pixel belonging to a class on the ground is missed in the classified map.", "bs": "El error de omisión ocurre cuando un píxel perteneciente a una clase en el terreno se omite en el mapa clasificado."}, {"id": "confusion-matrix", "be": "In a confusion matrix, omission corresponds to false negatives for a given class.", "bs": "En una matriz de confusión, la omisión corresponde a falsos negativos para una clase determinada."}], "children": ["false-negative"], "chain": ["data", "samples", "accuracy", "validation", "accuracy-assessment", "confusion-matrix", "omission"]}, {"id": "commission", "name_en": "Commission", "name_es": "Comisión", "def_en": "Commission error (false positive) occurs when a pixel or area is incorrectly assigned to a class in the map when it does not belong to that class in reality, leading to overestimation.", "def_es": "El error de comisión (falso positivo) ocurre cuando un píxel o área se asigna incorrectamente a una clase en el mapa cuando no pertenece a esa clase en la realidad, lo que lleva a una sobreestimación.", "level": 6, "category": "metric", "kind": "concept", "freq": 1, "sources": "th_validation#accuracy-assessment-of-classified-images", "parents": [{"id": "classification", "be": "Commission error occurs when a pixel is incorrectly labeled as a class it does not belong to.", "bs": "El error de comisión ocurre cuando un píxel se etiqueta incorrectamente como una clase a la que no pertenece."}, {"id": "confusion-matrix", "be": "In a confusion matrix, commission corresponds to false positives for a given class.", "bs": "En una matriz de confusión, la comisión corresponde a falsos positivos para una clase determinada."}], "children": ["false-positive"], "chain": ["data", "samples", "accuracy", "validation", "accuracy-assessment", "confusion-matrix", "commission"]}, {"id": "quality-flags", "name_en": "Quality Flags", "name_es": "Banderas de calidad", "def_en": "Quality flags are ancillary data layers in satellite products that indicate the reliability of each pixel, such as cloud cover, shadow, snow, or processing errors, used to filter out low-quality observations.", "def_es": "Las banderas de calidad son capas de datos auxiliares en productos satelitales que indican la fiabilidad de cada píxel, como cobertura de nubes, sombra, nieve o errores de procesamiento, utilizadas para filtrar observaciones de baja calidad.", "level": 2, "category": "data", "kind": "concept", "freq": 1, "sources": "cy_poland#modis-data", "parents": [{"id": "images", "be": "Satellite images often include quality bands that flag problematic pixels like clouds or shadows.", "bs": "Las imágenes satelitales a menudo incluyen bandas de calidad que marcan píxeles problemáticos como nubes o sombras."}, {"id": "pixels", "be": "Quality flags are per-pixel indicators of data reliability, such as cloud or shadow presence.", "bs": "Las banderas de calidad son indicadores por píxel de la fiabilidad de los datos, como presencia de nubes o sombras."}], "children": ["quality-band"], "chain": ["images", "pixels", "quality-flags"]}, {"id": "prediction-probabilities", "name_en": "Prediction Probabilities", "name_es": "Probabilidades de predicción", "def_en": "Prediction probabilities are the output values from a classification model that represent the estimated likelihood that a pixel belongs to each possible class, typically ranging from 0 to 1.", "def_es": "Las probabilidades de predicción son los valores de salida de un modelo de clasificación que representan la probabilidad estimada de que un píxel pertenezca a cada clase posible, típicamente en un rango de 0 a 1.", "level": 6, "category": "metric", "kind": "concept", "freq": 1, "sources": "th_uncertainty#measuring-uncertainty", "parents": [{"id": "machine-learning", "be": "Machine learning models often produce prediction probabilities for each class, indicating confidence.", "bs": "Los modelos de aprendizaje automático a menudo producen probabilidades de predicción para cada clase, indicando confianza."}, {"id": "classification-algorithm", "be": "Classification algorithms output prediction probabilities representing the likelihood of a pixel belonging to each class.", "bs": "Los algoritmos de clasificación generan probabilidades de predicción que representan la probabilidad de que un píxel pertenezca a cada clase."}], "children": ["uncertainty"], "chain": ["data", "samples", "training", "machine-learning", "algorithm", "classification-algorithm", "prediction-probabilities"]}, {"id": "spectral-indices", "name_en": "Spectral Indices", "name_es": "Índices espectrales", "def_en": "Spectral indices are mathematical combinations of two or more spectral bands designed to highlight specific surface properties, such as vegetation vigor (NDVI) or water content (NDWI).", "def_es": "Los índices espectrales son combinaciones matemáticas de dos o más bandas espectrales diseñadas para resaltar propiedades específicas de la superficie, como el vigor de la vegetación (NDVI) o el contenido de agua (NDWI).", "level": 6, "category": "index", "kind": "concept", "freq": 1, "sources": "th_remote_sensing#introduction-to-remote-sensing-imagery", "parents": [{"id": "vegetation-indices", "be": "Vegetation indices are spectral indices designed to highlight vegetation health and cover.", "bs": "Los índices de vegetación son índices espectrales diseñados para resaltar la salud y la cobertura de la vegetación."}, {"id": "spectral-bands", "be": "Spectral indices are mathematical combinations of two or more spectral bands to highlight specific surface properties.", "bs": "Los índices espectrales son combinaciones matemáticas de dos o más bandas espectrales para resaltar propiedades específicas de la superficie."}, {"id": "reflectance", "be": "Spectral indices use surface reflectance values from different bands, such as NDVI from red and NIR bands.", "bs": "Los índices espectrales utilizan valores de reflectancia superficial de diferentes bandas, como el NDVI de las bandas roja e infrarroja cercana."}], "children": ["spectral-temporal-signatures", "leaf-area-index"], "chain": ["images", "satellite", "remote-sensing", "sensors", "satellite-sensors", "spectral-bands", "spectral-indices"]}, {"id": "spectral-range", "name_en": "Spectral Range", "name_es": "Rango espectral", "def_en": "Spectral range refers to the interval of wavelengths in the electromagnetic spectrum that a satellite sensor measures, typically expressed in micrometers (µm) or nanometers (nm).", "def_es": "El rango espectral se refiere al intervalo de longitudes de onda en el espectro electromagnético que mide un sensor satelital, generalmente expresado en micrómetros (µm) o nanómetros (nm).", "level": 4, "category": "data", "kind": "concept", "freq": 1, "sources": "th_remote_sensing#introduction-to-remote-sensing-imagery", "parents": [{"id": "sensors", "be": "Spectral range defines the wavelength intervals a sensor can detect, such as visible or near-infrared.", "bs": "El rango espectral define los intervalos de longitud de onda que un sensor puede detectar, como el visible o el infrarrojo cercano."}, {"id": "range", "be": "Range is a shortened term often used to refer to spectral range or spatial coverage of a sensor.", "bs": "Rango es un término abreviado que a menudo se refiere al rango espectral o la cobertura espacial de un sensor."}], "children": ["electromagnetic-spectrum"], "chain": ["images", "satellite", "remote-sensing", "sensors", "spectral-range"]}, {"id": "area-weighted-error-matrices", "name_en": "Area-Weighted Error Matrices", "name_es": "Matrices de error ponderadas por área", "def_en": "An area-weighted error matrix adjusts the standard confusion matrix by weighting each cell by the proportion of area mapped as that class, providing unbiased accuracy and area estimates.", "def_es": "Una matriz de error ponderada por área ajusta la matriz de confusión estándar ponderando cada celda por la proporción de área mapeada como esa clase, proporcionando estimaciones de exactitud y área insesgadas.", "level": 6, "category": "metric", "kind": "concept", "freq": ciones Agronómicas", "def_en": "Agronomic conditions refer to the set of factors affecting crop growth and management, including soil properties, climate, irrigation, fertilization, and farming practices.", "def_es": "Las Condiciones Agronómicas se refieren al conjunto de factores que afectan el crecimiento y manejo de los Cultivos, incluyendo propiedades del Suelo, Clima, riego, fertilización y prácticas agrícolas.", "level": 4, "category": "phenomenon", "kind": "concept", "freq": 1, "sources": "ct_chile#classification-scheme", "parents": [{"id": "vegetation", "be": "Agronomic conditions encompass the physical environment and plant health factors influencing crop development.", "bs": "Las condiciones agronómicas abarcan el entorno físico y los factores de salud vegetal que influyen en el desarrollo del cultivo."}, {"id": "soil", "be": "Agronomic conditions include soil properties like moisture and nutrient status that affect crop growth.", "bs": "Las condiciones agronómicas incluyen propiedades del suelo como humedad y estado de nutrientes que afectan el crecimiento del cultivo."}, {"id": "regional-field-experts", "be": "They understand agronomic conditions that influence crop growth and satellite observations.", "bs": "Ellos entienden las condiciones agronómicas que influyen en el crecimiento de cultivos y las observaciones satelitales."}], "children": [], "chain": ["area", "land", "cover", "vegetation", "agronomic-conditions"]}, {"id": "chapter-specific-data", "name_en": "Chapter-Specific Data", "name_es": "Datos Específicos del Capítulo", "def_en": "Data sets used exclusively within a particular chapter of a textbook or course.", "def_es": "Conjuntos de datos utilizados exclusivamente dentro de un Capítulo particular de un libro de texto o curso.", "level": 0, "category": "primitive", "kind": "primitive", "freq": 1, "sources": "", "parents": [], "children": [], "chain": ["chapter-specific-data"]}, {"id": "shared-teaching-artifacts", "name_en": "Shared Teaching A op and manage satellite missions for remote sensing.", "bs": "Agencias espaciales como la NASA desarrollan y gestionan misiones satelitales para teledetección."}], "children": [], "chain": ["images", "satellite", "landsat", "harmonized-landsat-sentinel", "sentinel-missions", "space-agency"]}, {"id": "segment", "name_en": "Segment", "name_es": "Segmento", "def_en": "A group of contiguous pixels representing a homogeneous area (e.g., an agricultural parcel) in object-based image analysis.", "def_es": "Un grupo de píxeles contiguos que representa un área homogénea (por ejemplo, una parcela agrícola) en el análisis de imágenes basado en objetos.", "level": 3, "category": "method", "kind": "concept", "freq": 1, "sources": "ct_mexico · ct_poland", "parents": [{"id": "pixels", "be": "Segments group meaningful regions from pixels, used in object-based classification.", "bs": "Los segmentos agrupan regiones significativas a partir de píxeles, utilizados en clasificación basada en objetos."}, {"id": "image-segmentation", "be": "A segment is a group of contiguous pixels produced by image segmentation, representing a homogeneous area.", "bs": "Un segmento es un grupo de píxeles contiguos producido por segmentación de imágenes, que representa un área homogénea."}], "children": [], "chain": ["images", "pixels", "image-segmentation", "segment"]}, {"id": "drone", "name_en": "Drone", "name_es": "Dron", "def_en": "An unmanned aerial vehicle used for capturing very-high-resolution imagery and crop growth data over small areas.", "def_es": "Un vehículo aéreo no tripulado utilizado para capturar imágenes de muy alta resolución y datos de crecimiento de cultivos en áreas pequeñas.", "level": 7, "category": "platform", "kind": "concept", "freq": 1, "sources": "uav_wheat_growth · uav_crop_growth", "parents": [{"id": "uav-imagery", "be": "Drone imagery provides ultra-high spatial resolution data for detailed crop monitoring.", "bs": "Las imágenes de dron proporcionan datos de resolución ult sférica convierte la radiancia en el tope de la atmósfera a reflectancia superficial para un análisis preciso."}], "children": [], "chain": ["images", "pixels", "values", "reflectance", "surface-reflectance", "atmospheric-correction"]}, {"id": "utm-zone", "name_en": "UTM zone", "name_es": "zona UTM", "def_en": "A 6-degree-wide longitudinal division of the Universal Transverse Mercator coordinate system used for accurate spatial measurements.", "def_es": "Una división longitudinal de 6 grados de ancho del sistema de coordenadas Universal Transversal de Mercator, utilizada para mediciones espaciales precisas.", "level": 6, "category": "data", "kind": "concept", "freq": 1, "sources": "th_data_sources · uav_agriculture_cook_islands", "parents": [{"id": "military-grid-reference-system", "be": "The Military Grid Reference System extends UTM zones by adding a grid of 100 km squares for precise location.", "bs": "El Sistema de Referencia de Cuadrícula Militar extiende las zonas UTM añadiendo una cuadrícula de cuadrados de 100 km para una ubicación precisa."}, {"id": "tiling-system", "be": "UTM zones partition the Earth into zones for consistent mapping and tile organization.", "bs": "Las zonas UTM dividen la Tierra en zonas para un mapeo consistente y organización de teselas."}, {"id": "coordinate-system", "be": "A UTM zone is a 6-degree longitudinal division of the Universal Transverse Mercator coordinate system.", "bs": "Una zona UTM es una división longitudinal de 6 grados del sistema de coordenadas Universal Transversal de Mercator."}], "children": [], "chain": ["data", "samples", "classification", "map", "basemap", "coordinate-system", "utm-zone"]}, {"id": "tiling-system", "name_en": "Tiling system", "name_es": "Sistema de teselas", "def_en": "A spatial partition that divides the Earth's surface into regular, uniquely identified grid cells (tiles) used to organize satellite image collections, such as the MGRS grid for Sentinel-2 or the WRS-2 for Landsat, enabling consistent data management and processing.", "def_es": "Una partición espacial que divide la superficie de la Tierra en celdas de cuadrícula regulares e identificadas de manera única (teselas) utilizadas para organizar colecciones de imágenes satelitales, como la cuadrícula MGRS para Sentinel-2 o la WRS-2 para Landsat, permitiendo una gestión y procesamiento de datos consistentes.", "level": 4, "category": "data", "kind": "concept", "freq": 1, "sources": "th_data_sources", "parents": [{"id": "grid", "be": "A tiling system divides the Earth into regular grid cells for managing large satellite image collections.", "bs": "Un sistema de teselas divide la Tierra en celdas de cuadrícula regulares para gestionar grandes colecciones de imágenes satelitales."}, {"id": "military-grid-reference-system", "be": "The Military Grid Reference System is a standard tiling system used for global satellite data organization.", "bs": "El Sistema de Referencia de Cuadrícula Militar es un sistema de teselas estándar utilizado para la organización global de datos satelitales."}], "children": ["utm-zone"], "chain": ["images", "tiles", "grid", "military-grid-reference-system", "tiling-system"]}, {"id": "stateless-data", "name_en": "Stateless data", "name_es": "Datos sin estado", "def_en": "Data that is managed without persistent storage, state, or lifecycle management, as with OCI artifacts mounted as read-only volumes in Kubernetes sessions, enabling fast startup, automatic caching, and garbage collection without manual cleanup.", "def_es": "Datos que se gestionan sin almacenamiento persistente, estado o ciclo de vida, como los artefactos OCI montados como volúmenes de solo lectura en sesiones de Kubernetes, lo que permite un inicio rápido, almacenamiento en caché automático y recolección de basura sin limpieza manual.", "level": 1, "category": "data", "kind": "concept", "freq": 1, "sources": "howto", "parents": [{"id": "container-image", "be": "Stateless data uses container images for immutable, versioned snapshots of chapter data.", "bs": "Los datos sin estado utilizan imágenes de contenedor para instantáneas inmutables y versionadas de los datos del capítulo."}], "children": ["oci-artifact"], "chain": ["container-image", "stateless-data"]}, {"id": "ard", "name_en": "ARD", "name_es": "ARD", "def_en": "Analysis Ready Data: satellite data processed to meet standards defined by CEOS, including geometric, radiometric, and atmospheric corrections, so that images are consistent across sensors, times, and locations, with cloud and shadow masking included; prepared for direct use in analysis without further preprocessing.", "def_es": "Datos Listos para Análisis: datos satelitales procesados para cumplir con los estándares definidos por CEOS, que incluyen correcciones geométricas, radiométricas y atmosféricas, de modo que las imágenes sean consistentes entre sensores, tiempos y ubicaciones, con enmascaramiento de nubes y sombras incluido; preparados para uso directo en análisis sin preprocesamiento adicional.", "level": 3, "category": "data", "kind": "concept", "freq": 1, "sources": "th_data_sources", "parents": [{"id": "cloud-collections", "be": "Cloud collections often consist of Analysis Ready Data (ARD) to simplify downstream processing.", "bs": "Las colecciones en la nube a menudo consisten en Datos Listos para Análisis (ARD) para simplificar el procesamiento posterior."}, {"id": "radiometric-corrections", "be": "ARD processing includes radiometric corrections to produce consistent surface reflectance products.", "bs": "El procesamiento ARD incluye correcciones radiométricas para producir productos consistentes de reflectancia superficial."}, {"id": "analysis-ready-data", "be": "ARD stands for Analysis Ready Data, which has been geometrically and radiometrically corrected.", "bs": "ARD significa Datos Listos para Análisis, que han sido corregidos geométrica y radiométricamente."}], "children": [], "chain": ["images", "cloud", "cloud-collections", "ard"]}, {"id": "area-frame", "name_en": "Area frame", "name_es": "Marco de área", "def_en": "A sampling method based on dividing the land surface into contiguous, exhaustive area units (such as grid cells or segments), from which a probability sample is selected. It is used to estimate land cover proportions and crop areas without relying on pre-existing farmer lists.", "def_es": "Método de muestreo que divide la superficie terrestre en unidades de área exhaustivas y contiguas (como celdas de cuadrícula o segmentos), de las cuales se selecciona una muestra probabilística. Se utiliza para estimar proporciones de cobertura del suelo y áreas de cultivo sin depender de listas preexistentes de agricultores.", "level": 8, "category": "statistic", "kind": "concept", "freq": 1, "sources": "crop_statistics_regression", "parents": [{"id": "grid", "be": "Area frames use a grid to partition the land into contiguous cells for random sampling.", "bs": "Los marcos de área utilizan una cuadrícula para dividir la tierra en celdas para el muestreo aleatorio."}, {"id": "sampling-frame", "be": "An area frame is a sampling frame based on exhaustive area units like grid cells.", "bs": "Un marco de área es un marco de muestreo basado en unidades de área exhaustivas como celdas de cuadrícula."}], "children": [], "chain": ["data", "statistics", "estimates", "estimation", "estimator", "design-estimator", "sample-design", "sampling-frame", "area-frame"]}, {"id": "list-frame", "name_en": "List frame", "name_es": "Marco de lista", "def_en": "A sampling method where the population of agricultural holdings or parcels is enumerated in a list (often from a census), and a sample is selected from that list. It typically provides one georeferenced centroid per parcel without direct area measurement.", "def_es": "Un método de muestreo donde la población de explotaciones agrícolas o parcelas se enumera en una lista (a menudo de un censo) y se selecciona una muestra de esa lista. Por lo general, proporciona un centroide georreferenciado por parcela sin medición directa del área.", "level": 8, "category": "method", "kind": "concept", "freq": 1, "sources": "crop_statistics_calibration", "parents": [{"id": "sampling-frame", "be": "A list frame is a sampling frame that enumerates all agricultural holdings or parcels in a list.", "bs": "Un marco de lista es un marco de muestreo que enumera todas las explotaciones agrícolas o parcelas en una lista."}], "children": ["agricultural-holding"], "chain": ["data", "statistics", "estimates", "estimation", "estimator", "design-estimator", "sample-design", "sampling-frame", "list-frame"]}, {"id": "spectral-signature", "name_en": "Spectral signature", "name_es": "Firma espectral", "def_en": "The unique pattern of electromagnetic radiation reflected or emitted by a surface feature across different wavelengths. Different materials (e.g., healthy vegetation, bare soil, water) have distinct spectral signatures, enabling their identification and discrimination in remote sensing imagery.", "def_es": "El patrón único de radiación electromagnética reflejada o emitida por una característica de la superficie a través de diferentes longitudes de onda. Diferentes materiales (por ejemplo, vegetación sana, suelo desnudo, agua) tienen firmas espectrales distintas, lo que permite su identificación y discriminación en imágenes de teledetección.", "level": 1, "category": "phenomenon", "kind": "concept", "freq": 1, "sources": "th_remote_sensing", "parents": [{"id": "spectral-reflectance", "be": "A spectral signature is the unique spectral reflectance pattern across wavelengths, distinguishing different surface materials.", "bs": "Una firma espectral es el patrón único de reflectancia espectral en longitudes de onda, que distingue diferentes materiales de superficie."}, {"id": "wavelength", "be": "A spectral signature plots reflectance values as a function of wavelength, creating a pattern for identification.", "bs": "Una firma espectral grafica los valores de hetic samples for minority classes by interpolating between nearest neighbors in the feature space. It is used to rebalance imbalanced training datasets, reducing bias towards majority classes and improving classifier performance.", "def_es": "Técnica de sobremuestreo sintético de minorías: un método de aumento de datos que genera muestras sintéticas para clases minoritarias mediante interpolación entre vecinos más cercanos en el espacio de atributos. Se utiliza para reequilibrar conjuntos de datos de entrenamiento desbalanceados, reduciendo el sesgo hacia las clases mayoritarias y mejorando el rendimiento del clasificador.", "level": 1, "category": "method", "kind": "concept", "freq": 1, "sources": "th_quality_control", "parents": [{"id": "oversampling", "be": "SMOTE oversamples minority classes by generating synthetic examples, balancing imbalanced training datasets.", "bs": "SMOTE sobremuestrea las clases minoritarias generando ejemplos sintéticos, equilibrando conjuntos de datos de entrenamiento desbalanceados."}], "children": [], "chain": ["oversampling", "smote"]}, {"id": "som", "name_en": "SOM", "name_es": "SOM", "def_en": "Self-Organizing Map: an unsupervised neural network that reduces high-dimensional data (e.g., satellite image time series) to a two-dimensional grid while preserving topological relationships. It is used for clustering, visualizing data patterns, and detecting noisy or mislabeled training samples.", "def_es": "Mapa autoorganizado: una red neuronal no supervisada que reduce datos de alta dimensión (por ejemplo, series temporales de imágenes satelitales) a una cuadrícula bidimensional preservando relaciones topológicas. Se utiliza para agrupamiento, visualización de patrones de datos y detección de muestras de entrenamiento ruidosas o mal etiquetadas.", "level": 7, "category": "method", "kind": "concept", "freq": 1, "sources": "th_quality_control", "parents": [{"id": "time-series", "be": "SOM organizes input time series into clusters, preserving topological relationships for pattern discovery.", "bs": "SOM organiza series temporales de entrada en clústeres, preservando relaciones topológicas para el descubrimiento de patrones."}, {"id": "clustering-algorithm", "be": "SOM is an unsupervised clustering algorithm that maps high-dimensional time series to a 2D grid.", "bs": "SOM es un algoritmo de agrupamiento no supervisado que mapea series temporales de alta dimensión a una cuadrícula 2D."}], "children": [], "chain": ["data", "samples", "training", "machine-learning", "algorithm", "cluster", "clustering-algorithm", "som"]}, {"id": "coordinate-system", "name_en": "Coordinate system", "name_es": "Sistema de coordenadas", "def_en": "A reference system used to uniquely identify the location of points on the Earth's surface. It includes geographic coordinates (latitude/longitude) as well as projected coordinate systems (e.g., UTM) that convert the Earth's curved surface to a flat map, enabling area and distance calculations.", "def_es": "Un sistema de referencia utilizado para identificar de manera única la ubicación de puntos en la superficie de la Tierra. Incluye coordenadas geográficas (latitud/longitud), así como sistemas de coordenadas proyectadas (por ejemplo, UTM) que convierten la superficie curva de la Tierra a un mapa plano, permitiendo cálculos de área y distancia.", "level": 5, "category": "other", "kind": "concept", "freq": 1, "sources": "th_data_sources", "parents": [{"id": "georeferenced-information", "be": "A coordinate system provides the reference for georeferenced information, linking data to locations.", "bs": "Un sistema de coordenadas proporciona la referencia para la información georreferenciada, vinculando los datos con ubicaciones."}, {"id": "basemap", "be": "A basemap is projected in a coordinate system to align with other geospatial layers.", "bs": "Un mapa base se proyecta en un sistema de coordenadas para alinearse con otras capas geoespaciales."}, {"id": "coordinates", "be": "A c thin a study area."}, {"src": "chance-agreement", "dst": "cohen-s-kappa", "bridge": "Cohen's Kappa corrects observed agreement for chance agreement, giving a reliability measure."}, {"src": "tiling-system", "dst": "utm-zone", "bridge": "UTM zones partition the Earth into zones for consistent mapping and tile organization."}, {"src": "stateless-data", "dst": "oci-artifact", "bridge": "Stateless data is managed as OCI artifacts mounted as read-only volumes, requiring no persistent storage."}, {"src": "list-frame", "dst": "agricultural-holding", "bridge": "List frames rely on a list of agricultural holdings from administrative registers or census data."}, {"src": "coordinate-system", "dst": "utm-zone", "bridge": "A UTM zone is a 6-degree longitudinal division of the Universal Transverse Mercator coordinate system."}, {"src": "statistical-unit", "dst": "population", "bridge": "The population is the complete set of statistical units (e.g., all fields) from which a sample is drawn."}, {"src": "sar-backscatter", "dst": "radar-signal", "bridge": "SAR backscatter is the portion of the radar signal reflected back to the satellite sensor."}, {"src": "per-pixel-quality", "dst": "quality-band", "bridge": "A quality band is a raster layer providing per-pixel quality information for satellite imagery."}, {"src": "kappa", "dst": "inter-rater-agreement", "bridge": "Inter-rater agreement is often quantified using Kappa statistics to account for chance agreement."}, {"src": "unmanned-aerial-vehicle", "dst": "drone", "bridge": "A drone is another term for an unmanned aerial vehicle that captures high-resolution imagery over fields."}, {"src": "chlorophyll", "dst": "chlorophyll-absorption", "bridge": "Chlorophyll absorption refers to the uptake of light energy by plant chlorophyll molecules."}, {"src": "chlorophyll", "dst": "vegetation-health", "bridge": "Chlorophyll content is linked to vegetation health, as it drives photosynthesis."}, {"src": "oversampling", "dst": "smote", "bridge": const palette=["#2e7d32","#388e3c","#558b2f","#9e9d24","#f9a825","#ef6c00","#d84315","#c62828","#ad1457","#6a1b9a","#4527a0","#283593"];
const colorFor=l=>palette[Math.min(l,palette.length-1)];
const byId=Object.fromEntries(DATA.nodes.map(n=>[n.id,n]));
const nodes=new vis.DataSet(DATA.nodes.map(n=>({id:n.id,label:n.name_en,level:n.level,
  color:colorFor(n.level),shape:n.kind==='primitive'?'dot':'box',
  font:{color:'#e6edf3',size:14},value:Math.max(1,n.freq)})));
const edges=new vis.DataSet(DATA.edges.map(e=>({from:e.src,to:e.dst,arrows:'to',
  color:{color:'#30425e'},title:e.bridge||''})));
const net=new vis.Network(document.getElementById('graph'),{nodes,edges},{
  layout:{hierarchical:{enabled:true,direction:'UD',sortMethod:'directed',levelSeparation:150,nodeSpacing:115}},
  physics:false,interaction:{hover:true,tooltipDelay:120}});
function chainHtml(id){const c=byId[id].chain||[];return c.map(x=>`<a onclick="show('${x}')">${byId[x].name_en}</a>`).join(' → ');}
function show(id){const n=byId[id];if(!n)return;
  const pre=(n.parents||[]).map(p=>`<div><a onclick="show('${p.id}')">${byId[p.id].name_en}</a><div class='bridge'>${p.be||''}<br><span class='es'>${p.bs||''}</span></div></div>`).join('');
  const unl=(n.children||[]).map(c=>`<a onclick="show('${c}')">${byId[c].name_en}</a>`).join(', ');
  document.getElementById('info').innerHTML=
   `<h2>${n.name_en}</h2><h2 class='es'>${n.name_es}</h2>
    <p><span class='pill'>level ${n.level}</span><span class='pill'>${n.category}</span></p>
    <p><b>EN.</b> ${n.def_en}</p><p class='es'><b>ES.</b> ${n.def_es}</p>
    <p class='muted'>${n.sources?('sources: '+n.sources):''}</p>
    <h3>Understand first / Entiende primero</h3>${pre||'<p class="muted">— fundamental —</p>'}
    <h3>Lineage / Linaje</h3><p>${chainHtml(id)}</p>
    <h3>This unlocks / Esto habilita</h3><p>${unl||'—'}</p>`;
  net.selectNodes([id]);net.focus(id,{scale:1.0,animation:true});}
net.on('click',p=>{if(p.nodes.length)show(p.nodes[0]);});
document.getElementById('search').addEventListener('keydown',e=>{if(e.key!=='Enter')return;
  const q=e.target.value.toLowerCase();
  const hit=DATA.nodes.find(n=>n.name_en.toLowerCase().includes(q)||n.name_es.toLowerCase().includes(q));
  if(hit)show(hit.id);});
</script></body></html>
