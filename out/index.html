th Africa o Sen4Stat.","lvl":1,"ord":146,"cat":"software","kind":"concept","src":"th_data_sources · ct_zimbabwe","al":"data systems sistemas de datos data systems"},{"id":"classification-results","en":"Classification results","es":"Resultados de clasificación","den":"The output of a classifier, a map where each pixel is labeled with a land cover or crop type, sometimes with associated prediction probabilities.","des":"La salida de un clasificador, un mapa donde cada píxel está etiquetado con un tipo de cobertura del suelo o cultivo, a veces con probabilidades de predicción asociadas.","lvl":1,"ord":143,"cat":"product","kind":"concept","src":"th_validation · th_uncertainty","al":"classification results resultados de clasificación classification results"},{"id":"classification-algorithm","en":"Classification algorithm","es":"Algoritmo de clasificación","den":"A computational method that uses labeled samples to learn patterns and then assigns class labels to new observations, such as Random Forest or neural networks.","des":"Un método computacional que utiliza muestras etiquetadas para aprender patrones y luego asigna etiquetas de clase a nuevas observaciones, como Random Forest o redes neuronales.","lvl":5,"ord":463,"cat":"method","kind":"concept","src":"th_machine_learning · th_machine_learning","al":"classification algorithm algoritmo de clasificación classification algorithm"},{"id":"vegetation-monitoring","en":"Vegetation monitoring","es":"Monitoreo de vegetación","den":"The use of satellite-derived spectral indices, like NDVI, to track changes in plant health, growth, and phenology over time.","des":"El uso de índices espectrales derivados de satélites, como el NDVI, para rastrear cambios en la salud de la vegetación, el crecimiento y la fenología a lo largo del tiempo.","lvl":3,"ord":257,"cat":"method","kind":"concept","src":"th_remote_sensing · cy_finland","al":"vegetation monitoring monitoreo de vegetación vegetation monitoring seguimiento de la vegetación"},{"id":"range","en":"Range","es":"Rango","den":"The span of wavelengths (spectral range) or the spatial area (coverage) that a remote sensing sensor can detect.","des":"El intervalo de longitudes de onda (rango espectral) o el área espacial (cobertura) que un sensor de teledetección puede detectar.","lvl":0,"ord":29,"cat":"primitive","kind":"concept","src":"th_remote_sensing · th_data_sources","al":"range rango range"},{"id":"machine","en":"Machine","es":"Máquina","den":"A trained algorithm, typically from machine learning, that maps input features to output predictions or classifications.","des":"Un algoritmo entrenado, típicamente de aprendizaje automático, que mapea atributos de entrada a predicciones o clasificaciones de salida.","lvl":1,"ord":123,"cat":"primitive","kind":"concept","src":"th_machine_learning · th_quality_control","al":"machine máquina machine"},{"id":"map-validation","en":"Map Validation","es":"Validación de mapas","den":"The assessment of a classified map's accuracy by comparing it against independent, probabilistically selected reference samples, using area-weighted error matrices.","des":"La evaluación de la exactitud de un mapa clasificado mediante su comparación con muestras de referencia independientes seleccionadas probabilísticamente, utilizando matrices de error ponderadas por área.","lvl":4,"ord":399,"cat":"method","kind":"concept","src":"th_validation · th_validation · th_validation","al":"map validation validación de mapas map validation"},{"id":"model-accuracy","en":"Model accuracy","es":"Precisión del modelo","den":"A measure of how often a classification model correctly predicts the true class, often reported as overall accuracy or per-class user's and producer's accuracies.","des":"Una medida de la frecuencia con la que un modelo de clasificación predice correctamente la clase verdadera, a menudo reportada como precisión general o precisiones de usuario y productor por clase.","lvl":3,"ord":293,"cat":"metric","kind":"concept","src":"th_validation · th_quality_control","al":"model accuracy precisión del modelo model accuracy exactitud del modelo"},{"id":"landscapes","en":"Landscapes","es":"Paisajes","den":"Geographic areas with distinctive patterns of land cover, such as agricultural fields, forests, or urban zones, which influence the spectral-temporal signatures captured by satellites.","des":"Áreas geográficas con patrones distintivos de cobertura del suelo, como campos agrícolas, bosques o zonas urbanas, que influyen en las firmas espectro-temporales capturadas por satélites.","lvl":2,"ord":194,"cat":"phenomenon","kind":"concept","src":"th_lucc · ct_chile","al":"landscapes paisajes landscapes"},{"id":"analysis-system","en":"Analysis System","es":"Sistema de análisis","den":"A software framework that provides an integrated workflow for processing Earth observation data, from data access to classification and mapping, often with reproducibility features.","des":"Un marco de software que proporciona un flujo de trabajo integrado para procesar datos de observación de la Tierra, desde el acceso a datos hasta la clasificación y el mapeo, a menudo con características de reproducibilidad.","lvl":1,"ord":147,"cat":"software","kind":"concept","src":"howto · ct_zimbabwe","al":"analysis system sistema de análisis analysis system"},{"id":"patterns","en":"Patterns","es":"Patrones","den":"Idealized approximations of the time series associated with each land cover class, derived from training data. They summarize typical temporal dynamics across spectral bands for a given class.","des":"Aproximaciones idealizadas de las series temporales asociadas a cada clase de cobertura del suelo, derivadas de datos de entrenamiento. Resumen las dinámicas temporales típicas en todas las bandas espectrales para una clase determinada.","lvl":2,"ord":226,"cat":"primitive","kind":"concept","src":"ct_chile","al":"patterns patrones patterns"},{"id":"terrain","en":"Terrain","es":"Terreno","den":"The physical features of the Earth's surface, including elevation and slope. Topographic data from digital elevation models can improve land cover classification in mountainous areas.","des":"Las características físicas de la superficie de la Tierra, incluyendo elevación y pendiente. Los datos topográficos provenientes de modelos digitales de elevación pueden mejorar la clasificación de cobertura del suelo en zonas montañosas.","lvl":1,"ord":157,"cat":"phenomenon","kind":"concept","src":"ct_chile","al":"terrain terreno terrain"},{"id":"map-sf","en":"Map SF","es":"Mapa SF","den":"A classified data cube that has been labeled by assigning each pixel the land cover class with the highest probability. It represents the final thematic map output.","des":"Un cubo de datos clasificado que ha sido etiquetado asignando a cada píxel la clase de cobertura del suelo con mayor probabilidad. Representa el producto cartográfico temático final.","lvl":3,"ord":283,"cat":"product","kind":"concept","src":"th_validation","al":"map sf mapa sf map sf"},{"id":"classification-method","en":"Classification method","es":"Método de clasificación","den":"A machine learning or deep learning algorithm used to assign land cover labels to pixels based on their spectral-temporal features. Examples include Random Forest, XGBoost, and TempCNN.","des":"Un algoritmo de aprendizaje automático o profundo utilizado para asignar etiquetas de cobertura del suelo a los píxeles basándose en sus características espectro-temporales. Los ejemplos incluyen Random Forest, XGBoost y TempCNN.","lvl":5,"ord":464,"cat":"method","kind":"concept","src":"th_machine_learning","al":"classification method método de clasificación classification method"},{"id":"reliable-statistical-analyses","en":"Reliable statistical analyses","es":"Análisis estadísticos fiables","den":"Analyses that produce unbiased estimates with valid confidence intervals, often by combining satellite map predictions with a small random sample of ground-truth data to correct for prediction errors.","des":"Análisis que producen estimaciones insesgadas con intervalos de confianza válidos, a menudo combinando predicciones de mapas satelitales con una pequeña muestra aleatoria de datos de verdad terreno para corregir errores de predicción.","lvl":4,"ord":352,"cat":"method","kind":"concept","src":"crop_statistics_ppi","al":"reliable statistical analyses análisis estadísticos fiables reliable statistical analyses"},{"id":"predictors","en":"Predictors","es":"Predictores","den":"Variables used in a model to predict an outcome. In yield forecasting, predictors include satellite-derived vegetation indices, temperature, precipitation, and soil moisture data.","des":"Variables utilizadas en un modelo para predecir un resultado. En la predicción del rendimiento, los predictores incluyen índices de vegetación derivados de satélites, datos de temperatura, precipitación y humedad del suelo.","lvl":2,"ord":185,"cat":"data","kind":"concept","src":"cy_poland","al":"predictors predictores predictors"},{"id":"reference-datasets","en":"Reference datasets","es":"Conjuntos de datos de referencia","den":"Collections of ground-truth observations used for training and validating classification models. They must be collected independently of the classification process and accurately labeled.","des":"Colecciones de observaciones de verdad terreno utilizadas para entrenar y validar modelos de clasificación. Deben recolectarse independientemente del proceso de clasificación y etiquetarse con precisión.","lvl":2,"ord":171,"cat":"data","kind":"concept","src":"th_validation","al":"reference datasets conjuntos de datos de referencia reference datasets reference data"},{"id":"regional-field-experts","en":"Regional field experts","es":"Expertos de campo regionales","den":"Specialists with knowledge of local agronomic conditions who verify and adjust model-based yield estimates using their experience and contact with local agricultural producers.","des":"Especialistas con conocimiento de las condiciones agronómicas locales que verifican y ajustan las estimaciones de rendimiento basadas en modelos utilizando su experiencia y contacto con productores agrícolas locales.","lvl":1,"ord":152,"cat":"other","kind":"concept","src":"ct_poland","al":"regional field experts expertos de campo regionales regional field experts"},{"id":"tools","en":"Tools","es":"Herramientas","den":"Software systems, platforms, and libraries used for processing, analyzing, and classifying Earth observation data. Examples include SITS, Sen4Stat, Google Earth Engine, and Python packages.","des":"Sistemas de software, plataformas y bibliotecas utilizadas para procesar, analizar y clasificar datos de observación de la Tierra. Los ejemplos incluyen SITS, Sen4Stat, Google Earth Engine y paquetes de Python.","lvl":2,"ord":244,"cat":"primitive","kind":"concept","src":"introduction","al":"tools herramientas tools"},{"id":"statistical-methods","en":"Statistical methods","es":"Métodos estadísticos","den":"Techniques for designing surveys, analyzing data, and drawing inferences. In remote sensing, they include sampling design, unbiased area estimation, accuracy assessment, and regression estimators.","des":"Técnicas para diseñar encuestas, analizar datos y realizar inferencias. En teledetección, incluyen diseño muestral, estimación de área insesgada, evaluación de precisión y estimadores de regresión.","lvl":5,"ord":458,"cat":"method","kind":"concept","src":"th_validation","al":"statistical methods métodos estadísticos statistical methods"},{"id":"statistical-analysis","en":"Statistical analysis","es":"Análisis estadístico","den":"The process of collecting, exploring, and presenting large quantities of data to discover underlying patterns and trends. In this handbook, it refers to generating official agricultural statistics from EO data.","des":"El proceso de recolectar, explorar y presentar grandes cantidades de datos para descubrir patrones y tendencias subyacentes. En este manual, se refiere a la generación de estadísticas agrícolas oficiales a partir de datos EO.","lvl":6,"ord":509,"cat":"method","kind":"concept","src":"index","al":"statistical analysis análisis estadístico statistical analysis"},{"id":"machine-learning-models","en":"Machine learning models","es":"Modelos de aprendizaje automático","den":"Algorithms trained on data to make predictions or decisions. For satellite image classification, they learn to assign land cover labels based on spectral and temporal patterns. Examples include Random Forest and TempCNN.","des":"Algoritmos entrenados con datos para realizar predicciones o tomar decisiones. Para la clasificación de imágenes satelitales, aprenden a asignar etiquetas de cobertura del suelo basándose en patrones espectrales y temporales. Los ejemplos incluyen Random Forest y TempCNN.","lvl":4,"ord":387,"cat":"method","kind":"concept","src":"th_machine_learning","al":"machine learning models modelos de aprendizaje automático machine learning models"},{"id":"data-organization-patterns","en":"Data Organization Patterns","es":"Patrones de organización de datos","den":"Standard ways to store chapter-specific and shared data within a project. Chapter-specific data is placed in `data/<chapter>/` directories, while shared teaching artifacts are in an `etc/` directory.","des":"Formas estándar de almacenar datos específicos del capítulo y compartidos dentro de un proyecto. Los datos específicos del capítulo se colocan en directorios `data/<chapter>/`, mientras que los recursos didácticos compartidos se encuentran en un directorio `etc/`.","lvl":3,"ord":344,"cat":"method","kind":"concept","src":"howto","al":"data organization patterns patrones de organización de datos data organization patterns"},{"id":"metrics","en":"Metrics","es":"Métricas","den":"Quantitative measures used to evaluate classification or model performance. Common examples include overall accuracy, F1-score, precision, recall, and kappa coefficient.","des":"Medidas cuantitativas utilizadas para evaluar el rendimiento de la clasificación o del modelo. Los ejemplos comunes incluyen la precisión general, la puntuación F1, la precisión, la exhaustividad y el coeficiente Kappa.","lvl":3,"ord":294,"cat":"metric","kind":"concept","src":"th_validation","al":"metrics métricas metrics"},{"id":"som-analysis","en":"SOM analysis","es":"análisis SOM","den":"A quality control method for training data that uses Self-Organizing Maps to cluster time series, detect confusion between labels, and identify noisy or mislabeled samples for removal.","des":"Un método de control de calidad para datos de entrenamiento que utiliza mapas autoorganizados para agrupar series temporales, detectar confusión entre etiquetas e identificar muestras ruidosas o mal etiquetadas para su eliminación.","lvl":0,"ord":30,"cat":"method","kind":"concept","src":"th_quality_control","al":"som analysis análisis som som analysis análisis de mapas autoorganizados"},{"id":"statisticians","en":"Statisticians","es":"Estadísticos","den":"Professionals specialized in the theory and application of statistical methods. In the context of this handbook, they work in National Statistical Offices to produce official agricultural statistics.","des":"Profesionales especializados en la teoría y aplicación de métodos estadísticos. En el contexto de este manual, trabajan en oficinas nacionales de estadística para producir estadísticas agrícolas oficiales.","lvl":2,"ord":177,"cat":"other","kind":"concept","src":"introduction","al":"statisticians estadísticos statisticians"},{"id":"spatial-analysis","en":"Spatial Analysis","es":"Análisis espacial","den":"The process of examining locations, attributes, and relationships of features in spatial data. In this handbook, it includes operations like zonal statistics, buffering, and coordinate reference system harmonization.","des":"El proceso de examinar ubicaciones, atributos y relaciones de características en datos espaciales. En este manual, incluye operaciones como estadísticas zonales, búfer y armonización del sistema de referencia de coordenadas.","lvl":5,"ord":490,"cat":"method","kind":"concept","src":"uav_agriculture_cook_islands","al":"spatial analysis análisis espacial spatial analysis spatial analysis"},{"id":"statistics-production","en":"Statistics production","es":"Producción de estadísticas","den":"The end-to-end process of generating official statistics, from data collection and processing to analysis, validation, and dissemination. It includes the integration of EO data into official statistical workflows.","des":"El proceso integral de generar estadísticas oficiales, desde la recopilación y el procesamiento de datos hasta el análisis, la validación y la difusión. Incluye la integración de datos de observación de la Tierra en los flujos de trabajo estadísticos oficiales.","lvl":7,"ord":540,"cat":"method","kind":"concept","src":"th_alignment","al":"statistics production producción de estadísticas statistics production"},{"id":"reproducible-analysis-system","en":"Reproducible analysis system","es":"Sistema de análisis reproducible","den":"A system that allows readers to launch a chapter's analysis in a one-click, pre-configured JupyterLab environment with all code, data, and dependencies ready.","des":"Un sistema que permite a los lectores iniciar el análisis de un capítulo en un entorno JupyterLab preconfigurado con un solo clic, con todo el código, los datos y las dependencias listos.","lvl":2,"ord":243,"cat":"method","kind":"concept","src":"howto#reproducible-analysis-system","al":"reproducible analysis system sistema de análisis reproducible reproducible analysis system reproducible analysis"},{"id":"design-estimator","en":"Design estimator","es":"Estimador de diseño","den":"An estimator based on the sampling design (defined by inclusion probabilities), which is design-consistent, meaning it becomes unbiased as the sample size increases under that design.","des":"Un estimador basado en el diseño muestral (definido por probabilidades de inclusión), que es consistente con el diseño, lo que significa que se vuelve insesgado a medida que aumenta el tamaño de la muestra bajo ese diseño.","lvl":5,"ord":459,"cat":"statistic","kind":"concept","src":"crop_statistics_calibration#national-level-estimators","al":"design estimator estimador de diseño estimators design estimator"},{"id":"component","en":"Component","es":"Componente","den":"A custom software element in the reproducible analysis system that performs a specific task, such as building compute images, packaging data artifacts, generating a button, or deploying a session.","des":"Un elemento de software personalizado en el sistema de análisis reproducible que realiza una tarea específica, como construir imágenes de cómputo, empaquetar artefactos de datos, generar un botón o implementar una sesión.","lvl":1,"ord":155,"cat":"primitive","kind":"concept","src":"howto#the-five-core-components","al":"component componente component"},{"id":"data-scarce-regions","en":"Data scarce regions","es":"Regiones con escasez de datos","den":"Geographic areas with limited available reference data from field surveys, censuses, or other sources, making it difficult to train accurate machine learning models for crop mapping.","des":"Áreas geográficas con datos de referencia limitados disponibles de encuestas de campo, censos u otras fuentes, lo que dificulta entrenar modelos precisos de aprendizaje automático para el mapeo de cultivos.","lvl":3,"ord":305,"cat":"phenomenon","kind":"concept","src":"ad_world_cereal","al":"data scarce regions regiones con escasez de datos data scarce regions"},{"id":"cloud-collections","en":"Cloud collections","es":"Colecciones en la nube","den":"Organized sets of satellite images stored on cloud platforms, often as Analysis-Ready Data (ARD), accessible via STAC protocols and services like AWS, MPC, or CDSE.","des":"Conjuntos organizados de imágenes satelitales almacenados en plataformas en la nube, a menudo como datos listos para análisis, accesibles a través de protocolos STAC y servicios como AWS, MPC o CDSE.","lvl":2,"ord":217,"cat":"data","kind":"concept","src":"th_data_sources#ard-image-collections","al":"cloud collections colecciones en la nube cloud collections"},{"id":"land-cover-land-use-mapping","en":"LULC mapping","es":"mapeo LULC","den":"The process of using satellite imagery to create maps that classify land cover (e.g., forest) and land use (e.g., agriculture), essential for agricultural statistics and environmental monitoring.","des":"El proceso de utilizar imágenes satelitales para crear mapas que clasifican la cobertura del suelo (por ejemplo, bosque) y el uso del suelo (por ejemplo, agricultura), esencial para las estadísticas agrícolas y el monitoreo ambiental.","lvl":0,"ord":31,"cat":"method","kind":"concept","src":"ct_chile#introduction","al":"lulc mapping mapeo lulc lulc map lulc mapping mapeo de cobertura y uso del suelo"},{"id":"earth-observation-classifications","en":"EO classifications","es":"clasificaciones EO","den":"Labels assigned to pixels or objects in satellite imagery based on land cover or land use, often derived from machine learning models trained on reference data.","des":"Etiquetas asignadas a píxeles u objetos en imágenes satelitales basadas en la cobertura o el uso del suelo, a menudo derivadas de modelos de aprendizaje automático entrenados con datos de referencia.","lvl":4,"ord":414,"cat":"method","kind":"concept","src":"crop_statistics_calibration#crop-type-maps","al":"eo classifications clasificaciones eo eo classifications clasificaciones de observación de la tierra"},{"id":"identification","en":"Identification","es":"Identificación","den":"The process of recognizing and assigning a label (e.g., crop type) or detecting a feature (e.g., field parcel) from remotely sensed data, often through manual interpretation or automated algorithms.","des":"El proceso de reconocer y asignar una etiqueta (por ejemplo, tipo de cultivo) o detectar una característica (por ejemplo, parcela de campo) a partir de datos de teledetección, a menudo mediante interpretación manual o algoritmos.","lvl":3,"ord":302,"cat":"method","kind":"concept","src":"uav_field_parcels#introduction","al":"identification identificación identification"},{"id":"function","en":"Function","es":"Función","den":"In the reproducible analysis system, a Dagger SDK function that performs a build-time task, such as building compute images, packaging data artifacts, or generating metadata.","des":"En el sistema de análisis reproducible, una función del SDK de Dagger que realiza una tarea en tiempo de compilación, como construir imágenes de cómputo, empaquetar artefactos de datos o generar metadatos.","lvl":0,"ord":32,"cat":"primitive","kind":"concept","src":"howto#dagger-sdk-implementation","al":"function función function"},{"id":"survey-approach","en":"Survey approach","es":"Enfoque de encuesta","den":"A statistical method that relies solely on a random sample of ground-truth data to estimate a quantity (e.g., mean yield) without using satellite map predictions.","des":"Un método estadístico que se basa únicamente en una muestra aleatoria de datos de verdad terreno para estimar una cantidad (por ejemplo, rendimiento medio) sin utilizar predicciones de mapa satelital.","lvl":5,"ord":460,"cat":"method","kind":"concept","src":"crop_statistics_ppi#mean-estimation","al":"survey approach enfoque de encuesta survey approach"},{"id":"uhr-cfp-dataset","en":"UHR CFP dataset","es":"conjunto de datos UHR CFP","den":"A dataset of ultra-high resolution (0.2m) UAV images paired with labels for cultivation field parcels, used to train and evaluate models for automated parcel vectorization.","des":"Un conjunto de datos de imágenes de UAV de resolución ultraalta (0,2 m) emparejadas con etiquetas para parcelas de campo de cultivo, utilizado para entrenar y evaluar modelos para la vectorización automatizada de parcelas.","lvl":4,"ord":357,"cat":"data","kind":"concept","src":"uav_field_parcels#experimental-area-and-data","al":"uhr cfp dataset conjunto de datos uhr cfp uhr cfp dataset conjunto de datos de very high resolution common field of practice"},{"id":"statistical-indicators","en":"Statistical indicators","es":"Indicadores estadísticos","den":"Quantitative measures used to evaluate model performance, such as coefficient of determination, root mean square error, and mean absolute error.","des":"Medidas cuantitativas utilizadas para evaluar el rendimiento del modelo, como el coeficiente de determinación, la raíz del error cuadrático medio y el error absoluto medio.","lvl":4,"ord":384,"cat":"statistic","kind":"concept","src":"uav_wheat_growth#model-evaluation-metrics","al":"statistical indicators indicadores estadísticos statistical indicators"},{"id":"radar","en":"Radar","es":"Radar","den":"A remote sensing technique that emits microwave signals and analyzes the returning echoes to observe the Earth's surface, capable of penetrating clouds and operating day or night.","des":"Una técnica de teledetección que emite señales de microondas y analiza los ecos de retorno para observar la superficie de la Tierra, capaz de penetrar nubes y funcionar de día o de noche.","lvl":4,"ord":408,"cat":"sensor","kind":"concept","src":"th_remote_sensing#introduction-to-remote-sensing-imagery","al":"radar radar radar"},{"id":"radar-vegetation-index","en":"Radar Vegetation Index","es":"Índice de Vegetación Radar","den":"An index derived from radar satellite data, such as the Dual-polarimetric Radar Vegetation Index (DpRVI), designed to track vegetation growth by measuring canopy structural complexity.","des":"Un índice derivado de datos satelitales de radar, como el Índice de Vegetación Radar Dual-Polarimétrico (DpRVI), diseñado para seguir el crecimiento de la vegetación midiendo la complejidad estructural del dosel.","lvl":5,"ord":479,"cat":"index","kind":"concept","src":"cy_colombia#dual-polarimetric-radar-vegetation-index-dprvi","al":"radar vegetation index índice de vegetación radar radar vegetation index rvi"},{"id":"data-cube","en":"Data cube","es":"Cubo de datos","den":"A three-dimensional array of satellite data with two spatial dimensions and one temporal dimension, where each cell has the same spatial resolution and regular time intervals, suitable for machine learning.","des":"Un arreglo tridimensional de datos satelitales con dos dimensiones espaciales y una dimensión temporal, donde cada celda tiene la misma resolución espacial e intervalos de tiempo regulares, adecuado para aprendizaje automático.","lvl":5,"ord":485,"cat":"data","kind":"concept","src":"th_data_cubes#regular-earth-observation-data-cubes","al":"data cube cubo de datos data cube local data cube"},{"id":"crop-assessment","en":"Crop Assessment","es":"Evaluación de cultivos","den":"The evaluation of crop condition, area, or yield, often using remote sensing, field surveys, and models, to inform agricultural decisions and food security monitoring.","des":"La evaluación de la condición, área o rendimiento de los cultivos, a menudo utilizando teledetección, encuestas de campo y modelos, para informar decisiones agrícolas y el monitoreo de la seguridad alimentaria.","lvl":3,"ord":309,"cat":"method","kind":"concept","src":"ad_world_cereal#demonstration","al":"crop assessment evaluación de cultivos crop assessment"},{"id":"official-agricultural-statistics","en":"Official agricultural statistics","es":"Estadísticas agrícolas oficiales","den":"Statistical data on agricultural production, area, and yield produced and disseminated by national statistical offices, adhering to standards for timeliness, accuracy, and reliability.","des":"Datos estadísticos sobre producción, área y rendimiento agrícola producidos y difundidos por las Oficinas Nacionales de Estadística, cumpliendo con estándares de puntualidad, exactitud y fiabilidad.","lvl":3,"ord":249,"cat":"statistic","kind":"concept","src":"ct_chile#introduction","al":"official agricultural statistics estadísticas agrícolas oficiales official agricultural statistics official statistics"},{"id":"cgi-algorithm","en":"CGI algorithm","es":"algoritmo CGI","den":"A method that monitors crop growth by computing multiple vegetation indices from UAV multispectral imagery, normalizing them, and extracting the first principal component to produce a continuous Crop Growth Index.","des":"Un método que monitorea el crecimiento de cultivos calculando múltiples índices de vegetación a partir de imágenes multiespectrales de UAV, normalizándolos y extrayendo el primer componente principal para producir un Índice de Crecimiento de Cultivos continuo.","lvl":5,"ord":493,"cat":"method","kind":"concept","src":"uav_crop_growth#methods","al":"cgi algorithm algoritmo cgi cgi algorithm algoritmo de cumbre de información global"},{"id":"label","en":"Label","es":"Etiqueta","den":"A categorical descriptor assigned to a sample or pixel in supervised classification, representing the land cover or crop type it belongs to.","des":"Un descriptor categórico asignado a una muestra o píxel en clasificación supervisada, que representa la cobertura del suelo o el tipo de cultivo al que pertenece.","lvl":2,"ord":198,"cat":"data","kind":"concept","src":"th_quality_control · th_machine_learning","al":"label etiqueta label labels"},{"id":"geoprocessing","en":"Geoprocessing","es":"Geoprocesamiento","den":"The manipulation and analysis of spatial data using specialized software to derive information, including operations like buffering, overlay, and spatial joins.","des":"La manipulación y análisis de datos espaciales utilizando software especializado para derivar información, incluyendo operaciones como búfer, superposición y uniones espaciales.","lvl":6,"ord":534,"cat":"method","kind":"concept","src":"th_parcel_extraction","al":"geoprocessing geoprocesamiento geoprocessing"},{"id":"statistical","en":"Statistical","es":"Estadístico","den":"Relating to mathematical methods for collecting, a r crop mapping, integrating field surveys, parcel systems, and citizen science. It reduces the cost of training data for Earth observation applications.","des":"Un marco impulsado por la comunidad para recopilar, armonizar, documentar y compartir datos de referencia para el mapeo de cultivos, integrando encuestas de campo, sistemas de parcelas y ciencia ciudadana. Reduce el costo de los datos de entrenamiento para aplicaciones de observación de la Tierra.","lvl":4,"ord":378,"cat":"software","kind":"concept","src":"ad_world_cereal · ad_world_cereal","al":"worldcereal reference data module módulo de datos de referencia de worldcereal worldcereal reference data module worldcereal reference data module"},{"id":"topographic-information","en":"Topographic information","es":"Información topográfica","den":"Data describing the elevation and shape of the Earth's surface, often derived from Digital Elevation Models (DEMs). In remote sensing classification, it improves accuracy by distinguishing land cover types influenced by altitude and slope.","des":"Datos que describen la elevación y la forma de la superficie de la Tierra, a menudo derivados de Modelos Digitales de Elevación (MDE). En la clasificación por teledetección, mejora la exactitud al distinguir tipos de cobertura del suelo influenciados por la altitud y la pendiente.","lvl":0,"ord":35,"cat":"data","kind":"concept","src":"ct_chile · th_parcel_extraction","al":"topographic information información topográfica topographic information"},{"id":"tasks","en":"Tasks","es":"Tareas","den":"Specific problems or activities addressed using Earth observation data, such as crop classification, yield estimation, land cover mapping, or field boundary delineation. The handbook covers multiple tasks across its sections.","des":"Problemas o actividades específicas abordadas con datos de observación de la Tierra, como la clasificación de cultivos, la estimación de rendimiento, la cartografía de cobertura del suelo o la delimitación de to de entrenamiento utilizados para evaluar la exactitud de un modelo de clasificación. Permiten métricas de evaluación no sesgadas como la precisión general y la puntuación F1.","lvl":5,"ord":473,"cat":"data","kind":"concept","src":"th_validation · ct_zimbabwe","al":"validation datasets conjuntos de datos de validación validation datasets"},{"id":"roadmap","en":"Roadmap","es":"Hoja de ruta","den":"A strategic plan outlining the steps and timeline for developing or deploying a system or methodology. The handbook provides an implementation roadmap for the reproducible analysis system.","des":"Un plan estratégico que describe los pasos y el cronograma para desarrollar o implementar un sistema o metodología. El manual proporciona una hoja de ruta de implementación para el sistema de análisis reproducible.","lvl":4,"ord":431,"cat":"primitive","kind":"concept","src":"howto · howto","al":"roadmap hoja de ruta roadmap"},{"id":"segment-model","en":"Segment Model","es":"Modelo de segmentación","den":"A deep learning model that performs image segmentation by generating object masks from input images and optional prompts. The Segment Anything Model (SAM) is used for flood extent detection in this handbook.","des":"Un modelo de aprendizaje profundo que realiza segmentación de imágenes generando máscaras de objetos a partir de imágenes de entrada y avisos opcionales. El Modelo de Segmentación de Cualquier Cosa (SAM) se utiliza para la detección de extensión de inundaciones en este manual.","lvl":0,"ord":36,"cat":"method","kind":"concept","src":"dis_china_floods · dis_china_floods","al":"segment model modelo de segmentación segment model"},{"id":"earthdata","en":"EarthData","es":"EarthData","den":"NASA's platform for discovering and accessing Earth observation data. Users must register and log in via a .netrc file to access certain collections such as Harmonized Landsat Sentinel (HLS).","des":"La plataforma de la NASA para descubrir y acceder a datos de observación de la Tierra. ara entrenar y validar modelos de teledetección. Los protocolos de calidad garantizan la idoneidad para el uso en observación de la Tierra.","lvl":4,"ord":360,"cat":"method","kind":"concept","src":"th_alignment · th_design_frames","al":"field data collection recolección de datos de campo field data collection"},{"id":"brazil-data-cube","en":"Brazil Data Cube","es":"Brazil Data Cube","den":"A cloud service providing open, regularized Earth observation data cubes from Sentinel-2, Landsat-8, CBERS-4/4A, and MODIS over Brazil. It provides ready-to-use data for machine learning classification.","des":"Un servicio en la nube que proporciona cubos de datos de observación de la Tierra abiertos y regularizados a partir de Sentinel-2, Landsat-8, CBERS-4/4A y MODIS sobre Brasil. Proporciona datos listos para usar en clasificación por aprendizaje automático.","lvl":6,"ord":533,"cat":"data","kind":"concept","src":"th_data_sources · th_data_cubes","al":"brazil data cube brazil data cube brazil data cube cubo de datos de brasil"},{"id":"agricultural-environmental-statistics","en":"Agricultural environmental statistics","es":"Estadísticas agroambientales","den":"Official statistics on crop area, yield, and production, often combined with environmental data. They support food security monitoring, policy making, and sustainable development goals.","des":"Estadísticas oficiales sobre área de cultivo, rendimiento y producción, a menudo combinadas con datos ambientales. Apoyan el monitoreo de la seguridad alimentaria, la formulación de políticas y los objetivos de desarrollo sostenible.","lvl":3,"ord":270,"cat":"statistic","kind":"concept","src":"index · introduction","al":"agricultural environmental statistics estadísticas agroambientales agricultural environmental statistics"},{"id":"unbiased-area-estimates","en":"Unbiased area estimates","es":"Estimaciones de área insesgadas","den":"Area estimates corrected for classification errors (omission and commission) using statistically rigorous methods such as stratified random sampling and the error-adjusted estimator. They provide accurate figures with confidence intervals.","des":"Estimaciones de área corregidas por errores de clasificación (omisión y comisión) mediante métodos estadísticamente rigurosos, como el muestreo aleatorio estratificado y el estimador ajustado por error. Proporcionan cifras precisas con intervalos de confianza.","lvl":5,"ord":440,"cat":"statistic","kind":"concept","src":"th_validation · crop_statistics_area","al":"unbiased area estimates estimaciones de área insesgadas unbiased area estimates unbiased estimates unbiased estimation estimaciones de superficie insesgadas"},{"id":"land-use","en":"Land use","es":"Uso del suelo","den":"The socioeconomic function for which land is managed, such as agriculture, forestry, or urban development. It is inferred from land cover but requires context beyond spectral signatures.","des":"La función socioeconómica para la cual se gestiona la tierra, como la agricultura, la silvicultura o el desarrollo urbano. Se infiere a partir de la cobertura del suelo, pero requiere contexto más allá de las firmas espectrales.","lvl":3,"ord":284,"cat":"data","kind":"concept","src":"th_lucc · th_lucc","al":"land use uso del suelo land use uso de la tierra"},{"id":"precision-agriculture","en":"Precision agriculture","es":"Agricultura de precisión","den":"A management approach that uses detailed spatial data, including remote sensing, to optimize inputs such as water, fertilizer, and pesticides at the field level, improving efficiency and reducing environmental impact.","des":"Un enfoque de gestión que utiliza datos espaciales detallados, incluida la teledetección, para optimizar insumos como agua, fertilizantes y pesticidas a nivel de campo, mejorando la eficiencia y reduciendo el impacto ambiental.","lvl":4,"ord":422,"cat":"method","kind":"concept","src":"th_remote_sensing · uav_crop_growth","al":"precision agriculture agricultura de precisión precision agriculture"},{"id":"dcp-mtl-model","en":"DCP MTL model","es":"modelo DCP MTL","den":"A multi-task learning model for extracting field parcel regions and boundaries from UAV imagery. It uses a Discrete Cosine Transform module, dual-branch attention, and boundary connectivity modules to achieve precise segmentation.","des":"Un modelo de aprendizaje multitarea para extraer regiones y límites de parcelas de campo a partir de imágenes de UAV. Utiliza un módulo de Transformada de Coseno Discreta, atención de doble rama y módulos de conectividad de límites para lograr una segmentación precisa.","lvl":0,"ord":37,"cat":"method","kind":"concept","src":"uav_field_parcels · uav_field_parcels","al":"dcp mtl model modelo dcp mtl dcp mtl model modelo dcp mtl"},{"id":"land-classes","en":"Land classes","es":"Clases de tierra","den":"The set of categories used to label areas of the Earth's surface in a classification system, such as 'Forest', 'Cropland', or 'Water'.","des":"El conjunto de categorías utilizadas para etiquetar áreas de la superficie de la Tierra en un sistema de clasificación, tales como \"Bosque\", \"Tierras de cultivo\" o \"Agua\".","lvl":3,"ord":269,"cat":"data","kind":"concept","src":"th_lucc · th_validation","al":"land classes clases de tierra land classes clases de cobertura terrestre"},{"id":"agricultural","en":"Agricultural","es":"Agrícola","den":"Relating to the practice of farming, including cultivation of crops and rearing of animals for food and other products.","des":"Relativo a la práctica de la agricultura, incluyendo el cultivo de cultivos y la cría de animales para alimento y otros productos.","lvl":3,"ord":265,"cat":"primitive","kind":"concept","src":"th_remote_sensing","al":"agricultural agrícola agricultural"},{"id":"geoinformation","en":"Geoinformation","es":"Geoinformación","den":"Information about objects or phenomena on the Earth's surface that is associated with a specific geographic location, often stored in a GIS.","des":"Información sobre obj ertainty#measuring-uncertainty","al":"probability probabilidad probability"},{"id":"segmentation-map","en":"Segmentation map","es":"Mapa de segmentación","den":"A raster or vector product where each pixel or polygon is assigned a class label representing a land cover or land use category.","des":"Un producto ráster o vectorial donde cada píxel o polígono se asigna una etiqueta de clase que representa una categoría de cobertura del suelo o uso del suelo.","lvl":4,"ord":372,"cat":"product","kind":"concept","src":"th_parcel_extraction#results","al":"segmentation map mapa de segmentación segmentation map mapa de parcelas"},{"id":"model-evaluation","en":"Model evaluation","es":"Evaluación de modelos","den":"The process of assessing a classification model's performance using metrics like accuracy, precision, recall, and F1-score on a validation dataset.","des":"El proceso de evaluar el rendimiento de un modelo de clasificación utilizando métricas como exactitud, precisión, exhaustividad y puntuación F1 en un conjunto de datos de validación.","lvl":4,"ord":403,"cat":"method","kind":"concept","src":"th_validation#accuracy-assessment-of-classified-images","al":"model evaluation evaluación de modelos model evaluation validación de modelos"},{"id":"growth","en":"Growth","es":"Crecimiento","den":"The process by which a crop increases in biomass and develops through phenological stages, from germination to maturity, influenced by environmental factors.","des":"El proceso mediante el cual un cultivo aumenta en biomasa y se desarrolla a través de etapas fenológicas, desde la germinación hasta la madurez, influenciado por factores ambientales.","lvl":1,"ord":140,"cat":"phenomenon","kind":"concept","src":"uav_crop_growth#introduction","al":"growth crecimiento growth desarrollo vegetativo"},{"id":"agricultural-plots","en":"Agricultural plots","es":"Parcelas agrícolas","den":"Individual, spatially contiguous areas of land where a single crop type is grown, often the smallest unit for eys, often corrected for classification bias.","des":"Extensiones espaciales cuantificadas de cobertura del suelo o tipos de cultivos, derivadas típicamente del conteo de píxeles en mapas clasificados o de encuestas de campo, a menudo corregidas por sesgo de clasificación.","lvl":1,"ord":160,"cat":"data","kind":"concept","src":"crop_statistics_calibration","al":"area measurements mediciones de área area measurements field area measurement estimaciones de superficie"},{"id":"national-scale-applications","en":"National scale applications","es":"Aplicaciones a escala nacional","den":"The operational use of remote sensing and statistical methods to generate official agricultural statistics for an entire country, supporting policy and food security monitoring.","des":"El uso operativo de métodos de teledetección y estadísticos para generar estadísticas agrícolas oficiales para un país entero, apoyando el monitoreo de políticas y seguridad alimentaria.","lvl":1,"ord":149,"cat":"other","kind":"concept","src":"ct_zimbabwe","al":"national scale applications aplicaciones a escala nacional national scale applications aplicaciones nacionales"},{"id":"instances","en":"Instances","es":"Instancias","den":"Individual data points or objects in a dataset, such as a single training sample in machine learning or a single field parcel in object-based image analysis.","des":"Puntos de datos u objetos individuales en un conjunto de datos, como una muestra de entrenamiento única en aprendizaje automático o una parcela de campo individual en clasificación basada en objetos.","lvl":2,"ord":199,"cat":"primitive","kind":"concept","src":"th_machine_learning","al":"instances instancias instances muestras casos"},{"id":"agricultural-land-areas","en":"Agricultural land areas","es":"Áreas de tierras agrícolas","den":"Portions of the Earth's surface used for crop cultivation, including arable land, pastures, and permanent crops, which are the focus of agricultural area statistics.","des":"Porciones  la condición del cultivo y los recursos hídricos mediante series temporales de teledetección para detectar cambios a lo largo del tiempo.","lvl":3,"ord":271,"cat":"method","kind":"concept","src":"th_lucc","al":"environmental monitoring monitoreo ambiental environmental monitoring"},{"id":"spatial-variability","en":"Spatial variability","es":"Variabilidad espacial","den":"The variation in values of a property (e.g., NDVI, yield) across geographic locations within a study area, often quantified by metrics like coefficient of variation.","des":"La variación en los valores de una propiedad (por ejemplo, NDVI, rendimiento) entre ubicaciones geográficas dentro de un área de estudio, a menudo cuantificada por métricas como el coeficiente de variación.","lvl":4,"ord":423,"cat":"phenomenon","kind":"concept","src":"uav_agriculture_cook_islands","al":"spatial variability variabilidad espacial spatial variability"},{"id":"methodological-improvement","en":"Methodological improvement","es":"Mejora metodológica","den":"Refinements to existing methods that enhance accuracy, efficiency, or applicability in agricultural statistics, such as improved sampling strategies or classification techniques.","des":"Refinamientos a los métodos existentes que mejoran la exactitud, eficiencia o aplicabilidad en las estadísticas agrícolas, como estrategias de muestreo mejoradas o técnicas de clasificación.","lvl":3,"ord":296,"cat":"method","kind":"concept","src":"introduction","al":"methodological improvement mejora metodológica methodological improvement mejoramiento metodológico"},{"id":"study-area","en":"Study area","es":"Área de estudio","den":"The geographic region selected for analysis, defined by boundaries and characteristics relevant to the research objectives.","des":"La región geográfica seleccionada para el análisis, definida por límites y características relevantes para los objetivos de la investigación.","lvl":0,"ord":40,"cat":"data","kind":"concept","src":"ct_chile","al":"study area área de estudio study area"},{"id":"raster","en":"Raster","es":"Ráster","den":"A data structure consisting of a grid of cells (pixels) where each cell holds a value representing a measurement, such as spectral reflectance.","des":"Una estructura de datos que consiste en una cuadrícula de celdas (píxeles) donde cada celda contiene un valor que representa una medición, como la reflectancia espectral.","lvl":3,"ord":331,"cat":"data","kind":"concept","src":"th_parcel_extraction","al":"raster ráster raster thematic raster raster"},{"id":"crop-development-stage","en":"Crop development stage","es":"Etapa de desarrollo del cultivo","den":"A distinct phase in the growth cycle of a crop, from sowing to harvest, characterized by specific physiological changes.","des":"Una fase distinta en el ciclo de crecimiento de un cultivo, desde la siembra hasta la cosecha, caracterizada por cambios fisiológicos específicos.","lvl":2,"ord":228,"cat":"phenomenon","kind":"concept","src":"cy_colombia","al":"crop development stage etapa de desarrollo del cultivo crop development stage fase de desarrollo del cultivo"},{"id":"reliability","en":"Reliability","es":"Fiabilidad","den":"The consistency and dependability of results, often assessed through accuracy, precision, and reproducibility metrics.","des":"La consistencia y fiabilidad de los resultados, a menudo evaluada a través de métricas de exactitud, precisión y reproducibilidad.","lvl":3,"ord":297,"cat":"metric","kind":"concept","src":"th_quality_control","al":"reliability fiabilidad reliability confiabilidad"},{"id":"machine-learning-algorithms","en":"Machine learning algorithms","es":"Algoritmos de aprendizaje automático","den":"Computational methods that learn patterns from data to make predictions or decisions without explicit programming for each task.","des":"Métodos computacionales que aprenden patrones a partir de datos para hacer predicciones o tomar decisiones sin programación explícita para cada tarea.","lvl":5,"ord":465,"cat":"method","kind":"concept","src":"th_machine_learning","al":"machine learning algorithms algoritmos de aprendizaje automático machine learning algorithms algoritmos de machine learning"},{"id":"vector","en":"Vector","es":"Vector","den":"Geographic data represented by points, lines, and polygons, used to delineate features like field boundaries.","des":"Datos geográficos representados por puntos, líneas y polígonos, utilizados para delinear atributos como los límites de los campos.","lvl":5,"ord":444,"cat":"data","kind":"concept","src":"uav_field_parcels","al":"vector vector vector vector data"},{"id":"indicators","en":"Indicators","es":"Indicadores","den":"Quantitative measures derived from data to assess a condition, such as vegetation indices like NDVI for crop health.","des":"Medidas cuantitativas derivadas de datos para evaluar una condición, como los índices de vegetación como el NDVI para la salud del cultivo.","lvl":4,"ord":385,"cat":"statistic","kind":"concept","src":"th_lucc","al":"indicators indicadores indicators"},{"id":"training-samples","en":"Training samples","es":"Muestras de entrenamiento","den":"Labeled observations used to train machine learning models, consisting of input features and known output classes.","des":"Observaciones etiquetadas utilizadas para entrenar modelos de aprendizaje automático, que consisten en atributos de entrada y clases de salida conocidas.","lvl":3,"ord":303,"cat":"data","kind":"concept","src":"th_quality_control","al":"training samples muestras de entrenamiento training samples"},{"id":"geospatial-analysis","en":"Geospatial analysis","es":"Análisis geoespacial","den":"The process of examining, modeling, and interpreting geographic data to understand spatial patterns and relationships.","des":"El proceso de examinar, modelar e interpretar datos geográficos para comprender patrones y relaciones espaciales.","lvl":3,"ord":253,"cat":"method","kind":"concept","src":"th_design_frames","al":"geospatial analysis análisis geoespacial geospatial analysis"},{"id":"classification-workflows","en":"Classification workflows","es":"Flujos de trabajo de clasificación","den":"Sequences of steps for assigning land cover or crop type labels to satellite imagery, including data preparation, model training, and validation.","des":"Secuencias de etapas para asignar etiquetas de cobertura del suelo o tipo de cultivo a las imágenes satelitales, que incluyen preparación de datos, entrenamiento del modelo y validación.","lvl":5,"ord":500,"cat":"method","kind":"concept","src":"ct_digital_earth_africa","al":"classification workflows flujos de trabajo de clasificación classification workflows"},{"id":"anomaly-score-map","en":"Anomaly score map","es":"Mapa de puntuación de anomalías","den":"A raster layer where each pixel represents a normalized score indicating deviation from expected patterns, used to detect unusual events like floods.","des":"Una capa ráster donde cada píxel representa una puntuación normalizada que indica una desviación de los patrones esperados, utilizada para detectar eventos inusuales como inundaciones.","lvl":4,"ord":374,"cat":"product","kind":"concept","src":"dis_china_floods","al":"anomaly score map mapa de puntuación de anomalías anomaly score map mapa de anomalías"},{"id":"random-training-testing-datasets","en":"Random training testing datasets","es":"Conjuntos de datos aleatorios de entrenamiento y prueba","den":"Subsets of available samples randomly assigned to train a model and evaluate its performance, ensuring unbiased assessment.","des":"Subconjuntos de muestras disponibles asignados aleatoriamente para entrenar un modelo y evaluar su rendimiento, garantizando una evaluación insesgada.","lvl":5,"ord":475,"cat":"data","kind":"concept","src":"ct_poland","al":"random training testing datasets conjuntos de datos aleatorios de entrenamiento y prueba random training testing datasets"},{"id":"pixel-classification","en":"Pixel classification","es":"Clasificación de píxeles","den":"Assigning a class label to each individual pixel in an image based on its spectral or temporal characteristics.","des":"Asignación de una etiqueta de clase a cada píxel individual de una imagen basada en sus características espectrales o temporales.","lvl":3,"ord":286,"cat":"method","kind":"concept","src":"th_data_cubes","al":"pixel classification clasificación de píxeles pixel classification"},{"id":"strategy","en":"Strategy","es":"Estrategia","den":"A deliberate approach or set of principles guiding decisions to attain long-term objectives in agricultural statistics.","des":"Un enfoque deliberado o conjunto de principios que guían las decisiones para alcanzar objetivos a largo plazo en estadísticas agrícolas.","lvl":3,"ord":341,"cat":"primitive","kind":"concept","src":"uav_agriculture_cook_islands","al":"strategy estrategia strategy"},{"id":"transferable-classification-system","en":"Transferable classification system","es":"Sistema de clasificación transferible","den":"A classification approach designed to be applied across different regions, times, or contexts without extensive retraining, often using foundation models.","des":"Un enfoque de clasificación diseñado para aplicarse en diferentes regiones, tiempos o contextos sin necesidad de un reentrenamiento extenso, a menudo utilizando modelos fundacionales.","lvl":4,"ord":367,"cat":"method","kind":"concept","src":"ad_world_cereal","al":"transferable classification system sistema de clasificación transferible transferable classification system"},{"id":"data-code-availability","en":"Data code availability","es":"Disponibilidad de datos y código","den":"The practice of sharing datasets and source code used in analyses to ensure transparency and reproducibility.","des":"La práctica de compartir conjuntos de datos y código fuente utilizados en análisis para garantizar transparencia y reproducibilidad.","lvl":1,"ord":162,"cat":"primitive","kind":"concept","src":"howto","al":"data code availability disponibilidad de datos y código data code availability"},{"id":"big-data-sources","en":"Big Data sources","es":"Fuentes de macrodatos","den":"Large and complex datasets, such as satellite imagery archives, that require specialized processing methods for analysis.","des":"Conjuntos de datos grandes y complejos, como archivos de imágenes satelitales, que requieren métodos de procesamiento especializados para su análisis.","lvl":3,"ord":313,"cat":"other","kind":"concept","src":"introduction","al":"big data sources fuentes de macrodatos big data sources fuentes de big data"},{"id":"planted-area","en":"Planted area","es":"Área sembrada","den":"The total land area where seeds or seedlings of a specific crop have been sown or planted in a given agricultural season, typically measured in hectares.","des":"La superficie total de tierra donde se han sembrado o plantado semillas o plántulas de un cultivo específico en una temporada agrícola determinada, típicamente medida en hectáreas.","lvl":1,"ord":126,"cat":"metric","kind":"concept","src":"crop_statistics_area","al":"planted area área sembrada planted area superficie sembrada"},{"id":"hectares","en":"Hectares","es":"Hectáreas","den":"Unit of area equal to 10,000 square meters.","des":"Unidad de área equivalente a 10,000 metros cuadrados.","lvl":0,"ord":41,"cat":"primitive","kind":"primitive","src":"","al":"hectares hectáreas hectares"},{"id":"satellite-sensors","en":"Satellite sensors","es":"Sensores satelitales","den":"Instruments mounted on satellites that collect data about the Earth's surface. They include optical sensors (e.g., cameras) and radar sensors (e.g., Synthetic Aperture Radar).","des":"Instrumentos montados en satélites que recopilan datos sobre la superficie de la Tierra. Incluyen sensores ópticos (por ejemplo, cámaras) y sensores de radar (por ejemplo, Radar de Apertura Sintética).","lvl":4,"ord":409,"cat":"sensor","kind":"concept","src":"th_remote_sensing","al":"satellite sensors sensores satelitales satellite sensors"},{"id":"spectral-bands","en":"Spectral bands","es":"Bandas espectrales","den":"Discrete wavelength intervals in the electromagnetic spectrum recorded by a sensor, such as visible, near-infrared, or shortwave infrared bands, used to differentiate Earth surface materials.","des":"Intervalos discretos de longitud de onda en el espectro electromagnético registrados por un sensor, como bandas visibles, infrarrojo cercano o infrarrojo de onda corta, utilizados para diferenciar materiales de la superficie terrestre.","lvl":5,"ord":481,"cat":"data","kind":"concept","src":"th_remote_sensing","al":"spectral bands bandas espectrales spectral bands"},{"id":"geographic-distribution","en":"Geographic distribution","es":"Distribución geográfica","den":"The spatial arrangement or spread of features, such as crop types or land cover classes, across a geographic area, analyzed to identify patterns and variability.","des":"La disposición espacial o extensión de características, como tipos de cultivos o clases de cobertura del suelo, a través de un área geográfica, analizada para identificar patrones y variabilidad.","lvl":4,"ord":375,"cat":"phenomenon","kind":"concept","src":"","al":"geographic distribution distribución geográfica geographic distribution"},{"id":"producer-s-accuracy","en":"Producer's accuracy","es":"Precisión del productor","den":"The probability that a pixel of a given class on the ground is correctly classified on the map, calculated as 1 minus the omission error rate. It measures how well the map represents that class.","des":"La probabilidad de que un píxel de una clase dada en el terreno esté correctamente clasificado en el mapa, calculada como 1 menos la tasa de error de omisión. Mide qué tan bien el mapa representa esa clase.","lvl":6,"ord":516,"cat":"metric","kind":"concept","src":"th_validation","al":"producer's accuracy precisión del productor producer's accuracy exactitud del productor"},{"id":"survey-records","en":"Survey records","es":"Registros de encuestas","den":"Data entries collected from field surveys or administrative sources, containing information about land use, crop type, and agricultural practices at sampled locations.","des":"Entradas de datos recopilados de encuestas de campo o fuentes administrativas, que contienen información sobre el uso del suelo, el tipo de cultivo y las prácticas agrícolas en ubicaciones muestreadas.","lvl":2,"ord":183,"cat":"data","kind":"concept","src":"th_alignment","al":"survey records registros de encuestas survey records registros de campo"},{"id":"tabular-statistics","en":"Tabular statistics","es":"Estadísticas tabulares","den":"Statistical data presented in the form of rows and columns.","des":"Datos estadísticos presentados en forma de filas y columnas.","lvl":0,"ord":42,"cat":"primitive","kind":"primitive","src":"","al":"tabular statistics estadísticas tabulares tabular statistics"},{"id":"phenology","en":"Phenology","es":"Fenología","den":"The study of recurring biological events in plant life cycles, such as emergence, flowering, and senescence, often monitored via satellite time series to track crop development.","des":"Estudio de eventos biológicos recurrentes en los ciclos de vida de las plantas, como la emergencia, la floración y la senescencia, a menudo monitoreado mediante series temporales de satélite para rastrear el desarrollo del cultivo.","lvl":3,"ord":336,"cat":"phenomenon","kind":"concept","src":"th_lucc","al":"phenology fenología phenology"},{"id":"temporal-dimension","en":"Temporal dimension","es":"Dimensión temporal","den":"Aspect of data relating to time or changing over time.","des":"Aspecto de los datos relativo al tiempo o que cambia con el tiempo.","lvl":0,"ord":43,"cat":"primitive","kind":"primitive","src":"","al":"temporal dimension dimensión temporal temporal dimension"},{"id":"accuracy-metrics","en":"Accuracy metrics","es":"Métricas de precisión","den":"Quantitative measures used to evaluate the performance of a classification model, including overall accuracy, precision, recall, F1-score, and kappa coefficient.","des":"Medidas cuantitativas utilizadas para evaluar el rendimiento de un modelo de clasificación, incluyendo la precisión general, la precisión, la exhaustividad, la puntuación F1 y el coeficiente Kappa.","lvl":6,"ord":517,"cat":"metric","kind":"concept","src":"th_validation","al":"accuracy metrics métricas de precisión accuracy metrics métricas de exactitud"},{"id":"spectral-reflectance","en":"Spectral reflectance","es":"Reflectancia espectral","den":"The fraction of incident electromagnetic radiation reflected by a surface as a function of wavelength, used to distinguish land cover types via their spectral signatures.","des":"Fracción de la radiación electromagnética incidente reflejada por una superficie en función de la longitud de onda, utilizada para distinguir tipos de cobertura del suelo mediante sus firmas espectrales.","lvl":0,"ord":44,"cat":"data","kind":"concept","src":"th_remote_sensing","al":"spectral reflectance reflectancia espectral spectral reflectance"},{"id":"labeled-samples","en":"Labeled samples","es":"Muestras etiquetadas","den":"Data points (e.g., pixels or polygons) that have been assigned a known class label by an expert, used to train and validate supervised machine learning models.","des":"Puntos de datos (por ejemplo, píxeles o polígonos) a los que un experto ha asignado una etiqueta de clase conocida, utilizados para entrenar y validar modelos de aprendizaje automático supervisado.","lvl":4,"ord":396,"cat":"data","kind":"concept","src":"th_quality_control","al":"labeled samples muestras etiquetadas labeled samples muestras rotuladas"},{"id":"optical","en":"Optical","es":"Óptico","den":"A type of remote sensing sensor that measures reflected solar radiation in visible, near-infrared, and shortwave infrared wavelengths. It is passive and requires sunlight.","des":"Tipo de sensor de teledetección que mide la radiación solar reflejada en longitudes de onda visibles, infrarrojo cercano e infrarrojo de onda corta. Es pasivo y requiere luz solar.","lvl":5,"ord":482,"cat":"sensor","kind":"concept","src":"th_remote_sensing","al":"optical óptico optical"},{"id":"reflectance","en":"Reflectance","es":"Reflectancia","den":"The proportion of incident light that is reflected from a surface, typically expressed as a value between 0 and 1. It is a fundamental measure in remote sensing for analyzing surface properties.","des":"Proporción de la luz incidente que se refleja desde una superficie, típicamente expresada como un valor entre 0 y 1. Es una medida fundamental en teledetección para analizar las propiedades de la superficie.","lvl":3,"ord":317,"cat":"data","kind":"concept","src":"th_remote_sensing","al":"reflectance reflectancia reflectance"},{"id":"data-point","en":"Data point","es":"Punto de datos","den":"A single observation or measurement in a dataset.","des":"Una sola observación o medición en un conjunto de datos.","lvl":0,"ord":45,"cat":"primitive","kind":"primitive","src":"","al":"data point punto de datos data point punto de muestra"},{"id":"temporal-pattern","en":"Temporal pattern","es":"Patrón temporal","den":"A recurring sequence or trend in data over time, such as the seasonal variation in vegetation indices observed in satellite image time series, used to monitor change.","des":"Secuencia o tendencia recurrente en los datos a lo largo del tiempo, como la variación estacional en los índices de vegetación observada en series temporales de imágenes satelitales, utilizada para monitorear cambios.","lvl":4,"ord":428,"cat":"phenomenon","kind":"concept","src":"th_data_cubes","al":"temporal pattern patrón temporal temporal pattern"},{"id":"regression","en":"Regression","es":"Regresión","den":"A statistical method that models the relationship between a dependent variable (e.g., crop yield) and one or more independent variables (e.g., vegetation indices), used for prediction.","des":"Método estadístico que modela la relación entre una variable dependiente (por ejemplo, rendimiento del cultivo) y una o más variables independientes (por ejemplo, índices de vegetación), utilizado para la predicción.","lvl":5,"ord":441,"cat":"method","kind":"concept","src":"cy_poland","al":"regression regresión regression"},{"id":"harvest","en":"Harvest","es":"Cosecha","den":"Act of gathering crops after maturity.","des":"Acción de recolectar los cultivos después de su madurez.","lvl":0,"ord":46,"cat":"primitive","kind":"primitive","src":"","al":"harvest cosecha harvest recolección"},{"id":"planet","en":"Planet","es":"Planet","den":"A commercial satellite imagery provider offering high-resolution (3–5 m) multispectral data, often used for detailed agricultural mapping and validation.","des":"Proveedor comercial de imágenes satelitales que ofrece datos multiespectrales de alta resolución (3–5 m), a menudo utilizado para cartografía agrícola detallada y validación.","lvl":5,"ord":487,"cat":"platform","kind":"concept","src":"th_parcel_extraction","al":"planet planet planet planet labs"},{"id":"masking","en":"Masking","es":"Enmascaramiento","den":"The process of setting certain pixels to no-data values based on criteria such as cloud cover, shadow, or non-agricultural land, to exclude them from analysis.","des":"Proceso de asignar valores sin datos a ciertos píxeles basándose en criterios como cobertura de nubes, sombra o tierra no agrícola, para excluirlos del análisis.","lvl":2,"ord":219,"cat":"method","kind":"concept","src":"th_data_sources","al":"masking enmascaramiento masking máscara"},{"id":"radiometric-corrections","en":"Radiometric corrections","es":"Correcciones radiométricas","den":"Processing steps applied to satellite imagery to correct for sensor errors and atmospheric interference, converting raw digital numbers to physical units like surface reflectance.","des":"Pasos de procesamiento aplicados a las imágenes satelitales para corregir errores del sensor e interferencia atmosférica, convirtiendo los números digitales brutos en unidades físicas como la reflectancia superficial.","lvl":1,"ord":153,"cat":"method","kind":"concept","src":"th_data_sources","al":"radiometric corrections correcciones radiométricas radiometric corrections"},{"id":"deep-learning","en":"Deep learning","es":"Aprendizaje profundo","den":"A class of machine learning algorithms using multi-layered neural networks to automatically learn hierarchical features from large datasets, widely used for image classification tasks.","des":"Una clase de algoritmos de aprendizaje automático que utilizan redes neuronales multicapa para aprender automáticamente atributos jerárquicos de grandes conjuntos de datos, ampliamente utilizado para tareas de clasificación de imágenes.","lvl":5,"ord":467,"cat":"method","kind":"concept","src":"th_machine_learning","al":"deep learning aprendizaje profundo deep learning"},{"id":"ground-truth","en":"Ground-truth","es":"Verdad terreno","den":"Data collected by direct observation or measurement on the Earth's surface, used to calibrate and validate remote sensing analyses and classification models.","des":"Datos recopilados mediante observación directa o medición en la superficie de la Tierra, utilizados para calibrar y validar análisis de teledetección y modelos de clasificación.","lvl":6,"ord":511,"cat":"data","kind":"concept","src":"th_validation#introduction · th_quality_control#outline","al":"ground-truth verdad terreno ground-truth verdad de campo referencia de campo"},{"id":"tibble","en":"Tibble","es":"Tibble","den":"Modern data frame structure used in R programming.","des":"Estructura moderna de marco de datos utilizada en programación R.","lvl":0,"ord":47,"cat":"primitive","kind":"primitive","src":"","al":"tibble tibble tibble tabla tibble"},{"id":"food-security","en":"Food security","es":"Seguridad alimentaria","den":"The state of having reliable access to a sufficient quantity of nutritious food. Satellite-derived agricultural statistics support food security monitoring by enabling timely crop production estimates.","des":"El estado de tener acceso fiable a una cantidad suficiente de alimentos nutritivos. Las estadísticas agrícolas derivadas de satélites apoyan el monitoreo de la seguridad alimentaria al permitir estimaciones oportunas de la producción de cultivos.","lvl":3,"ord":250,"cat":"other","kind":"concept","src":"introduction#background · ct_china#introduction","al":"food security seguridad alimentaria food security"},{"id":"software","en":"Software","es":"Software","den":"Programs and operating information used by a computer.","des":"Programas e información operativa utilizados por una computadora.","lvl":0,"ord":48,"cat":"primitive","kind":"primitive","src":"","al":"software software software programa informático aplicación"},{"id":"electromagnetic-radiation","en":"Electromagnetic radiation","es":"Radiación electromagnética","den":"Energy waves that travel through space. Remote sensing records the electromagnetic radiation reflected or emitted by Earth's surface, using different wavelengths (e.g., visible, infrared, microwave) to identify surface features.","des":"Ondas de energía que viajan a través del espacio. La teledetección registra la radiación electromagnética reflejada o emitida por la superficie de la Tierra, utilizando diferentes longitudes de onda (por ejemplo, visible, infrarrojo, microondas) para identificar atributos de la superficie.","lvl":1,"ord":163,"cat":"phenomenon","kind":"concept","src":"th_remote_sensing#introduction-to-remote-sensing-imagery","al":"electromagnetic radiation radiación electromagnética electromagnetic radiation"},{"id":"spectral-index","en":"Spectral index","es":"Índice espectral","den":"A mathematical combination of two or more spectral bands, designed to enhance a specific surface property (e.g., vegetation vigor). Common indices include NDVI and NDWI.","des":"Una combinación matemática de dos o más bandas espectrales, diseñada para resaltar una propiedad específica de la superficie (por ejemplo, vigor de la vegetación). Los índices comunes incluyen NDVI y NDWI.","lvl":6,"ord":527,"cat":"index","kind":"concept","src":"ct_chile#computing-vegetation-indexes · uav_crop_growth#methods","al":"spectral index índice espectral spectral index"},{"id":"near-infrared","en":"Near-infrared","es":"Infrarrojo cercano","den":"Portion of the electromagnetic spectrum (0.75-1.0 µm) beyond visible red, strongly reflected by healthy vegetation and used in vegetation indices.","des":"Porción del espectro electromagnético (0.75-1.0 µm) más allá del rojo visible, fuertemente reflejada por la vegetación sana y utilizada en índices de vegetación.","lvl":0,"ord":49,"cat":"other","kind":"concept","src":"","al":"near-infrared infrarrojo cercano near-infrared nir"},{"id":"red-reflectance","en":"Red reflectance","es":"Reflectancia roja","den":"The proportion of incident solar radiation reflected by a surface in the red portion of the visible spectrum (approximately 620–700 nm). It is inversely related to chlorophyll absorption and is used to compute vegetation indices.","des":"La proporción de radiación solar incidente reflejada por una superficie en la porción roja del espectro visible (aproximadamente 620–700 nm). Es inversamente proporcional a la absorción de clorofila y se utiliza para calcular índices de vegetación.","lvl":6,"ord":528,"cat":"data","kind":"concept","src":"th_remote_sensing#sentinel-2 · uav_wheat_growth#machine-learning-algorithms","al":"red reflectance reflectancia roja red reflectance reflectancia en el rojo"},{"id":"representativeness","en":"Representativeness","es":"Representatividad","den":"The degree to which a sample or dataset accurately reflects the diversity of the target population (e.g., land cover classes). High representativeness ensures that model training data covers the full variability of the area of interest.","des":"El grado en que una muestra o conjunto de datos refleja con precisión la diversidad de la población objetivo (por ejemplo, clases de cobertura terrestre). Una alta representatividad asegura que los datos de entrenamiento del modelo cubran toda la variabilidad del área de interés.","lvl":5,"ord":461,"cat":"statistic","kind":"concept","src":"th_design_frames#matching-in-situ-survey-data-to-remote-sensing-analysis-needs · th_quality_control#validation","al":"representativeness representatividad representativeness"},{"id":"thematic-map","en":"Thematic map","es":"Mapa temático","den":"A map that displays the spatial distribution of a specific theme or class, such as land cover, crop type, or yield. Thematic maps are the primary output of satellite image classification for agricultural statistics.","des":"Un mapa que muestra la distribución espacial de un tema o clase específica, como cobertura del suelo, tipo de cultivo o rendimiento. Los mapas temáticos son el resultado principal de la clasificación de imágenes satelitales para estadísticas agrícolas.","lvl":4,"ord":376,"cat":"product","kind":"concept","src":"th_validation#introduction · ct_chile#generation-of-land-use-and-land-cover-maps-using-time-series-of-satellite-images","al":"thematic map mapa temático thematic map"},{"id":"satellite-derived-models","en":"Satellite-derived models","es":"Modelos derivados de satélite","den":"Computational models that use satellite imagery as input to predict biophysical variables (e.g., crop yield, plant area index) or classify land surface types. They are calibrated with ground observations and can be statistical or machine-learning based.","des":"Modelos computacionales que utilizan imágenes satelitales como entrada para predecir variables biofísicas (por ejemplo, rendimiento de cultivos, índice de área foliar) o clasificar tipos de superficie terrestre. Se basan en observaciones de campo y pueden ser estadísticos o de aprendizaje automático.","lvl":5,"ord":488,"cat":"method","kind":"concept","src":"crop_statistics_ppi#example-yield-estimation · cy_finland#machine-learning","al":"satellite-derived models modelos derivados de satélite satellite-derived models modelos satelitales"},{"id":"ground-truth-data","en":"Ground-truth data","es":"Datos de verdad terreno","den":"Synonym of ground-truth. Information collected on the Earth's surface through field visits, surveys, or high-resolution image interpretation, used to calibrate and validate satellite-based classifications and models.","des":"Sinónimo de verdad terreno. Información recopilada en la superficie de la Tierra mediante visitas de campo, encuestas o interpretación de imágenes de alta resolución, utilizada para calibrar y validar clasificaciones y modelos basados en satélites.","lvl":7,"ord":543,"cat":"data","kind":"concept","src":"th_validation#introduction · crop_statistics_area#sec-introduction","al":"ground-truth data datos de verdad terreno ground-truth data datos de campo datos de referencia"},{"id":"confusion-matrix","en":"Confusion matrix","es":"Matriz de confusión","den":"A table that compares predicted class labels (from a map or model) against reference labels, showing the number of correct and incorrect predictions per class. It is the basis for accuracy metrics such as user's and producer's accuracy.","des":"Una tabla que compara las etiquetas de clase predichas (de un mapa o modelo) con las etiquetas de referencia, mostrando el número de predicciones correctas e incorrectas por clase. Es la base para métricas de precisión como la precisión del usuario y del productor.","lvl":5,"ord":474,"cat":"metric","kind":"concept","src":"th_validation#accuracy-assessment-of-classified-images · th_quality_control#validation","al":"confusion matrix matriz de confusión confusion matrix"},{"id":"f1-score","en":"F1-score","es":"puntuación F1","den":"The harmonic mean of precision and recall, providing a single measure of a classification model's performance for a given class. F1 balances commission and omission errors.","des":"Media armónica de la precisión y la exhaustividad, que proporciona una medida única del rendimiento de un modelo de clasificación para una clase determinada. La puntuación F1 equilibra los errores de comisión y omisión.","lvl":7,"ord":549,"cat":"metric","kind":"concept","src":"th_validation#accuracy-assessment-of-classified-images · ct_zimbabwe#accuracy-assessment","al":"f1-score puntuación f1 f1-score índice f1 f1-score"},{"id":"fallow","en":"Fallow","es":"Barbecho","den":"A temporary state of agricultural land where no crop is grown, usually to allow the soil to recover moisture or nutrients. In remote sensing, fallow is a temporal phase rather than a static land cover class.","des":"Estado temporal de la tierra agrícola donde no se cultiva ningún cultivo, generalmente para permitir que el suelo recupere humedad o nutrientes. En teledetección, el barbecho es una fase temporal más que una clase de cobertura del suelo estática.","lvl":3,"ord":267,"cat":"phenomenon","kind":"concept","src":"th_lucc#specific-challenges-in-agricultural-classification · ct_chile#classification-scheme","al":"fallow barbecho fallow"},{"id":"sample-based-estimators","en":"Sample-based estimators","es":"Estimadores basados en muestras","den":"Statistical methods that derive area or other population totals from a probability sample of reference units, often using a map for stratification. They provide unbiased, design-consistent estimates with quantifiable uncertainty.","des":"Métodos estadísticos que derivan el área u otros totales poblacionales a partir de una muestra probabilística de unidades de referencia, utilizando a menudo un mapa para la estratificación. Proporcionan estimaciones insesgadas, consistentes con el diseño y con incertidumbre cuantificable.","lvl":6,"ord":504,"cat":"statistic","kind":"concept","src":"crop_statistics_area#sec-methods · th_validation#sampling-design","al":"sample-based estimators estimadores basados en muestras sample-based estimators estimadores muestrales"},{"id":"confusion-matrices","en":"Confusion matrices","es":"Matrices de confusión","den":"Synonym of confusion matrix. A cross-tabulation of predicted versus reference class labels used to assess classification accuracy.","des":"Sinónimo de matriz de confusión. Tabulación cruzada de las etiquetas de clase predichas frente a las de referencia que se utiliza para evaluar la precisión de la clasificación.","lvl":6,"ord":518,"cat":"metric","kind":"concept","src":"th_validation#accuracy-assessment-of-classified-images · ct_zimbabwe#accuracy-assessment","al":"confusion matrices matrices de confusión confusion matrices"},{"id":"yield-forecasting","en":"Yield forecasting","es":"Pronóstico de rendimiento","den":"The process of predicting crop yield (mass per unit area) before harvest, using satellite imagery, weather data, and/or crop models. It supports food security planning and policy decisions.","des":"Proceso de predicción del rendimiento de cultivos (masa por unidad de área) antes de la cosecha, utilizando imágenes satelitales, datos meteorológicos y/o modelos de cultivo. Apoya la planificación de la seguridad alimentaria y las decisiones políticas.","lvl":2,"ord":227,"cat":"method","kind":"concept","src":"cy_finland#introduction · cy_poland#introduction","al":"yield forecasting pronóstico de rendimiento yield forecasting predicción de rendimiento"},{"id":"reference-samples","en":"Reference samples","es":"Muestras de referencia","den":"Subset of ground observations used to train a classification model or validate its output. They must be representative, well-labeled, and independent of the model's training data for unbiased accuracy assessment.","des":"Subconjunto de observaciones de campo utilizado para entrenar un modelo de clasificación o validar su resultado. Deben ser representativas, estar bien etiquetadas y ser independientes de los datos de entrenamiento del modelo para una evaluación de precisión insesgada.","lvl":7,"ord":544,"cat":"data","kind":"concept","src":"th_quality_control#outline · th_validation#sampling-design","al":"reference
