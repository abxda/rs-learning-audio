al fields managed as single units for a specific crop.","Las parcelas agrícolas son campos individuales gestionados como unidades únicas para un cultivo específico."],["field","ground-truth","Field observations of real land cover conditions are directly used to create ground-truth data for training and validation.","Las observaciones de campo de las condiciones reales de cobertura del suelo se usan directamente para crear datos de verdad terreno para entrenamiento y validación."],["field","in-situ-observations","In-situ observations are collected directly in agricultural fields to record crop type, condition, and other attributes.","Las observaciones in situ se recolectan directamente en campos agrícolas para registrar tipo de cultivo, condición y otros atributos."],["methods","analysis","Analysis applies defined methods to transform data into results.","El análisis aplica métodos definidos para producir resultados."],["methods","algorithm","Methods are systematic techniques, often implemented through algorithms, for processing data.","Los métodos son técnicas sistemáticas, a menudo implementadas mediante algoritmos, para procesar datos."],["methods","approach","An approach is a methodology or strategy used to achieve a goal within a set of methods.","Un enfoque es una metodología o estrategia utilizada para lograr un objetivo dentro de un conjunto de métodos."],["methods","development","Development is the process of creating or improving analytical methods or tools.","El desarrollo es el proceso de crear o mejorar métodos o herramientas analíticas."],["methods","step","A step is a specific procedure within a method that is executed to achieve a sub-goal.","Una etapa es un procedimiento específico dentro de un método que se ejecuta para lograr un subobjetivo."],["methods","process","A process implements a method by executing its steps in a defined order.","Un proceso implementa un método ejecutando sus etapas en un orden definido."],["methods","applications","Applications implement methods to solve real-world problems in agriculture and land management.","Las aplicaciones implementan métodos para resolver problemas reales en agricultura y gestión de tierras."],["methods","methodology","Methodology is a systematic set of procedures, extending individual methods to ensure consistent and reproducible analysis.","La metodología es un conjunto sistemático de procedimientos, que extiende métodos individuales para garantizar un análisis consistente y reproducible."],["methods","handbook","A handbook is a practical guide that compiles methods, case studies, and reproducible code for users.","Un manual es una guía práctica que reúne métodos, estudios de caso y código reproducible para los usuarios."],["methods","tools","They operationalize methods into usable workflows for crop mapping and monitoring.","Operacionalizan los métodos en flujos de trabajo utilizables para el mapeo y monitoreo de cultivos."],["methods","implementation","Implementation puts a method into practice within a specific operational context.","La implementación pone en práctica un método dentro de un contexto operativo específico."],["methods","methodological-improvement","A methodological improvement refines an existing method to enhance accuracy, efficiency, or applicability.","Una mejora metodológica refina un método existente para mejorar la exactitud, eficiencia o aplicabilidad."],["chapter","chapter-crop-classification","As a handbook section, it focuses on the specific topic of crop classification.","Como sección del manual, se enfoca en el tema específico de clasificación de cultivos."],["chapter","reproducible-analysis-system","Each chapter's analysis is delivered as a self-contained reproducible analysis system with one-click execution.","El análisis de cada capítulo se entrega como un sistema de análisis reproducible autocontenido con ejecución en un solo clic."],["pixels","values","Values are numerical measurements recorded at each pixel, such as spectral reflectance.","Los valores son mediciones numéricas registradas en cada píxel, como la reflectancia espectral."],["pixels","resolution","Resolution is the level of detail in an image, often described by the ground area each pixel covers.","La resolución es el nivel de detalle en una imagen, a menudo descrito por el área de terreno que cubre cada píxel."],["pixels","segmentation","Segmentation partitions an image into meaningful regions by grouping adjacent pixels with similar properties.","La segmentación divide una imagen en regiones significativas agrupando píxeles adyacentes con propiedades similares."],["pixels","raster","A raster is a grid of pixels where each pixel stores a value representing a measurement.","Un ráster es una cuadrícula de píxeles donde cada píxel almacena un valor que representa una medición."],["pixels","pixel-classification","Pixel classification assigns a class label to every pixel based on its spectral values.","La clasificación de píxeles asigna una etiqueta de clase a cada píxel basándose en sus valores espectrales."],["pixels","quality-flags","Quality flags are per-pixel indicators of data reliability, such as cloud or shadow presence.","Las banderas de calidad son indicadores por píxel de la fiabilidad de los datos, como presencia de nubes o sombras."],["pixels","digital-elevation-model","Digital elevation models store elevation values in each pixel, allowing slope and aspect calculations.","Los modelos digitales de elevación almacenan valores de elevación en cada píxel, permitiendo cálculos de pendiente y orientación."],["pixels","image-segmentation","Image segmentation partitions an image into meaningful groups of adjacent pixels (segments).","La segmentación de imágenes divide una imagen en grupos significativos de píxeles adyacentes (segmentos)."],["pixels","segment","Segments group meaningful regions from pixels, used in object-based classification.","Los segmentos agrupan regiones significativas a partir de píxeles, utilizados en clasificación basada en objetos."],["training","machine-learning","Training uses machine learning algorithms to learn patterns from data.","El entrenamiento utiliza algoritmos de aprendizaje automático para aprender patrones a partir de datos."],["training","model-development","Model development involves training a model on labeled data to learn patterns.","El desarrollo de modelos implica entrenar un modelo con datos etiquetados para aprender patrones."],["training","modeling","Modeling involves training a model on labeled samples to learn patterns.","El modelado implica entrenar un modelo con muestras etiquetadas para aprender patrones."],["training","model-training","Model training is the process of fitting a machine learning algorithm to labeled data by adjusting its parameters.","El entrenamiento del modelo es el proceso de ajustar un algoritmo de aprendizaje automático a datos etiquetados mediante el ajuste de sus parámetros."],["training","foundation-model","Foundation models are trained on massive unlabeled datasets and can be fine-tuned for specific tasks.","Los modelos fundacionales se entrenan con grandes conjuntos de datos no etiquetados y pueden ajustarse para tareas específicas."],["training","training-dataset","A training dataset is the data used during the training process of a machine learning model.","Un conjunto de datos de entrenamiento son los datos utilizados durante el proceso de entrenamiento de un modelo de aprendizaje automático."],["regions","data-scarce-regions","Data-scarce regions are geographic areas where limited reference data from field surveys are available.","Las regiones con escasez de datos son áreas geográficas donde hay disponibles datos de referencia limitados de encuestas de campo."],["system","methods","A system is a structured set of methods, tools, and workflows for a specific task.","Un sistema es un conjunto estructurado de métodos, herramientas y flujos de trabajo para una tarea específica."],["system","framework","A framework provides a structured set of guidelines and standards, similar to a system but more conceptual.","Un marco proporciona un conjunto estructurado de directrices y estándares, similar a un sistema pero más conceptual."],["system","statistical-systems","Statistical systems are the structured frameworks for producing official statistics.","Los sistemas estadísticos son los marcos estructurados para producir estadísticas oficiales."],["system","data-systems","Data systems are integrated platforms that combine data storage, processing, and analysis tools.","Los sistemas de datos son plataformas integradas que combinan almacenamiento de datos, procesamiento y herramientas de análisis."],["system","analysis-system","An analysis system is a system designed to provide an integrated workflow for processing Earth observation data.","Un sistema de análisis es un sistema diseñado para proporcionar un flujo de trabajo integrado para procesar datos de observación de la Tierra."],["system","component","The system defines the framework into which components are integrated as functional modules.","El sistema define el marco en el cual los componentes se integran como módulos funcionales."],["system","grid","A grid is a spatial system of regular cells used to partition and index Earth observation data.","Una cuadrícula es un sistema espacial de celdas regulares utilizado para dividir e indexar datos de observación de la Tierra."],["system","platforms","Platforms are systems that integrate data, compute, and tools for Earth observation workflows.","Las plataformas son sistemas que integran datos, cómputo y herramientas para flujos de trabajo de observación de la Tierra."],["approach","map-approach","An approach is a methodology; the Map approach selects the classification map as the sole estimator.","Un enfoque es una metodología; el enfoque cartográfico selecciona el mapa de clasificación como el único estimador."],["approach","strategy","A strategy is a high-level approach that guides decisions for achieving long-term objectives.","Una estrategia es un enfoque de alto nivel que guía las decisiones para lograr objetivos a largo plazo."],["statistics","analysis","Statistics are quantitative measures derived from data analysis, such as crop area and yield.","Las estadísticas son medidas cuantitativas derivadas del análisis de datos, como el área de cultivo y el rendimiento."],["statistics","estimation","Estimation uses statistical methods to infer unknown quantities like crop area from sample data.","La estimación utiliza métodos estadísticos para inferir cantidades desconocidas como el área de cultivo a partir de datos de muestra."],["statistics","agricultural-statistics","Agricultural statistics apply statistical methods to produce quantitative measures of agricultural variables.","Las estadísticas agrícolas aplican métodos estadísticos para producir medidas cuantitativas de variables agrícolas."],["statistics","number","A number is a mathematical object fundamental to statistical analysis and quantitative measurement.","Un número es un objeto matemático fundamental para el análisis estadístico y la medición cuantitativa."],["statistics","estimator","An estimator uses statistical methods to infer unknown quantities like crop area or yield.","Un estimador utiliza métodos estadísticos para inferir cantidades desconocidas como el área de cultivo o el rendimiento."],["statistics","area-statistics","They use statistical methods to derive unbiased area estimates and confidence intervals.","Utilizan métodos estadísticos para derivar estimaciones de área insesgadas e intervalos de confianza."],["statistics","statistical-systems","They encompass methods, data, and institutions for generating reliable agricultural statistics.","Abarcan métodos, datos e instituciones para generar estadísticas agrícolas fiables."],["statistics","agricultural-surveys","Agricultural surveys provide the raw data from which official agricultural statistics are derived through statistical estimation.","Las encuestas agrícolas proporcionan los datos brutos a partir de los cuales se derivan las estadísticas agrícolas oficiales mediante estimación estadística."],["statistics","statistical-rigor","Statistics provide the foundation for rigorous methods in sampling and estimation.","La estadística proporciona la base para métodos rigurosos en muestreo y estimación."],["statistics","estimates","Statistics provides the framework for producing reliable estimates from sample data.","La estadística proporciona el marco para producir estimaciones fiables a partir de datos de muestra."],["statistics","statistical-methods","Statistical methods provide techniques for estimating crop area, yield, and accuracy from sample data.","Los métodos estadísticos proporcionan técnicas para estimar el área de cultivo, el rendimiento y la exactitud a partir de datos de muestra."],["statistics","statisticians","Statisticians are professionals who apply statistical theory to design surveys and analyze agricultural data.","Los estadísticos son profesionales que aplican la teoría estadística para diseñar encuestas y analizar datos agrícolas."],["statistics","statistical-indicators","Statistical indicators derive from the broader field of statistics to quantify accuracy and precision.","Los indicadores estadísticos se derivan del campo más amplio de la estadística para cuantificar la exactitud y la precisión."],["statistics","official-agricultural-statistics","Official statistics ensure consistency and enable policy decisions based on rigorous statistical methods.","Las estadísticas oficiales garantizan la coherencia y permiten decisiones políticas basadas en métodos estadísticos rigurosos."],["statistics","variance","Variance is a statistical measure of the spread of a set of values around their mean.","La varianza es una medida estadística de la dispersión de un conjunto de valores alrededor de su media."],["statistics","regression","Regression is a statistical method that models relationships between a dependent and independent variables.","La regresión es un método estadístico que modela relaciones entre una variable dependiente y una independiente."],["statistics","data-science","Data science relies on statistical principles to analyze and interpret data.","La ciencia de datos se basa en principios estadísticos para analizar e interpretar datos."],["mapping","detailed-mapping","Detailed mapping extends general mapping by using high-resolution imagery and object-based methods to produce fine-scale crop maps.","La cartografía detallada extiende la cartografía general mediante el uso de imágenes de alta resolución y métodos basados en objetos para producir mapas de cultivos a escala fina."],["mapping","national-scale-mapping","National scale mapping applies mapping techniques to produce country-wide thematic maps.","La cartografía a escala nacional aplica técnicas de mapeo para producir mapas temáticos de todo el país."],["mapping","early-season-crop-yield-mapping","Mapping techniques produce spatial yield estimates from satellite imagery and models.","Las técnicas de mapeo producen estimaciones espaciales de rendimiento a partir de imágenes satelitales y modelos."],["mapping","crop-mapping","Crop mapping is the process of producing thematic maps showing crop types, building on the general mapping concept.","El mapeo de cultivos es el proceso de producir mapas temáticos que muestran tipos de cultivos, basándose en el concepto general de mapeo."],["mapping","land-use-mapping","Land use mapping produces themes showing socioeconomic functions, building on general mapping processes.","El mapeo de uso del suelo produce temas que muestran funciones socioeconómicas, basándose en procesos generales de mapeo."],["imagery","satellite-imagery","Satellite imagery is imagery specifically collected by satellite sensors, hence building from the broader imagery concept.","Las imágenes satelitales son imágenes recolectadas específicamente por sensores satelitales, por lo tanto, se basan en el concepto más amplio de imágenes."],["figure","example","A figure is a visual element, like a diagram or map, used to illustrate concepts or results.","Una figura es un elemento visual, como un diagrama o mapa, utilizado para ilustrar conceptos o resultados."],["figure","chart","A chart is a visual element that graphically represents data trends or comparisons.","Un gráfico es un elemento visual que representa gráficamente tendencias o comparaciones de datos."],["use","applications","Applications are the practical uses of remote sensing data for specific purposes like crop monitoring.","Las aplicaciones son los usos prácticos de los datos de teledetección para fines específicos como el monitoreo de cultivos."],["information","georeferenced-information","Georeferenced information is data linked to a specific location on Earth's surface.","La información georreferenciada son datos vinculados a una ubicación específica en la superficie de la Tierra."],["information","geoinformation","Geoinformation is information that has geographic location and attributes derived from Earth observation.","La geoinformación es información que tiene ubicación geográfica y atributos derivados de la observación de la Tierra."],["survey","field-surveys","Field surveys are on-the-ground surveys that collect detailed crop information for training and validation.","Las encuestas de campo son encuestas sobre el terreno que recopilan información detallada de cultivos para entrenamiento y validación."],["survey","ground-survey-estimators","Ground survey estimators use data from field surveys to produce unbiased population estimates.","Los estimadores de encuesta sobre el terreno utilizan datos de encuestas de campo para producir estimaciones poblacionales insesgadas."],["survey","ground-surveys","Ground surveys are field-based data collection campaigns that provide ground truth for remote sensing.","Las encuestas de campo son campañas de recolección de datos basadas en el terreno que proporcionan verdad terreno para la teledetección."],["survey","agricultural-surveys","Agricultural surveys are systematic survey programs that gather crop area and yield data, extending the general survey method to a specific agricultural context.","Las encuestas agrícolas son programas sistemáticos de encuesta que recopilan datos de área y rendimiento de cultivos, extendiendo el método general de encuesta a un contexto agrícola específico."],["survey","survey-vector","A survey vector represents the crop type observed at a pixel, with element 1 for the observed crop and 0 for others.","Un vector de encuesta representa el tipo de cultivo observado en un píxel, con el elemento 1 para el cultivo observado y 0 para los demás."],["survey","surveying","Surveying is the systematic act of conducting a survey to gather data.","La topografía es el acto sistemático de realizar una encuesta para recopilar datos."],["survey","statistical-survey","A statistical survey is a systematic survey designed to produce quantitative estimates with known error.","Una encuesta estadística es una encuesta sistemática diseñada para producir estimaciones cuantitativas con error conocido."],["survey","survey-records","Survey records are the individual data entries collected during a systematic field survey.","Los registros de encuestas son las entradas de datos individuales recolectadas durante una encuesta de campo sistemática."],["example","case-study","A case study serves as a concrete example that illustrates how methods are applied in practice.","Un estudio de caso sirve como ejemplo concreto que ilustra cómo se aplican los métodos en la práctica."],["example","case-studies","A case study provides a concrete instance that demonstrates the application of a methodology.","Un estudio de caso proporciona una instancia concreta que demuestra la aplicación de una metodología."],["quality","quality-framework","A quality framework is a structured set of criteria to assess the fitness‑for‑use of in‑situ survey data.","Un marco de calidad es un conjunto estructurado de criterios para evaluar la idoneidad de uso de los datos de encuesta in situ."],["quality","quality-control","Quality control is a systematic process to ensure data meets required standards through checks and corrections.","El control de calidad es un proceso sistemático para garantizar que los datos cumplan con los estándares requeridos mediante verificaciones y correcciones."],["values","reflectance","Pixels in satellite images store digital numbers that are converted to reflectance values.","Los píxeles en imágenes satelitales almacenan números digitales que se convierten en valores de reflectancia."],["values","variability","Variability refers to the degree of spread or variation among data values, affecting classification complexity.","La variabilidad se refiere al grado de dispersión o variación entre los valores de datos, afectando la complejidad de la clasificación."],["values","variance","It quantifies how much individual values differ from the average of the dataset.","Cuantifica cuánto se desvían los valores individuales del promedio del conjunto de datos."],["values","probability","Probability assigns a numerical value between 0 and 1 to the likelihood of an event.","La probabilidad asigna un valor numérico entre 0 y 1 a la probabilidad de un evento."],["values","regression","It uses numeric values of predictors to predict a continuous outcome, such as crop yield.","Utiliza valores numéricos de predictores para predecir un resultado continuo, como el rendimiento de cultivos."],["values","thresholding","Thresholding assigns pixels to classes by comparing their values against a chosen cut‑off point.","La umbralización asigna píxeles a clases comparando sus valores con un punto de corte elegido."],["vegetation","vegetation-indices","Vegetation indices use spectral combinations to quantify green biomass and plant condition.","Los índices de vegetación usan combinaciones espectrales para cuantificar la biomasa verde y la condición de la planta."],["vegetation","biophysical","Biophysical properties describe the physical and biological characteristics of vegetation, such as biomass and LAI.","Las propiedades biofísicas describen las características físicas y biológicas de la vegetación, como la biomasa y el IAF."],["vegetation","agronomic-conditions","Agronomic conditions encompass the physical environment and plant health factors influencing crop development.","Las condiciones agronómicas abarcan el entorno físico y los factores de salud vegetal que influyen en el desarrollo del cultivo."],["vegetation","crop-conditions","By analyzing spectral indices from satellite imagery, you assess crop conditions such as health and stress.","Mediante el análisis de índices espectrales de imágenes satelitales, se evalúan condiciones de cultivo como salud y estrés."],["vegetation","vegetation-health","Vegetation health is assessed through remote sensing spectral indices that measure plant vigor.","La salud de la vegetación se evalúa mediante índices espectrales de teledetección que miden el vigor vegetal."],["vegetation","biomass","Biomass is the total mass of living vegetation in a given area, estimated from spectral indices.","La biomasa es la masa total de vegetación viva en un área determinada, estimada a partir de índices espectrales."],["vegetation","leaf-area-index","Leaf area index measures the leaf area per ground unit, a key biophysical parameter of vegetation.","El índice de área foliar mide el área foliar por unidad de suelo, un parámetro biofísico clave de la vegetación."],["vegetation","ndvi","NDVI is a spectral index designed to highlight vegetation, building on the concept of vegetation cover.","El NDVI es un índice espectral diseñado para resaltar la vegetación, basándose en el concepto de cobertura vegetal."],["observation","monitoring","Monitoring relies on a series of observations at regular intervals to track conditions.","El monitoreo depende de una serie de observaciones a intervalos regulares para rastrear las condiciones."],["observation","ground","Ground observations are measurements taken directly on the Earth's surface, such as crop type and yield data.","Las observaciones de campo son mediciones tomadas directamente en la superficie de la Tierra, como tipo de cultivo y datos de rendimiento."],["observation","instances","An instance can be an observation; a collection of instances forms a dataset for machine learning.","Una instancia puede ser una observación; una colección de instancias forma un conjunto de datos para el aprendizaje automático."],["time-series","satellite-image-time-series","A satellite image time series is a specific type of time series where each observation is an image capturing land surface conditions.","Una serie temporal de imágenes satelitales es un tipo específico de serie temporal donde cada observación es una imagen que captura las condiciones de la superficie terrestre."],["time-series","patterns","A time series reveals seasonal patterns, which we can generalize into idealized patterns for each land cover class.","Una serie temporal revela patrones estacionales, que podemos generalizar en patrones idealizados para cada clase de cobertura del suelo."],["time-series","better-reference-data-series","A better reference data series may include temporal information to capture phenological patterns.","Una mejor serie de datos de referencia puede incluir información temporal para capturar patrones fenológicos."],["time-series","continuous-monitoring","It relies on dense time series to detect subtle temporal changes over the entire season.","Se basa en series temporales densas para detectar cambios temporales sutiles durante toda la temporada."],["time-series","temporal-pattern","A temporal pattern is a recurring sequence or trend observed in a satellite image time series.","Un patrón temporal es una secuencia o tendencia recurrente observada en una serie temporal de imágenes satelitales."],["time-series","yield-forecasting","Satellite image time series capture temporal crop growth patterns essential for yield forecasting models.","Las series temporales de imágenes satelitales capturan patrones temporales de crecimiento de cultivos esenciales para modelos de pronóstico de rendimiento."],["time-series","phenological-patterns","Satellite time series data reveal phenological patterns through changes in vegetation indices over the growing season.","Los datos de series temporales satelitales revelan patrones fenológicos a través de cambios en índices de vegetación durante la temporada de crecimiento."],["time-series","temporal-compositing","Temporal compositing merges multiple images over a time period into a single composite by selecting the best observation per pixel.","La composición temporal fusiona múltiples imágenes durante un período de tiempo en un único compuesto seleccionando la mejor observación por píxel."],["time-series","spectral-temporal-signatures","Spectral-temporal signatures are the unique patterns of spectral indices over time for a given land cover.","Las firmas espectro-temporales son los patrones únicos de índices espectrales a lo largo del tiempo para una cobertura del suelo determinada."],["time-series","time-series-analysis","Time series analysis focuses on sequences of data points collected at successive times.","El análisis de series temporales se centra en secuencias de puntos de datos recolectados en tiempos sucesivos."],["time-series","som","SOM organizes input time series into clusters, preserving topological relationships for pattern discovery.","SOM organiza series temporales de entrada en clústeres, preservando relaciones topológicas para el descubrimiento de patrones."],["level","classification-scheme","A level in a classification scheme indicates increasing detail or specificity within a hierarchy.","Un nivel en un esquema de clasificación indica detalle o especificidad creciente dentro de una jerarquía."],["monitoring","agricultural-monitoring","Agricultural monitoring applies systematic observation methods to track crop conditions and changes over the growing season.","El monitoreo agrícola aplica métodos de observación sistemáticos para rastrear las condiciones y cambios de los cultivos durante la temporada de crecimiento."],["monitoring","operational-crop-monitoring","Operational crop monitoring applies systematic satellite observation and models routinely to track crops.","El monitoreo operativo de cultivos aplica observación satelital sistemática y modelos de manera rutinaria para rastrear cultivos."],["monitoring","vegetation-monitoring","Vegetation monitoring applies systematic repeated observation specifically to plant cover.","El monitoreo de vegetación aplica observación repetida sistemática específicamente a la cobertura vegetal."],["monitoring","continuous-monitoring","Continuous monitoring systematically observes land surface changes at each satellite revisit.","El monitoreo continuo observa sistemáticamente los cambios en la superficie terrestre en cada revisita del satélite."],["monitoring","environmental-monitoring","Environmental monitoring uses satellite time series to track changes in vegetation, water, and soil.","El monitoreo ambiental utiliza series temporales de satélite para rastrear cambios en la vegetación, el agua y el suelo."],["monitoring","near-real-time","Near real‑time capability is essential for operational monitoring of crop conditions as the growing season progresses.","La capacidad en tiempo casi real es esencial para el monitoreo operativo de las condiciones de cultivo a medida que avanza la temporada de crecimiento."],["monitoring","large-scale-agricultural-monitoring","Large-scale agricultural monitoring extends systematic observation to regional or national levels.","El monitoreo agrícola a gran escala extiende la observación sistemática a niveles regionales o nacionales."],["machine-learning","algorithm","Machine learning involves algorithms that improve through experience with data.","El aprendizaje automático involucra algoritmos que mejoran a través de la experiencia con datos."],["machine-learning","early-season-crop-yield-mapping","Machine learning models predict early season crop yield from satellite features.","Los modelos de aprendizaje automático predicen el rendimiento de cultivos en temporada temprana a partir de atributos satelitales."],["machine-learning","classification-method","A classification method is a machine learning algorithm that learns from samples to assign classes.","Un método de clasificación es un algoritmo de aprendizaje automático que aprende de muestras para asignar clases."],["machine-learning","machine-learning-models","Machine learning models are algorithms trained on data to recognize patterns and make predictions.","Los modelos de aprendizaje automático son algoritmos entrenados con datos para reconocer patrones y hacer predicciones."],["machine-learning","neural-networks","Neural networks are a class of machine learning algorithms inspired by biological neurons.","Las redes neuronales son una clase de algoritmos de aprendizaje automático inspirados en neuronas biológicas."],["machine-learning","random-forest","This ensemble method reduces overfitting compared to a single decision tree.","Este método de conjunto reduce el sobreajuste en comparación con un solo árbol de decisión."],["machine-learning","machine-learning-algorithms","Machine learning algorithms are specific techniques like random forest or SVM used within machine learning.","Los algoritmos de aprendizaje automático son técnicas específicas como random forest o SVM utilizadas dentro del aprendizaje automático."],["machine-learning","deep-learning","Deep learning is a subset of machine learning using multi-layered neural networks to learn hierarchical features.","El aprendizaje profundo es un subconjunto del aprendizaje automático que utiliza redes neuronales multicapa para aprender atributos jerárquicos."],["machine-learning","prediction-probabilities","Machine learning models often produce prediction probabilities for each class, indicating confidence.","Los modelos de aprendizaje automático a menudo producen probabilidades de predicción para cada clase, indicando confianza."],["machine-learning","self-organizing-maps","Self-organizing maps use a neural network to learn a topological representation of input data without labels.","Los mapas autoorganizados utilizan una red neuronal para aprender una representación topológica de los datos de entrada sin etiquetas."],["machine-learning","multi-task-learning","Multi-task learning trains a single model simultaneously on multiple related tasks, improving generalization.","El aprendizaje multitarea entrena un solo modelo simultáneamente en múltiples tareas relacionadas, mejorando la generalización."],["machine-learning","data-science","Using machine learning algorithms, data science builds models from data for predictions.","Usando algoritmos de aprendizaje automático, la Ciencia de Datos construye modelos a partir de datos para predicciones."],["machine-learning","crop-classification-models","Machine learning provides the algorithms that learn patterns from labeled samples.","El aprendizaje automático proporciona los algoritmos que aprenden patrones a partir de muestras etiquetadas."],["algorithm","cluster","A clustering algorithm partitions data into clusters of similar points.","Un algoritmo de agrupamiento divide los datos en clústeres de puntos similares."],["algorithm","satellite-image-analysis","Algorithms interpret satellite imagery to extract meaningful patterns and information.","Los algoritmos interpretan imágenes satelitales para extraer patrones e información significativos."],["algorithm","classification-algorithm","A classification algorithm is an algorithm specifically designed to assign class labels to data.","Un algoritmo de clasificación es un algoritmo diseñado específicamente para asignar etiquetas de clase a los datos."],["algorithm","classification-method","It is a specific algorithm—e.g., decision tree or random forest—that processes features to label pixels.","Es un algoritmo específico—por ejemplo, árbol de decisión o random forest—que procesa atributos para etiquetar píxeles."],["algorithm","cgi-algorithm","The CGI algorithm is a defined computational procedure for extracting crop growth indicators from images.","El algoritmo CGI es un procedimiento computacional definido para extraer indicadores de crecimiento de cultivos a partir de imágenes."],["algorithm","machine-learning-algorithms","Machine learning algorithms apply an algorithm to learn patterns from data for prediction.","Los algoritmos de aprendizaje automático aplican un algoritmo para aprender patrones a partir de datos para predicción."],["algorithm","clustering-algorithm","Clustering algorithms are unsupervised methods that identify natural groupings in data without labels.","Los algoritmos de agrupamiento son métodos no supervisados que identifican agrupaciones naturales en los datos sin etiquetas."],["type","classification-scheme","A type is a category in a classification scheme, such as a land cover class or crop species.","Un tipo es una categoría en un esquema de clasificación, como una clase de cobertura del suelo o una especie de cultivo."],["type","crop-types","A type is a category; crop types divide agricultural production into distinct classes for classification.","Un tipo es una categoría; los tipos de cultivos dividen la producción agrícola en clases distintas para clasificación."],["forest","land-cover","Forest is a land cover type characterized by dense tree cover in remote sensing imagery.","El bosque es un tipo de cobertura del suelo caracterizado por una cubierta arbórea densa en imágenes de teledetección."],["feature","predictors","Predictors are features such as spectral bands, vegetation indices, or time series used in a model.","Los predictores son atributos como bandas espectrales, índices de vegetación o series temporales utilizados en un modelo."],["feature","identification","Identification recognizes features such as crop types by analyzing their spectral or temporal patterns.","La identificación reconoce atributos como los tipos de cultivos al analizar sus patrones espectrales o temporales."],["feature","decision-tree","A decision tree splits the data based on feature values to create a tree-like model of decisions.","Un árbol de decisión divide los datos según los valores de los atributos para crear un modelo de decisiones en forma de árbol."],["estimation","estimator","An estimator is a statistical rule for estimating a population parameter from sample data.","Un estimador es una regla estadística para estimar un parámetro poblacional a partir de datos muestrales."],["estimation","area-estimation","Area estimation applies statistical methods to estimate the spatial extent of land cover or crop types from sample data.","La estimación de área aplica métodos estadísticos para estimar la extensión espacial de la cobertura del suelo o tipos de cultivo a partir de datos muestrales."],["estimation","remote-sensing-estimation","Estimation infers unknown quantities like crop area from observed data such as satellite imagery.","La estimación infiere cantidades desconocidas como el área de cultivo a partir de datos observados como imágenes satelitales."],["estimation","reliable-statistical-analyses","Reliable statistical analyses combine map predictions with design-based estimators to produce unbiased estimates.","Los análisis estadísticos fiables combinan predicciones de mapas con estimadores de diseño para producir estimaciones insesgadas."],["estimation","statistics-production","Statistics production generates official estimates of crop area and yield using rigorous estimation methods.","La producción de estadísticas genera estimaciones oficiales del área y rendimiento de cultivos utilizando métodos de estimación rigurosos."],["estimation","survey-approach","The survey approach is a pure estimation method that does not incorporate satellite map predictions.","El enfoque de encuesta es un método de estimación puro que no incorpora predicciones de mapas satelitales."],["estimation","crop-yield-estimation","Crop yield estimation is the process of inferring yield values from satellite and ground data.","La estimación del rendimiento de cultivos es el proceso de inferir valores de rendimiento a partir de datos satelitales y de campo."],["estimation","sample-based-estimators","Sample-based estimators use data from a probability sample to estimate population parameters like total area.","Los estimadores basados en muestras utilizan datos de una muestra probabilística para estimar parámetros poblacionales como el área total."],["estimation","crop-area","Crop area estimation uses statistical methods to infer total planted area from samples.","La estimación de área de cultivo utiliza métodos estadísticos para inferir el área total sembrada a partir de muestras."],["yield","crop-yield-estimation","Crop yield estimation uses models to predict the amount of crop produced per unit area.","La estimación del rendimiento de cultivos utiliza modelos para predecir la cantidad de cultivo producido por unidad de área."],["yield","yield-forecasting","Yield forecasting predicts future crop yield per unit area, using historical yield data and satellite observations.","El pronóstico de rendimiento predice el rendimiento futuro de cultivos por unidad de área, utilizando datos históricos de rendimiento y observaciones satelitales."],["yield","crop-yield","Crop yield is the yield (mass per area) of a specific crop, estimated using remote sensing or surveys.","El rendimiento de cultivos es el rendimiento (masa por área) de un cultivo específico, estimado mediante teledetección o encuestas."],["remote-sensing","sensors","Remote sensing uses sensors on satellites or aircraft to detect electromagnetic radiation.","La teledetección utiliza sensores en satélites o aeronaves para detectar radiación electromagnética."],["remote-sensing","geoinformatics","It integrates remote sensing data with spatial analysis methods for Earth observation.","Integra datos de teledetección con métodos de análisis espacial para la observación de la Tierra."],["remote-sensing","remote-sensing-estimation","Remote sensing provides satellite imagery from which agricultural parameters can be estimated.","La teledetección proporciona imágenes satelitales a partir de las cuales se pueden estimar parámetros agrícolas."],["remote-sensing","radar","Radar is a remote sensing technique that uses actively emitted microwave signals instead of passive solar radiation.","El radar es una técnica de teledetección que utiliza señales de microondas emitidas activamente en lugar de radiación solar pasiva."],["remote-sensing","crop-assessment","Remote sensing provides spectral and temporal data essential for crop assessment over large areas.","La teledetección proporciona datos espectrales y temporales esenciales para la evaluación de cultivos en grandes áreas."],["remote-sensing","remote-sensing-science","Remote sensing science is the academic discipline underlying the practice of remote sensing.","La ciencia de la teledetección es la disciplina académica que subyace a la práctica de la teledetección."],["remote-sensing","earth-observation","Earth Observation is the application of remote sensing to monitor and study the planet's surface.","La observación de la Tierra es la aplicación de la teledetección para monitorear y estudiar la superficie del planeta."],["remote-sensing","satellite-sensors","In remote sensing, satellite sensors are the key hardware that record data from a distance.","En teledetección, los sensores satelitales son el hardware clave que registra datos a distancia."],["resolution","detailed-mapping","Detailed mapping requires high spatial resolution imagery to delineate individual fields and small features.","La cartografía detallada requiere imágenes de alta resolución espacial para delimitar campos individuales y pequeños elementos."],["study","research","Research advances knowledge by conducting systematic studies and experiments to develop or refine methods.","La investigación avanza el conocimiento mediante la realización de estudios sistemáticos y experimentos para desarrollar o refinar métodos."],["study","project","A project is a planned undertaking with specific objectives, larger than a study, often involving multiple steps.","Un proyecto es una empresa planificada con objetivos específicos, más grande que un estudio, que a menudo involucra múltiples etapas."],["study","experimental-area","This area serves as the spatial domain for a case study or pilot investigation.","Esta área sirve como dominio espacial para un estudio de caso o investigación piloto."],["study","research-areas","Research areas are specific geographic or thematic domains where a study or field experiment is conducted.","Las áreas de investigación son dominios geográficos o temáticos específicos donde se realiza un estudio o experimento de campo."],["study","case-study","A case study is a detailed investigation of a specific instance or application within the larger study.","Un estudio de caso es una investigación detallada de una instancia o aplicación específica dentro del estudio más grande."],["study","case-studies","Case studies are detailed investigations of specific examples, illustrating methods and results.","Los estudios de caso son investigaciones detalladas de ejemplos específicos, que ilustran métodos y resultados."],["earth","soil","Soil forms from the weathering of Earth's crust and organic matter decomposition.","El suelo se forma a partir de la meteorización de la corteza terrestre y la descomposición de materia orgánica."],["earth","remote-sensing-science","It studies Earth observation from a distance using sensors and energy interactions.","Estudia la observación de la Tierra a distancia mediante sensores e interacciones energéticas."],["earth","earth-observation","Earth Observation focuses on collecting data about Earth using satellite-mounted sensors.","La observación de la Tierra se centra en recopilar datos sobre la Tierra utilizando sensores montados en satélites."],["polygons","individual-agricultural-plot-polygons","Polygons are vector boundaries used to delineate individual agricultural plots.","Los polígonos son límites vectoriales utilizados para delinear parcelas agrícolas individuales."],["polygons","vector","A vector object includes points, lines, and polygons; polygons represent field parcels in mapping.","Un objeto vectorial incluye puntos, líneas y polígonos; los polígonos representan parcelas de campo en el mapeo."],["polygons","zonal-statistics","Zonal statistics compute summary values (e.g., mean NDVI) for each polygon in a vector layer.","Las estadísticas zonales calculan valores resumidos (p. ej., NDVI medio) para cada polígono en una capa vectorial."],["polygons","boundaries","Boundaries are the edges of polygons that delineate agricultural fields or land cover parcels.","Los límites son los bordes de los polígonos que delinean campos agrícolas o parcelas de cobertura del suelo."],["ground-survey-estimators","reliable-statistical-analyses","By integrating ground survey data, these analyses ensure estimates are design-consistent.","Al integrar datos de encuestas de campo, estos análisis aseguran que las estimaciones sean consistentes con el diseño."],["development","roadmap","It guides the development and deployment of a system or methodology over time.","Guía el desarrollo y despliegue de un sistema o metodología a lo largo del tiempo."],["development","implementation","Implementation follows the development phase to deploy a system for routine use.","La implementación sigue a la fase de desarrollo para desplegar un sistema para uso rutinario."],["points","vector","A vector can represent a point, line, or polygon, enabling spatial analysis of discrete features.","Un vector puede representar un punto, línea o polígono, permitiendo el análisis espacial de atributos discretos."],["step","algorithm","An algorithm is a defined set of step-by-step instructions or rules designed to perform a task.","Un algoritmo es un conjunto definido de instrucciones o reglas paso a paso diseñadas para realizar una tarea."],["step","process","A process is a sequence of steps designed to transform input data into a desired output.","Un proceso es una secuencia de etapas diseñada para transformar datos de entrada en una salida deseada."],["step","stages","Each stage represents a major phase of the workflow for agricultural statistics.","Cada etapa representa una fase principal del flujo de trabajo para las estadísticas agrícolas."],["process","stages","Stages are the discrete steps within a process, such as data acquisition and classification.","Las etapas son los pasos discretos dentro de un proceso, como la adquisición y clasificación de datos."],["process","workflow","A workflow is a specific sequence of steps (a process) that is formally defined to analyze data.","Un flujo de trabajo es una secuencia específica de etapas (un proceso) que se define formalmente para analizar datos."],["collection","satellite-image-collections","A satellite image collection is a set of images sharing a common source, format, and theme.","Una colección de imágenes satelitales es un conjunto de imágenes que comparten una fuente, formato y tema común."],["agricultural-statistics","official-agricultural-statistics","Official agricultural statistics are the authoritative quantitative data on farming produced by government agencies.","Las estadísticas agrícolas oficiales son los datos cuantitativos autoritativos sobre la agricultura producidos por agencias gubernamentales."],["agricultural-statistics","agricultural-statistical-production","Agricultural statistical production is the process of generating official agricultural statistics.","La producción estadística agrícola es el proceso de generar estadísticas agrícolas oficiales."],["agricultural-statistics","agricultural-environmental-statistics","Agricultural environmental statistics combine crop area and yield data with environmental variables for sustainability assessment.","Las estadísticas agroambientales combinan datos de área de cultivo y rendimiento con variables ambientales para la evaluación de la sostenibilidad."],["agricultural-statistics","agricultural","Agricultural refers to the domain of farming and crop production that these statistics describe.","Agrícola se refiere al dominio de la agricultura y producción de cultivos que describen estas estadísticas."],["agricultural-statistics","food-security","Agricultural statistics on crop area and yield serve as key indicators for assessing food security at regional and national levels.","Las estadísticas agrícolas sobre área de cultivo y rendimiento sirven como indicadores clave para evaluar la seguridad alimentaria a nivel regional y nacional."],["agricultural-statistics","agricultural-statistical-systems","Agricultural statistical systems are the institutional frameworks that produce agricultural statistics.","Los sistemas estadísticos agrícolas son los marcos institucionales que producen estadísticas agrícolas."],["performance","classification-performance","Classification performance is the specific performance measure of a classification model or map.","El rendimiento de clasificación es la medida de rendimiento específica de un modelo o mapa de clasificación."],["performance","model-evaluation","Model evaluation measures the performance of a model using quantitative metrics.","La evaluación de modelos mide el rendimiento de un modelo utilizando métricas cuantitativas."],["performance","model-ability","It is often measured by the model's performance on new, unseen data.","A menudo se mide por el rendimiento del modelo en datos nuevos no vistos."],["source","public-datasets","They come from public sources like space agencies and are free to use for research.","Provienen de fuentes públicas como agencias espaciales y son de uso gratuito para investigación."],["source","big-data-sources","Big data sources include satellite archives and public datasets that provide petabyte-scale imagery.","Las fuentes de macrodatos incluyen archivos satelitales y conjuntos de datos públicos que proporcionan imágenes a escala de petabytes."],["cloud","atmospheric-correction","Cloud is atmospheric water vapor that obscures satellite imagery and must be masked or composited.","La nube es vapor de agua atmosférico que oscurece las imágenes satelitales y debe ser enmascarado o compuesto."],["cloud","infrastructure","Infrastructure comprises cloud computing and storage systems needed to process and analyze large Earth observation data.","La infraestructura comprende sistemas de computación en la nube y almacenamiento necesarios para procesar y analizar grandes datos de observación de la Tierra."],["cloud","copernicus-data-space-ecosystem","It is a cloud-based platform for storing and analyzing Earth observation data.","Es una plataforma basada en la nube para almacenar y analizar datos de observación de la Tierra."],["cloud","cloud-collections","Cloud computing enables storage and retrieval of large satellite image collections as cloud collections.","La computación en la nube permite almacenar y recuperar grandes colecciones de imágenes satelitales como colecciones en la nube."],["cloud","platforms","Platforms like cloud services provide the infrastructure to access and process satellite imagery.","Plataformas como los servicios en la nube proporcionan la infraestructura para acceder y procesar imágenes satelitales."],["cloud","masking","Cloud masking identifies and removes cloud-covered pixels to obtain clear observations.","El enmascaramiento de nubes identifica y elimina píxeles cubiertos por nubes para obtener observaciones claras."],["cloud","cloud-based-services","Cloud‑based services deliver on‑demand access to satellite data archives and computational resources via the internet.","Los servicios basados en la nube ofrecen acceso bajo demanda a archivos de datos satelitales y recursos computacionales a través de internet."],["cloud","cloud-masking","Cloud masking uses cloud detection algorithms to remove cloud-affected pixels from satellite imagery.","El enmascaramiento de nubes utiliza algoritmos de detección de nubes para eliminar píxeles afectados por nubes de las imágenes satelitales."],["cloud","cloud-shadow","Cloud shadow is the dark area on the ground caused by a cloud blocking sunlight, requiring masking.","La sombra de nube es el área oscura en el suelo causada por una nube que bloquea la luz solar, requiriendo enmascaramiento."],["validation","map-validation","Map validation is the process of assessing a map's accuracy by comparing it to reference data.","La validación de mapas es el proceso de evaluar la exactitud de un mapa comparándolo con datos de referencia."],["validation","statistics-production","It includes validation steps to ensure the accuracy and reliability of the produced statistics.","Incluye etapas de validación para asegurar la exactitud y fiabilidad de las estadísticas producidas."],["validation","model-generalization-capabilities","Generalization is assessed by validating the model on independent datasets from different regions or times.","La generalización se evalúa validando el modelo en conjuntos de datos independientes de diferentes regiones o tiempos."],["validation","accuracy-assessment","Accuracy assessment uses validation data independent of training to compute error metrics.","La evaluación de precisión utiliza datos de validación independientes del entrenamiento para calcular métricas de error."],["validation","data-division","Data division reserves a validation set to tune model parameters and prevent overfitting.","La división de datos reserva un conjunto de validación para ajustar los parámetros del modelo y evitar el sobreajuste."],["validation","model-evaluation","Model evaluation uses validation datasets to compute accuracy metrics and detect overfitting.","La evaluación de modelos utiliza conjuntos de datos de validación para calcular métricas de precisión y detectar sobreajuste."],["estimator","statistical-rigor","Rigorous application of estimators ensures unbiased and precise statistical inference.","La aplicación rigurosa de estimadores garantiza una inferencia estadística insesgada y precisa."],["estimator","design-estimator","A design estimator extends the estimator by incorporating the sampling design's inclusion probabilities.","Un estimador de diseño extiende el estimador al incorporar las probabilidades de inclusión del diseño muestral."],["parcels","polygons","Parcels are often represented as polygons in geographic information systems for analysis.","Las parcelas a menudo se representan como polígonos en sistemas de información geográfica para su análisis."],["parcels","uhr-cfp-dataset","Each image in the UHR CFP dataset is paired with polygon labels of individual agricultural field parcels.","Cada imagen en el conjunto de datos UHR CFP está emparejada con etiquetas de polígonos de parcelas de campo agrícolas individuales."],["parcels","agricultural-plots","Agricultural plots are the fundamental spatial units also known as parcels in crop mapping.","Las parcelas agrícolas son las unidades espaciales fundamentales, también conocidas como parcelas en el mapeo de cultivos."],["parcels","agricultural-holding","An agricultural holding may consist of multiple parcels, all under unified economic management.","Una explotación agrícola puede consistir en múltiples parcelas, todas bajo una gestión económica unificada."],["agriculture","land-preparation","Land preparation is a key initial practice in agriculture, involving soil tillage before sowing.","La preparación del terreno es una práctica inicial clave en la agricultura, que implica la labranza del suelo antes de la siembra."],["agriculture","precision-agriculture","Precision agriculture uses detailed spatial data, including remote sensing, to optimize crop management inputs.","La agricultura de precisión utiliza datos espaciales detallados, incluida la teledetección, para optimizar los insumos de manejo de cultivos."],["agriculture","agricultural","Agricultural is the adjective form of agriculture, the practice of cultivating land for crops.","Agrícola es la forma adjetiva de agricultura, la práctica de cultivar la tierra para obtener cultivos."],["agriculture","agricultural-landscapes","Agricultural landscapes are geographic areas dominated by farming activities and field mosaics.","Los paisajes agrícolas son áreas geográficas dominadas por actividades agrícolas y mosaicos de campos."],["agriculture","agricultural-land-areas","Agricultural land areas are portions of the Earth's surface used for crop cultivation and livestock.","Las áreas de tierras agrícolas son porciones de la superficie terrestre utilizadas para el cultivo y la ganadería."],["agriculture","agricultural-holding","An agricultural holding is a single management unit engaged in agricultural production.","Una explotación agrícola es una unidad de gestión única dedicada a la producción agrícola."],["parameters","algorithm","Parameters adjust how an algorithm runs, like the number of neighbors in a classifier.","Los parámetros ajustan cómo funciona un algoritmo, como el número de vecinos en un clasificador."],["crop-type-mapping","large-scale-agricultural-mapping","Large-scale agricultural mapping extends crop type mapping to cover extensive areas using automated methods.","La cartografía agrícola a gran escala extiende el mapeo de tipos de cultivo para cubrir áreas extensas mediante métodos automatizados."],["crop-type-mapping","worldcereal-reference-data-module","It supports crop type mapping by standardizing reference data collection and documentation across projects.","Apoya el mapeo de tipos de cultivo al estandarizar la recopilación y documentación de datos de referencia entre proyectos."],["ground-surveys","surveying","It often involves field-based data collection, synonymous with ground surveys.","A menudo implica la recolección de datos de campo, sinónimo de encuestas de campo."],["ground-surveys","field-data-collection","It is a systematic process of recording ground surveys to provide reference data for remote sensing analysis.","Es un proceso sistemático de registro de encuestas de campo para proporcionar datos de referencia para el análisis de teledetección."],["ground-surveys","field-samples","Field samples are the primary output of ground surveys, used for training and validation.","Las muestras de campo son el resultado principal de las encuestas de campo, utilizadas para entrenamiento y validación."],["ground-surveys","fao-situ-quality-framework","The FAO situ quality framework provides criteria for evaluating ground survey data quality.","El Marco de calidad in situ de la FAO proporciona criterios para evaluar la calidad de los datos de encuestas de campo."],["processing","data-processing","Data processing is the generic term for the steps applied to any data, including raw satellite data.","El procesamiento de datos es el término genérico para los pasos aplicados a cualquier dato, incluidos los datos satelitales en bruto."],["processing","high-performance-computing","HPC uses parallel processing and specialized hardware (e.g., GPUs) to accelerate Earth observation workflows.","La computación de alto rendimiento utiliza procesamiento paralelo y hardware especializado (por ejemplo, GPU) para acelerar los flujos de trabajo de observación de la Tierra."],["processing","analysis-ready-data","ARD is produced by applying geometric, radiometric, and atmospheric corrections to raw satellite imagery.","Los Datos Listos para Análisis se producen aplicando correcciones geométricas, radiométricas y atmosféricas a las imágenes satelitales en bruto."],["processing","atmospheric-correction","Atmospheric correction is a processing step that removes scattering and absorption effects from satellite data.","La corrección atmosférica es una etapa de procesamiento que elimina los efectos de dispersión y absorción de los datos satelitales."],["data-science","analytics","It uses statistical and machine learning techniques for understanding Earth observation data.","Utiliza técnicas estadísticas y de aprendizaje automático para comprender los datos de observación de la Tierra."],["reference","validation","Validation uses reference data to check if a map or model correctly reflects ground conditions.","La validación utiliza datos de referencia para verificar si un mapa o modelo refleja correctamente las condiciones del terreno."],["reference","data-scarce-regions","In data-scarce regions, reference data are sparse, making it difficult to train robust classification models.","En regiones con escasez de datos, los datos de referencia son escasos, lo que dificulta entrenar modelos de clasificación robustos."],["reference","ground","Reference data consists of ground observations used to label satellite image samples.","Los datos de referencia consisten en observaciones de campo utilizadas para etiquetar muestras de imágenes satelitales."],["design","sampling-strategies","They include design-based approaches like stratified random sampling to reduce bias.","Incluyen enfoques basados en diseño, como el muestreo aleatorio estratificado, para reducir el sesgo."],["design","sampling","Design specifies the sampling strategy to collect representative data for estimation.","El diseño especifica la estrategia de muestreo para recolectar datos representativos para la estimación."],["resources","infrastructure","Resources include the infrastructure needed for processing Earth observation data.","Los recursos incluyen la infraestructura necesaria para procesar datos de observación de la Tierra."],["data-analysis","statistical-analysis","Statistical analysis applies data analysis techniques to estimate quantities and test hypotheses using models.","El análisis estadístico aplica técnicas de análisis de datos para estimar cantidades y probar hipótesis usando modelos."],["satellite-imagery","satellite-image-analysis","Satellite imagery is the primary input for analysis using computer algorithms.","Las imágenes satelitales son la entrada principal para el análisis mediante algoritmos computacionales."],["satellite-imagery","national-scale-mapping","Satellite imagery covering entire countries enables national scale mapping.","Las imágenes satelitales que cubren países enteros permiten la cartografía a escala nacional."],["satellite-imagery","satellite-data-cube","Satellite imagery is stacked along spatial and temporal dimensions to form a data cube.","Las imágenes satelitales se apilan a lo largo de dimensiones espaciales y temporales para formar un cubo de datos."],["satellite-imagery","data-cube","A data-cube organizes satellite imagery along spatial axes and a time dimension for easy access.","Un cubo de datos organiza las imágenes satelitales a lo largo de ejes espaciales y una dimensión temporal para facilitar el acceso."],["satellite-imagery","satellite-imagery-nasa-english","Satellite Imagery NASA English is a NASA training course utilizing satellite imagery for agriculture.","Imágenes satelitales de la NASA es un curso de capacitación de la NASA que utiliza imágenes satelitales para la agricultura."],["satellite-imagery","planet","Planet's satellites capture imagery similar to other missions but with higher spatial resolution.","Los satélites de Planet capturan imágenes similares a otras misiones, pero con mayor resolución espacial."],["satellite-imagery","satellite-derived-models","Satellite imagery provides the input data for training and applying satellite-derived models to estimate agricultural parameters.","Las imágenes satelitales proporcionan los datos de entrada para entrenar y aplicar modelos derivados de satélite para estimar parámetros agrícolas."],["satellite-imagery","land-classification","Satellite imagery provides the spectral data needed for land classification.","Las imágenes satelitales proporcionan los datos espectrales necesarios para la clasificación de tierras."],["ndvi","vegetation-health","NDVI is a key indicator of vegetation health, correlating with green biomass.","El NDVI es un indicador clave de la salud de la vegetación, correlacionado con la biomasa verde."],["ndvi","spectral-index","NDVI is a specific spectral index calculated from near-infrared and red reflectance bands.","El NDVI es un índice espectral específico calculado a partir de las bandas de reflectancia del infrarrojo cercano y el rojo."],["training-dataset","better-reference-data-series","A better reference data series serves as an improved training dataset for classification models.","Una mejor serie de datos de referencia sirve como un conjunto de datos de entrenamiento mejorado para modelos de clasificación."],["training-dataset","quality-control","Quality control of training data ensures samples are accurate and representative before model training.","El control de calidad de los datos de entrenamiento asegura que las muestras sean precisas y representativas antes del entrenamiento del modelo."],["training-dataset","undersampling","Undersampling reduces the number of samples in overrepresented classes to balance the training dataset.","El submuestreo reduce el número de muestras en clases sobrerrepresentadas para equilibrar el conjunto de datos de entrenamiento."],["training-dataset","labeled-samples","A training dataset consists of labeled samples that serve as ground truth for supervised learning.","Un conjunto de datos de entrenamiento consiste en muestras etiquetadas que sirven como verdad terreno para el aprendizaje supervisado."],["crop-type-map","classification-map","A crop-type map is a classification map that focuses on differentiating crop types using spectral-temporal signatures.","Un mapa de tipos de cultivo es un mapa de clasificación que se enfoca en diferenciar tipos de cultivos usando firmas espectro-temporales."],["classification-accuracy","uncertainty","Uncertainty in classification arises from imperfect accuracy; it is quantified by metrics like confidence intervals.","La incertidumbre en la clasificación surge de una precisión imperfecta; se cuantifica con métricas como intervalos de confianza."],["cropland","fallow","Fallow is a state of cropland where no crop is grown, usually to allow soil recovery before the next planting season.","El barbecho es un estado de las tierras de cultivo donde no se cultiva, usualmente para permitir la recuperación del suelo antes de la próxima temporada de siembra."],["area-estimation","acreage-estimation","Acreage estimation is a type of area estimation focused on crop extent.","La estimación de superficie es un tipo de estimación de área enfocada en la extensión del cultivo."],["area-estimation","unbiased-area-estimates","Unbiased area estimates correct for classification errors using statistically rigorous methods derived from area estimation.","Las estimaciones de área insesgadas corrigen errores de clasificación usando métodos estadísticamente rigurosos derivados de la estimación de área."],["crop-classification","chapter-crop-classification","This chapter presents methodologies and case studies for crop classification using remote sensing.","Este capítulo presenta metodologías y estudios de caso para la clasificación de cultivos mediante teledetección."],["field-surveys","data-scarce-regions","Field surveys are often insufficient in number or coverage in data-scarce regions, limiting ground truth data.","Las encuestas de campo a menudo son insuficientes en número o cobertura en regiones con escasez de datos, limitando los datos de verdad terreno."],["field-surveys","crop-assessment","Field surveys supply ground-truth measurements that validate and calibrate crop assessment models.","Las encuestas de campo proporcionan mediciones de verdad terreno que validan y calibran modelos de evaluación de cultivos."],["field-surveys","ground-observations","They are collected through field surveys and represent in-situ conditions.","Se recolectan mediante encuestas de campo y representan condiciones in situ."],["satellite-image-time-series-classification","time-series-classification","Satellite image time series classification applies time series classification methods to sequences of satellite images.","La clasificación de series temporales de imágenes satelitales aplica métodos de clasificación de series temporales a secuencias de imágenes satelitales."],["national-statistical-systems","statistical-systems","National statistical systems are the country-level implementations of statistical systems to produce official statistics.","Los sistemas estadísticos nacionales son las implementaciones a nivel de país de los sistemas estadísticos para producir estadísticas oficiales."],["ground","ground-observations","Ground observations are specific measurements taken on the Earth's surface, synonymous with ground data.","Las observaciones de campo son mediciones específicas tomadas en la superficie de la Tierra, sinónimo de datos de campo."],["ground","ground-truth-2","Ground truth data are direct observations of actual conditions on the Earth's surface used for validation.","Los datos de verdad terreno son observaciones directas de las condiciones reales en la superficie de la Tierra utilizadas para validación."],["ground","ground-measurements","Ground measurements are in-situ observations collected on the Earth's surface, such as crop yield or type.","Las mediciones de campo son observaciones in situ recolectadas en la superficie de la Tierra, como el rendimiento o tipo de cultivo."],["ground","extensive-ground-samples","Extensive ground samples are many in-situ observations, building from the ground concept of field data.","Las muestras extensivas de campo son muchas observaciones in situ, que se basan en el concepto de campo de los datos de campo."],["cube","dimensional-dataset","A dimensional dataset organizes Earth observation data into a multi-dimensional array called a data cube.","Un conjunto de datos dimensional organiza los datos de observación de la Tierra en un arreglo multidimensional llamado cubo de datos."],["cube","map-sf","A classified data cube is labeled by selecting for each pixel the class with highest probability.","Un cubo de datos clasificado se etiqueta seleccionando para cada píxel la clase con mayor probabilidad."],["sampling","population","Sampling selects a subset of units from a population to estimate characteristics while reducing cost.","El muestreo selecciona un subconjunto de unidades de una población para estimar características mientras reduce el costo."],["sampling","statistical-methods","They rely on sampling theory to select representative units and draw inferences about the population.","Se basan en la teoría de muestreo para seleccionar unidades representativas y hacer inferencias sobre la población."],["sampling","design-estimator","The design estimator uses the probability-based sampling scheme to produce unbiased population estimates.","El estimador de diseño utiliza el esquema de muestreo basado en probabilidad para producir estimaciones poblacionales insesgadas."],["sampling","survey-approach","The survey approach uses a probability sample of ground observations to make unbiased population estimates.","El enfoque de encuesta utiliza una muestra probabilística de observaciones de campo para hacer estimaciones poblacionales insesgadas."],["sampling","sample-design","Sample design is the detailed plan for how sampling is implemented, including selection methods.","El diseño muestral es el plan detallado de cómo se implementa el muestreo, incluyendo los métodos de selección."],["sampling","representativeness","Sampling designs aim to achieve representativeness so that sample statistics can be generalized to the whole area.","Los diseños muestrales buscan lograr representatividad para que las estadísticas muestrales puedan generalizarse a toda el área."],["sampling","sample-based-estimators","The sampling design determines the properties of the sample-based estimator, such as unbiasedness and variance.","El diseño muestral determina las propiedades del estimador basado en muestras, como la insesgadez y la varianza."],["sampling","stratified-random-sampling","Stratified random sampling extends simple random sampling by partitioning the population into homogeneous subgroups.","El muestreo aleatorio estratificado extiende el muestreo aleatorio simple al dividir la población en subgrupos homogéneos."],["sampling","sampling-frame","A sampling frame is the list or spatial structure from which a sample is selected.","Un marco de muestreo es la lista o estructura espacial de la cual se selecciona una muestra."],["sampling","sampling-strategies","Sampling strategies are plans for selecting units from a population to estimate characteristics.","Las estrategias de muestreo son planes para seleccionar unidades de una población con el fin de estimar características."],["scale","national-scale-applications","National-scale applications apply remote sensing methods across an entire country for official statistics.","Las aplicaciones a escala nacional aplican métodos de teledetección en todo un país para producir estadísticas oficiales."],["segmentation","segmentation-map","A segmentation map stores the output of an image segmentation algorithm, labeling each pixel with a segment ID.","Un mapa de segmentación almacena la salida de un algoritmo de segmentación de imágenes, etiquetando cada píxel con un ID de segmento."],["segmentation","object-based-classification","Object-based classification first segments an image into objects (groups of pixels) and then classifies each object.","La clasificación basada en objetos primero segmenta una imagen en objetos (grupos de píxeles) y luego clasifica cada objeto."],["segmentation","boundaries","Image segmentation produces boundaries that separate different land cover or crop regions.","La segmentación de imágenes produce límites que separan diferentes regiones de cobertura del suelo o cultivos."],["users","national-statistical-offices","Users, especially national statistical offices, apply remote sensing methods to produce official agricultural statistics.","Los usuarios, especialmente las oficinas nacionales de estadística, aplican métodos de teledetección para producir estadísticas agrícolas oficiales."],["infrastructure","cloud-based-services","Cloud‑based services provide scalable infrastructure for storing and analyzing large Earth observation datasets.","Los servicios basados en la nube proporcionan infraestructura escalable para almacenar y analizar grandes conjuntos de datos de observación de la Tierra."],["infrastructure","cloud-computing","Cloud computing is a type of infrastructure that delivers on-demand computing resources over the internet.","La computación en la nube es un tipo de infraestructura que entrega recursos informáticos bajo demanda a través de internet."],["project","data-organization-patterns","In a project, these patterns separate chapter-specific and shared data to ensure reproducibility.","En un proyecto, estos patrones separan los datos específicos del capítulo y los datos compartidos para garantizar la reproducibilidad."],["bands","spectral-bands","Bands are discrete spectral channels in satellite imagery that capture reflectance in specific wavelength ranges.","Las bandas son canales espectrales discretos en las imágenes satelitales que capturan reflectancia en rangos de longitud de onda específicos."],["bands","ndvi","NDVI uses the near-infrared and red bands from satellite imagery to compute its index value.","El NDVI utiliza las bandas del infrarrojo cercano y rojo de las imágenes satelitales para calcular su valor de índice."],["satellite-vegetation-indices","crop-conditions","Satellite vegetation indices, like NDVI, quantify vegetation health and thus indicate crop conditions.","Los índices de vegetación satelitales, como el NDVI, cuantifican la salud de la vegetación y, por lo tanto, indican las condiciones de los cultivos."],["classified-map","pixel-counting","Pixel counting estimates area by multiplying the number of pixels classified as a class by its spatial resolution.","El conteo de píxeles estima el área multiplicando el número de píxeles clasificados como una clase por su resolución espacial."],["framework","plp-framework","The PLP Framework extends a structured framework by linking user profiles and learning modules to customize education.","El marco PLP extiende un marco estructurado vinculando perfiles de usuario y módulos de aprendizaje para personalizar la educación."],["framework","quality-framework","The quality framework provides standardized procedures for evaluating and documenting data quality.","El marco de calidad proporciona procedimientos estandarizados para evaluar y documentar la calidad de los datos."],["variability","precision-agriculture","It addresses spatial variability within fields by applying treatments tailored to specific locations.","Aborda la variabilidad espacial dentro de los campos aplicando tratamientos adaptados a ubicaciones específicas."],["variability","spatial-variability","Spatial variability is the geographic variation of a property, such as NDVI, across a region.","La variabilidad espacial es la variación geográfica de una propiedad, como el NDVI, en una región."],["variability","spatial-patterns","Spatial patterns describe how data values vary across geographic locations within a study area.","Los patrones espaciales describen cómo varían los valores de los datos entre ubicaciones geográficas dentro de un área de estudio."],["case","study","A case is a specific example or instance of a study, illustrating the application of methods.","Un caso es un ejemplo o instancia específica de un estudio, que ilustra la aplicación de métodos."],["soil","soil-vegetation-index","This index adjusts for soil brightness to improve vegetation signal in areas with partial cover.","Este índice ajusta el brillo del suelo para mejorar la señal de vegetación en áreas con cobertura parcial."],["soil","agronomic-conditions","Agronomic conditions include soil properties like moisture and nutrient status that affect crop growth.","Las condiciones agronómicas incluyen propiedades del suelo como humedad y estado de nutrientes que afectan el crecimiento del cultivo."],["soil","soil-moisture","Soil moisture is the water content in the soil, affecting crop growth and remote sensing signals.","La humedad del suelo es el contenido de agua en el suelo, que afecta el crecimiento del cultivo y las señales de teledetección."],["set","probability","Probability measures the chance that an element from a set belongs to a particular subset.","La probabilidad mide la posibilidad de que un elemento de un conjunto pertenezca a un subconjunto particular."],["georeferenced-information","coordinate-system","A coordinate system provides the reference for georeferenced information, linking data to locations.","Un sistema de coordenadas proporciona la referencia para la información georreferenciada, vinculando los datos con ubicaciones."],["georeferenced-information","geographic-information-systems","GIS integrates georeferenced information layers such as satellite imagery, field boundaries, and survey records.","El GIS integra capas de información georreferenciada como imágenes satelitales, límites de campo y registros de encuestas."],["georeferenced-information","spatial-information","Spatial information is any data referenced to locations, i.e., georeferenced information.","La información espacial son datos referenciados a ubicaciones, es decir, inform
