ación georreferenciada."],["georeferenced-information","geospatial-analysis","Geospatial analysis examines georeferenced information to extract patterns and relationships.","El análisis geoespacial examina información georreferenciada para extraer patrones y relaciones."],["georeferenced-information","geographic-data","Geographic data is essentially georeferenced information, tied to coordinates.","Los datos geográficos son esencialmente información georreferenciada, vinculada a coordenadas."],["geoinformatics","geographic-information-systems","Geoinformatics encompasses GIS and other geospatial technologies for analysis.","La geoinformática abarca los SIG y otras tecnologías geoespaciales para el análisis."],["geoinformatics","geographical-science","Geographical science provides the theoretical foundation for geoinformatics.","La ciencia geográfica proporciona la base teórica para la geoinformática."],["geoinformatics","geoinformation","Geoinformation is the output produced by geoinformatics; it is geographic data with meaning.","La geoinformación es el producto generado por la geoinformática; son datos geográficos con significado."],["land-cover-mapping","land-cover","Land cover mapping produces thematic maps showing the distribution of land cover types.","La cartografía de cobertura terrestre produce mapas temáticos que muestran la distribución de tipos de cobertura del suelo."],["copernicus-data-space-ecosystem","sentinel-missions","The Copernicus Data Space Ecosystem provides access to Sentinel mission data and processing tools.","El Ecosistema del Espacio de Datos Copernicus proporciona acceso a datos de las misiones Sentinel y herramientas de procesamiento."],["stages","classification-process","It includes stages like training, classification, and validation in a sequential order.","Incluye etapas como entrenamiento, clasificación y validación en un orden secuencial."],["statistical-systems","un-statistical-commission","The UN Statistical Commission oversees global statistical systems, including those for agricultural statistics.","La Comisión de Estadística de las Naciones Unidas supervisa los sistemas estadísticos globales, incluidos los de estadísticas agrícolas."],["big-data","big-data-sources","Big data sources are origins of large-scale datasets that require specialized processing methods.","Las fuentes de macrodatos son orígenes de grandes conjuntos de datos que requieren métodos de procesamiento especializados."],["big-data","high-performance-computing","High‑performance computing (HPC) provides the processing power needed to handle big data and complex models.","La computación de alto rendimiento proporciona la potencia de procesamiento necesaria para manejar macrodatos y modelos complejos."],["big-data","cloud-computing","Cloud computing provides the scalable infrastructure needed to process and store big Earth observation data.","La computación en la nube proporciona la infraestructura escalable necesaria para procesar y almacenar grandes datos de observación de la Tierra."],["geographic-information-systems","spatial-analysis","Spatial analysis uses GIS tools to examine locations, patterns, and relationships in geographic data.","El análisis espacial utiliza herramientas SIG para examinar ubicaciones, patrones y relaciones en datos geográficos."],["geographic-information-systems","geoprocessing","Geoprocessing implements the analytical functions of a geographic information system.","El geoprocesamiento implementa las funciones analíticas de un sistema de información geográfica."],["geographic-information-systems","coordinate-reference-system","In GIS, the CRS is essential for aligning and analyzing spatial data from different sources.","En SIG, el sistema de referencia de coordenadas es esencial para alinear y analizar datos espaciales de diferentes fuentes."],["land-cover-classes","classification-systems","Classification systems define organized sets of land cover classes with clear boundaries and relationships.","Los sistemas de clasificación definen conjuntos organizados de clases de cobertura terrestre con límites y relaciones claros."],["land-cover-classes","land-classes","Land classes extend land cover classes by including land use and other classification criteria.","Las clases de tierra extienden las clases de cobertura terrestre al incluir el uso del suelo y otros criterios de clasificación."],["classification-systems","fao-land-cover-classification-system","The FAO Land Cover Classification System extends classification systems with hierarchical diagnostic criteria.","El Sistema de Clasificación de la Cobertura del Suelo de la FAO extiende los sistemas de clasificación con criterios diagnósticos jerárquicos."],["classification-systems","classification-framework","Classification systems are structured frameworks such as FAO LCCS with rules and hierarchies for assigning semantic labels to land cover.","Los sistemas de clasificación son marcos estructurados como el LCCS de la FAO con reglas y jerarquías para asignar etiquetas semánticas a la cobertura terrestre."],["classification-systems","standardization","It is applied to classification systems to enable comparability.","Se aplica a los sistemas de clasificación para permitir la comparabilidad."],["classification-systems","transferable-classification-system","A transferable classification system is designed to be applied across different regions and times.","Un sistema de clasificación transferible está diseñado para aplicarse en diferentes regiones y tiempos."],["national-statistical-offices","statistical-systems","National Statistical Offices are government agencies within national statistical systems that produce official statistics.","Las Oficinas Nacionales de Estadística son agencias gubernamentales dentro de los sistemas estadísticos nacionales que producen estadísticas oficiales."],["national-statistical-offices","agricultural-statistical-systems","National Statistical Offices operate agricultural statistical systems to generate official data.","Las Oficinas Nacionales de Estadística operan sistemas estadísticos agrícolas para generar datos oficiales."],["satellite-image-time-series","data-approach","A data approach like 'time-first, space-later' leverages satellite image time series for classification.","Un enfoque de datos como 'tiempo primero, espacio después' aprovecha las series temporales de imágenes satelitales para la clasificación."],["satellite-image-time-series","satellite-image-time-series-2","A satellite image time series is a sequence of satellite images of the same area acquired at regular intervals.","Una serie temporal de imágenes satelitales es una secuencia de imágenes satelitales de la misma área adquiridas a intervalos regulares."],["satellite-image-time-series","time-series-classification","Satellite image time series classification uses temporal sequences of images to label land cover.","La clasificación de series temporales de imágenes satelitales utiliza secuencias temporales de imágenes para etiquetar la cobertura terrestre."],["reproducible-analysis-sessions","oci-data-artifacts","OCI data artifacts enable reproducible analysis sessions by providing versioned, self-contained data that can be mounted in JupyterLab environments.","Los artefactos de datos OCI permiten sesiones de análisis reproducibles al proporcionar datos versionados y autocontenidos que se pueden montar en entornos JupyterLab."],["reproducible-analysis-sessions","jupyterlab","Reproducible analysis sessions are one-click JupyterLab environments pre-configured with code, data, and dependencies.","Las sesiones de análisis reproducibles son entornos JupyterLab de un solo clic preconfigurados con código, datos y dependencias."],["reproducible-analysis-sessions","reproducibility","Such sessions ensure reproducibility by encapsulating all software and data needed to re-run an analysis.","Dichas sesiones garantizan la reproducibilidad al encapsular todo el software y los datos necesarios para volver a ejecutar un análisis."],["cluster","clustering-algorithm","A clustering algorithm groups data points (e.g., pixels) into clusters based on feature similarity.","Un algoritmo de agrupamiento agrupa puntos de datos (por ejemplo, píxeles) en clústeres según la similitud de atributos."],["cluster","clustering","Clustering is the process of partitioning data into clusters where points are similar to each other.","El agrupamiento es el proceso de dividir datos en clústeres donde los puntos son similares entre sí."],["classification-scheme","classification-framework","A classification framework organizes a classification scheme into rules and hierarchies.","Un marco de clasificación organiza un esquema de clasificación en reglas y jerarquías."],["classification-scheme","land-cover","Land cover classes are organized by a classification scheme into a hierarchical system.","Las clases de cobertura terrestre se organizan mediante un esquema de clasificación en un sistema jerárquico."],["cover","vegetation","Vegetation is a type of cover on the Earth's surface, monitored using spectral indices.","La vegetación es un tipo de cobertura en la superficie de la Tierra, monitoreada mediante índices espectrales."],["cover","land-cover","Land cover is the observed biophysical material on the Earth's surface, such as forest or cropland.","La cobertura del suelo es el material biofísico observado en la superficie de la Tierra, como bosque o tierras de cultivo."],["indices","spectral-bands","Indices are computed by mathematically combining two or more spectral bands.","Los índices se calculan combinando matemáticamente dos o más bandas espectrales."],["indices","satellite-imagery","Satellite imagery provides the spectral bands used to calculate vegetation indices.","Las imágenes satelitales proporcionan las bandas espectrales utilizadas para calcular índices de vegetación."],["indices","indicators","Indicators such as NDVI are spectral indices that highlight vegetation properties.","Indicadores como el NDVI son índices espectrales que resaltan propiedades de la vegetación."],["land-cover-map","cropland-extent-map","A cropland extent map is a land cover map that specifically delineates areas used for crop cultivation.","Un mapa de extensión de tierras de cultivo es un mapa de cobertura terrestre que delimita específicamente las áreas utilizadas para el cultivo."],["land-cover-map","land-cover","A land cover map displays the spatial distribution of land cover classes.","Un mapa de cobertura terrestre muestra la distribución espacial de las clases de cobertura terrestre."],["environment","agricultural-environmental-statistics","They integrate agricultural statistics with environmental monitoring to support policy and decision-making.","Integran estadísticas agrícolas con monitoreo ambiental para apoyar políticas y toma de decisiones."],["environment","environmental-monitoring","Environmental monitoring systematically observes natural surroundings, including land and atmosphere.","El monitoreo ambiental observa sistemáticamente el entorno natural, incluyendo tierra y atmósfera."],["geospatial-data","spatial-analysis","It operates on geospatial data, including satellite imagery and vector boundaries, to derive spatial statistics.","Opera sobre datos geoespaciales, incluyendo imágenes satelitales y límites vectoriales, para derivar estadísticas espaciales."],["geospatial-data","gis","A GIS is a software system for capturing, storing, analyzing, and displaying geospatial data layers.","Un SIG es un sistema de software para capturar, almacenar, analizar y mostrar capas de datos geoespaciales."],["data-collection","ground-truth","Ground truth data collected via field surveys forms the basis for training and validation.","Los datos de verdad terreno recolectados mediante encuestas de campo forman la base para el entrenamiento y la validación."],["estimates","estimation","Estimation is the process of deriving numerical approximations for unknown population quantities.","La estimación es el proceso de derivar aproximaciones numéricas para cantidades poblacionales desconocidas."],["estimates","confidence-intervals","Confidence intervals provide a range around an estimate that likely contains the true population value.","Los intervalos de confianza proporcionan un rango alrededor de una estimación que probablemente contiene el valor poblacional verdadero."],["early-season-crop-yield-mapping","crop-yield","Crop yield is the target quantity estimated early in the season using satellite data.","El rendimiento de cultivos es la cantidad objetivo estimada temprano en la temporada usando datos satelitales."],["database","data-organization-patterns","Data organization patterns define standard ways to structure data within a database for a project.","Los patrones de organización de datos definen formas estándar de estructurar datos dentro de una base de datos para un proyecto."],["satellite-data-cube","spatiotemporal-array","A spatiotemporal array is a data cube where layers represent time slices of registered satellite images.","Un arreglo espacio-temporal es un cubo de datos donde las capas representan cortes temporales de imágenes satelitales registradas."],["sensors","radar","Radar sensors on satellites transmit pulses and record echoes to measure surface properties.","Los sensores de radar en satélites transmiten pulsos y registran ecos para medir propiedades de la superficie."],["sensors","satellite-sensors","Satellite sensors are specific sensors designed to operate in space and collect Earth observation data.","Los sensores satelitales son sensores específicos diseñados para operar en el espacio y recolectar datos de observación de la Tierra."],["sensors","spectral-channels","Each spectral channel captures reflectance in a specific wavelength range determined by the sensor's filter.","Cada canal espectral captura reflectancia en un rango de longitud de onda específico determinado por el filtro del sensor."],["sensors","spectral-range","Spectral range defines the wavelength intervals a sensor can detect, such as visible or near-infrared.","El rango espectral define los intervalos de longitud de onda que un sensor puede detectar, como el visible o el infrarrojo cercano."],["sensors","satellite-imagery","Satellite imagery is produced by sensors aboard satellites that detect electromagnetic radiation.","Las imágenes satelitales son producidas por sensores a bordo de satélites que detectan radiación electromagnética."],["classification-algorithm","prediction-probabilities","Classification algorithms output prediction probabilities representing the likelihood of a pixel belonging to each class.","Los algoritmos de clasificación generan probabilidades de predicción que representan la probabilidad de que un píxel pertenezca a cada clase."],["range","spectral-range","Range is a shortened term often used to refer to spectral range or spatial coverage of a sensor.","Rango es un término abreviado que a menudo se refiere al rango espectral o la cobertura espacial de un sensor."],["landscapes","agricultural-landscapes","These landscapes consist of patterns of agricultural fields, fallow land, and associated features.","Estos paisajes consisten en patrones de campos agrícolas, barbecho y atributos asociados."],["terrain","terrain-correction","Terrain correction adjusts SAR imagery for geometric distortions caused by elevation and slope.","La corrección del terreno ajusta las imágenes SAR por distorsiones geométricas causadas por elevación y pendiente."],["terrain","digital-elevation-model","A digital elevation model is a raster representation of terrain elevation, used for topographic analysis.","Un modelo digital de elevación es una representación ráster de la elevación del terreno, utilizada para análisis topográfico."],["reference-datasets","ground-truth","Reference datasets are collections of ground-truth observations used to train and validate models.","Los conjuntos de datos de referencia son colecciones de observaciones de verdad terreno utilizadas para entrenar y validar modelos."],["reference-datasets","labeled-samples","Each reference dataset consists of labeled samples that specify the correct class for a location.","Cada conjunto de datos de referencia consiste en muestras etiquetadas que especifican la clase correcta para una ubicación."],["reference-datasets","worldcereal-reference-data-module","The WorldCereal Reference Data Module provides a framework for harmonizing and sharing reference datasets for crop mapping.","El Módulo de Datos de Referencia de WorldCereal proporciona un marco para armonizar y compartir conjuntos de datos de referencia para mapeo de cultivos."],["reference-datasets","validation-datasets","Validation datasets are independent reference datasets used to assess the accuracy of a classification model.","Los conjuntos de datos de validación son conjuntos de datos de referencia independientes utilizados para evaluar la precisión de un modelo de clasificación."],["regional-field-experts","agronomic-conditions","They understand agronomic conditions that influence crop growth and satellite observations.","Ellos entienden las condiciones agronómicas que influyen en el crecimiento de cultivos y las observaciones satelitales."],["tools","better-analytical-tools","Better analytical tools are software systems that improve upon existing tools by adding new capabilities or efficiency.","Mejores herramientas analíticas son sistemas de software que mejoran las herramientas existentes al agregar nuevas capacidades o eficiencia."],["statistical-methods","statistical-analysis","It employs statistical methods to ensure estimates are valid, unbiased, and accompanied by uncertainty measures.","Emplea métodos estadísticos para asegurar que las estimaciones sean válidas, insesgadas y acompañadas de medidas de incertidumbre."],["statistical-analysis","statistics-production","It encompasses the full pipeline from data collection through analysis to dissemination of statistics.","Abarca el flujo de trabajo completo desde la recopilación de datos hasta el análisis y la difusión de estadísticas."],["metrics","confusion-matrix","They are derived from a confusion matrix to compute overall accuracy, precision, recall, and F1-score.","Se derivan de una matriz de confusión para calcular precisión general, precisión, exhaustividad y puntuación F1."],["metrics","statistical-indicators","Statistical indicators are quantitative metrics that assess the performance of models or analyses.","Los indicadores estadísticos son métricas cuantitativas que evalúan el rendimiento de modelos o análisis."],["metrics","indicators","Indicators are derived metrics like vegetation indices that quantify crop condition or performance.","Los indicadores son métricas derivadas, como los índices de vegetación, que cuantifican la condición o el rendimiento del cultivo."],["som-analysis","self-organizing-maps","SOM analysis uses Self-Organizing Maps to cluster time series and detect confusions in training data.","El análisis SOM utiliza mapas autoorganizados para agrupar series temporales y detectar confusiones en los datos de entrenamiento."],["som-analysis","quality-control","It serves as a quality control step to identify mislabeled samples before training a classifier.","Sirve como paso de control de calidad para identificar muestras mal etiquetadas antes de entrenar un clasificador."],["spatial-analysis","geoprocessing","Geoprocessing is a set of spatial analysis operations that manipulate geographic data.","El geoprocesamiento es un conjunto de operaciones de análisis espacial que manipulan datos geográficos."],["spatial-analysis","geographical-science","It studies spatial patterns and relationships, which spatial analysis applies.","Estudia patrones y relaciones espaciales, que el análisis espacial aplica."],["statistics-production","agricultural-statistical-production","It applies the principles of statistics production to the agricultural domain.","Aplica los principios de la producción de estadísticas al ámbito agrícola."],["reproducible-analysis-system","reproducible-code","The reproducible analysis system packages the chapter's reproducible code into a pre-configured JupyterLab environment.","El sistema de análisis reproducible empaqueta el código reproducible del capítulo en un entorno JupyterLab preconfigurado."],["reproducible-analysis-system","jupyterlab","JupyterLab provides the interactive web-based interface for launching the reproducible analysis system.","JupyterLab proporciona la interfaz web interactiva para lanzar el sistema de análisis reproducible."],["design-estimator","sample-design","Sample design determines the inclusion probabilities that a design estimator uses.","El diseño muestral determina las probabilidades de inclusión que utiliza un estimador de diseño."],["component","reproducible-analysis-system","A component is a modular software element within the reproducible analysis system that performs a specific task.","Un componente es un elemento de software modular dentro del sistema de análisis reproducible que realiza una tarea específica."],["cloud-collections","satellite-image-collections","Cloud collections are satellite image collections stored on cloud platforms for scalable access.","Las colecciones en la nube son colecciones de imágenes satelitales almacenadas en plataformas en la nube para un acceso escalable."],["cloud-collections","ard","Cloud collections often consist of Analysis Ready Data (ARD) to simplify downstream processing.","Las colecciones en la nube a menudo consisten en Datos Listos para Análisis (ARD) para simplificar el procesamiento posterior."],["land-cover-land-use-mapping","land-cover-mapping","LULC mapping extends land cover mapping by also classifying the socioeconomic function of the land.","El mapeo LULC extiende la cartografía de cobertura terrestre al clasificar también la función socioeconómica de la tierra."],["land-cover-land-use-mapping","land-use-mapping","LULC mapping integrates both biophysical cover and human-use categories into a single thematic map.","El mapeo LULC integra tanto la cobertura biofísica como las categorías de uso humano en un único mapa temático."],["function","reproducible-analysis-system","A function in the system is a Dagger SDK unit that encapsulates a single build-time operation.","Una función en el sistema es una unidad del SDK de Dagger que encapsula una sola operación de tiempo de compilación."],["function","component","Functions are atomic executables that components rely on to perform specific tasks.","Las funciones son ejecutables atómicos de los que dependen los componentes para realizar tareas específicas."],["survey-approach","ground-truth","Ground-truth data from field surveys are the sole input for the survey approach's estimations.","Los datos de verdad terreno de las encuestas de campo son la única entrada para las estimaciones del enfoque de encuesta."],["uhr-cfp-dataset","uav-imagery","The UHR CFP dataset consists of ultra-high resolution imagery from UAVs showing cultivation parcels.","El conjunto de datos UHR CFP consiste en imágenes de ultra alta resolución de UAV que muestran parcelas de cultivo."],["radar","microwave","Radar operates in the microwave portion of the spectrum, allowing day-and-night and all-weather imaging.","El radar opera en la porción de microondas del espectro, permitiendo imágenes de día y noche y en cualquier clima."],["radar","radar-vegetation-index","Radar vegetation indices use radar backscatter from different polarizations to estimate vegetation structure.","Los índices de vegetación radar utilizan la retrodispersión SAR de diferentes polarizaciones para estimar la estructura de la vegetación."],["radar","synthetic-aperture-radar","Synthetic Aperture Radar (SAR) uses the motion of a satellite to simulate a larger antenna aperture.","El Radar de Apertura Sintética (SAR) utiliza el movimiento de un satélite para simular una apertura de antena más grande."],["data-cube","satellite-data-cube","A data cube organizes satellite imagery into a regular spatiotemporal array.","Un cubo de datos organiza las imágenes satelitales en un arreglo espacio-temporal regular."],["data-cube","brazil-data-cube","The Brazil Data Cube is a cloud service providing open Earth observation data cubes from multiple satellite missions.","El Brazil Data Cube es un servicio en la nube que proporciona cubos de datos abiertos de observación de la Tierra de múltiples misiones satelitales."],["official-agricultural-statistics","national-statistical-offices","National statistical offices are responsible for compiling and disseminating official agricultural statistics.","Las Oficinas Nacionales de Estadística son responsables de compilar y difundir las estadísticas agrícolas oficiales."],["cgi-algorithm","uav-imagery","The CGI algorithm processes multispectral UAV imagery to compute vegetation indices for crop monitoring.","El algoritmo CGI procesa imágenes multiespectrales de UAV para calcular índices de vegetación para el monitoreo de cultivos."],["label","identification","Identification assigns a known label to a pixel or object after analyzing its characteristics.","La identificación asigna una etiqueta conocida a un píxel u objeto después de analizar sus características."],["label","training-samples","Training samples consist of labeled observations that guide the model during supervised learning.","Las muestras de entrenamiento consisten en observaciones etiquetadas que guían el modelo durante el aprendizaje supervisado."],["label","labeled-samples","A label is the correct class category attached to each sample for supervised learning.","Una etiqueta es la categoría de clase correcta asignada a cada muestra para el aprendizaje supervisado."],["statistical","statistical-methods","The term 'statistical' refers to methods grounded in probability and inference, derived from statistical methods.","El término 'estadístico' se refiere a métodos basados en probabilidad e inferencia, derivados de métodos estadísticos."],["ground-observations","in-situ-observations","In-situ observations are measurements or descriptions recorded directly at field locations, same as ground observations.","Las observaciones in situ son mediciones o descripciones registradas directamente en ubicaciones de campo, igual que las observaciones de campo."],["acreage-estimation","crop-area","It aims to quantify the total land cultivated with a specific crop, i.e., crop area.","Su objetivo es cuantificar la tierra total cultivada con un cultivo específico, es decir, el área de cultivo."],["neural-networks","mlp-models","MLP models are a specific type of neural network with fully connected layers.","Los modelos MLP son un tipo específico de red neuronal con capas completamente conectadas."],["neural-networks","deep-learning","It extends neural networks by adding many hidden layers that automatically extract complex patterns from data.","Extiende las redes neuronales añadiendo muchas capas ocultas que extraen automáticamente patrones complejos de los datos."],["neural-networks","hidden-layers","Hidden layers are intermediate layers in a neural network between input and output that transform features.","Las capas ocultas son capas intermedias en una red neuronal entre la entrada y la salida que transforman los atributos."],["land-preparation","sowing","It occurs before sowing to create a suitable seedbed.","Ocurre antes de la siembra para crear un lecho de siembra adecuado."],["experts","regional-field-experts","Experts are individuals like regional field experts with specialized knowledge in a domain.","Los expertos son individuos como expertos de campo regionales con conocimiento especializado en un dominio."],["experts","statisticians","They are experts who ensure that estimation methods are design-consistent and provide valid confidence intervals.","Son expertos que aseguran que los métodos de estimación sean consistentes con el diseño y proporcionen intervalos de confianza válidos."],["spatial-information","geospatial-data","Spatial information provides the coordinate reference for geospatial data.","La información espacial proporciona la referencia de coordenadas para los datos geoespaciales."],["spatial-information","spatial-datasets","It is organized in spatial datasets such as vectors and rasters.","Se organiza en conjuntos de datos espaciales como vectores y rásteres."],["spatial-information","geoinformation","Geoinformation is a type of spatial information specifically focused on Earth surface features.","La geoinformación es un tipo de información espacial centrada específicamente en las características de la superficie terrestre."],["topographic-information","digital-elevation-model","Topographic information is derived from a Digital Elevation Model, which provides elevation data for the terrain.","La información topográfica se deriva de un Modelo Digital de Elevación, que proporciona datos de elevación del terreno."],["landsat","harmonized-landsat-sentinel","Harmonized Landsat Sentinel aligns Landsat 8 and Sentinel-2 imagery into a consistent product.","Harmonized Landsat Sentinel alinea las imágenes de Landsat 8 y Sentinel-2 en un producto consistente."],["segment-model","deep-learning","A Segment Model is a deep learning model that performs image segmentation by generating object masks from input images.","Un modelo de segmentación es un modelo de aprendizaje profundo que realiza segmentación de imágenes generando máscaras de objetos a partir de imágenes de entrada."],["segment-model","image-segmentation","It is designed specifically for the task of image segmentation, often using architectures like SAM.","Está diseñado específicamente para la tarea de segmentación de imágenes, a menudo utilizando arquitecturas como SAM."],["earthdata","nasa","EarthData is NASA's platform for discovering and accessing Earth observation data from various missions.","EarthData es la plataforma de la NASA para descubrir y acceder a datos de observación de la Tierra de diversas misiones."],["earthdata","satellite-data","It provides access to satellite data, including Landsat and MODIS, for research and applications.","Proporciona acceso a datos satelitales, incluyendo Landsat y MODIS, para investigación y aplicaciones."],["overall-accuracy","confusion-matrix","It is calculated from the confusion matrix as the sum of true positives and true negatives divided by total.","Se calcula a partir de la matriz de confusión como la suma de verdaderos positivos y verdaderos negativos dividida por el total."],["overall-accuracy","kappa-coefficient","Kappa coefficient goes beyond overall accuracy by accounting for chance agreement in classification.","El coeficiente Kappa va más allá de la precisión general al considerar el acuerdo por azar en la clasificación."],["overall-accuracy","chance-agreement","Chance agreement is a baseline that overall accuracy is compared against in Cohen's Kappa.","El acuerdo por azar es una línea base con la que se compara la precisión general en el Kappa de Cohen."],["variance","confidence-intervals","Confidence intervals are computed from the variance of the estimate and a chosen confidence level.","Los intervalos de confianza se calculan a partir de la varianza de la estimación y un nivel de confianza elegido."],["variance","confidence-interval","A confidence interval is a range around an estimate, derived from variance, that likely contains the true value.","Un intervalo de confianza es un rango alrededor de una estimación, derivado de la varianza, que probablemente contenga el valor verdadero."],["brazil-data-cube","satellite-data","It organizes satellite data into a regular spatiotemporal array for easier analysis and time series processing.","Organiza los datos satelitales en un arreglo espacio-temporal regular para facilitar el análisis y el procesamiento de series temporales."],["unbiased-area-estimates","sample-based-estimators","They rely on sample-based estimators that incorporate sampling design to remove bias from map predictions.","Se basan en estimadores basados en muestras que incorporan el diseño muestral para eliminar el sesgo de las predicciones del mapa."],["land-use","land-cover","Land use describes the socioeconomic function of land, such as agriculture, while land cover describes its biophysical state.","El uso del suelo describe la función socioeconómica de la tierra, como la agricultura, mientras que la cobertura del suelo describe su estado biofísico."],["dcp-mtl-model","multi-task-learning","The DCP MTL model is a multi-task learning model that simultaneously extracts field parcel boundaries and regions from UAV imagery.","El modelo DCP MTL es un modelo de aprendizaje multitarea que extrae simultáneamente límites de parcelas de campo y regiones a partir de imágenes de UAV."],["dcp-mtl-model","uav-imagery","It is designed for processing UAV imagery with very high spatial resolution to delineate individual fields.","Está diseñado para procesar imágenes de UAV con muy alta resolución espacial para delimitar campos individuales."],["maize","crop-types","Maize is one of the main crop types studied in agricultural remote sensing.","El maíz es uno de los principales tipos de cultivo estudiados en la teledetección agrícola."],["sample-design","sampling-frame","Sample design requires a sampling frame from which units are selected following a defined procedure.","El diseño muestral requiere un marco de muestreo del cual se seleccionan unidades siguiendo un procedimiento definido."],["sample-design","stratified-random-sampling","Sample design often uses stratified random sampling to increase precision of estimates.","El diseño muestral a menudo utiliza muestreo aleatorio estratificado para aumentar la precisión de las estimaciones."],["plsr-model","regression","PLSR model is a multivariate regression method that handles many correlated predictors.","El modelo PLSR es un método de regresión multivariante que maneja muchos predictores correlacionados."],["accuracy-assessment","validation-datasets","They enable accuracy assessment by providing ground truth for comparison with model predictions.","Permiten la evaluación de precisión al proporcionar verdad terreno para comparar con las predicciones del modelo."],["accuracy-assessment","confusion-matrix","Accuracy assessment is typically based on the confusion matrix comparing predicted vs. reference labels.","La evaluación de precisión se basa típicamente en la matriz de confusión que compara etiquetas predichas con las de referencia."],["robust-sampling-frame","sampling-frame","A robust sampling frame is a sampling frame that is complete, accurate, and up-to-date.","Un marco muestral robusto es aquel que es completo, preciso y actualizado."],["robust-sampling-frame","representativeness","Robust sampling frames ensure representativeness of the target population for valid inference.","Los marcos muestrales robustos aseguran la representatividad de la población objetivo para una inferencia válida."],["statistical-survey","sample-design","A statistical survey follows a sample design to select units and derive population estimates.","Una encuesta estadística sigue un diseño muestral para seleccionar unidades y derivar estimaciones poblacionales."],["statistical-survey","statistical-methods","A statistical survey applies statistical methods to collect and analyze data for official statistics.","Una encuesta estadística aplica métodos estadísticos para recolectar y analizar datos para estadísticas oficiales."],["crop-yield-estimation","regression","Crop yield estimation often employs regression models relating vegetation indices to yield.","La estimación del rendimiento de cultivos a menudo emplea modelos de regresión que relacionan índices de vegetación con el rendimiento."],["earthdatalogin","earthdata","earthdatalogin is an R package that helps users set up credentials to access NASA Earthdata.","earthdatalogin es un paquete de R que ayuda a los usuarios a configurar credenciales para acceder a EarthData de la NASA."],["data-division","random-training-testing-datasets","Data division randomly assigns samples to training and testing sets to ensure unbiased evaluation.","La división de datos asigna aleatoriamente las muestras a conjuntos de entrenamiento y prueba para asegurar una evaluación insesgada."],["basemap","orthophoto","A basemap is often an orthophoto that provides accurate geographic context for digitizing.","Un mapa base es a menudo una ortofoto que proporciona un contexto geográfico preciso para la digitalización."],["basemap","coordinate-system","A basemap is projected in a coordinate system to align with other geospatial layers.","Un mapa base se proyecta en un sistema de coordenadas para alinearse con otras capas geoespaciales."],["input","predictors","Input variables serve as predictors for a model to estimate an outcome.","Las variables de entrada sirven como predictores para que un modelo estime un resultado."],["fao-situ-quality-framework","quality-framework","The FAO situ quality framework is a specific quality framework for assessing field survey data.","El Marco de calidad in situ de la FAO es un marco de calidad específico para evaluar datos de encuestas de campo."],["fao-situ-quality-framework","in-situ-observations","The FAO situ quality framework evaluates the compatibility of in-situ observations with satellite data needs.","El Marco de calidad in situ de la FAO evalúa la compatibilidad de las observaciones in situ con las necesidades de datos satelitales."],["workflow","classification-workflows","Classification workflows are a specific type of workflow that sequences steps for assigning labels.","Los flujos de trabajo de clasificación son un tipo específico de flujo de trabajo que secuencia etapas para asignar etiquetas."],["workflow","reproducible-code","Reproducible code encapsulates the entire workflow from data loading to figure generation in a shareable script.","El código reproducible encapsula todo el flujo de trabajo, desde la carga de datos hasta la generación de figuras, en un script compartible."],["model-evaluation","model-development","Model development includes model evaluation to assess performance and guide improvements.","El desarrollo de modelos incluye la evaluación de modelos para evaluar el rendimiento y guiar mejoras."],["growth","crop-development-stage","A crop development stage marks a specific period in the continuous growth of a crop.","Una etapa de desarrollo del cultivo marca un período específico en el crecimiento continuo de un cultivo."],["precision","accuracy-metrics","Precision is a classification metric derived from the confusion matrix.","La precisión es una métrica de clasificación derivada de la matriz de confusión."],["precision","f1-score","F1-score is the harmonic mean of precision and recall, providing a balanced measure of classification performance.","La puntuación F1 es la media armónica de la precisión y la exhaustividad, proporcionando una medida equilibrada del rendimiento de clasificación."],["ard-image-collections","analysis-ready-data","ARD image collections are sets of satellite images processed to Analysis Ready Data standards.","Las colecciones de imágenes ARD son conjuntos de imágenes satelitales procesadas según los estándares de Datos Listos para Análisis."],["ard-image-collections","satellite-image-collections","Satellite image collections can be stored as ARD image collections, processed to analysis-ready standards.","Las colecciones de imágenes satelitales pueden almacenarse como colecciones de imágenes ARD, procesadas según estándares listos para análisis."],["implementation","operational-application","Moving from research to operational application requires robust implementation and automation of the workflow.","Pasar de la investigación a la aplicación operativa requiere una implementación robusta y automatización del flujo de trabajo."],["harmonized-landsat-sentinel","sentinel-missions","This product merges data from Landsat and Sentinel missions for seamless time series analysis.","Este producto fusiona datos de las misiones Landsat y Sentinel para un análisis de series temporales sin interrupciones."],["tillering-samples","phenological-stage","These samples capture the spectral signature during the tillering phase of crop development.","Estas muestras capturan la firma espectral durante la etapa de macollamiento del desarrollo del cultivo."],["random-forest","decision-tree","Random forest extends decision trees by building many trees on random data subsets and averaging.","Random forest extiende los árboles de decisión construyendo muchos árboles sobre subconjuntos aleatorios de datos y promediando."],["grid","spatial-datasets","A grid organizes spatial datasets into regular cells for systematic analysis and efficient retrieval.","Una cuadrícula organiza los conjuntos de datos espaciales en celdas regulares para un análisis sistemático y una recuperación eficiente."],["grid","raster","A raster organizes spatial data into a regular grid of cells (pixels) for analysis.","Un ráster organiza los datos espaciales en una cuadrícula regular de celdas (píxeles) para su análisis."],["grid","military-grid-reference-system","MGRS is a global tiling system that divides the Earth into 60 UTM zones, each further divided into grid cells.","MGRS es un sistema de teselas global que divide la Tierra en 60 zonas UTM, cada una subdividida en celdas de cuadrícula."],["grid","tiling-system","A tiling system divides the Earth into regular grid cells for managing large satellite image collections.","Un sistema de teselas divide la Tierra en celdas de cuadrícula regulares para gestionar grandes colecciones de imágenes satelitales."],["grid","area-frame","Area frames use a grid to partition the land into contiguous cells for random sampling.","Los marcos de área utilizan una cuadrícula para dividir la tierra en celdas para el muestreo aleatorio."],["tiles","grid","Tiles are the individual cells within a grid that partition satellite imagery into manageable spatial units.","Las teselas son las celdas individuales dentro de una cuadrícula que dividen las imágenes satelitales en unidades espaciales manejables."],["data-image","csi-image-driver","The CSI Image Driver mounts OCI container images as read-only volumes for fast, stateless data access.","El Controlador de imágenes CSI monta imágenes de contenedor OCI como volúmenes de solo lectura para acceso rápido a datos sin estado."],["vegetation-indices","satellite-vegetation-indices","Satellite vegetation indices are mathematical combinations of spectral bands computed from satellite sensors.","Los índices de vegetación satelitales son combinaciones matemáticas de bandas espectrales calculadas a partir de sensores satelitales."],["vegetation-indices","cgi-algorithm","By combining multiple vegetation indices, the CGI algorithm captures different aspects of crop growth.","Al combinar múltiples índices de vegetación, el algoritmo CGI captura diferentes aspectos del crecimiento del cultivo."],["vegetation-indices","soil-vegetation-index","A soil-vegetation index (e.g., OSAVI) minimizes soil background influence to better estimate vegetation cover.","Un índice de vegetación de suelo (ej., OSAVI) minimiza la influencia del fondo del suelo para estimar mejor la cobertura vegetal."],["vegetation-indices","spectral-indices","Vegetation indices are spectral indices designed to highlight vegetation health and cover.","Los índices de vegetación son índices espectrales diseñados para resaltar la salud y la cobertura de la vegetación."],["vegetation-indices","soil-moisture","Vegetation indices help infer soil moisture by monitoring plant water stress indirectly.","Los índices de vegetación ayudan a inferir la humedad del suelo mediante la observación indirecta de las condiciones de la vegetación."],["earth-observation","earth-observation-classifications","Earth observation data are the source from which EO classifications are derived through analysis.","Los datos de observación de la Tierra son la fuente de la que se derivan las clasificaciones EO mediante análisis."],["earth-observation","earth-observation-integration","Earth observation integration combines satellite data with other sources for comprehensive analysis.","La integración de observación de la Tierra combina datos satelitales con otras fuentes para un análisis integral."],["package","tools","A package is a set of tools organized into a distributable unit for ease of use.","Un paquete es un conjunto de herramientas organizadas en una unidad distribuible para facilitar su uso."],["study-area","experimental-area","An experimental area is a specific geographic region selected for conducting a remote sensing experiment.","Un área experimental es una región geográfica específica seleccionada para realizar un experimento de teledetección."],["study-area","boundaries","A study area is delineated by boundaries that define its spatial extent for remote sensing.","Un área de estudio está delimitada por límites que definen su extensión espacial para la teledetección."],["raster","data-cube","A data-cube is a multi-temporal raster where each layer is a spatially aligned image at a different date.","Un cubo de datos es un ráster multitemporal donde cada capa es una imagen alineada espacialmente en una fecha diferente."],["raster","zonal-statistics","Zonal statistics summarize raster pixel values within each polygon zone to produce per-zone metrics.","Las estadísticas zonales resumen los valores de píxeles ráster dentro de cada zona de polígono para producir métricas por zona."],["crop-development-stage","phenology","A crop development stage is a distinct phenological phase in a crop's growth cycle.","Una etapa de desarrollo del cultivo es una fase fenológica distinta en el ciclo de crecimiento de un cultivo."],["vector","survey-vector","Survey vectors encode ground observations as binary vectors for integration with satellite-derived probability vectors.","Los vectores de encuesta codifican observaciones de campo como vectores binarios para su integración con vectores de probabilidad derivados de satélite."],["training-samples","tillering-samples","Tillering samples are training samples that represent the specific phenological stage of tillering.","Las muestras de macollamiento son muestras de entrenamiento que representan la etapa fenológica específica del macollamiento."],["training-samples","sample-balancing","Sample balancing adjusts the class distribution in training samples to avoid bias toward majority classes.","El balanceo de muestra ajusta la distribución de clases en las muestras de entrenamiento para evitar sesgos hacia clases mayoritarias."],["geospatial-analysis","spatial-analysis","Geospatial analysis applies spatial analysis techniques to geographic data like satellite imagery.","El análisis geoespacial aplica técnicas de análisis espacial a datos geográficos como imágenes satelitales."],["strategy","roadmap","A roadmap is a strategic plan that outlines steps and milestones for achieving long-term objectives.","Una hoja de ruta es un plan estratégico que describe pasos e hitos para lograr objetivos a largo plazo."],["transferable-classification-system","transferability","A transferable classification system ensures transferability by maintaining accuracy across contexts.","Un sistema de clasificación transferible asegura la transferibilidad manteniendo la precisión en diferentes contextos."],["data-code-availability","reproducibility","Data code availability enables reproducibility by sharing the data and code used in analysis.","La disponibilidad de datos y código permite la reproducibilidad al compartir los datos y el código utilizados en el análisis."],["satellite-sensors","spectral-bands","Satellite sensors capture data in distinct wavelength intervals known as spectral bands.","Los sensores satelitales capturan datos en intervalos de longitud de onda distintos conocidos como bandas espectrales."],["satellite-sensors","optical","Optical sensors on satellites measure reflected solar radiation in these wavelength ranges.","Los sensores ópticos en satélites miden la radiación solar reflejada en estos rangos de longitud de onda."],["spectral-bands","spectral-index","Spectral index is a mathematical combination of two or more spectral bands to enhance a specific surface property.","Un índice espectral es una combinación matemática de dos o más bandas espectrales para resaltar una propiedad específica de la superficie."],["spectral-bands","red-reflectance","The red spectral band (around 600-700 nm) measures red reflectance from the Earth's surface.","La banda espectral roja (alrededor de 600-700 nm) mide la reflectancia roja de la superficie de la Tierra."],["spectral-bands","spectral-channels","Spectral channels are the discrete wavelength intervals recorded by a sensor, also called bands.","Los canales espectrales son los intervalos de longitud de onda discretos registrados por un sensor, también llamados bandas."],["spectral-bands","spectral-indices","Spectral indices are mathematical combinations of two or more spectral bands to highlight specific surface properties.","Los índices espectrales son combinaciones matemáticas de dos o más bandas espectrales para resaltar propiedades específicas de la superficie."],["phenology","temporal-pattern","Crop phenology drives the temporal pattern of vegetation indices over a growing season.","La fenología del cultivo impulsa el patrón temporal de los índices de vegetación durante una temporada de crecimiento."],["phenology","phenological-patterns","Phenological patterns are the repetitive sequences of plant growth stages observed in phenology, such as leaf emergence.","Los patrones fenológicos son las secuencias repetitivas de etapas de crecimiento de las plantas observadas en la fenología, como la emergencia de hojas."],["phenology","phenological-stage","A phenological stage is a distinct phase in the growth cycle of a crop, such as flowering or maturity.","Una etapa fenológica es una fase distinta en el ciclo de crecimiento de un cultivo, como la floración o la madurez."],["spectral-reflectance","electromagnetic-spectrum","It describes how surface materials reflect different portions of the electromagnetic spectrum.","Describe cómo los materiales de la superficie reflejan diferentes porciones del espectro electromagnético."],["spectral-reflectance","reflectance","Reflectance is the ratio of reflected to incident radiation, often derived from spectral reflectance.","La reflectancia es la relación entre la radiación reflejada y la incidente, a menudo derivada de la reflectancia espectral."],["spectral-reflectance","radiometric-corrections","These corrections ensure spectral reflectance values are accurate and comparable across time and sensors.","Estas correcciones aseguran que los valores de reflectancia espectral sean precisos y comparables a lo largo del tiempo y entre sensores."],["spectral-reflectance","satellite-image-classification","Spectral reflectance patterns from imagery are the basis for classifying satellite images.","Los patrones de reflectancia espectral de las imágenes son la base para clasificar imágenes satelitales."],["spectral-reflectance","chlorophyll-absorption","Chlorophyll absorption causes specific troughs in the spectral reflectance curve of vegetation.","La absorción de clorofila causa canales específicos en la curva de reflectancia espectral de la vegetación."],["spectral-reflectance","spectral-signature","A spectral signature is the unique spectral reflectance pattern across wavelengths, distinguishing different surface materials.","Una firma espectral es el patrón único de reflectancia espectral en longitudes de onda, que distingue diferentes materiales de superficie."],["optical","electromagnetic-spectrum","Optical remote sensing uses visible and near-infrared portions of the electromagnetic spectrum.","La teledetección óptica utiliza las porciones visible e infrarrojo cercano del espectro electromagnético."],["reflectance","spectral-index","Reflectance values from spectral bands are used to compute spectral indices that highlight vegetation or other features.","Los valores de reflectancia de las bandas espectrales se utilizan para calcular índices espectrales que resaltan la vegetación u otras características."],["reflectance","red-reflectance","Red reflectance is the portion of incident light reflected in the red spectral region, a key input for vegetation indices.","La reflectancia roja es la porción de luz incidente reflejada en la región espectral roja, una entrada clave para los índices de vegetación."],["reflectance","spectral-indices","Spectral indices use surface reflectance values from different bands, such as NDVI from red and NIR bands.","Los índices espectrales utilizan valores de reflectancia superficial de diferentes bandas, como el NDVI de las bandas roja e infrarroja cercana."],["reflectance","surface-reflectance","Surface reflectance is the reflectance measured at the Earth's surface after removing atmospheric effects.","La reflectancia superficial es la reflectancia medida en la superficie de la Tierra después de eliminar los efectos atmosféricos."],["masking","cloud-shadow","Cloud shadow is identified and removed by masking algorithms that detect adjacent dark pixels.","La sombra de nube se identifica y elimina mediante algoritmos de enmascaramiento que detectan píxeles oscuros adyacentes."],["radiometric-corrections","atmospheric-correction","Radiometric corrections include atmospheric correction to convert raw digital numbers to surface reflectance.","Las correcciones radiométricas incluyen la corrección atmosférica para convertir números digitales brutos en reflectancia superficial."],["radiometric-corrections","ard","ARD processing includes radiometric corrections to produce consistent surface reflectance products.","El procesamiento ARD incluye correcciones radiométricas para producir productos consistentes de reflectancia superficial."],["deep-learning","foundation-model","A foundation model is a large pre-trained deep learning model that learns general representations from data.","Un modelo fundacional es un modelo grande de aprendizaje profundo preentrenado que aprende representaciones generales a partir de datos."],["ground-truth","ground-truth-data","Ground-truth data is the set of observations collected on the Earth's surface, used to calibrate and validate remote sensing results.","Los datos de verdad terreno son el conjunto de observaciones recolectadas en la superficie de la Tierra, utilizados para calibrar y validar los resultados de teledetección."],["ground-truth","reference-samples","Reference samples come from ground-truth data and are used to assess classification accuracy.","Las muestras de referencia provienen de datos de verdad terreno y se utilizan para evaluar la precisión de clasificación."],["tibble","table","In R, a tibble is a modern table structure that simplifies data manipulation.","En R, un tibble es una estructura de tabla moderna que simplifica la manipulación de datos."],["software","tools","Tools are software systems that implement methods for processing and analyzing Earth observation data.","Las herramientas son sistemas de software que implementan métodos para procesar y analizar datos de observación de la Tierra."],["software","component","Components are custom software pieces that execute well-defined analytical functions.","Los componentes son piezas de software personalizadas que ejecutan funciones analíticas bien definidas."],["software","package","A package bundles reusable software components and data for a specific analysis, like the sits R package.","Un paquete agrupa componentes de software reutilizables y datos para un análisis específico, como el paquete sits de R."],["software","reproducibility","Reproducibility relies on software containers or virtual environments that replicate the exact computational setup.","La reproducibilidad se basa en contenedores de software o entornos virtuales que replican la configuración computacional exacta."],["software","reproducible-code","Reproducible code packages analysis scripts and dependencies so that others can rerun the same computations.","El código reproducible empaqueta scripts de análisis y dependencias para que otros puedan reejecutar los mismos cálculos."],["software","jupyterlab","JupyterLab provides a platform for interactive code development, data analysis, and visualization.","JupyterLab proporciona una plataforma para el desarrollo interactivo de código, análisis de datos y visualización."],["electromagnetic-radiation","microwave","Microwave radiation is electromagnetic radiation with wavelengths from 1 mm to 1 m, used by radar sensors.","La radiación de microondas es radiación electromagnética con longitudes de onda de 1 mm a 1 m, utilizada por sensores de radar."],["electromagnetic-radiation","electromagnetic-spectrum","The electromagnetic spectrum is the full range of electromagnetic radiation wavelengths from gamma to radio.","El espectro electromagnético es el rango completo de longitudes de onda de radiación electromagnética desde gamma hasta radio."],["red-reflectance","chlorophyll-absorption","Chlorophyll strongly absorbs red reflectance, making red bands sensitive to chlorophyll content.","La clorofila absorbe fuertemente la reflectancia roja, haciendo que las bandas rojas sean sensibles al contenido de clorofila."],["confusion-matrix","producer-s-accuracy","From a confusion matrix, producer's accuracy is computed by dividing correct class pixels by the column total.","A partir de una matriz de confusión, la precisión del productor se calcula dividiendo los píxeles de clase correctos por el total de la columna."],["confusion-matrix","accuracy-metrics","From a confusion matrix, many accuracy metrics like producer's and user's accuracy are derived.","A partir de una matriz de confusión, se derivan muchas métricas de precisión como la precisión del productor y del usuario."],["confusion-matrix","confusion-matrices","Confusion matrices are the plural of confusion matrix; multiple confusion matrices can be used for different regions or classes.","Las matrices de confusión son el plural de matriz de confusión; se pueden usar múltiples matrices de confusión para diferentes regiones o clases."],["confusion-matrix","omission","In a confusion matrix, omission corresponds to false negatives for a given class.","En una matriz de confusión, la omisión corresponde a falsos negativos para una clase determinada."],["confusion-matrix","commission","In a confusion matrix, commission corresponds to false positives for a given class.","En una matriz de confusión, la comisión corresponde a falsos positivos para una clase determinada."],["confusion-matrix","area-weighted-error-matrices","Area-weighted error matrices weight each cell by the proportion of area that cell represents in the map.","Las matrices de error ponderadas por área ponderan cada celda según la proporción de área que representa en el mapa."],["confusion-matrix","kappa-coefficient","Kappa coefficient measures agreement between classified map and reference data, adjusting for chance agreement.","El coeficiente Kappa mide la concordancia entre el mapa clasificado y los datos de referencia, ajustando por acuerdo por azar."],["confusion-matrix","recall","In a confusion matrix, recall for a class is the proportion of actual positives correctly identified.","En una matriz de confusión, la exhaustividad para una clase es la proporción de positivos reales correctamente identificados."],["confusion-matrix","false-negative","A false negative occurs when a pixel truly belonging to a class is predicted as another in the confusion matrix.","Un falso negativo ocurre cuando un píxel que realmente pertenece a una clase se predice como otra en la matriz de confusión."],["confusion-matrix","false-positive","A false positive occurs when a pixel predicted as a class actually belongs to another in the confusion matrix.","Un falso positivo ocurre cuando un píxel predicho como una clase realmente pertenece a otra en la matriz de confusión."],["confusion-matrix","chance-agreement","Chance agreement is the proportion of correct classifications expected by random labeling, derived from the confusion matrix.","El acuerdo por azar es la proporción de clasificaciones correctas esperadas por etiquetado aleatorio, derivada de la matriz de confusión."],["confusion-matrix","cohen-s-kappa","Cohen's Kappa quantifies agreement between two raters balancing chance, based on the confusion matrix.","El Kappa de Cohen cuantifica la concordancia entre dos evaluadores equilibrando el azar, basado en la matriz de confusión."],["stratified-random-sampling","strata","Strata are homogeneous subgroups created for stratified random sampling.","Los estratos son subgrupos homogéneos creados para el muestreo aleatorio estratificado."],["stratified-random-sampling","sampling-strategies","Stratified random sampling is a common strategy that divides the population into homogeneous strata.","El muestreo aleatorio estratificado es una estrategia común que divide la población en estratos homogéneos."],["reproducible-code","reproducibility","Reproducibility in research is achieved by sharing the reproducible code along with data and environment specifications.","La reproducibilidad en la investigación se logra compartiendo el código reproducible junto con los datos y las especificaciones del entorno."],["reproducible-code","jupyter-notebook","Jupyter Notebooks enable reproducible code by combining narrative text with executable code cells.","Los Jupyter Notebook permiten código reproducible al combinar texto narrativo con celdas de código ejecutable."],["sample-balancing","undersampling","It is a sample balancing technique that alleviates class imbalance by removing majority class samples.","Es una técnica de balanceo de muestra que alivia el desequilibrio de clases eliminando muestras de la clase mayoritaria."],["sentinel-missions","space-agency","Sentinel missions are operated by the European Space Agency (ESA) as part of the Copernicus program.","Las misiones Sentinel son operadas por la Agencia Espacial Europea (ESA) como parte del programa Copernicus."],["jupyterlab","jupyter-notebook","A Jupyter Notebook runs within JupyterLab, providing an interactive computing environment for analysis.","Un Jupyter Notebook se ejecuta dentro de JupyterLab, proporcionando un entorno informático interactivo para el análisis."],["clustering-algorithm","som","SOM is an unsupervised clustering algorithm that maps high-dimensional time series to a 2D grid.","SOM es un algoritmo de agrupamiento no supervisado que mapea series temporales de alta dimensión a una cuadrícula 2D."],["cloud-masking","temporal-compositing","After cloud masking, temporal compositing combines clear pixels from several dates to produce a cloud-free synthesis.","Tras el enmascaramiento de nubes, la composición temporal combina píxeles despejados de varias fechas para producir una síntesis sin nubes."],["omission","false-negative","False negatives correspond to omission errors, where true class pixels are missed in the map.","Los falsos negativos corresponden a errores de omisión, donde se omiten píxeles de clase verdadera en el mapa."],["commission","false-positive","False positives correspond to commission errors, where pixels are incorrectly assigned to a class.","Los falsos positivos corresponden a errores de comisión, donde los píxeles se asignan incorrectamente a una clase."],["quality-flags","quality-band","Quality bands encode quality flags that indicate cloud, shadow, or sensor conditions per pixel.","Las bandas de calidad codifican banderas de calidad que indican condiciones de nube, sombra o sensor por píxel."],["prediction-probabilities","uncertainty","Uncertainty can be expressed through prediction probabilities, which indicate how confident the model is.","La incertidumbre se puede expresar mediante probabilidades de predicción, que indican la confianza del modelo."],["spectral-indices","spectral-temporal-signatures","Spectral-temporal signatures combine spectral indices like NDVI with time to form characteristic curves.","Las firmas espectro-temporales combinan índices espectrales como NDVI con el tiempo para caracterizar la dinámica."],["spectral-indices","leaf-area-index","Leaf area index is often estimated from spectral indices like NDVI that relate to canopy density.","El índice de área foliar se estima a partir de índices espectrales como NDVI, relacionados con la densidad del dosel."],["spectral-range","electromagnetic-spectrum","Spectral range refers to a specific portion of the electromagnetic spectrum used for remote sensing.","El rango espectral se refiere a una porción específica del espectro electromagnético utilizada en teledetección."],["elevation","terrain","Terrain is the physical land surface defined by elevation and its variations.","El terreno es la superficie física de la tierra definida por la elevación y sus variaciones."],["slope","terrain","Slope is a derivative of elevation that describes the steepness of the terrain.","La Pendiente es una derivada de la elevación que describe la inclinación del terreno."],["self-organizing-maps","clustering","Self-organizing maps are an unsupervised method that clusters high-dimensional data into a low-dimensional grid.","Los mapas autoorganizados son un método no supervisado que agrupa datos de alta dimensión en una cuadrícula de baja dimensión."],["microwave","soil-moisture","Microwave remote sensing can estimate soil moisture due to its sensitivity to water content.","La teledetección por microondas puede estimar la humedad del suelo debido a su sensibilidad al contenido de agua."],["microwave","radar-signal","A radar signal is a microwave pulse transmitted and received by radar satellites like Sentinel-1.","Una señal de radar es un pulso de microondas transmitido y recibido por satélites de radar como Sentinel-1."],["population","sampling-frame","The sampling frame must represent the entire target population for valid inference.","El marco de muestreo debe representar a toda la población objetivo para una inferencia válida."],["population","strata","Strata partition the population into distinct, non-overlapping groups.","Los estratos dividen la población en grupos distintos y no superpuestos."],["kubernetes","data-volumes","DataVolumes are a Kubernetes resource that manages importing and persistent storage of data.","DataVolumes es un recurso de Kubernetes que gestiona la importación y el almacenamiento persistente de datos."],["kubernetes","csi-image-driver","In a Kubernetes cluster, the CSI Image Driver exposes container images as storage volumes to pods.","En un clúster de Kubernetes, el CSI Image Driver expone imágenes de contenedor como volúmenes de almacenamiento a los pods."],["persistent-storage","data-volumes","They provide persistent storage for containerized applications in a cluster.","Proporcionan almacenamiento persistente para aplicaciones contenerizadas en un clúster."],["consistency","standardization","Standardization establishes uniform rules to ensure consistency across data and methods.","La estandarización establece reglas uniformes para asegurar consistencia entre datos y métodos."],["consistency","reliability","Reliability of a method is the consistency of its results across different datasets or conditions.","La fiabilidad de un método es la consistencia de sus resultados a través de diferentes conjuntos de datos o condiciones."],["nasa","usgs","The USGS jointly manages the Landsat program with NASA and distributes the satellite data.","El USGS gestiona conjuntamente el programa Landsat con la NASA y distribuye los datos satelitales."],["nasa","space-agency","Space agencies like NASA develop and manage satellite missions for remote sensing.","Agencias espaciales como la NASA desarrollan y gestionan misiones satelitales para teledetección."],["coordinates","coordinate-reference-system","A coordinate reference system (CRS) defines how geographic coordinates map to positions on the Earth.","Un sistema de referencia de coordenadas (CRS) define cómo las coordenadas geográficas se asignan a posiciones en la Tierra."],["coordinates","geographic-data","Geographic data often uses coordinates to define positions of features.","Los datos geográficos a menudo usan coordenadas para definir posiciones de atributos."],["coordinates","coordinate-system","A coordinate system defines how coordinates are assigned to points on Earth, enabling georeferencing.","Un sistema de coordenadas define cómo se asignan coordenadas a puntos en la Tierra, permitiendo la georreferenciación."],["transferability","domain-shift","Domain shift, a change in data distribution between training and target domains, hinders model transferability.","El cambio de dominio, una alteración en la distribución de datos entre los dominios de entrenamiento y objetivo, dificulta la transferibilidad del modelo."],["image-segmentation","sam","SAM (Segment Anything Model) is a deep learning model that performs image segmentation from prompts.","SAM (Segment Anything Model) es un modelo de aprendizaje profundo que realiza segmentación de imágenes a partir de indicaciones."],["image-segmentation","segment","A segment is a group of contiguous pixels produced by image segmentation, representing a homogeneous area.","Un segmento es un grupo de píxeles contiguos producido por segmentación de imágenes, que representa un área homogénea."],["uav-imagery","drone","Drone imagery provides ultra-high spatial resolution data for detailed crop monitoring.","Las imágenes de dron proporcionan datos de resolución ultraalta para el monitoreo detallado de cultivos."],["netrc-file","earthdatalogin","earthdatalogin creates a .netrc file with user credentials for automatic Earthdata login.","earthdatalogin crea un archivo .netrc con credenciales de usuario para el inicio de sesión automático en Earthdata."],["recall","f1-score","Recall, together with precision, forms the basis for computing the F1-score in classification evaluation.","La exhaustividad, junto con la precisión, forma la base para calcular la puntuación F1 en la evaluación de clasificación."],["analysis-ready-data","ard","ARD stands for Analysis Ready Data, which has been geometrically and radiometrically corrected.","ARD significa Datos Listos para Análisis, que han sido corregidos geométrica y radiométricamente."],["surface-reflectance","atmospheric-correction","Atmospheric correction converts top-of-atmosphere radiance to surface reflectance for accurate analysis.","La corrección atmosférica convierte la radiancia en el tope de la atmósfera a reflectancia superficial para un análisis preciso."],["surface-reflectance","biomass","Biomass can be estimated from surface reflectance via models relating spectral response to mass.","La biomasa puede estimarse a partir de la reflectancia superficial mediante modelos que relacionan la respuesta espectral con la masa."],["military-grid-reference-system","utm-zone","The Military Grid Reference System extends UTM zones by adding a grid of 100 km squares for precise location.","El Sistema de Referencia de Cuadrícula Militar extiende las zonas UTM añadiendo una cuadrícula de cuadrados de 100 km para una ubicación precisa."],["military-grid-reference-system","tiling-system","The Military Grid Reference System is a standard tiling system used for global satellite data organization.","El Sistema de Referencia de Cuadrícula Militar es un sistema de teselas estándar utilizado para la organización global de datos satelitales."],["synthetic-aperture-radar","sar-backscatter","SAR backscatter measures the microwave energy returned from the ground, imaged by synthetic aperture radar.","La retrodispersión SAR mide la energía de microondas devuelta desde el suelo, imagenada por radar de apertura sintética."],["measure","area-measurements","A measure quantifies a property; area measurements are derived from classified maps or surveys.","Una medida cuantifica una propiedad; las mediciones de área se derivan de mapas clasificados o encuestas."],["measure","ground-measurements","Ground measurements serve as reference data for calibrating and validating satellite-derived models.","Las mediciones de campo sirven como datos de referencia para calibrar y validar modelos derivados de satélite."],["objectives","tasks","Tasks are specific activities designed to achieve the objectives of a remote sensing project.","Las tareas son actividades específicas diseñadas para lograr los objetivos de un proyecto de teledetección."],["transparency","data-code-availability","Data code availability ensures transparency in research by making inputs and scripts accessible.","La disponibilidad de datos y código garantiza la transparencia en la investigación al hacer accesibles las entradas y los scripts."],["time-series-analysis","time-series-classification","Time series classification assigns labels to entire temporal sequences based on patterns.","La clasificación de series temporales asigna etiquetas a series temporales completas basándose en patrones."],["sampling-frame","area-frame","An area frame is a sampling frame based on exhaustive area units like grid cells.","Un marco de área es un marco de muestreo basado en unidades de área exhaustivas como celdas de cuadrícula."],["sampling-frame","list-frame","A list frame is a sampling frame that enumerates all agricultural holdings or parcels in a list.","Un marco de lista es un marco de muestreo que enumera todas las explotaciones agrícolas o parcelas en una lista."],["training-program","satellite-imagery-nasa-english","It is a structured training program provided in English.","Es un programa de capacitación estructurado proporcionado en inglés."],["deviation","anomaly-score-map","An anomaly score map quantifies deviation, assigning high scores to unusual observations.","Un mapa de puntuación de anomalías cuantifica la desviación, asignando puntuaciones altas a observaciones inusuales."],["wavelength","spectral-bands","Each spectral band corresponds to a narrow range of wavelengths in the electromagnetic spectrum.","Cada banda espectral corresponde a un rango estrecho de longitudes de onda en el espectro electromagnético."],["wavelength","electromagnetic-radiation","Wavelength is the fundamental property that distinguishes different types of electromagnetic radiation used in remote sensing.","La longitud de onda es la propiedad fundamental que distingue los diferentes tipos de radiación electromagnética utilizados en teledetección."],["wavelength","spectral-signature","A spectral signature plots reflectance values as a function of wavelength, creating a pattern for identification.","Una firma espectral grafica los valores de reflectancia en función de la longitud de onda, creando un patrón para la identificación."],["wavelength","electromagnetic-spectrum","The electromagnetic spectrum orders radiation by wavelength, from short to long waves.","El espectro electromagnético ordena la radiación por longitud de onda, desde ondas cortas hasta ondas largas."],["spatial-dimension","spatial-variability","Spatial variability captures differences between locations within a study area.","La variabilidad espacial captura las diferencias entre ubicaciones dentro de un área de estudio."],["chance-agreement","cohen-s-kappa","Cohen's Kappa corrects observed agreement for chance agreement, giving a reliability measure.","El Kappa de Cohen corrige el acuerdo observado por el acuerdo por azar, proporcionando una medida de fiabilidad."],["tiling-system","utm-zone","UTM zones partition the Earth into zones for consistent mapping and tile organization.","Las zonas UTM dividen la Tierra en zonas para un mapeo consistente y organización de teselas."],["stateless-data","oci-artifact","Stateless data is managed as OCI artifacts mounted as read-only volumes, requiring no persistent storage.","Los datos sin estado se gestionan como artefactos OCI montados como volúmenes de solo lectura, sin requerir almacenamiento persistente."],["list-frame","agricultural-holding","List frames rely on a list of agricultural holdings from administrative registers or census data.","Los marcos de lista se basan en una lista de explotaciones agrícolas de registros administrativos o listas de parcelas."],["coordinate-system","utm-zone","A UTM zone is a 6-degree longitudinal division of the Universal Transverse Mercator coordinate system.","Una zona UTM es una división longitudinal de 6 grados del sistema de coordenadas Universal Transversal de Mercator."],["statistical-unit","population","The population is the complete set of statistical units (e.g., all fields) from which a sample is drawn.","La población es el conjunto completo de unidades estadísticas (p. ej., todos los campos) del cual se extrae una muestra."],["sar-backscatter","radar-signal","SAR backscatter is the portion of the radar signal reflected back to the satellite sensor.","La retrodispersión SAR es la porción de la señal de radar reflejada de vuelta al sensor satelital."],["per-pixel-quality","quality-band","A quality band is a raster layer providing per-pixel quality information for satellite imagery.","Una banda de calidad es una capa ráster que proporciona información de calidad por píxel para imágenes satelitales."],["kappa","inter-rater-agreement","Inter-rater agreement is often quantified using Kappa statistics to account for chance agreement.","El acuerdo entre evaluadores se cuantifica a menudo utilizando estadísticas Kappa para tener en cuenta el acuerdo por azar."],["unmanned-aerial-vehicle","drone","A drone is another term for an unmanned aerial vehicle that captures high-resolution imagery over fields.","Un dron es otro término para un vehículo aéreo no tripulado que captura imágenes de alta resolución sobre los campos."],["chlorophyll","chlorophyll-absorption","Chlorophyll absorption refers to the uptake of light energy by plant chlorophyll molecules.","La absorción de clorofila se refiere a la captación de energía lumínica por las moléculas de clorofila de las plantas."],["chlorophyll","vegetation-health","Chlorophyll content is linked to vegetation health, as it drives photosynthesis.","El contenido de clorofila está vinculado a la salud de la vegetación, ya que impulsa la fotosíntesis."],["oversampling","smote","SMOTE oversamples minority classes by generating synthetic examples, balancing imbalanced training datasets.","SMOTE sobremuestrea las clases minoritarias generando ejemplos sintéticos, equilibrando conjuntos de datos de entrenamiento desbalanceados."],["container-image","stateless-data","Stateless data uses container images for immutable, versioned snapshots of chapter data.","Los datos sin estado utilizan imágenes de contenedor para instantáneas inmutables y versionadas de los datos del capítulo."],["container-image","oci-artifact","An OCI artifact is a container image packaging chapter-specific data to ensure immutability and reproducibility.","Un artefacto OCI es una imagen de contenedor que empaqueta datos específicos del capítulo para garantizar inmutabilidad y reproducibilidad."],["content-hash","oci-artifact","OCI artifacts are identified by a content hash, enabling versioned, data integrity verification.","Los artefactos OCI se identifican mediante un hash de contenido, lo que permite la verificación versionada de la integridad de los datos."],["annotator","inter-rater-agreement","Inter-rater agreement measures consistency among annotators labeling the same samples for reference data.","El acuerdo entre evaluadores mide la consistencia entre anotadores que etiquetan las mismas muestras para datos de re
