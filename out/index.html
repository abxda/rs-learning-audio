samples muestras de referencia reference samples"},{"id":"phenological-patterns","en":"Phenological patterns","es":"Patrones fenológicos","den":"Repeating sequences of plant growth stages (e.g., emergence, flowering, senescence) observable as temporal changes in satellite-derived vegetation indices. They are unique to each crop and form the basis for crop type discrimination.","des":"Secuencias repetitivas de etapas de crecimiento de las plantas (p. ej., emergencia, floración, senescencia) observables como cambios temporales en los índices de vegetación derivados de satélite. Son únicos para cada cultivo y forman la base para la discriminación de tipos de cultivo.","lvl":4,"ord":429,"cat":"phenomenon","kind":"concept","src":"th_lucc#the-key-role-of-time-series · ct_chile#satellite-image-time-series","al":"phenological patterns patrones fenológicos phenological patterns"},{"id":"in-situ-observations","en":"In-situ observations","es":"Observaciones in situ","den":"Measurements or descriptions recorded directly at a location on the Earth's surface, typically collected by field surveys. They serve as ground truth for calibrating and validating remote sensing products.","des":"Mediciones o descripciones registradas directamente en una ubicación de la superficie terrestre, típicamente recopiladas mediante encuestas de campo. Sirven como verdad terreno para calibrar y validar productos de teledetección.","lvl":5,"ord":477,"cat":"data","kind":"concept","src":"th_alignment#introduction · th_design_frames#matching-in-situ-survey-data-to-remote-sensing-analysis-needs","al":"in-situ observations observaciones in situ in-situ observations observaciones de campo"},{"id":"spatiotemporal-array","en":"Spatiotemporal array","es":"Arreglo espacio-temporal","den":"A three-dimensional array of Earth observation data with two spatial dimensions and one temporal dimension, where each cell has a fixed spatial resolution, temporal duration, and set of spectral attributes.","des":"Arreglo tridimensional de datos de observación de la Tierra con dos dimensiones espaciales y una dimensión temporal, donde cada celda tiene una resolución espacial fija, una duración temporal y un conjunto de atributos espectrales.","lvl":7,"ord":555,"cat":"data","kind":"concept","src":"th_data_cubes","al":"spatiotemporal array arreglo espacio-temporal spatiotemporal array matriz espacio-temporal"},{"id":"stratified-random-sampling","en":"Stratified random sampling","es":"Muestreo aleatorio estratificado","den":"A method dividing the population into homogeneous subgroups (strata) and then randomly sampling within each stratum. It is recommended for selecting reference data for map validation to produce unbiased estimates.","des":"Método que divide la población en subgrupos homogéneos (estratos) y luego muestrea aleatoriamente dentro de cada estrato. Se recomienda para seleccionar datos de referencia para la validación de mapas con el fin de producir estimaciones insesgadas.","lvl":7,"ord":542,"cat":"method","kind":"concept","src":"th_validation","al":"stratified random sampling muestreo aleatorio estratificado stratified random sampling"},{"id":"temporal-resolution","en":"Temporal resolution","es":"Resolución temporal","den":"The frequency with which a satellite sensor revisits the same location on Earth, determining how often imagery is acquired for a given area over time.","des":"Frecuencia con la que un sensor satelital revisita la misma ubicación en la Tierra, determinando con qué frecuencia se adquieren imágenes para un área determinada a lo largo del tiempo.","lvl":2,"ord":207,"cat":"metric","kind":"concept","src":"","al":"temporal resolution resolución temporal temporal resolution"},{"id":"object-based-classification","en":"Object-based classification","es":"Clasificación basada en objetos","den":"A classification approach that analyzes image objects (segments) rather than individual pixels. Objects are created by aggregating pixels into homogeneous regions, often corresponding to real-world features like agricultural parcels.","des":"Enfoque de clasificación que analiza objetos de imagen (segmentos) en lugar de píxeles individuales. Los objetos se crean agregando píxeles en regiones homogéneas, a menudo correspondientes a características del mundo real como parcelas agrícolas.","lvl":3,"ord":322,"cat":"method","kind":"concept","src":"ct_mexico","al":"object-based classification clasificación basada en objetos object-based classification clasificación orientada a objetos"},{"id":"reproducibility","en":"Reproducibility","es":"Reproducibilidad","den":"The ability to obtain identical results from the same data and analysis methods, achieved through version control, content-hashed data snapshots, and containerized environments.","des":"Capacidad de obtener resultados idénticos a partir de los mismos datos y métodos de análisis, lograda mediante el control de versiones, instantáneas de datos con hash de contenido y entornos contenerizados.","lvl":6,"ord":538,"cat":"method","kind":"concept","src":"howto","al":"reproducibility reproducibilidad reproducibility"},{"id":"policymakers","en":"Policymakers","es":"Formuladores de políticas","den":"Individuals who base decisions on agricultural statistics and reports.","des":"Individuos que basan sus decisiones en informes y análisis.","lvl":0,"ord":50,"cat":"primitive","kind":"primitive","src":"","al":"policymakers formuladores de políticas policymakers responsables de políticas tomadores de decisiones"},{"id":"near-real-time","en":"Near real-time","es":"Tiempo casi real","den":"Describes data or processing that is delivered with minimal delay after acquisition, enabling timely monitoring, such as satellite imagery available within hours of acquisition.","des":"Describe datos o procesamiento que se entregan con un retraso mínimo después de la adquisición, permitiendo un monitoreo oportuno, como imágenes satelitales disponibles horas después de la captura.","lvl":3,"ord":259,"cat":"metric","kind":"concept","src":"","al":"near real-time tiempo casi real near real-time casi en tiempo real tcr"},{"id":"reproducible-code","en":"Reproducible code","es":"Código reproducible","den":"Analysis code (e.g., R, Python scripts) that can be executed by others to produce identical results, often packaged in a containerized environment with all dependencies and data.","des":"Código de análisis (por ejemplo, scripts en R o Python) que otros pueden ejecutar para producir resultados idénticos, a menudo empaquetado en un entorno contenerizado con todas las dependencias y datos.","lvl":5,"ord":501,"cat":"software","kind":"concept","src":"howto","al":"reproducible code código reproducible reproducible code"},{"id":"high-performance-computing","en":"High-performance computing","es":"Computación de alto rendimiento","den":"Powerful computing resources (e.g., supercomputers, GPU clusters) required to process large Earth observation data volumes and run complex machine learning models efficiently.","des":"Recursos informáticos potentes (por ejemplo, supercomputadoras, clústeres GPU) necesarios para procesar grandes volúmenes de datos de observación de la Tierra y ejecutar modelos de aprendizaje automático complejos de manera eficiente.","lvl":3,"ord":314,"cat":"software","kind":"concept","src":"cy_finland","al":"high-performance computing computación de alto rendimiento high-performance computing car hpc"},{"id":"pilot-study","en":"Pilot study","es":"Estudio piloto","den":"Small-scale preliminary test to assess feasibility before a larger project.","des":"Prueba preliminar a pequeña escala para evaluar la viabilidad antes de un proyecto mayor.","lvl":0,"ord":51,"cat":"primitive","kind":"primitive","src":"","al":"pilot study estudio piloto pilot study prueba piloto"},{"id":"collaboration","en":"Collaboration","es":"Colaboración","den":"Working jointly with others on research or data collection activities.","des":"Trabajo conjunto con otros en actividades de investigación o recopilación de datos.","lvl":0,"ord":52,"cat":"primitive","kind":"primitive","src":"","al":"collaboration colaboración collaboration"},{"id":"petabytes","en":"Petabytes","es":"Petabytes","den":"Unit of digital information equal to one quadrillion bytes for large datasets.","des":"Unidad de información digital equivalente a un cuatrillón de bytes para conjuntos de datos grandes.","lvl":0,"ord":53,"cat":"primitive","kind":"primitive","src":"","al":"petabytes petabytes petabytes pb"},{"id":"cloud-based-services","en":"Cloud-based services","es":"Servicios basados en la nube","den":"Online platforms providing access to large petabyte-scale Earth observation data archives and computational resources for processing, analysis, and storage.","des":"Plataformas en línea que proporcionan acceso a grandes archivos de datos de observación de la Tierra (a escala de petabytes) y recursos computacionales para procesamiento, análisis y almacenamiento.","lvl":3,"ord":326,"cat":"software","kind":"concept","src":"index","al":"cloud-based services servicios basados en la nube cloud-based services servicios en la nube"},{"id":"spectral-channels","en":"Spectral channels","es":"Canales espectrales","den":"Discrete wavelength intervals in the electromagnetic spectrum that a remote sensing sensor records, each providing a separate image band. More channels provide richer spectral information for classification.","des":"Intervalos discretos de longitud de onda en el espectro electromagnético que registra un sensor de teledetección, cada uno proporciona una banda de imagen separada. Más canales proporcionan información espectral más rica para la clasificación.","lvl":6,"ord":529,"cat":"sensor","kind":"concept","src":"","al":"spectral channels canales espectrales spectral channels bandas espectrales"},{"id":"quality-framework","en":"Quality framework","es":"Marco de calidad","den":"A structured set of criteria and procedures to assess the fitness-for-use of in-situ survey data for Earth observation applications, covering sampling design, response design, and EO-based post-hoc checks.","des":"Un conjunto estructurado de criterios y procedimientos para evaluar la idoneidad de los datos de encuestas in situ para aplicaciones de observación de la Tierra, que abarca el diseño de muestreo, el diseño de respuesta y las verificaciones posteriores basadas en EO.","lvl":5,"ord":447,"cat":"method","kind":"concept","src":"th_alignment","al":"quality framework marco de calidad quality framework marco de aseguramiento de la calidad"},{"id":"sample-balancing","en":"Sample balancing","es":"Balanceo de muestra","den":"Techniques to adjust an imbalanced training dataset, such as oversampling minority classes (e.g., SMOTE) or undersampling majority classes, to improve classifier performance on less frequent categories.","des":"Técnicas para ajustar un conjunto de datos de entrenamiento desequilibrado, como el sobremuestreo de clases minoritarias (p. ej., SMOTE) o el submuestreo de clases mayoritarias, para mejorar el rendimiento del clasificador en categorías menos frecuentes.","lvl":4,"ord":398,"cat":"method","kind":"concept","src":"th_quality_control","al":"sample balancing balanceo de muestra sample balancing equilibrado de la muestra"},{"id":"operational-application","en":"Operational Application","es":"Aplicación operativa","den":"A methodology or system that is routinely used in production settings, as opposed to a research prototype. It requires robustness, automation, and integration into institutional workflows.","des":"Una metodología o sistema que se utiliza de forma rutinaria en entornos de producción, a diferencia de un prototipo de investigación. Requiere robustez, automatización e integración en flujos de trabajo institucionales.","lvl":4,"ord":432,"cat":"other","kind":"concept","src":"introduction","al":"operational application aplicación operativa operational application operational application aplicación operacional"},{"id":"coordinate-reference-system","en":"Coordinate Reference System","es":"Sistema de referencia de coordenadas","den":"A framework for defining real-world geographic coordinates, such as WGS 84 (latitude/longitude) or UTM (projected meters). Harmonizing CRS between data layers is essential for accurate spatial analysis.","des":"Un marco para definir coordenadas geográficas del mundo real, como WGS 84 (latitud/longitud) o UTM (metros proyectados). Armonizar el sistema de referencia de coordenadas entre los conjuntos de datos es esencial para un análisis espacial preciso.","lvl":5,"ord":491,"cat":"other","kind":"concept","src":"uav_agriculture_cook_islands","al":"coordinate reference system sistema de referencia de coordenadas coordinate reference system coordinate reference system src crs"},{"id":"sentinel-missions","en":"Sentinel Missions","es":"misiones Sentinel","den":"The European Space Agency's constellation of Earth observation satellites, including Sentinel-1 (SAR radar), Sentinel-2 (optical), and Sentinel-3, providing open-access, high-resolution data for global monitoring.","des":"La constelación de satélites de observación de la Tierra de la Agencia Espacial Europea, que incluye Sentinel-1 (radar SAR), Sentinel-2 (óptico) y Sentinel-3, que proporcionan datos de alta resolución y acceso abierto para el monitoreo global.","lvl":4,"ord":420,"cat":"platform","kind":"concept","src":"th_remote_sensing","al":"sentinel missions misiones sentinel sentinel missions sentinel missions misiones copernicus sentinel"},{"id":"thresholding","en":"Thresholding","es":"Umbralización","den":"A segmentation method that assigns pixels to classes based on whether their value is above or below a chosen cutoff (threshold). Multiple threshold methods can be combined for robust flood detection.","des":"Un método de segmentación que asigna píxeles a clases en función de si su valor está por encima o por debajo de un umbral elegido. Se pueden combinar múltiples métodos de umbralización para una detección robusta de inundaciones.","lvl":3,"ord":321,"cat":"method","kind":"concept","src":"dis_china_floods","al":"thresholding umbralización thresholding thresholding aplicación de umbrales"},{"id":"jupyterlab","en":"JupyterLab","es":"JupyterLab","den":"A web-based interactive development environment for Jupyter notebooks, code, and data. It enables reproducible analysis by providing a pre-configured environment with all dependencies and data ready to run.","des":"Entorno de desarrollo interactivo basado en web para Jupyter Notebooks, código y datos. Permite análisis reproducible al proporcionar un entorno preconfigurado con todas las dependencias y datos listos para ejecutar.","lvl":3,"ord":345,"cat":"software","kind":"concept","src":"howto","al":"jupyterlab jupyterlab jupyterlab jupyterlab entorno jupyterlab"},{"id":"clustering-algorithm","en":"Clustering Algorithm","es":"Algoritmo de agrupamiento","den":"An unsupervised machine learning technique that groups similar data points (e.g., pixels or time series) into clusters based on feature similarity. Self-Organizing Maps (SOM) are a common clustering method for time series data.","des":"Técnica de aprendizaje automático no supervisado que agrupa puntos de datos similares (por ejemplo, píxeles o series temporales) en clústeres basados en similitud de atributos. Los Mapas Autoorganizados (SOM) son un método común de agrupamiento para datos de series temporales.","lvl":6,"ord":512,"cat":"method","kind":"concept","src":"th_quality_control","al":"clustering algorithm algoritmo de agrupamiento clustering algorithm clustering algorithm algoritmo de clustering"},{"id":"biophysical","en":"Biophysical","es":"Biofísico","den":"Biophysical refers to the physical and biological properties of the Earth's surface, such as vegetation health, biomass, and leaf area index, which are measured or estimated from remote sensing data.","des":"Biofísico se refiere a las propiedades físicas y biológicas de la superficie terrestre, como salud de la vegetación, biomasa e índice de área foliar, que se miden o estiman a partir de datos de teledetección.","lvl":4,"ord":417,"cat":"phenomenon","kind":"concept","src":"","al":"biophysical biofísico biophysical biophysical"},{"id":"geometric-correction","en":"Geometric Correction","es":"Corrección geométrica","den":"Geometric correction is the process of aligning satellite imagery to a known coordinate system by removing distortions caused by sensor geometry, terrain, and Earth's rotation, ensuring accurate spatial positioning.","des":"La corrección geométrica es el proceso de alinear imágenes satelitales a un sistema de coordenadas conocido eliminando distorsiones causadas por la geometría del sensor, el terreno y la rotación de la Tierra, asegurando un posicionamiento espacial preciso.","lvl":2,"ord":208,"cat":"method","kind":"concept","src":"th_data_sources#ard-image-collections","al":"geometric correction corrección geométrica geometric correction geometric correction"},{"id":"cloud-masking","en":"Cloud Masking","es":"Enmascaramiento de nubes","den":"Cloud masking is the process of identifying and removing pixels affected by clouds or cloud shadows in satellite imagery, often using spectral tests or pre-computed quality bands, to ensure clear observations.","des":"El enmascaramiento de nubes es el proceso de identificar y eliminar píxeles afectados por nubes o sombras de nubes en imágenes satelitales, a menudo usando pruebas espectrales o bandas de calidad precalculadas, para garantizar observaciones claras.","lvl":2,"ord":220,"cat":"method","kind":"concept","src":"th_data_sources#ard-image-collections","al":"cloud masking enmascaramiento de nubes cloud masking cloud masking máscara de nubes"},{"id":"temporal-compositing","en":"Temporal Compositing","es":"Composición temporal","den":"Temporal compositing is the process of combining multiple satellite images over a specified time period into a single image by selecting the best available pixel (e.g., median, minimum cloud cover) to reduce noise and cloud interference.","des":"La composición temporal es el proceso de combinar múltiples imágenes satelitales durante un período de tiempo específico en una sola imagen seleccionando el mejor píxel disponible (por ejemplo, mediana, mínima cobertura de nubes) para reducir ruido e interferencia de nubes.","lvl":3,"ord":330,"cat":"method","kind":"concept","src":"th_data_cubes#generating-regular-data-cubes","al":"temporal compositing composición temporal temporal compositing temporal compositing"},{"id":"omission","en":"Omission","es":"Omisión","den":"Omission error (false negative) occurs when a pixel or area that belongs to a class in reality is not classified as that class by the map, leading to underestimation of that class's extent.","des":"El error de omisión (falso negativo) ocurre cuando un píxel o área que pertenece a una clase en la realidad no es clasificado como esa clase por el mapa, lo que lleva a una subestimación de la extensión de esa clase.","lvl":6,"ord":519,"cat":"metric","kind":"concept","src":"th_validation#accuracy-assessment-of-classified-images","al":"omission omisión omission omission omission error error de omisión"},{"id":"commission","en":"Commission","es":"Comisión","den":"Commission error (false positive) occurs when a pixel or area is incorrectly assigned to a class in the map when it does not belong to that class in reality, leading to overestimation.","des":"El error de comisión (falso positivo) ocurre cuando un píxel o área se asigna incorrectamente a una clase en el mapa cuando no pertenece a esa clase en la realidad, lo que lleva a una sobreestimación.","lvl":6,"ord":520,"cat":"metric","kind":"concept","src":"th_validation#accuracy-assessment-of-classified-images","al":"commission comisión commission commission commission error error de comisión"},{"id":"quality-flags","en":"Quality Flags","es":"Banderas de calidad","den":"Quality flags are ancillary data layers in satellite products that indicate the reliability of each pixel, such as cloud cover, shadow, snow, or processing errors, used to filter out low-quality observations.","des":"Las banderas de calidad son capas de datos auxiliares en productos satelitales que indican la fiabilidad de cada píxel, como cobertura de nubes, sombra, nieve o errores de procesamiento, utilizadas para filtrar observaciones de baja calidad.","lvl":2,"ord":213,"cat":"data","kind":"concept","src":"cy_poland#modis-data","al":"quality flags banderas de calidad quality flags quality flags indicadores de calidad"},{"id":"prediction-probabilities","en":"Prediction Probabilities","es":"Probabilidades de predicción","den":"Prediction probabilities are the output values from a classification model that represent the estimated likelihood that a pixel belongs to each possible class, typically ranging from 0 to 1.","des":"Las probabilidades de predicción son los valores de salida de un modelo de clasificación que representan la probabilidad estimada de que un píxel pertenezca a cada clase posible, típicamente en un rango de 0 a 1.","lvl":6,"ord":514,"cat":"metric","kind":"concept","src":"th_uncertainty#measuring-uncertainty","al":"prediction probabilities probabilidades de predicción prediction probabilities prediction probabilities"},{"id":"spectral-indices","en":"Spectral Indices","es":"Índices espectrales","den":"Spectral indices are mathematical combinations of two or more spectral bands designed to highlight specific surface properties, such as vegetation vigor (NDVI) or water content (NDWI).","des":"Los índices espectrales son combinaciones matemáticas de dos o más bandas espectrales diseñadas para resaltar propiedades específicas de la superficie, como el vigor de la vegetación (NDVI) o el contenido de agua (NDWI).","lvl":6,"ord":530,"cat":"index","kind":"concept","src":"th_remote_sensing#introduction-to-remote-sensing-imagery","al":"spectral indices índices espectrales spectral indices spectral indices"},{"id":"spectral-range","en":"Spectral Range","es":"Rango espectral","den":"Spectral range refers to the interval of wavelengths in the electromagnetic spectrum that a satellite sensor measures, typically expressed in micrometers (µm) or nanometers (nm).","des":"El rango espectral se refiere al intervalo de longitudes de onda en el espectro electromagnético que mide un sensor satelital, generalmente expresado en micrómetros (µm) o nanómetros (nm).","lvl":4,"ord":410,"cat":"data","kind":"concept","src":"th_remote_sensing#introduction-to-remote-sensing-imagery","al":"spectral range rango espectral spectral range spectral range intervalo espectral"},{"id":"area-weighted-error-matrices","en":"Area-Weighted Error Matrices","es":"Matrices de error ponderadas por área","den":"An area-weighted error matrix adjusts the standard confusion matrix by weighting each cell by the proportion of area mapped as that class, providing unbiased accuracy and area estimates.","des":"Una matriz de error ponderada por área ajusta la matriz de confusión estándar ponderando cada celda por la proporción de área mapeada como esa clase, proporcionando estimaciones de exactitud y área insesgadas.","lvl":6,"ord":521,"cat":"metric","kind":"concept","src":"th_validation#accuracy-assessment-of-classified-images","al":"area-weighted error matrices matrices de error ponderadas por área area-weighted error matrices area-weighted error matrices matrices de error con ponderación areal"},{"id":"spectral-temporal-signatures","en":"Spectral-Temporal Signatures","es":"Firmas espectro-temporales","den":"Spectral-temporal signatures are the unique patterns of reflectance values over time for a given land cover type, capturing phenological changes and enabling classification from time series.","des":"Las firmas espectro-temporales son los patrones únicos de valores de reflectancia a lo largo del tiempo para un tipo de cobertura del suelo dado, capturando cambios fenológicos y permitiendo la clasificación a partir de series temporales.","lvl":7,"ord":553,"cat":"phenomenon","kind":"concept","src":"th_lucc#the-key-role-of-time-series","al":"spectral-temporal signatures firmas espectro-temporales spectral-temporal signatures spectral-temporal signatures firmas espectrales temporales"},{"id":"digital-elevation-model","en":"Digital Elevation Model","es":"Modelo Digital de Elevación","den":"A Digital Elevation Model (DEM) is a raster representation of the Earth's topographic surface, providing elevation values for each pixel, used for terrain correction and as an auxiliary feature in classification.","des":"Un Modelo Digital de Elevación (MDE) es una representación ráster de la superficie topográfica de la Tierra que proporciona valores de elevación para cada píxel, utilizado para corrección del terreno y como atributo auxiliar en clasificación.","lvl":2,"ord":246,"cat":"data","kind":"concept","src":"th_data_sources#copernicus-digital-elevation-model","al":"digital elevation model modelo digital de elevación digital elevation model digital elevation model mde dem"},{"id":"elevation","en":"Elevation","es":"Elevación","den":"Height above a reference datum, such as sea level.","des":"Altura sobre un datum de referencia, como el nivel del mar.","lvl":0,"ord":54,"cat":"primitive","kind":"primitive","src":"","al":"elevation elevación elevation altitud"},{"id":"slope","en":"Slope","es":"Pendiente","den":"The steepness or inclination of the land surface.","des":"La inclinación o pendiente de la superficie del terreno.","lvl":0,"ord":55,"cat":"primitive","kind":"primitive","src":"","al":"slope pendiente slope"},{"id":"confidence-intervals","en":"Confidence Intervals","es":"Intervalos de Confianza","den":"Confidence intervals are a range of values around an estimate (e.g., area) that likely contains the true population value with a specified probability, typically 95%, reflecting sampling uncertainty.","des":"Los Intervalos de Confianza son un rango de valores alrededor de una estimación (ej. área) que probablemente contiene el valor verdadero de la Población con una probabilidad especificada, típicamente 95%, reflejando la incertidumbre del muestreo.","lvl":4,"ord":425,"cat":"statistic","kind":"concept","src":"th_validation#accuracy-assessment-of-classified-images","al":"confidence intervals intervalos de confianza confidence intervals confidence intervals"},{"id":"agronomic-conditions","en":"Agronomic Conditions","es":"Condiciones Agronómicas","den":"Agronomic conditions refer to the set of factors affecting crop growth and management, including soil properties, climate, irrigation, fertilization, and farming practices.","des":"Las Condiciones Agronómicas se refieren al conjunto de factores que afectan el crecimiento y manejo de los Cultivos, incluyendo propiedades del Suelo, Clima, riego, fertilización y prácticas agrícolas.","lvl":4,"ord":418,"cat":"phenomenon","kind":"concept","src":"ct_chile#classification-scheme","al":"agronomic conditions condiciones agronómicas agronomic conditions agronomic conditions"},{"id":"chapter-specific-data","en":"Chapter-Specific Data","es":"Datos Específicos del Capítulo","den":"Data sets used exclusively within a particular chapter of a textbook or course.","des":"Conjuntos de datos utilizados exclusivamente dentro de un Capítulo particular de un libro de texto o curso.","lvl":0,"ord":56,"cat":"primitive","kind":"primitive","src":"","al":"chapter-specific data datos específicos del capítulo chapter-specific data"},{"id":"shared-teaching-artifacts","en":"Shared Teaching Artifacts","es":"Recursos Didácticos Compartidos","den":"Educational materials like notebooks, slides, or exercises shared among instructors.","des":"Recursos educativos como cuadernos, diapositivas o ejercicios compartidos entre instructores.","lvl":0,"ord":57,"cat":"primitive","kind":"primitive","src":"","al":"shared teaching artifacts recursos didácticos compartidos shared teaching artifacts artefactos de enseñanza compartidos"},{"id":"kappa-coefficient","en":"Kappa Coefficient","es":"Coeficiente Kappa","den":"The Kappa coefficient is a statistical measure of agreement between classified map and reference data, accounting for chance agreement. Values range from -1 to 1, with higher values indicating better accuracy.","des":"El Coeficiente Kappa es una medida estadística de concordancia entre un Mapa clasificado y datos de Referencia, que considera el acuerdo por azar. Los valores varían de -1 a 1, donde valores más altos indican mejor Exactitud.","lvl":6,"ord":522,"cat":"metric","kind":"concept","src":"th_quality_control#validation","al":"kappa coefficient coeficiente kappa kappa coefficient kappa coefficient índice kappa"},{"id":"self-organizing-maps","en":"Self-Organizing Maps","es":"Mapas Autoorganizados","den":"Self-Organizing Maps (SOM) are an unsupervised neural network technique that projects high-dimensional data onto a 2D grid while preserving topological relationships, used for clustering and quality control of training samples.","des":"Los Mapas Autoorganizados (SOM) son una técnica no supervisada de redes neuronales que proyecta datos de alta dimensión en una cuadrícula 2D preservando relaciones topológicas, utilizada para agrupamiento y Control de Calidad de Muestras de Entrenamiento.","lvl":4,"ord":390,"cat":"method","kind":"concept","src":"th_quality_control#quality-control-using-self-organizing-maps","al":"self-organizing maps mapas autoorganizados self-organizing maps mapas auto-organizados som"},{"id":"quality-control","en":"Quality Control","es":"Control de Calidad","den":"Quality control in remote sensing refers to procedures for assessing and improving the reliability of training data, classifications, and derived products, including detection of noisy samples and class imbalance correction.","des":"El Control de Calidad en teledetección se refiere a procedimientos para evaluar y mejorar la fiabilidad de los datos de entrenamiento, clasificaciones y productos derivados, incluyendo la detección de Muestras ruidosas y corrección de desbalance de Clases.","lvl":4,"ord":395,"cat":"method","kind":"concept","src":"th_quality_control#outline","al":"quality control control de calidad quality control quality control"},{"id":"zonal-statistics","en":"Zonal Statistics","es":"Estadísticas Zonales","den":"Statistical measures (e.g., mean, standard deviation) computed for each zone or polygon in a raster dataset, often used to summarize pixel values within field boundaries from remote sensing imagery.","des":"Medidas estadísticas (ej. media, desviación estándar) calculadas para cada Zona o Polígono en un conjunto de datos ráster, a menudo utilizadas para resumir Valores de Píxeles dentro de límites de Campo a partir de Imágenes de teledetección.","lvl":5,"ord":445,"cat":"method","kind":"concept","src":"uav_agriculture_cook_islands","al":"zonal statistics estadísticas zonales zonal statistics zonal statistics estadísticas por zonas"},{"id":"buffering","en":"Buffering","es":"Búfer","den":"buffering","des":"Búfer","lvl":0,"ord":58,"cat":"primitive","kind":"primitive","src":"","al":"buffering búfer buffering creación de búfer zona de amortiguamiento"},{"id":"microwave","en":"Microwave","es":"Microondas","den":"Electromagnetic radiation with wavelengths from 1 mm to 1 m, used in remote sensing by radar satellites like Sentinel-1 and GF-3, which can penetrate clouds and operate day or night.","des":"Radiación electromagnética con longitudes de onda de 1 mm a 1 m, utilizada en teledetección por satélites de Radar como Sentinel-1 y GF-3, que pueden penetrar nubes y operar de día o noche.","lvl":5,"ord":478,"cat":"method","kind":"concept","src":"th_remote_sensing","al":"microwave microondas microwave radar de microondas"},{"id":"population","en":"Population","es":"Población","den":"The entire collection of statistical units (e.g., all pixels in a study area) from which a sample is drawn; in survey sampling, the target set for inference.","des":"La colección completa de unidades estadísticas (ej. todos los Píxeles en un Área de Estudio) de la cual se extrae una Muestra; en encuestas por muestreo, el conjunto objetivo para la Inferencia.","lvl":5,"ord":457,"cat":"statistic","kind":"concept","src":"crop_statistics_calibration","al":"population población population universo"},{"id":"inference","en":"Inference","es":"Inferencia","den":"Process of deriving logical conclusions from data or models.","des":"Proceso de derivar conclusiones lógicas a partir de datos o modelos.","lvl":0,"ord":59,"cat":"primitive","kind":"primitive","src":"","al":"inference inferencia inference"},{"id":"hidden-layers","en":"Hidden layers","es":"Capas ocultas","den":"Intermediate layers in a neural network between the input and output layers that transform inputs through weighted connections; deeper hidden layers capture more complex features.","des":"Capas intermedias en una red neuronal entre las capas de entrada y salida que transforman las entradas mediante conexiones ponderadas; las capas ocultas más profundas capturan atributos más complejos.","lvl":5,"ord":468,"cat":"method","kind":"concept","src":"th_machine_learning","al":"hidden layers capas ocultas hidden layers"},{"id":"kubernetes","en":"Kubernetes","es":"Kubernetes","den":"Open-source platform for automating deployment and scaling of containerized apps.","des":"Plataforma de código abierto para automatizar el despliegue y escalado de aplicaciones en contenedores.","lvl":0,"ord":60,"cat":"primitive","kind":"primitive","src":"","al":"kubernetes kubernetes kubernetes"},{"id":"persistent-storage","en":"Persistent storage","es":"Almacenamiento persistente","den":"Data storage that retains information after the process that created it ends.","des":"Almacenamiento de datos que retiene la información después de que finaliza el proceso que la creó.","lvl":0,"ord":61,"cat":"primitive","kind":"primitive","src":"","al":"persistent storage almacenamiento persistente persistent storage"},{"id":"consistency","en":"Consistency","es":"Consistencia","den":"Property of being coherent or uniform across different observations or times.","des":"Propiedad de ser coherente o uniforme a través de diferentes observaciones o momentos.","lvl":0,"ord":62,"cat":"primitive","kind":"primitive","src":"","al":"consistency consistencia consistency"},{"id":"sowing","en":"Sowing","es":"Siembra","den":"The agricultural practice of planting seeds in the soil; a key phenological event in crop calendars that satellite time series can detect by monitoring changes in vegetation indices.","des":"Práctica agrícola de sembrar semillas en el suelo; un evento fenológico clave en los calendarios de cultivos que las series temporales satelitales pueden detectar monitoreando cambios en los índices de vegetación.","lvl":4,"ord":363,"cat":"phenomenon","kind":"concept","src":"th_lucc","al":"sowing siembra sowing"},{"id":"gps","en":"GPS","es":"GPS","den":"Global Positioning System, a satellite-based navigation system that provides precise geographic coordinates for ground control points, field sample locations, and survey points.","des":"Sistema de Posicionamiento Global, un sistema de navegación basado en satélites que proporciona coordenadas geográficas precisas para puntos de control terrestre, ubicaciones de muestras de campo y puntos de encuesta.","lvl":2,"ord":209,"cat":"sensor","kind":"concept","src":"th_alignment","al":"gps gps gps sistema de posicionamiento global"},{"id":"gis","en":"GIS","es":"GIS","den":"Geographic Information System, a software framework for capturing, storing, analyzing, and displaying spatial data; used for tasks such as parcel digitization, map creation, and spatial analysis.","des":"Sistema de Información Geográfica, un marco de software para capturar, almacenar, analizar y mostrar datos geoespaciales; utilizado para tareas como digitalización de parcelas, creación de mapas y análisis espacial.","lvl":5,"ord":442,"cat":"software","kind":"concept","src":"th_alignment","al":"gis gis gis sistema de información geográfica"},{"id":"nasa","en":"NASA","es":"NASA","den":"The National Aeronautics and Space Administration, the United States space agency that jointly manages the Landsat program with USGS and provides the Harmonized Landsat-Sentinel (HLS) products.","des":"La Administración Nacional de Aeronáutica y el Espacio, la agencia espacial de Estados Unidos que gestiona conjuntamente el programa Landsat con el USGS y proporciona los productos Landsat Sentinel Armonizado (HLS).","lvl":3,"ord":347,"cat":"organization","kind":"concept","src":"th_remote_sensing","al":"nasa nasa nasa administración nacional de aeronáutica y del espacio"},{"id":"coordinates","en":"Coordinates","es":"Coordenadas","den":"Numerical values defining a position in a coordinate system.","des":"Valores numéricos que definen una posición en un sistema de coordenadas.","lvl":0,"ord":63,"cat":"primitive","kind":"primitive","src":"","al":"coordinates coordenadas coordinates coordinate"},{"id":"usgs","en":"USGS","es":"USGS","den":"The U.S. Geological Survey, a scientific agency that jointly manages the Landsat program with NASA and distributes Landsat imagery through platforms like Earth Explorer.","des":"El Servicio Geológico de Estados Unidos, una agencia científica que gestiona conjuntamente el programa Landsat con la NASA y distribuye imágenes satelitales a través de plataformas como Earth Explorer.","lvl":4,"ord":435,"cat":"organization","kind":"concept","src":"th_remote_sensing","al":"usgs usgs usgs servicio geológico de los estados unidos"},{"id":"transferability","en":"Transferability","es":"Transferibilidad","den":"The ability of a machine learning model or classification system to maintain predictive performance when applied to new geographic regions, time periods, or conditions not seen during training.","des":"Capacidad de un modelo de aprendizaje automático o sistema de clasificación para mantener el rendimiento predictivo al aplicarse a nuevas regiones geográficas, períodos de tiempo o condiciones no vistas durante el entrenamiento.","lvl":5,"ord":448,"cat":"method","kind":"concept","src":"ad_world_cereal","al":"transferability transferibilidad transferability"},{"id":"domain-shift","en":"Domain shift","es":"Cambio de dominio","den":"A change in the statistical distribution of data between the source (training) domain and a target (application) domain, which can reduce the performance of a machine learning model applied to new conditions.","des":"Cambio en la distribución estadística de los datos entre el dominio fuente (entrenamiento) y un dominio objetivo (aplicación), que puede reducir el rendimiento de un modelo de aprendizaje automático aplicado a nuevas condiciones.","lvl":6,"ord":506,"cat":"phenomenon","kind":"concept","src":"th_parcel_extraction","al":"domain shift cambio de dominio domain shift"},{"id":"image-segmentation","en":"Image segmentation","es":"Segmentación de imágenes","den":"The process of partitioning an image into multiple segments (sets of pixels), often used to delineate objects like agricultural field parcels by grouping spectrally similar pixels into homogeneous regions.","des":"Proceso de dividir una imagen en múltiples segmentos (conjuntos de píxeles), a menudo utilizado para delinear objetos como parcelas agrícolas agrupando píxeles espectralmente similares en regiones homogéneas.","lvl":2,"ord":214,"cat":"method","kind":"concept","src":"th_parcel_extraction","al":"image segmentation segmentación de imágenes image segmentation"},{"id":"sam","en":"SAM","es":"SAM","den":"The Segment Anything Model, a deep learning model developed by Meta AI that can segment objects in images using prompt points, used in the TSM-SAM flood detection framework.","des":"El Modelo de Segmentación de Cualquier Cosa, un modelo de aprendizaje profundo desarrollado por Meta AI que puede segmentar objetos en imágenes utilizando puntos de aviso, utilizado en el marco de detección de inundaciones TSM-SAM.","lvl":3,"ord":324,"cat":"product","kind":"concept","src":"dis_china_floods","al":"sam sam sam mapeo espectral de ángulo"},{"id":"confidence-interval","en":"Confidence interval","es":"Intervalo de confianza","den":"A range of values, derived from sample data, that is likely to contain the true population parameter with a specified probability (e.g., 95%), providing a measure of estimation uncertainty.","des":"Un rango de valores, derivado de datos de muestra, que probablemente contenga el verdadero parámetro de la población con una probabilidad especificada (por ejemplo, 95%), proporcionando una medida de la incertidumbre de estimación.","lvl":4,"ord":426,"cat":"statistic","kind":"concept","src":"th_validation","al":"confidence interval intervalo de confianza confidence interval"},{"id":"multi-task-learning","en":"Multi-task learning","es":"Aprendizaje multitarea","den":"A machine learning approach where a model is trained simultaneously on multiple related tasks, sharing representations between tasks to improve generalization and performance, such as jointly learning parcel region and boundary segmentation.","des":"Un enfoque de aprendizaje automático donde un modelo se entrena simultáneamente en múltiples tareas relacionadas, compartiendo representaciones entre tareas para mejorar la generalización y el rendimiento, como aprender conjuntamente la segmentación de región y límites de parcelas.","lvl":4,"ord":391,"cat":"method","kind":"concept","src":"uav_field_parcels","al":"multi-task learning aprendizaje multitarea multi-task learning"},{"id":"uav-imagery","en":"UAV imagery","es":"imágenes de UAV","den":"Images captured from Unmanned Aerial Vehicles (drones) at low altitudes, providing very high spatial resolution (centimeter-level) for detailed agricultural monitoring, plot delineation, and crop health assessment.","des":"Imágenes capturadas desde vehículos aéreos no tripulados (drones) a bajas altitudes, que proporcionan una resolución espacial muy alta (nivel centimétrico) para el monitoreo agrícola detallado, la delimitación de parcelas y la evaluación de la salud de los cultivos.","lvl":6,"ord":537,"cat":"data","kind":"concept","src":"uav_agriculture_cook_islands","al":"uav imagery imágenes de uav uav imagery imágenes de vehículo aéreo no tripulado imágenes de dron"},{"id":"ground-truth-2","en":"Ground truth","es":"Verdad terreno","den":"Observations or measurements of the actual conditions on the Earth's surface, collected via field surveys or very high-resolution imagery, used to train and validate remote sensing classification models.","des":"Observaciones o mediciones de las condiciones reales en la superficie de la Tierra, recopiladas mediante encuestas de campo o imágenes de muy alta resolución, utilizadas para entrenar y validar modelos de clasificación de teledetección.","lvl":4,"ord":405,"cat":"data","kind":"concept","src":"th_alignment","al":"ground truth verdad terreno ground truth verdad de campo dato de referencia"},{"id":"r-package","en":"R package","es":"paquete de R","den":"Collection of R functions and data for specific tasks, distributed via CRAN.","des":"Colección de funciones y datos de R para tareas específicas, distribuida a través de CRAN.","lvl":0,"ord":64,"cat":"primitive","kind":"primitive","src":"","al":"r package paquete de r r package paquete r"},{"id":"netrc-file","en":".netrc file","es":"Archivo .netrc","den":"Configuration file for automatic login to remote systems via FTP, HTTP, etc.","des":"Archivo de configuración para inicio de sesión automático en sistemas remotos a través de FTP, HTTP, etc.","lvl":0,"ord":65,"cat":"primitive","kind":"primitive","src":"","al":".netrc file archivo .netrc .netrc file archivo netrc"},{"id":"orthophoto","en":"Orthophoto","es":"Ortofoto","den":"A geometrically corrected aerial or satellite image where distortions due to terrain relief and camera tilt have been removed, making it usable for accurate area measurement and map creation.","des":"Una imagen aérea o satelital corregida geométricamente donde se han eliminado las distorsiones debidas al relieve del terreno y la inclinación de la cámara, haciéndola utilizable para la medición precisa de áreas y la creación de mapas.","lvl":5,"ord":455,"cat":"product","kind":"concept","src":"uav_agriculture_cook_islands","al":"orthophoto ortofoto orthophoto ortofotografía"},{"id":"recall","en":"Recall","es":"Exhaustividad","den":"The proportion of actual positive instances correctly identified by a classifier, also called Producer's Accuracy. It measures omission errors.","des":"La proporción de instancias positivas reales identificadas correctamente por un clasificador, también llamada precisión del productor. Mide los errores de omisión.","lvl":6,"ord":523,"cat":"metric","kind":"concept","src":"th_validation · cy_colombia","al":"recall exhaustividad recall recall sensibilidad"},{"id":"analysis-ready-data","en":"Analysis Ready Data","es":"Datos Listos para Análisis","den":"Satellite data processed to meet CEOS standards, including geometric, radiometric, and atmospheric corrections, with cloud and shadow masks, and surface reflectance values for optical sensors or GammaNought backscatter for SAR.","des":"Datos satelitales procesados para cumplir con los estándares de CEOS, incluyendo correcciones geométricas, radiométricas y atmosféricas, con máscaras de nubes y sombras, y valores de reflectancia superficial para sensores ópticos o retrodispersión GammaNought para SAR.","lvl":2,"ord":224,"cat":"data","kind":"concept","src":"th_data_sources","al":"analysis ready data datos listos para análisis analysis ready data ard"},{"id":"surface-reflectance","en":"Surface reflectance","es":"Reflectancia superficial","den":"The fraction of incident solar radiation reflected by the Earth's surface, derived from satellite imagery after atmospheric correction. It enables consistent comparison across time and locations.","des":"La fracción de la radiación solar incidente reflejada por la superficie de la Tierra, derivada de imágenes satelitales después de la corrección atmosférica. Permite una comparación consistente entre ubicaciones y momentos.","lvl":4,"ord":421,"cat":"data","kind":"concept","src":"th_data_sources","al":"surface reflectance reflectancia superficial surface reflectance reflectancia de superficie"},{"id":"phenological-stage","en":"Phenological stage","es":"Etapa fenológica","den":"A distinct phase in a plant's growth cycle, such as germination, leaf development, tillering, or flowering. These stages are used to classify crop development and map agricultural dynamics.","des":"Una fase distinta en el ciclo de crecimiento de una planta, como germinación, desarrollo de hojas, macollamiento o floración. Estas etapas se utilizan para clasificar el desarrollo de los cultivos y mapear la dinámica agrícola.","lvl":5,"ord":471,"cat":"phenomenon","kind":"concept","src":"cy_colombia","al":"phenological stage etapa fenológica phenological stage fase fenológica"},{"id":"decision-tree","en":"Decision tree","es":"Árbol de decisión","den":"A supervised machine learning model that splits data into branches based on feature values, forming a tree structure. Each leaf represents a class label. Ensembles like Random Forest combine multiple trees.","des":"Un modelo de aprendizaje automático supervisado que divide los datos en ramas basadas en valores de atributos, formando una estructura de árbol. Cada hoja representa una etiqueta de clase. Los conjuntos como Random Forest combinan múltiples árboles.","lvl":5,"ord":469,"cat":"method","kind":"concept","src":"th_machine_learning","al":"decision tree árbol de decisión decision tree árbol de clasificación"},{"id":"knowledge-areas","en":"Knowledge areas","es":"Áreas de conocimiento","den":"Distinct domains or fields of expertise within a broader subject.","des":"Dominios o campos de experiencia distintos dentro de un tema más amplio.","lvl":0,"ord":66,"cat":"primitive","kind":"primitive","src":"","al":"knowledge areas áreas de conocimiento knowledge areas"},{"id":"military-grid-reference-system","en":"Military Grid Reference System","es":"Sistema de Referencia de Cuadrícula Militar","den":"A global tiling system dividing the world into 60 UTM zones of 8° longitude, each split into 6° latitude blocks and further into 110×110 km tiles with 10 km overlap. Used by Sentinel-2.","des":"Un sistema global de teselas que divide el mundo en 60 zonas UTM de 8° de longitud, cada una dividida en bloques de 6° de latitud y luego en teselas de 110×110 km con superposición de 10 km. Utilizado por Sentinel-2.","lvl":3,"ord":332,"cat":"data","kind":"concept","src":"th_data_sources","al":"military grid reference system sistema de referencia de cuadrícula militar military grid reference system mgrs mgrs"},{"id":"bias","en":"Bias","es":"Sesgo","den":"Systematic error or deviation from the true value.","des":"Error sistemático o desviación del valor verdadero.","lvl":0,"ord":67,"cat":"primitive","kind":"primitive","src":"","al":"bias sesgo bias"},{"id":"synthetic-aperture-radar","en":"Synthetic Aperture Radar","es":"Radar de Apertura Sintética","den":"A radar imaging technique that uses the motion of the satellite antenna to simulate a larger aperture, producing high-resolution images. It can penetrate clouds and operate day and night.","des":"Una técnica de imágenes de radar que utiliza el movimiento de la antena del satélite para simular una apertura más grande, produciendo imágenes de alta resolución. Puede penetrar nubes y operar de día y de noche.","lvl":5,"ord":480,"cat":"sensor","kind":"concept","src":"th_remote_sensing","al":"synthetic aperture radar radar de apertura sintética synthetic aperture radar sar sar"},{"id":"csi-image-driver","en":"CSI Image Driver","es":"Controlador de imágenes CSI","den":"A Kubernetes CSI driver that mounts OCI container images as read-only volumes. It enables fast, stateless data access by treating data artifacts like compute images, with node-level caching.","des":"Un controlador CSI de Kubernetes que monta imágenes de contenedor OCI como volúmenes de solo lectura. Permite un acceso rápido y sin estado a los datos al tratar los artefactos de datos como imágenes de computación, con almacenamiento en caché a nivel de nodo.","lvl":2,"ord":186,"cat":"software","kind":"concept","src":"howto","al":"csi image driver controlador de imágenes csi csi image driver csi image driver"},{"id":"pixel-counting","en":"Pixel counting","es":"Conteo de píxeles","den":"A method to estimate area by multiplying the number of pixels classified as a given class by the pixel area. It is biased because it integrates classifier errors and does not correct for omission or commission.","des":"Un método para estimar área multiplicando el número de píxeles clasificados como una clase determinada por el área del píxel. Está sesgado porque integra errores del clasificador y no corrige omisiones ni comisiones.","lvl":4,"ord":380,"cat":"method","kind":"concept","src":"crop_statistics_area","al":"pixel counting conteo de píxeles pixel counting"},{"id":"satellite-image-time-series-2","en":"Satellite image time series","es":"Series temporales de imágenes satelitales","den":"A sequence of satellite images acquired over the same location at regular intervals, capturing spectral changes over time. SITS enables monitoring of phenology, land cover change, and crop dynamics.","des":"Una secuencia de imágenes satelitales adquiridas sobre la misma ubicación en intervalos regulares, capturando cambios espectrales a lo largo del tiempo. Las SITS permiten monitorear la fenología, el cambio de cobertura del suelo y la dinámica de los cultivos.","lvl":3,"ord":335,"cat":"data","kind":"concept","src":"th_lucc","al":"satellite image time series series temporales de imágenes satelitales satellite image time series sits series de tiempo de imágenes de satélite"},{"id":"coefficient-of-variation","en":"Coefficient of variation","es":"Coeficiente de variación","den":"Relative measure of dispersion equal to standard deviation divided by mean.","des" .","des":"La disposición, distribución o estructura de las características en el espacio geográfico. En las estadísticas agrícolas, los patrones espaciales revelan la variabilidad en el crecimiento de los cultivos, el uso del suelo o las condiciones ambientales.","lvl":4,"ord":424,"cat":"phenomenon","kind":"concept","src":"","al":"spatial patterns patrones espaciales spatial patterns"},{"id":"model-training","en":"Model training","es":"Entrenamiento del modelo","den":"The process of fitting a machine learning algorithm to labeled data by adjusting its parameters to minimize prediction error. It requires a representative dataset and produces a model for classification or regression.","des":"El proceso de ajustar un algoritmo de aprendizaje automático a datos etiquetados modificando sus parámetros para minimizar el error de predicción. Requiere un conjunto de datos representativo y produce un modelo para clasificación o regresión.","lvl":3,"ord":300,"cat":"method","kind":"concept","src":"","al":"model training entrenamiento del modelo model training"},{"id":"principles","en":"Principles","es":"Principios","den":"Fundamental rules or foundations guiding methods or decisions.","des":"Reglas fundamentales o fundamentos que guían métodos o decisiones.","lvl":0,"ord":72,"cat":"primitive","kind":"primitive","src":"","al":"principles principios principles"},{"id":"objectives","en":"Objectives","es":"Objetivos","den":"Specific goals or purposes to be achieved by a study or project.","des":"Metas o propósitos específicos que se pretenden alcanzar con un estudio o proyecto.","lvl":0,"ord":73,"cat":"primitive","kind":"primitive","src":"","al":"objectives objetivos objectives"},{"id":"foundation-model","en":"Foundation model","es":"Modelo fundacional","den":"A large pre-trained model that learns general representations from unlabeled data, such as satellite imagery, and can be fine-tuned for specific tasks like crop mapping with limited labeled samples.","des":"Un modelo preentre orking-with-satellite-image-time-series","al":"time series analysis análisis de series temporales time series analysis"},{"id":"earth-observation-integration","en":"Earth observation integration","es":"integración de observación de la Tierra","den":"The process of combining satellite-derived data with ground-based surveys and statistical methods to produce official agricultural statistics, improving accuracy and timeliness.","des":"El proceso de combinar datos derivados de satélites con encuestas de campo y métodos estadísticos para producir estadísticas agrícolas oficiales, mejorando la exactitud y la oportunidad.","lvl":4,"ord":415,"cat":"method","kind":"concept","src":"introduction#improving-the-use-of-eo-in-agricultural-statistics","al":"earth observation integration integración de observación de la tierra earth observation integration"},{"id":"time-series-classification","en":"Time series classification","es":"Clasificación de series temporales","den":"A machine learning task that assigns a land cover or crop type label to a pixel based on its complete temporal profile of spectral measurements.","des":"Una tarea de aprendizaje automático que asigna una etiqueta de cobertura del suelo o tipo de cultivo a un píxel basándose en su perfil temporal completo de mediciones espectrales.","lvl":4,"ord":430,"cat":"method","kind":"concept","src":"th_machine_learning#common-interface-to-machine-learning-and-deep-learning-models","al":"time series classification clasificación de series temporales time series classification"},{"id":"case-studies","en":"Case studies","es":"Estudios de caso","den":"Detailed, real-world examples of applying remote sensing methods for agricultural statistics, covering diverse regions, crops, and data sources, presented within the handbook.","des":"Estudios de caso detallados y del mundo real sobre la aplicación de métodos de teledetección para estadísticas agrícolas, que cubren diversas regiones, cultivos y fuentes de datos, presentados en el manual.","lvl":3,"ord":338,"cat":"other","kind":"concept","src":"introduction#purpose-of-this-handbook","al":"case studies estudios de caso case studies casos de estudio"},{"id":"spatial-area","en":"Spatial area","es":"Área espacial","den":"Extent of a two-dimensional surface measured in square units.","des":"Extensión de una superficie bidimensional medida en unidades cuadradas.","lvl":0,"ord":76,"cat":"primitive","kind":"primitive","src":"","al":"spatial area área espacial spatial area"},{"id":"soil-moisture","en":"Soil moisture","es":"Humedad del suelo","den":"The water content held within the soil profile, a critical factor for crop growth that can be estimated from satellite data, particularly through Synthetic Aperture Radar (SAR) measurements.","des":"El contenido de agua retenido en el perfil del suelo, un factor crítico para el crecimiento de los cultivos que puede estimarse a partir de datos satelitales, particularmente mediante mediciones de Radar de Apertura Sintética (SAR).","lvl":6,"ord":525,"cat":"phenomenon","kind":"concept","src":"th_remote_sensing#sentinel-1","al":"soil moisture humedad del suelo soil moisture contenido de humedad del suelo"},{"id":"agricultural-producers","en":"Agricultural producers","es":"Productores agrícolas","den":"Farmers and other entities that grow crops or raise livestock for market.","des":"Agricultores y otras entidades que cultivan cultivos o crían ganado para el mercado.","lvl":0,"ord":77,"cat":"primitive","kind":"primitive","src":"","al":"agricultural producers productores agrícolas agricultural producers"},{"id":"satellite-image-classification","en":"Satellite image classification","es":"Clasificación de imágenes satelitales","den":"The process of assigning thematic labels (e.g., crop type, land cover) to pixels or image objects based on their spectral, temporal, and spatial characteristics using algorithms.","des":"El proceso de asignar etiquetas temáticas (por ejemplo, tipo de cultivo, cobertura del suelo) a píxeles u objetos de imagen basándose en sus características espectrales, temporales y espaciales mediante algoritmos.","lvl":3,"ord":287,"cat":"method","kind":"concept","src":"th_lucc#problem-statement","al":"satellite image classification clasificación de imágenes satelitales satellite image classification clasificación de imágenes de satélite"},{"id":"crop-area","en":"Crop area","es":"Área de cultivo","den":"A fundamental agricultural statistic representing the total land extent cultivated with a specific crop, typically derived from classified satellite imagery and often corrected for map bias.","des":"Una estadística agrícola fundamental que representa la extensión total de tierra cultivada con un cultivo específico, típicamente derivada de imágenes satelitales clasificadas y a menudo corregida por sesgo del mapa.","lvl":6,"ord":503,"cat":"statistic","kind":"concept","src":"th_validation#introduction","al":"crop area área de cultivo crop area superficie cultivada superficie de cultivo"},{"id":"sampling-frame","en":"Sampling frame","es":"Marco de muestreo","den":"An ordered list or spatial structure from which a statistical sample is selected; for agricultural surveys, an area frame or list frame is used, and can be improved with Earth Observation data.","des":"Una lista ordenada o estructura espacial de la cual se selecciona una muestra estadística; para encuestas agrícolas, se utiliza un marco de área o un marco de lista, y puede mejorarse con datos de observación de la Tierra.","lvl":7,"ord":541,"cat":"method","kind":"concept","src":"th_design_frames#outline","al":"sampling frame marco de muestreo sampling frame marco muestral"},{"id":"training-program","en":"Training program","es":"Programa de capacitación","den":"Structured course to teach skills, such as remote sensing or statistics.","des":"Curso estructurado para enseñar habilidades, como teledetección o estadísticas.","lvl":0,"ord":78,"cat":"primitive","kind":"primitive","src":"","al":"training program programa de capacitación training program programa de formación"},{"id":"sampling-strategies","en":"Sampling strategies","es":"Estrategias de muestreo","den":"Plans for selecting a subset of units from a population to make inferences; common designs include stratified random sampling to ensure representative coverage of all classes.","des":"Planes para seleccionar un subconjunto de unidades de una población para hacer inferencias; los diseños comunes incluyen el muestreo aleatorio estratificado para asegurar una cobertura representativa de todas las clases.","lvl":8,"ord":562,"cat":"method","kind":"concept","src":"th_validation#sampling-design","al":"sampling strategies estrategias de muestreo sampling strategies"},{"id":"geographic-data","en":"Geographic data","es":"Datos geográficos","den":"Data that is associated with a specific location on the Earth's surface, including satellite imagery, vector boundaries, and GPS field observations, often managed in a GIS.","des":"Datos que están asociados a una ubicación específica en la superficie de la Tierra, incluyendo imágenes satelitales, límites vectoriales y observaciones de campo con GPS, a menudo gestionados en un GIS.","lvl":3,"ord":254,"cat":"data","kind":"concept","src":"th_design_frames#technical-suitability-of-in-situ-data","al":"geographic data datos geográficos geographic data datos geoespaciales"},{"id":"data-preparation","en":"Data preparation","es":"Preparación de datos","den":"Cleaning and transforming raw data ready for analysis or modeling.","des":"Limpiar y transformar datos brutos para que estén listos para el análisis o el modelado.","lvl":0,"ord":79,"cat":"primitive","kind":"primitive","src":"","al":"data preparation preparación de datos data preparation"},{"id":"deviation","en":"Deviation","es":"Desviación","den":"Difference between an observed value and a reference or expected value.","des":"Diferencia entre un valor observado y un valor de referencia o esperado.","lvl":0,"ord":80,"cat":"primitive","kind":"primitive","src":"","al":"deviation desviación deviation desviación estándar"},{"id":"wavelength","en":"Wavelength","es":"Longitud de onda","den":"Distance between successive peaks of a wave, determining the type of radiation.","des":"Distancia entre picos sucesivos de una onda, que determina el tipo de radiación.","lvl":0,"ord":81,"cat":"primitive","kind":"primitive","src":"","al":"wavelength longitud de onda wavelength"},{"id":"chlorophyll-absorption","en":"Chlorophyll absorption","es":"Absorción de clorofila","den":"The process by which plant chlorophyll takes in light energy, predominantly in the blue and red spectral bands, used to assess vegetation health via remote sensing.","des":"El proceso por el cual la clorofila vegetal absorbe energía lumínica, predominantemente en las bandas espectrales azul y roja, utilizado para evaluar la salud de la vegetación mediante teledetección.","lvl":7,"ord":552,"cat":"phenomenon","kind":"concept","src":"","al":"chlorophyll absorption absorción de clorofila chlorophyll absorption"},{"id":"spatial-dimension","en":"Spatial dimension","es":"Dimensión espacial","den":"The physical extent or size of an area in remote sensing imagery.","des":"La extensión física o el tamaño de un área en las imágenes de teledetección.","lvl":0,"ord":82,"cat":"primitive","kind":"primitive","src":"","al":"spatial dimension dimensión espacial spatial dimension"},{"id":"strata","en":"Strata","es":"Estratos","den":"Homogeneous subgroups of a population created for sampling, within which random samples are drawn to increase estimate precision and reduce variance.","des":"Subgrupos homogéneos de una población creados para el muestreo, dentro de los cuales se extraen muestras aleatorias para aumentar la precisión de la estimación y reducir la varianza.","lvl":8,"ord":561,"cat":"statistic","kind":"concept","src":"th_validation · crop_statistics_area","al":"strata estratos strata estrato"},{"id":"gpu","en":"GPU","es":"GPU","den":"Graphics Processing Unit, used for fast parallel computation in image processing.","des":"Unidad de procesamiento gráfico, utilizada para el cálculo paralelo rápido en el procesamiento de imágenes.","lvl":0,"ord":83,"cat":"primitive","kind":"primitive","src":"","al":"gpu gpu gpu unidad de procesamiento gráfico"},{"id":"undersampling","en":"Undersampling","es":"Submuestreo","den":"A technique that reduces the number of samples from overrepresented classes to balance the training dataset, often using Self-Organizing Maps (SOM).","des":"Técnica que reduce el número de muestras de clases sobrerrepresentadas para equilibrar el conjunto de datos de entrenamiento, a menudo empleando Mapas Autoorganizados (SOM).","lvl":5,"ord":472,"cat":"method","kind":"concept","src":"th_quality_control · th_quality_control","al":"undersampling submuestreo undersampling"},{"id":"jupyter-notebook","en":"Jupyter Notebook","es":"Jupyter Notebook","den":"An interactive web-based computing environment that supports R, Python, and other languages, used for reproducible data analysis and visualization.","des":"Entorno informático interactivo basado en web que admite R, Python y otros lenguajes, utilizado para el análisis de datos reproducible y la visualización.","lvl":6,"ord":539,"cat":"software","kind":"concept","src":"howto · howto","al":"jupyter notebook jupyter notebook jupyter notebook cuaderno jupyter"},{"id":"vegetation-health","en":"Vegetation health","es":"Salud de la vegetación","den":"A measure of the physiological condition and vitality of plants, often assessed using spectral indices like NDVI and GNDVI derived from satellite imagery.","des":"Medida de la condición fisiológica y vitalidad de las plantas, a menudo evaluada mediante índices espectrales como NDVI y GNDVI derivados de imágenes satelitales.","lvl":5,"ord":495,"cat":"phenomenon","kind":"concept","src":"uav_crop_growth · uav_crop_growth","al":"vegetation health salud de la vegetación vegetation health salud vegetal"},{"id":"biomass","en":"Biomass","es":"Biomasa","den":"The total mass of living plant material in a given area, often estimated from vegetation indices or SAR backscatter, used to assess crop growth and yield.","des":"Masa total de material vegetal vivo en un área determinada, a menudo estimada a partir de índices de vegetación o retrodispersión SAR, utilizada para evaluar el crecimiento y rendimiento de cultivos.","lvl":5,"ord":498,"cat":"phenomenon","kind":"concept","src":"cy_colombia · th_remote_sensing","al":"biomass biomasa biomass"},{"id":"leaf-area-index","en":"Leaf area index","es":"Índice de área foliar","den":"The total leaf area per unit ground surface area, a key crop parameter governing photosynthesis and transpiration, estimated from remote sensing data.","des":"Área foliar total por unidad de superficie del suelo, un parámetro clave del cultivo que regula la fotosíntesis y la transpiración, estimado a partir de datos de teledetección.","lvl":7,"ord":554,"cat":"index","kind":"concept","src":"uav_wheat_growth · th_remote_sensing","al":"leaf area index índice de área foliar leaf area index iaf"},{"id":"cloud-shadow","en":"Cloud shadow","es":"Sombra de nube","den":"A dark area on the ground caused by a cloud blocking sunlight, which can obscure satellite imagery and must be masked during data processing.","des":"Área oscura en el suelo causada por una nube que bloquea la luz solar, que puede oscurecer las imágenes satelitales y debe enmascararse durante el procesamiento de datos.","lvl":3,"ord":329,"cat":"phenomenon","kind":"concept","src":"th_data_sources · th_data_cubes","al":"cloud shadow sombra de nube cloud shadow sombra de nubes"},{"id":"quality-band","en":"Quality band","es":"Banda de calidad","den":"A raster layer that provides per-pixel quality information (e.g., cloud presence, shadow, and sensor conditions) from satellite image products.","des":"Capa ráster que proporciona información de calidad por píxel (por ejemplo, presencia de nubes, sombra y condiciones del sensor) a partir de productos de imágenes satelitales.","lvl":3,"ord":323,"cat":"data","kind":"concept","src":"th_data_sources · ct_china","al":"quality band banda de calidad quality band"},{"id":"median","en":"Median","es":"Mediana","den":"Middle value in a sorted list of numbers.","des":"Valor medio en una lista ordenada de números.","lvl":0,"ord":84,"cat":"primitive","kind":"primitive","src":"","al":"median mediana median"},{"id":"false-negative","en":"False negative","es":"Falso negativo","den":"A pixel or sample incorrectly classified as not belonging to a class (e.g., crop or flood) when it actually does, representing an omission error.","des":"Píxel o muestra clasificado incorrectamente como no perteneciente a una clase (p. ej., cultivo o inundación) cuando en realidad sí pertenece, representando un error de omisión.","lvl":7,"ord":547,"cat":"metric","kind":"concept","src":"th_validation · dis_china_floods","al":"false negative falso negativo false negative"},{"id":"underestimation","en":"Underestimation","es":"Subestimación","den":"Predicted value lower than actual value.","des":"Valor predicho inferior al valor real.","lvl":0,"ord":85,"cat":"primitive","kind":"primitive","src":"","al":"underestimation subestimación underestimation"},{"id":"false-positive","en":"False positive","es":"Falso positivo","den":"A pixel or sample incorrectly classified as belonging to a class (e.g., crop or flood) when it actually does not, representing a commission error.","des":"Píxel o muestra clasificado incorrectamente como perteneciente a una clase (p. ej., cultivo o inundación) cuando en realidad no pertenece, representando un error de comisión.","lvl":7,"ord":548,"cat":"metric","kind":"concept","src":"th_validation · dis_china_floods","al":"false positive falso positivo false positive"},{"id":"overestimation","en":"Overestimation","es":"Sobreestimación","den":"Predicted value higher than actual value.","des":"Valor predicho superior al valor real.","lvl":0,"ord":86,"cat":"primitive","kind":"primitive","src":"","al":"overestimation sobreestimación overestimation"},{"id":"uncertainty","en":"Uncertainty","es":"Incertidumbre","den":"The degree of doubt or ambiguity in classification results, caused by classification errors, data limitations, or landscape variability.","des":"El grado de duda o ambigüedad en los resultados de clasificación, causado por errores de clasificación, limitaciones de datos o variabilidad del paisaje.","lvl":7,"ord":546,"cat":"metric","kind":"concept","src":"th_uncertainty · th_uncertainty","al":"uncertainty incertidumbre uncertainty"},{"id":"climate","en":"Climate","es":"Clima","den":"Long-term patterns of temperature, precipitation, and other atmospheric conditions.","des":"Patrones a largo plazo de temperatura, precipitación y otras condiciones atmosféricas.","lvl":0,"ord":87,"cat":"primitive","kind":"primitive","src":"","al":"climate clima climate"},{"id":"chance-agreement","en":"Chance agreement","es":"Acuerdo por azar","den":"The proportion of classification agreement that would be expected by random chance, used as a baseline in metrics like Cohen’s Kappa.","des":"La proporción de acuerdo en la clasificación que se esperaría por azar, utilizada como línea base en métricas como el Kappa de Cohen.","lvl":6,"ord":524,"cat":"metric","kind":"concept","src":"cy_colombia · cy_colombia","al":"chance agreement acuerdo por azar chance agreement concordancia por azar"},{"id":"zone","en":"Zone","es":"Zona","den":"A designated area or region, often used in spatial analysis.","des":"Un área o región designada, a menudo utilizada en análisis espacial.","lvl":0,"ord":88,"cat":"primitive","kind":"primitive","src":"","al":"zone zona zone"},{"id":"space-agency","en":"Space agency","es":"Agencia espacial","den":"A national or international organization responsible for space exploration, satellite development, and Earth observation programs.","des":"Una organización nacional o internacional responsable de la exploración espacial, el desarrollo de satélites y los programas de observación de la Tierra.","lvl":5,"ord":496,"cat":"organization","kind":"concept","src":"introduction · th_remote_sensing","al":"space agency agencia espacial space agency"},{"id":"segment","en":"Segment","es":"Segmento","den":"A group of contiguous pixels representing a homogeneous area (e.g., an agricultural parcel) in object-based image analysis.","des":"Un grupo de píxeles contiguos que representa un área homogénea (por ejemplo, una parcela agrícola) en el análisis de imágenes basado en objetos.","lvl":3,"ord":325,"cat":"method","kind":"concept","src":"ct_mexico · ct_poland","al":"segment segmento segment"},{"id":"drone","en":"Drone","es":"Dron","den":"An unmanned aerial vehicle used for capturing very-high-resolution imagery and crop growth data over small areas.","des":"Un vehículo aéreo no tripulado utilizado para capturar imágenes de muy alta resolución y datos de crecimiento de cultivos en áreas pequeñas.","lvl":7,"ord":557,"cat":"platform","kind":"concept","src":"uav_wheat_growth · uav_crop_growth","al":"drone dron drone vehículo aéreo no tripulado"},{"id":"atmospheric-correction","en":"Atmospheric correction","es":"Corrección atmosférica","den":"Processing that removes atmospheric scattering and absorption effects from satellite imagery to obtain surface reflectance values.","des":"Procesamiento que elimina los efectos de dispersión y absorción atmosférica de las imágenes satelitales para obtener valores de reflectancia superficial.","lvl":5,"ord":497,"cat":"method","kind":"concept","src":"th_data_sources · th_data_sources","al":"atmospheric correction corrección atmosférica atmospheric correction"},{"id":"utm-zone","en":"UTM zone","es":"zona UTM","den":"A 6-degree-wide longitudinal division of the Universal Transverse Mercator coordinate system used for accurate spatial measurements.","des":"Una división longitudinal de 6 grados de ancho del sistema de coordenadas Universal Transversal de Mercator, utilizada para mediciones espaciales precisas.","lvl":6,"ord":508,"cat":"data","kind":"concept","src":"th_data_sources · uav_agriculture_cook_islands","al":"utm zone zona utm utm zone zona de la proyección universal transversal de mercator"},{"id":"tiling-system","en":"Tiling system","es":"Sistema de teselas","den":"A spatial partition that divides the Earth's surface into regular, uniquely identified grid cells (tiles) used to organize satellite image collections, such as the MGRS grid for Sentinel-2 or the WRS-2 for Landsat, enabling consistent data management and processing.","des":"Una partición espacial que divide la superficie de la Tierra en celdas de cuadrícula regulares e identificadas de manera única (teselas) utilizadas para organizar colecciones de imágenes satelitales, como la cuadrícula MGRS para Sentinel-2 o la WRS-2 para Landsat, permitiendo una gestión y procesamiento de datos consistentes.","lvl":4,"ord":427,"cat":"data","kind":"concept","src":"th_data_sources","al":"tiling system sistema de teselas tiling system sistema de partición en teselas"},{"id":"stateless-data","en":"Stateless data","es":"Datos sin estado","den":"Data that is managed without persistent storage, state, or lifecycle management, as with OCI artifacts mounted as read-only volumes in Kubernetes sessions, enabling fast startup, automatic caching, and garbage collection without manual cleanup.","des":"Datos que se gestionan sin almacenamiento persistente, estado o ciclo de vida, como los artefactos OCI montados como volúmenes de solo lectura en sesiones de Kubernetes, lo que permite un inicio rápido, almacenamiento en caché automático y recolección de basura sin limpieza manual.","lvl":1,"ord":166,"cat":"data","kind":"concept","src":"howto","al":"stateless data datos sin estado stateless data"},{"id":"ard","en":"ARD","es":"ARD","den":"Analysis Ready Data: satellite data processed to meet standards defined by CEOS, including geometric, radiometric, and atmospheric corrections, so that images are consistent across sensors, times, and locations, with cloud and shadow masking included; prepared for direct use in analysis without further preprocessing.","des":"Datos Listos para Análisis: datos satelitales procesados para cumplir con los estándares definidos por CEOS, que incluyen correcciones geométricas, radiométricas y atmosféricas, de modo que las imágenes sean consistentes entre sensores, tiempos y ubicaciones, con enmascaramiento de nubes y sombras incluido; preparados para uso directo en análisis sin preprocesamiento adicional.","lvl":3,"ord":333,"cat":"data","kind":"concept","src":"th_data_sources","al":"ard ard ard datos listos para el análisis"},{"id":"area-frame","en":"Area frame","es":"Marco de área","den":"A sampling method based on dividing the land surface into contiguous, exhaustive area units (such as grid cells or segments), from which a probability sample is selected. It is used to estimate land cover proportions and crop areas without relying on pre-existing farmer lists.","des":"Método de muestreo que divide la superficie terrestre en unidades de área exhaustivas y contiguas (como celdas de cuadrícula o segmentos), de las cuales se selecciona una muestra probabilística. Se utiliza para estimar proporciones de cobertura del suelo y áreas de cultivo sin depender de listas preexistentes de agricultores.","lvl":8,"ord":559,"cat":"statistic","kind":"concept","src":"crop_statistics_regression","al":"area frame marco de área area frame"},{"id":"list-frame","en":"List frame","es":"Marco de lista","den":"A sampling method where the population of agricultural holdings or parcels is enumerated in a list (often from a census), and a sample is selected from that list. It typically provides one georeferenced centroid per parcel without direct area measurement.","des":"Un método de muestreo donde la población de explotaciones agrícolas o parcelas se enumera en una lista (a menudo de un censo) y se selecciona una muestra de esa lista. Por lo general, proporciona un centroide georreferenciado por parcela sin medición directa del área.","lvl":8,"ord":560,"cat":"method","kind":"concept","src":"crop_statistics_calibration","al":"list frame marco de lista list frame"},{"id":"spectral-signature","en":"Spectral signature","es":"Firma espectral","den":"The unique pattern of electromagnetic radiation reflected or emitted by a surface feature across different wavelengths. Different materials (e.g., healthy vegetation, bare soil, water) have distinct spectral signatures, enabling their identification and discrimination in remote sensing imagery.","des":"El patrón único de radiación electromagnética reflejada o emitida por una característica de la superficie a través de diferentes longitudes de onda. Diferentes materiales (por ejemplo, vegetación sana, suelo desnudo, agua) tienen firmas espectrales distintas, lo que permite su identificación y discriminación en imágenes de teledetección.","lvl":1,"ord":164,"cat":"phenomenon","kind":"concept","src":"th_remote_sensing","al":"spectral signature firma espectral spectral signature huella espectral"},{"id":"crop-yield","en":"Crop yield","es":"Rendimiento de cultivos","den":"The amount of a crop produced per unit of land area, typically expressed in kilograms per hectare or metric tons per hectare. It is a key agricultural statistic used for food security assessment, production forecasting, and policy planning.","des":"La cantidad de un cultivo producida por unidad de área de tierra, típicamente expresada en kilogramos por hectárea o toneladas métricas por hectárea. Es una estadística agrícola clave utilizada para la evaluación de la seguridad alimentaria, el pronóstico de producción y la planificación de políticas.","lvl":6,"ord":507,"cat":"statistic","kind":"concept","src":"cy_poland","al":"crop yield rendimiento de cultivos crop yield rendimiento agrícola"},{"id":"smote","en":"SMOTE","es":"SMOTE","den":"Synthetic Minority Oversampling Technique: a data augmentation method that generat
