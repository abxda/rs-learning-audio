<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Ruta de Aprendizaje — Teledetección para Estadísticas Agrícolas</title>
<style>
:root{
  --bg:#f5efe2; --panel:#efe7d6; --ink:#2b2620; --soft:#6f6657; --line:#ddd1ba;
  --accent:#9a5b2e; --accent2:#3f6f55; --chip:#e7dcc4; --link:#8a4b1f; --shadow:rgba(60,45,20,.12);
  --read: 'Iowan Old Style','Palatino Linotype','Georgia',serif;
  --ui: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
[data-theme="light"]{--bg:#ffffff;--panel:#f4f4f6;--ink:#1a1a1d;--soft:#666;--line:#e3e3e8;--chip:#ececf2;--accent:#9a5b2e;--accent2:#2f6f55;--link:#8a4b1f;--shadow:rgba(0,0,0,.08);}
[data-theme="dark"]{--bg:#14161a;--panel:#1c2026;--ink:#e7e2d6;--soft:#9aa0aa;--line:#2a2f37;--accent:#e0a86b;--accent2:#7bc4a0;--chip:#262b33;--link:#e0a86b;--shadow:rgba(0,0,0,.4);}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--ui);line-height:1.6;-webkit-text-size-adjust:100%;}
a{color:var(--link);cursor:pointer;text-decoration:none}
a:hover{text-decoration:underline}
button{font-family:var(--ui);cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:8px;padding:7px 12px;font-size:14px}
button:hover{border-color:var(--accent)}
button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
button.ghost{background:transparent}
.pill{display:inline-block;padding:1px 9px;border-radius:11px;background:var(--chip);color:var(--soft);font-size:.72rem;margin-right:5px;white-space:nowrap}
.pill.lvl{background:var(--accent2);color:#fff}

/* layout */
header{position:sticky;top:0;z-index:30;background:var(--bg);border-bottom:1px solid var(--line);
  display:flex;gap:8px;align-items:center;padding:8px 12px;flex-wrap:wrap}
header .title{font-weight:600;font-size:15px;margin-right:auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#search{flex:1;min-width:140px;padding:8px 10px;border-radius:9px;border:1px solid var(--line);background:var(--panel);color:var(--ink);font-size:14px}
.iconbtn{padding:7px 10px}

.wrap{display:flex;max-width:1180px;margin:0 auto}
#drawer{width:330px;flex-shrink:0;border-right:1px solid var(--line);height:calc(100vh - 53px);position:sticky;top:53px;overflow:auto;padding:14px;background:var(--bg)}
#main{flex:1;min-width:0;padding:26px 22px 120px;}
.reader{max-width:72ch;margin:0 auto}
.reader h1{font-family:var(--read);font-size:2rem;line-height:1.2;margin:.1em 0 .1em}
.reader h1 .es{display:block;color:var(--soft);font-size:1.25rem;font-weight:400;font-style:italic}
.def{font-family:var(--read);font-size:1.16rem;line-height:1.72;margin:1em 0}
.def.es{color:var(--soft);font-size:1.04rem;border-top:1px dashed var(--line);padding-top:.8em}
.sec{margin:1.6em 0}
.sec h3{font-size:.78rem;text-transform:uppercase;letter-spacing:.07em;color:var(--soft);margin:.2em 0 .6em;font-family:var(--ui)}
.item{padding:9px 12px;border:1px solid var(--line);border-radius:10px;margin:7px 0;background:var(--panel)}
.item .nm{font-weight:600}
.bridge{font-family:var(--read);font-size:.97rem;margin-top:4px}
.bridge .es{color:var(--soft);display:block;font-size:.9rem}
.lineage{font-size:.92rem;line-height:2.1}
.lineage .step{display:inline-block;background:var(--chip);border-radius:8px;padding:2px 8px;margin:2px 3px}
.lineage .step.cur{background:var(--accent);color:#fff}
.note{width:100%;min-height:120px;border:1px solid var(--line);border-radius:10px;padding:11px;background:var(--panel);
  color:var(--ink);font-family:var(--read);font-size:1.02rem;line-height:1.55;resize:vertical}
.savednote{font-size:.8rem;color:var(--accent2);margin-top:4px}
.audiobar{margin:.6em 0}
.audiobar button{padding:6px 12px;margin-right:6px}
#autoBtn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
#karaoke{display:none;margin:0 auto 18px;max-width:72ch;padding:14px 16px;background:var(--panel);
  border:1px solid var(--line);border-radius:12px;font-family:var(--read);font-size:1.3rem;line-height:2}
#karaoke.on{display:block}
#karaoke .kw{cursor:pointer;border-radius:6px;padding:0 2px;transition:none}
#karaoke .kw.cur{background:var(--accent);color:#fff}
#karaoke .kw.done{color:var(--soft)}
#karaoke .lead{font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--soft);
  font-family:var(--ui);display:block;margin-bottom:6px}
/* ---- home / cover ---- */
#home{max-width:1000px;margin:0 auto}
#home h1{font-family:var(--read);font-size:2rem;margin:.1em 0}
#home .sub{color:var(--soft);font-size:1.05rem;margin:.2em 0 1.2em;max-width:70ch}
.minimap{width:100%;max-width:760px;margin:0 auto 18px;display:block;background:var(--panel);
  border:1px solid var(--line);border-radius:14px}
.mm-dot{cursor:pointer}
.mm-label{font-family:var(--ui);font-weight:600;paint-order:stroke;stroke:var(--bg);stroke-width:3.5px;cursor:pointer}
.mm-here{fill:none;stroke:var(--ink);stroke-width:1.6}
.mm-here-txt{fill:var(--ink);font-family:var(--ui);font-weight:700}
.themes{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}
.tcard{border:1px solid var(--line);border-radius:12px;padding:13px 14px;background:var(--panel);
  cursor:pointer;display:flex;flex-direction:column;gap:6px;transition:none}
.tcard:hover{border-color:var(--accent)}
.tcard .tt{font-weight:700;font-size:1.05rem;display:flex;align-items:center;gap:7px}
.tcard .sw{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.tcard .tes{color:var(--soft);font-size:.85rem;font-style:italic}
.tcard .td{font-size:.9rem;line-height:1.45}
.tcard .pg{height:6px;background:var(--chip);border-radius:4px;overflow:hidden;margin-top:auto}
.tcard .pg i{display:block;height:100%;background:var(--accent2)}
.tcard .meta{font-size:.74rem;color:var(--soft);display:flex;justify-content:space-between}
.tcard.done{border-color:var(--accent2)}

/* drawer sections */
.dh{font-size:.74rem;text-transform:uppercase;letter-spacing:.06em;color:var(--soft);margin:14px 0 6px}
.res{padding:8px 10px;border-radius:9px;cursor:pointer;border:1px solid transparent}
.res:hover{background:var(--panel);border-color:var(--line)}
.res .meta{font-size:.74rem;color:var(--soft)}
.route{padding:9px 10px;border:1px solid var(--line);border-radius:10px;margin:6px 0;background:var(--panel)}
.route.active{border-color:var(--accent)}
.route .bar{height:6px;background:var(--chip);border-radius:4px;overflow:hidden;margin-top:6px}
.route .bar i{display:block;height:100%;background:var(--accent2)}
.lvlgroup{margin:2px 0 6px}
.lvlgroup summary{cursor:pointer;font-size:.84rem;color:var(--ink);padding:4px 0}

/* compass / bottom bar */
#compass{position:fixed;left:0;right:0;bottom:0;z-index:40;background:var(--panel);border-top:1px solid var(--line);
  box-shadow:0 -4px 14px var(--shadow);padding:8px 12px;display:none}
#compass .row{max-width:900px;margin:0 auto;display:flex;align-items:center;gap:10px}
#compass .lbl{flex:1;min-width:0;font-size:.86rem}
#compass .lbl b{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#compass .bar{height:6px;background:var(--chip);border-radius:4px;overflow:hidden;margin-top:4px}
#compass .bar i{display:block;height:100%;background:var(--accent)}
.offbanner{background:var(--accent);color:#fff;border-radius:9px;padding:8px 12px;margin:0 0 14px;display:flex;
  gap:10px;align-items:center;flex-wrap:wrap}
.offbanner button{background:#fff;color:var(--accent);border:none}

.hidden{display:none!important}
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:25;display:none}
@media(max-width:820px){
  #drawer{position:fixed;left:0;top:53px;z-index:28;box-shadow:4px 0 18px var(--shadow);transform:translateX(-105%);transition:transform .18s}
  #drawer.open{transform:none}
  .scrim.open{display:block}
  #main{padding:18px 15px 130px}
  .reader h1{font-size:1.65rem}
}
@media(min-width:821px){ #drawer.collapsed{display:none} }
@media print{header,#drawer,#compass,.note{display:none}}
</style>
</head>
<body>
<header>
  <button class="iconbtn ghost" id="menuBtn" title="Menú" aria-label="Menú">☰</button>
  <button class="iconbtn ghost" id="homeBtn" title="Inicio · mapa de temas">🏠</button>
  <span class="title">📡 Ruta de Aprendizaje · Teledetección Agrícola</span>
  <input id="search" placeholder="Buscar concepto / search…" autocomplete="off">
  <button class="iconbtn ghost" id="themeBtn" title="Tema">◐</button>
  <button class="iconbtn ghost" id="langBtn" title="Idioma de lectura">EN/ES</button>
  <button class="iconbtn ghost" id="autoBtn" title="Modo automático: lee en voz de lo básico a lo avanzado">▶🔊</button>
  <select id="modelSel" title="Modelo de voz (TTS)" style="padding:6px 8px;border-radius:8px;border:1px solid var(--line);background:var(--panel);color:var(--ink);font-size:13px"></select>
  <button class="iconbtn ghost" id="exportBtn" title="Guardar / exportar memoria">⬇</button>
  <button class="iconbtn ghost" id="importBtn" title="Cargar memoria">⬆</button>
  <input type="file" id="importFile" accept="application/json" class="hidden">
</header>

<div class="scrim" id="scrim"></div>
<div class="wrap">
  <aside id="drawer">
    <div id="searchResults"></div>
    <div id="routesPanel"></div>
    <div id="browse"></div>
  </aside>
  <main id="main"><div id="home" class="hidden"></div><div id="karaoke"></div><div class="reader" id="reader"></div></main>
</div>

<div id="compass"><div class="row">
  <button id="prevBtn" title="Anterior">◀ Ant.</button>
  <div class="lbl"><b id="compassLbl">—</b><div class="bar"><i id="compassBar"></i></div></div>
  <button id="returnBtn" class="ghost" title="Volver a mi ruta">🧭 Mi ruta</button>
  <button id="nextBtn" class="primary" title="Siguiente">Sig. ▶</button>
</div></div>
<audio id="player" preload="none"></audio>

<script>
const DATA = {"meta":{"title":"UN Handbook on Remote Sensing for Agricultural Statistics","stats":{"nodes":564,"concepts":499,"primitives":65,"edges":1437,"prereq_edges":883,"dropped":5,"max_level":9},"models":[{"id":"xtts","label":"XTTS v2 · Damien Black","count":1128},{"id":"qwen","label":"Qwen3-TTS · Ryan","count":1128}],"clustering":{"method":"kmeans","k":14,"silhouette":0.082}},"nodes":[{"id":"data","en":"Data","es":"Datos","den":"Factual information from Earth observation, surveys, or sensors used as input for processing and analysis, such as satellite imagery or ground measurements.","des":"Información factual de la observación de la Tierra, encuestas o sensores utilizada como entrada para procesamiento y análisis, como imágenes satelitales o mediciones de campo.","lvl":0,"ord":0,"cat":"primitive","kind":"concept","src":"index","al":"data datos data data"},{"id":"crop","en":"Crop","es":"Cultivo","den":"A cultivated plant grown for food, feed, or other uses, whose type, planted area, and yield are targets of agricultural statistics.","des":"Planta cultivada para alimento, forraje u otros usos, cuyo tipo, área sembrada y rendimiento son objetivos de las estadísticas agrícolas.","lvl":0,"ord":1,"cat":"phenomenon","kind":"concept","src":"introduction","al":"crop cultivo crop crops"},{"id":"model","en":"Model","es":"Modelo","den":"A mathematical or algorithmic representation trained on data to perform tasks such as classifying land cover or predicting crop yield.","des":"Representación matemática o algorítmica entrenada con datos para realizar tareas como clasificar cobertura del suelo o predecir rendimiento de cultivos.","lvl":0,"ord":2,"cat":"method","kind":"concept","src":"th_machine_learning","al":"model modelo model"},{"id":"area","en":"Area","es":"Área","den":"The spatial extent of land, crop cover, or other geographic feature, often measured in hectares or square meters for statistical estimation.","des":"Extensión espacial de tierra, cobertura de cultivo u otro atributo geográfico, a menudo medida en hectáreas o metros cuadrados para estimación estadística.","lvl":0,"ord":3,"cat":"metric","kind":"concept","src":"th_validation","al":"area área area"},{"id":"classes","en":"Classes","es":"Clases","den":"Discrete categories or labels assigned to pixels or parcels in a classification scheme, such as crop types or land cover types.","des":"Categorías discretas o etiquetas asignadas a píxeles o parcelas en un esquema de clasificación, como tipos de cultivos o tipos de cobertura del suelo.","lvl":0,"ord":4,"cat":"data","kind":"concept","src":"th_lucc","al":"classes clases classes class"},{"id":"samples","en":"Samples","es":"Muestras","den":"Individual observations with known labels used to train or validate machine learning models, typically consisting of spectral and temporal data.","des":"Observaciones individuales con etiquetas conocidas utilizadas para entrenar o validar modelos de aprendizaje automático, que consisten típicamente en datos espectrales y temporales.","lvl":1,"ord":128,"cat":"data","kind":"concept","src":"th_quality_control","al":"samples muestras samples sample"},{"id":"classification","en":"Classification","es":"Clasificación","den":"The process of assigning a class label to each pixel or object in satellite imagery based on spectral, temporal, or spatial characteristics using algorithms.","des":"Proceso de asignar una etiqueta de clase a cada píxel u objeto en imágenes satelitales basado en características espectrales, temporales o espaciales mediante algoritmos.","lvl":2,"ord":195,"cat":"method","kind":"concept","src":"th_machine_learning","al":"classification clasificación classification hierarchical classification"},{"id":"images","en":"Images","es":"Imágenes","den":"Digital representations of the Earth's surface captured by satellite sensors, composed of multiple spectral bands used for analysis.","des":"Representaciones digitales de la superficie de la Tierra capturadas por sensores satelitales, compuestas por múltiples bandas espectrales utilizadas para análisis.","lvl":0,"ord":5,"cat":"data","kind":"concept","src":"th_remote_sensing","al":"images imágenes images"},{"id":"map","en":"Map","es":"Mapa","den":"A thematic spatial representation, such as a crop type or land cover map, produced by classifying satellite imagery to show geographic distribution.","des":"Representación espacial temática, como un mapa de tipos de cultivo o cobertura del suelo, producida clasificando imágenes satelitales para mostrar distribución geográfica.","lvl":3,"ord":273,"cat":"product","kind":"concept","src":"th_validation","al":"map mapa map"},{"id":"accuracy","en":"Accuracy","es":"Exactitud","den":"A metric of how correctly a classification or estimation matches reality, typically quantified as overall accuracy and per-class user's and producer's accuracy.","des":"Métrica de cuán correctamente una clasificación o estimación coincide con la realidad, típicamente cuantificada como precisión general y precisión del usuario y productor por clase.","lvl":2,"ord":196,"cat":"metric","kind":"concept","src":"th_validation","al":"accuracy exactitud accuracy"},{"id":"land","en":"Land","es":"Tierra","den":"The Earth's surface, including its cover (vegetation, water) and use (agriculture, urban), which is classified and monitored for environmental and statistical purposes.","des":"Superficie de la Tierra, incluyendo su cobertura (vegetación, agua) y uso (agricultura, urbano), que se clasifica y monitorea para fines ambientales y estadísticos.","lvl":1,"ord":127,"cat":"phenomenon","kind":"concept","src":"th_lucc","al":"land tierra land"},{"id":"dataset","en":"Dataset","es":"Conjunto de datos","den":"A structured collection of data, such as satellite image collections, ground survey records, or tabular statistics, used together in analysis.","des":"Colección estructurada de datos, como colecciones de imágenes satelitales, registros de encuestas de campo o estadísticas tabulares, utilizada conjuntamente en análisis.","lvl":1,"ord":107,"cat":"data","kind":"concept","src":"th_data_sources","al":"dataset conjunto de datos dataset"},{"id":"time","en":"Time","es":"Tiempo","den":"The temporal dimension in satellite image time series, enabling detection of change, phenology, and trends through repeated observations.","des":"Dimensión temporal en series temporales de imágenes satelitales, que permite la detección de cambios, fenología y tendencias mediante observaciones repetidas.","lvl":0,"ord":6,"cat":"primitive","kind":"concept","src":"th_data_cubes","al":"time tiempo time"},{"id":"analysis","en":"Analysis","es":"Análisis","den":"The systematic examination of data to extract information, such as classifying images or estimating crop area and yield using statistical or machine-learning methods.","des":"Examen sistemático de datos para extraer información, como clasificar imágenes o estimar área de cultivo y rendimiento usando métodos de aprendizaje automático.","lvl":2,"ord":231,"cat":"method","kind":"concept","src":"th_machine_learning","al":"analysis análisis analysis"},{"id":"satellite","en":"Satellite","es":"Satélite","den":"An artificial object orbiting Earth that carries sensors to collect imagery and measurements for Earth observation and agricultural monitoring.","des":"Un objeto artificial que orbita la Tierra y lleva sensores para recopilar imágenes y mediciones para la observación de la Tierra y el monitoreo agrícola.","lvl":1,"ord":130,"cat":"platform","kind":"concept","src":"th_remote_sensing","al":"satellite satélite satellite commercial satellite"},{"id":"results","en":"Results","es":"Resultados","den":"Outputs of data processing or analysis, such as classified maps, accuracy metrics, or area estimates, used for reporting and decision-making.","des":"Resultados del procesamiento o análisis de datos, como mapas clasificados, métricas de precisión o estimaciones de área, utilizados para informes y toma de decisiones.","lvl":0,"ord":7,"cat":"primitive","kind":"concept","src":"th_validation","al":"results resultados results"},{"id":"field","en":"Field","es":"Campo","den":"An area of land cultivated with a single crop or managed as a unit, typically delineated as a polygon in geospatial data for analysis.","des":"Un área de tierra cultivada con un solo cultivo o gestionada como una unidad, típicamente delimitada como un polígono en datos geoespaciales para análisis.","lvl":2,"ord":189,"cat":"phenomenon","kind":"concept","src":"th_parcel_extraction","al":"field campo field"},{"id":"methods","en":"Methods","es":"Métodos","den":"The techniques and procedures used in the handbook, including data acquisition, preprocessing, classification, validation, and estimation.","des":"Las técnicas y procedimientos utilizados en el manual, incluidos la adquisición de datos, el preprocesamiento, la clasificación, la validación y la estimación.","lvl":1,"ord":144,"cat":"method","kind":"concept","src":"introduction","al":"methods métodos methods method"},{"id":"chapter","en":"Chapter","es":"Capítulo","den":"A major section of the handbook focusing on a specific topic within remote sensing for agricultural statistics.","des":"Una sección principal del manual que se centra en un tema específico dentro de la teledetección para estadísticas agrícolas.","lvl":0,"ord":8,"cat":"primitive","kind":"concept","src":"index#main-sections-and-key-topics","al":"chapter capítulo chapter"},{"id":"pixels","en":"Pixels","es":"Píxeles","den":"The smallest discrete units in satellite imagery, each representing a specific land area and containing spectral reflectance values.","des":"Las unidades discretas más pequeñas en las imágenes satelitales, cada una representa un área de tierra específica y contiene valores de reflectancia espectral.","lvl":1,"ord":131,"cat":"data","kind":"concept","src":"th_data_cubes#working-with-satellite-image-time-series","al":"pixels píxeles pixels pixel"},{"id":"training","en":"Training","es":"Entrenamiento","den":"The process of fitting a machine learning model to labeled samples so it can learn to classify new data.","des":"El proceso de ajustar un modelo de aprendizaje automático a muestras etiquetadas para que pueda aprender a clasificar nuevos datos.","lvl":2,"ord":197,"cat":"method","kind":"concept","src":"th_quality_control#outline","al":"training entrenamiento training"},{"id":"regions","en":"Regions","es":"Regiones","den":"Geographic areas, often defined by administrative boundaries or agro-ecological zones, used as study areas or for stratification.","des":"Áreas geográficas, a menudo definidas por límites administrativos o zonas agroecológicas, utilizadas como áreas de estudio o para estratificación.","lvl":1,"ord":125,"cat":"phenomenon","kind":"concept","src":"ct_chile#study-area","al":"regions regiones regions geographic region"},{"id":"system","en":"System","es":"Sistema","den":"A structured set of methods, tools, and workflows designed to perform a specific task, such as crop mapping or yield forecasting.","des":"Un conjunto estructurado de métodos, herramientas y flujos de trabajo diseñados para realizar una tarea específica, como el mapeo de cultivos o el pronóstico de rendimiento.","lvl":0,"ord":9,"cat":"other","kind":"concept","src":"cy_poland#introduction","al":"system sistema system"},{"id":"approach","en":"Approach","es":"Enfoque","den":"A methodology or strategy used to achieve a goal, such as 'time-first, space-later' or object-based image analysis.","des":"Una metodología o estrategia utilizada para lograr un objetivo, como 'primero el tiempo, luego el espacio' o el análisis de imágenes basado en objetos.","lvl":2,"ord":232,"cat":"primitive","kind":"concept","src":"th_data_cubes#time-first-space-later","al":"approach enfoque approach"},{"id":"statistics","en":"Statistics","es":"Estadísticas","den":"Quantitative measures derived from remote sensing data, such as crop area, yield estimates, or accuracy metrics, used for official reporting.","des":"Medidas cuantitativas derivadas de datos de teledetección, como el área de cultivo, las estimaciones de rendimiento o las métricas de precisión, utilizadas para informes oficiales.","lvl":1,"ord":108,"cat":"statistic","kind":"concept","src":"th_validation#introduction","al":"statistics estadísticas statistics statistics statistic"},{"id":"mapping","en":"Mapping","es":"Mapeo","den":"The process of producing thematic maps, such as crop type or land cover maps, from remote sensing data.","des":"El proceso de producir mapas temáticos, como mapas de tipos de cultivo o de cobertura del suelo, a partir de datos de teledetección.","lvl":4,"ord":368,"cat":"method","kind":"concept","src":"ct_zimbabwe#crop-classification","al":"mapping mapeo mapping"},{"id":"imagery","en":"Imagery","es":"Imágenes","den":"Data collected by satellite sensors, including optical and radar images, used to observe the Earth's surface.","des":"Datos recopilados por sensores satelitales, incluyendo imágenes ópticas y de radar, utilizados para observar la superficie de la Tierra.","lvl":1,"ord":132,"cat":"data","kind":"concept","src":"th_remote_sensing#introduction-to-remote-sensing-imagery","al":"imagery imágenes imagery digital imagery"},{"id":"figure","en":"Figure","es":"Figura","den":"A visual element in the handbook, such as a diagram, map, or photograph, used to illustrate concepts or results.","des":"Un elemento visual en el manual, como un diagrama, mapa o fotografía, utilizado para ilustrar conceptos o resultados.","lvl":1,"ord":141,"cat":"primitive","kind":"concept","src":"howto#rendered-output","al":"figure figura figure"},{"id":"use","en":"Use","es":"Uso","den":"The application of remote sensing data for a specific purpose, such as agricultural statistics or disaster monitoring.","des":"La aplicación de datos de teledetección para un propósito específico, como estadísticas agrícolas o monitoreo de desastres.","lvl":0,"ord":10,"cat":"primitive","kind":"concept","src":"introduction#improving-the-use-of-eo al":"processing procesamiento processing tratamiento de datos"},{"id":"data-science","en":"Data Science","es":"Ciencia de Datos","den":"Data science is an interdisciplinary field that uses statistical and computational methods to extract insights from data. In this handbook, it underpins machine learning and deep learning approaches for analyzing satellite image time series.","des":"La Ciencia de Datos es un campo interdisciplinario que utiliza métodos estadísticos y computacionales para extraer información de los datos. En este manual, sustenta los enfoques de aprendizaje automático y aprendizaje profundo para analizar series temporales de imágenes satelitales.","lvl":4,"ord":392,"cat":"primitive","kind":"concept","src":"th_machine_learning","al":"data science ciencia de datos big data data science data science data scientist"},{"id":"land-classification","en":"Land classification","es":"Clasificación de tierras","den":"Land classification is the process of assigning semantic labels to pixels or objects in satellite imagery based on their spectral, temporal, or spatial characteristics, distinguishing land cover or land use categories.","des":"La clasificación de tierras es el proceso de asignar etiquetas semánticas a píxeles u objetos en imágenes satelitales basándose en sus características espectrales, temporales o espaciales, distinguiendo categorías de cobertura del suelo o uso del suelo.","lvl":5,"ord":489,"cat":"method","kind":"concept","src":"th_lucc","al":"land classification clasificación de tierras land classification clasificación del suelo clasificación de cobertura terrestre"},{"id":"reference","en":"Reference","es":"Referencia","den":"Reference data are ground-truth observations used to train and validate classification models. They include field surveys, photo-interpreted samples, or administrative records that provide accurate labels for land cover or crop types.","des":"Los datos de referencia son observaciones de verdad terreno utilizadas para entrenar y validar modelos de clasificación. Incluyen encuestas de campo, muestras fotointerpretadas o registros administrativos que proporcionan etiquetas precisas para la cobertura del suelo o tipos de cultivos.","lvl":2,"ord":200,"cat":"primitive","kind":"concept","src":"th_quality_control","al":"reference referencia reference dato de referencia referencia de campo"},{"id":"agricultural-statistical-systems","en":"Agricultural statistical systems","es":"Sistemas estadísticos agrícolas","den":"Agricultural statistical systems are the institutional frameworks and processes used by National Statistical Offices to collect, process, and disseminate official data on crop areas, yields, and production, increasingly integrating Earth Observation data.","des":"Los sistemas estadísticos agrícolas son los marcos institucionales y procesos utilizados por las Oficinas Nacionales de Estadística para recopilar, procesar y difundir datos oficiales sobre áreas de cultivo, rendimientos y producción, integrando cada vez más datos de observación de la Tierra.","lvl":5,"ord":437,"cat":"system","kind":"concept","src":"introduction","al":"agricultural statistical systems sistemas estadísticos agrícolas agricultural statistical systems sistemas de estadísticas agropecuarias"},{"id":"table","en":"Table","es":"Tabla","den":"A table is a structured arrangement of data in rows and columns. In the sits package, a tibble (a type of table) stores time series samples with metadata such as labels, coordinates, and temporal observations.","des":"Una tabla es una disposición estructurada de datos en filas y columnas. En el paquete sits, un tibble (un tipo de tabla) almacena muestras de series temporales con metadatos como etiquetas, coordenadas y observaciones temporales.","lvl":1,"ord":154,"cat":"primitive","kind":"concept","src":"th_data_cubes","al":"table tabla table cuadro"},{"id":"crop-classification-models","en":"Crop classification models","es":"Modelos de clasificación de cultivos","den":"Crop classification models are machine learning algorithms trained to identify crop types from satellite image time series. Examples include Random Forest, XGBoost, and deep learning architectures like TempCNN and ResNet.","des":"Los modelos de clasificación de cultivos son algoritmos de aprendizaje automático entrenados para identificar tipos de cultivos a partir de series temporales de imágenes satelitales. Ejemplos incluyen Random Forest, XGBoost y arquitecturas de aprendizaje profundo como TempCNN y ResNet.","lvl":4,"ord":393,"cat":"model","kind":"concept","src":"th_machine_learning","al":"crop classification models modelos de clasificación de cultivos classification model crop classification models classification models modelos clasificadores de cultivos"},{"id":"large-scale-agricultural-monitoring","en":"Large scale agricultural monitoring","es":"Monitoreo agrícola a gran escala","den":"Large-scale agricultural monitoring uses satellite imagery and automated methods to track crop conditions, planted areas, and yields across extensive regions, often at national or continental scales, supporting food security and policy decisions.","des":"El monitoreo agrícola a gran escala utiliza imágenes satelitales y métodos automatizados para rastrear las condiciones de cultivos, áreas sembradas y rendimientos en regiones extensas, a menudo a escala nacional o continental, apoyando la seguridad alimentaria y las decisiones políticas.","lvl":3,"ord":260,"cat":"method","kind":"concept","src":"introduction","al":"large scale agricultural monitoring monitoreo agrícola a gran escala large scale agricultural monitoring vigilancia agrícola de gran escala"},{"id":"design","en":"Design","es":"Diseño","den":"Design refers to the planning of sampling strategies, classification schemes, and data collection protocols to ensure statistically valid and operationally feasible agricultural statistics from Earth Observation data.","des":"El diseño se refiere a la planificación de estrategias de muestreo, esquemas de clasificación y protocolos de recolección de datos para garantizar estadísticas agrícolas estadísticamente válidas y operativamente factibles a partir de datos de observación de la Tierra.","lvl":3,"ord":288,"cat":"method","kind":"concept","src":"th_design_frames","al":"design diseño design diseño muestral diseño de encuesta"},{"id":"resources","en":"Resources","es":"Recursos","den":"Resources are the computational, financial, and human assets required for Earth Observation-based agricultural statistics, including cloud computing, satellite data access, trained personnel, and software tools.","des":"Los recursos son los activos computacionales, financieros y humanos requeridos para las estadísticas agrícolas basadas en observación de la Tierra, incluyendo computación en la nube, acceso a datos satelitales, personal capacitado y herramientas de software.","lvl":1,"ord":118,"cat":"primitive","kind":"concept","src":"howto","al":"resources recursos resources recursos disponibles"},{"id":"crop-mapping","en":"Crop mapping","es":"Mapeo de cultivos","den":"Crop mapping is the process of generating spatial maps that show the distribution of different crop types across a landscape, typically using satellite imagery and machine learning classification.","des":"El mapeo de cultivos es el proceso de generar mapas espaciales que muestran la distribución de diferentes tipos de cultivos en un paisaje, típicamente utilizando imágenes satelitales y clasificación de aprendizaje automático.","lvl":5,"ord":451,"cat":"method","kind":"concept","src":"ct_zimbabwe","al":"crop mapping mapeo de cultivos agricultural mapping crop mapping global crop mapping cartografía de cultivos"},{"id":"data-analysis","en":"Data Analysis","es":"Análisis de datos","den":"Data analysis involves examining, cleaning, transforming, and modeling data to discover useful information and support decision-making. In this handbook, it refers to statistical and machine learning techniques applied to satellite time series.","des":"El análisis de datos implica examinar, limpiar, transformar y modelar datos para descubrir información útil y apoyar la toma de decisiones. En este manual, se refiere a técnicas estadísticas y de aprendizaje automático aplicadas a series temporales satelitales.","lvl":3,"ord":340,"cat":"method","kind":"concept","src":"th_machine_learning","al":"data analysis análisis de datos data analysis análisis de información"},{"id":"land-use-mapping","en":"Land use mapping","es":"Mapeo de uso del suelo","den":"Land use mapping classifies land according to its socioeconomic function, such as agriculture, forestry, or urban areas, using satellite imagery and ancillary data. It differs from land cover mapping by inferring human activity.","des":"El mapeo de uso del suelo clasifica la tierra según su función socioeconómica, como agricultura, silvicultura o áreas urbanas, utilizando imágenes satelitales y datos auxiliares. Se diferencia del mapeo de cobertura terrestre al inferir la actividad humana.","lvl":5,"ord":452,"cat":"method","kind":"concept","src":"th_lucc","al":"land use mapping mapeo de uso del suelo land use mapping cartografía de uso del suelo"},{"id":"satellite-imagery","en":"Satellite imagery","es":"Imágenes satelitales","den":"Satellite imagery refers to data collected by sensors mounted on satellite platforms that capture electromagnetic radiation reflected or emitted from the Earth's surface, used for observing and analyzing land cover and crop conditions.","des":"Las imágenes satelitales se refieren a datos recolectados por sensores montados en plataformas satelitales que capturan la radiación electromagnética reflejada o emitida desde la superficie de la Tierra, utilizadas para observar y analizar la cobertura del suelo y las condiciones de cultivo.","lvl":4,"ord":411,"cat":"data","kind":"concept","src":"th_remote_sensing","al":"satellite imagery imágenes satelitales satellite imagery satellite image imágenes de satélite"},{"id":"ndvi","en":"NDVI","es":"NDVI","den":"The Normalized Difference Vegetation Index (NDVI) is a spectral index calculated from near-infrared and red reflectance that indicates vegetation vigor and density. It is widely used for crop monitoring and phenology analysis.","des":"El Índice de Vegetación de Diferencia Normalizada (NDVI) es un índice espectral calculado a partir de la reflectancia del infrarrojo cercano y la reflectancia roja que indica el vigor y la densidad de la vegetación. Es ampliamente utilizado para el monitoreo de cultivos y el análisis de fenología.","lvl":4,"ord":419,"cat":"index","kind":"concept","src":"th_remote_sensing","al":"ndvi ndvi ndvi ndwi índice de vegetación de diferencia normalizada"},{"id":"national-datasets","en":"National datasets","es":"Conjuntos de datos nacionales","den":"National datasets are collections of geospatial or statistical data covering an entire country, such as crop type maps, land cover classifications, or agricultural survey results, often produced by National Statistical Offices.","des":"Los conjuntos de datos nacionales son colecciones de datos geoespaciales o estadísticos que cubren un país entero, como mapas de tipos de cultivo, clasificaciones de cobertura del suelo o resultados de encuestas agrícolas, a menudo producidos por las Oficinas Nacionales de Estadística.","lvl":2,"ord":172,"cat":"data","kind":"concept","src":"ct_zimbabwe","al":"national datasets conjuntos de datos nacionales national datasets datos nacionales"},{"id":"training-dataset","en":"Training dataset","es":"Conjunto de datos de entrenamiento","den":"A training dataset is a set of labeled samples used to teach a machine learning model to recognize patterns. In remote sensing, it consists of satellite image time series with known land cover or crop type labels.","des":"Un conjunto de datos de entrenamiento es un conjunto de muestras etiquetadas utilizado para enseñar a un modelo de aprendizaje automático a reconocer patrones. En teledetección, consiste en series temporales de imágenes satelitales con etiquetas conocidas de cobertura del suelo o tipo de cultivo.","lvl":3,"ord":301,"cat":"data","kind":"concept","src":"th_quality_control","al":"training dataset conjunto de datos de entrenamiento training dataset training data datos de entrenamiento"},{"id":"extensive-ground-samples","en":"Extensive ground samples","es":"Muestras extensivas de campo","den":"Extensive ground samples refer to a large number of field observations collected across a study area to train and validate classification models, ensuring representativeness and reducing bias in crop type mapping.","des":"Las muestras extensivas de campo se refieren a un gran número de observaciones de campo recolectadas en un área de estudio para entrenar y validar modelos de clasificación, asegurando representatividad y reduciendo el sesgo en el mapeo de tipos de cultivo.","lvl":4,"ord":407,"cat":"data","kind":"concept","src":"ct_china","al":"extensive ground samples muestras extensivas de campo extensive ground samples muestras de campo extensivas"},{"id":"layers","en":"Layers","es":"Capas","den":"Layers are the individual spectral bands or derived data components in a satellite image collection, each capturing light in a specific wavelength range. Multiple layers form a multi-spectral image used for analysis.","des":"Las capas son las bandas espectrales individuales o componentes de datos derivados en una colección de imágenes satelitales, cada una capturando luz en un rango de longitud de onda específico. Múltiples capas forman una imagen multiespectral utilizada para el análisis.","lvl":1,"ord":134,"cat":"data","kind":"concept","src":"th_remote_sensing","al":"layers capas layers"},{"id":"spatial-datasets","en":"Spatial datasets","es":"Conjuntos de datos espaciales","den":"Spatial datasets are georeferenced collections of Earth observation data, such as satellite imagery, land cover maps, and environmental variables, organized for analysis over a defined geographic area and often provided through cloud platforms.","des":"Los conjuntos de datos espaciales son colecciones georreferenciadas de datos de observación de la Tierra, como imágenes satelitales, mapas de cobertura del suelo y variables ambientales, organizadas para su análisis en un área geográfica definida y a menudo proporcionadas a través de plataformas en la nube.","lvl":4,"ord":355,"cat":"data","kind":"concept","src":"ct_digital_earth_africa","al":"spatial datasets conjuntos de datos espaciales spatial datasets spatial data datos espaciales"},{"id":"crop-type-map","en":"Crop type map","es":"Mapa de tipos de cultivo","den":"A crop-type map is a thematic map assigning each pixel or field parcel to a specific crop category, produced by classifying satellite image time series with machine learning algorithms trained on reference data.","des":"Un mapa de tipos de cultivo es un mapa temático que asigna cada píxel o parcela de campo a una categoría de cultivo específica, producido mediante la clasificación de series temporales de imágenes satelitales con algoritmos de aprendizaje automático entrenados en datos de referencia.","lvl":0,"ord":15,"cat":"product","kind":"concept","src":"ct_poland","al":"crop type map mapa de tipos de cultivo crop maps crop type map national crop type map crop type maps mapa de cultivos"},{"id":"research","en":"Research","es":"Investigación","den":"Research refers to scientific investigation conducted by academic and institutional experts to develop, test, and advance remote sensing methods for agricultural statistics, distinguishing methodological innovation from operational implementation.","des":"La investigación se refiere a la investigación científica realizada por expertos académicos e institucionales para desarrollar, probar y avanzar en métodos de teledetección para estadísticas agrícolas, distinguiendo la innovación metodológica de la implementación operativa.","lvl":2,"ord":239,"cat":"primitive","kind":"concept","src":"introduction","al":"research investigación research estudio"},{"id":"predictions","en":"Predictions","es":"Predicciones","den":"Predictions are estimated values of agricultural quantities, such as yield or area, generated by satellite-derived models or maps. They require calibration with ground-truth data to correct bias and produce statistically valid estimates.","des":"Las predicciones son valores estimados de cantidades agrícolas, como el rendimiento o el área, generados por modelos o mapas derivados de satélite. Requieren calibración con datos de verdad terreno para corregir el sesgo y producir estimaciones estadísticamente válidas.","lvl":1,"ord":122,"cat":"product","kind":"concept","src":"crop_statistics_ppi","al":"predictions predicciones predictions prediction pronósticos"},{"id":"classification-accuracy","en":"Classification accuracy","es":"Precisión de clasificación","den":"Classification accuracy quantifies the degree to which a classification map matches reference data, measured by metrics such as overall accuracy, user's accuracy, producer's accuracy, and F1-score from a confusion matrix.","des":"La precisión de clasificación cuantifica el grado en que un mapa de clasificación coincide con los datos de referencia, medido mediante métricas como la precisión general, la precisión del usuario, la precisión del productor y la puntuación F1 a partir de una matriz de confusión.","lvl":3,"ord":291,"cat":"metric","kind":"concept","src":"th_validation","al":"classification accuracy precisión de clasificación classification accuracy exactitud de clasificación"},{"id":"cropland","en":"Cropland","es":"Tierras de cultivo","den":"Cropland is land used for cultivating crops, including both actively farmed fields and temporarily fallow areas. It is a fundamental land cover class in agricultural monitoring and crop type mapping.","des":"Las tierras de cultivo son tierras utilizadas para el cultivo de cultivos, incluyendo tanto campos cultivados activamente como áreas temporalmente en barbecho. Es una clase fundamental de cobertura del suelo en el monitoreo agrícola y el mapeo de tipos de cultivo.","lvl":2,"ord":191,"cat":"phenomenon","kind":"concept","src":"th_lucc","al":"cropland tierras de cultivo cropland área cultivada"},{"id":"area-estimation","en":"Area estimation","es":"Estimación de área","den":"Area estimation is a statistical method to quantify the extent of land covered by a specific crop or land use, using sample-based estimators and bias correction from confusion matrices to produce unbiased estimates with confidence intervals.","des":"La estimación de área es un método estadístico para cuantificar la extensión de tierra cubierta por un cultivo o uso del suelo específico, utilizando estimadores basados en muestras y corrección de sesgo a partir de matrices de confusión para producir estimaciones insesgadas con intervalos de confianza.","lvl":4,"ord":350,"cat":"method","kind":"concept","src":"crop_statistics_area","al":"area estimation estimación de área accurate area estimation area estimation crop area estimation estimación de superficie"},{"id":"crop-classification","en":"Crop classification","es":"Clasificación de cultivos","den":"Crop classification is the process of assigning crop type labels to satellite image pixels or field parcels using machine learning algorithms trained on reference data, enabling production of crop-type maps for agricultural statistics.","des":"La clasificación de cultivos es el proceso de asignar etiquetas de tipos de cultivo a píxeles de imágenes satelitales o parcelas de campo utilizando algoritmos de aprendizaje automático entrenados con datos de referencia, lo que permite la producción de mapas de tipos de cultivo para estadísticas agrícolas.","lvl":3,"ord":275,"cat":"method","kind":"concept","src":"ct_chile","al":"crop classification clasificación de cultivos crop classification"},{"id":"agricultural-monitoring","en":"Agricultural monitoring","es":"Monitoreo agrícola","den":"Agricultural monitoring is the systematic observation of crop growth, health, and extent over time using remote sensing and field data, supporting yield forecasting, area estimation, and early food security warning.","des":"El monitoreo agrícola es la observación sistemática del crecimiento, salud y extensión de los cultivos a lo largo del tiempo mediante teledetección y datos de campo, apoyando el pronóstico de rendimiento, la estimación de área y la alerta temprana de seguridad alimentaria.","lvl":3,"ord":255,"cat":"method","kind":"concept","src":"ct_poland","al":"agricultural monitoring monitoreo agrícola agricultural monitoring agricultural monitoring tasks seguimiento agrícola"},{"id":"field-surveys","en":"Field surveys","es":"Encuestas de campo","den":"Field surveys are ground-based data collection campaigns that record crop types, phenology, and other attributes at sampled locations, used to train and validate remote sensing models and produce official statistics.","des":"Las encuestas de campo son campañas de recopilación de datos sobre el terreno que registran tipos de cultivo, fenología y otros atributos en ubicaciones muestreadas, utilizadas para entrenar y validar modelos de teledetección y producir estadísticas oficiales.","lvl":2,"ord":179,"cat":"method","kind":"concept","src":"th_design_frames","al":"field surveys encuestas de campo field surveys levantamientos de campo"},{"id":"source-datasets","en":"Source datasets","es":"Conjuntos de datos fuente","den":"Source datasets are the primary input data for remote sensing analyses, including satellite image collections, reference samples, and auxiliary geospatial layers such as elevation or land cover masks.","des":"Los conjuntos de datos fuente son los datos de entrada principales para análisis de teledetección, incluyendo colecciones de imágenes satelitales, muestras de referencia y capas geoespaciales auxiliares como elevación o máscaras de cobertura del suelo.","lvl":2,"ord":168,"cat":"data","kind":"concept","src":"howto","al":"source datasets conjuntos de datos fuente source datasets datos de origen"},{"id":"dimensional-dataset","en":"Dimensional dataset","es":"Conjunto de datos dimensional","den":"A dimensional dataset is an Earth observation data cube organized along spatial, temporal, and spectral dimensions, providing regular grids for consistent time series analysis and machine learning classification.","des":"Un conjunto de datos dimensional es un cubo de datos de observación de la Tierra organizado a lo largo de dimensiones espacial, temporal y espectral, que proporciona cuadrículas regulares para análisis consistente de series temporales y clasificación con aprendizaje automático.","lvl":2,"ord":221,"cat":"data","kind":"concept","src":"th_data_cubes","al":"dimensional dataset conjunto de datos dimensional dimensional dataset cubo de datos dimensional"},{"id":"satellite-image-time-series-classification","en":"Satellite image time series classification","es":"Clasificación de series temporales de imágenes satelitales","den":"Satellite image time series classification is a machine learning method that assigns land cover labels to pixels by analyzing temporal sequences of spectral observations, capturing phenological patterns to improve accuracy over single-date classification.","des":"La clasificación de series temporales de imágenes satelitales es un método de aprendizaje automático que asigna etiquetas de cobertura del suelo a píxeles mediante el análisis de secuencias temporales de observaciones espectrales, capturando patrones fenológicos para mejorar la exactitud en comparación con la clasificación de una sola fecha.","lvl":0,"ord":16,"cat":"method","kind":"concept","src":"th_machine_learning","al":"satellite image time series classification clasificación de series temporales de imágenes satelitales satellite image time series classification"},{"id":"national-statistical-systems","en":"National statistical systems","es":"Sistemas estadísticos nacionales","den":"National statistical systems are the institutional frameworks and processes by which countries produce official statistics, including agricultural data. They are the primary target users of Earth observation integration for improved statistics.","des":"Los sistemas estadísticos nacionales son los marcos institucionales y procesos mediante los cuales los países producen estadísticas oficiales, incluidos los datos agrícolas. Son los usuarios objetivo principales de la integración de la observación de la Tierra para mejorar las estadísticas.","lvl":0,"ord":17,"cat":"system","kind":"concept","src":"introduction","al":"national statistical systems sistemas estadísticos nacionales national statistical systems"},{"id":"classification-map","en":"Classification map","es":"Mapa de clasificación","den":"A classification map is a thematic raster product that assigns each pixel a land cover or land use label based on supervised or unsupervised analysis of satellite imagery.","des":"Un mapa de clasificación es un producto ráster temático que asigna a cada píxel una etiqueta de cobertura del suelo o uso del suelo basada en análisis supervisado o no supervisado de imágenes satelitales.","lvl":3,"ord":276,"cat":"product","kind":"concept","src":"th_validation","al":"classification map mapa de clasificación classification map"},{"id":"ground","en":"Ground","es":"Terreno","den":"Ground refers to in-situ observations or measurements collected on the Earth's surface, such as crop type and yield, used as reference data for calibrating and validating satellite-based products.","des":"El terreno se refiere a observaciones o mediciones in situ recopiladas en la superficie de la Tierra, como tipo de cultivo y rendimiento, utilizadas como datos de referencia para calibrar y validar productos basados en satélite.","lvl":3,"ord":306,"cat":"phenomenon","kind":"concept","src":"th_design_frames","al":"ground terreno ground suelo campo"},{"id":"cube","en":"Cube","es":"Cubo","den":"A data cube is a regular spatiotemporal array of Earth observation images, with uniform spatial resolution and time intervals, enabling efficient multi-dimensional analysis and time series classification.","des":"Un cubo de datos es un arreglo espacio-temporal regular de imágenes de observación de la Tierra, con resolución espacial e intervalos de tiempo uniformes, que permite una clasificación eficiente de series temporales y análisis.","lvl":1,"ord":135,"cat":"data","kind":"concept","src":"th_data_cubes","al":"cube cubo cube cubo de datos"},{"id":"sampling","en":"Sampling","es":"Muestreo","den":"A method for selecting a subset of units from a population to estimate characteristics of the whole, often using probability-based designs like stratified random sampling to ensure unbiased estimates.","des":"Método para seleccionar un subconjunto de unidades de una población con el fin de estimar características del total, utilizando a menudo diseños basados en probabilidad, como el muestreo aleatorio estratificado, para garantizar estimaciones insesgadas.","lvl":4,"ord":381,"cat":"method","kind":"concept","src":"th_validation · th_design_frames","al":"sampling muestreo sampling sampling design muestreo estadístico"},{"id":"scale","en":"Scale","es":"Escala","den":"The spatial or temporal resolution at which data are collected or analyzed, affecting the level of detail and the ability to detect patterns, such as field-level versus regional scales.","des":"La resolución espacial o temporal a la que se recopilan o analizan los datos, que afecta el nivel de detalle y la capacidad de detectar patrones, como escalas a nivel de campo versus regionales.","lvl":0,"ord":18,"cat":"metric","kind":"concept","src":"th_remote_sensing · th_data_cubes","al":"scale escala scale escala espacial"},{"id":"cropland-extent-map","en":"Cropland extent map","es":"Mapa de extensión de tierras de cultivo","den":"A thematic map that delineates areas used for crop cultivation, often derived from satellite imagery and used to mask non-agricultural land for crop type mapping or area estimation.","des":"Un mapa temático que delimita las áreas utilizadas para el cultivo agrícola, a menudo derivado de imágenes satelitales y utilizado para enmascarar tierras no agrícolas en el mapeo de tipos de cultivo o la estimación de área.","lvl":5,"ord":453,"cat":"product","kind":"concept","src":"ct_digital_earth_africa · crop_statistics_area","al":"cropland extent map mapa de extensión de tierras de cultivo cropland extent map mapa de extensión de cultivos"},{"id":"segmentation","en":"Segmentation","es":"Segmentación","den":"The process of partitioning an image into meaningful regions (segments) that correspond to real-world objects, such as agricultural fields, often as a precursor to object-based classification.","des":"El proceso de dividir una imagen en regiones significativas (segmentos) que corresponden a objetos del mundo real, como campos agrícolas, a menudo como precursor de la clasificación basada en objetos.","lvl":2,"ord":212,"cat":"method","kind":"concept","src":"th_parcel_extraction · ct_mexico","al":"segmentation segmentación segmentation"},{"id":"methodology","en":"Methodology","es":"Metodología","den":"A systematic set of principles, procedures, and techniques used to conduct a study or produce statistics, ensuring reproducibility and rigor, such as the workflow for crop classification from satellite imagery.","des":"Conjunto sistemático de principios, procedimientos y técnicas utilizados para realizar un estudio o producir estadísticas, garantizando reproducibilidad y rigor, como el flujo de trabajo para la clasificación de cultivos a partir de imágenes satelitales.","lvl":2,"ord":236,"cat":"method","kind":"concept","src":"introduction · th_validation","al":"methodology metodología methodology"},{"id":"users","en":"Users","es":"Usuarios","den":"Individuals or organizations that apply the methods and tools described in the handbook, including national statistical offices, resear n.","des":"Un término primitivo para identificar la presencia u ocurrencia de un fenómeno, como un tipo de cultivo, un evento de cambio o una inundación, a partir de datos de teledetección. A menudo implica umbralización o clasificación.","lvl":0,"ord":23,"cat":"method","kind":"concept","src":"dis_china_floods · th_lucc","al":"detection detección detection"},{"id":"survey-vector","en":"Survey vector","es":"Vector de encuesta","den":"A vector representing the crop type observed at a pixel, with element 1 for the observed crop and 0 for others. It follows a multinomial distribution and is used in design-based estimators for crop area.","des":"Un vector que representa el tipo de cultivo observado en un píxel, con el elemento 1 para el cultivo observado y 0 para los demás. Sigue una distribución multinomial y se utiliza en estimadores basados en diseño para la estimación de áreas.","lvl":6,"ord":505,"cat":"data","kind":"concept","src":"crop_statistics_calibration","al":"survey vector vector de encuesta survey vector vector de muestreo"},{"id":"big-data","en":"Big Data","es":"Macrodatos","den":"Datasets so large or complex that traditional processing methods are insufficient. In the handbook, it refers to petabyte-scale Earth Observation archives and cloud-based services that require novel computational and statistical approaches.","des":"Conjuntos de datos tan grandes o complejos que los métodos de procesamiento tradicionales son insuficientes. En el manual, se refiere a archivos de observación de la Tierra a escala de petabytes y servicios basados en la nube que requieren enfoques computacionales y estadísticos novedosos.","lvl":2,"ord":204,"cat":"data","kind":"concept","src":"introduction · introduction","al":"big data macrodatos big data datos masivos"},{"id":"geographic-information-systems","en":"Geographic information systems","es":"Sistemas de información geográfica","den":"Computer systems for capturing, storing, analyzing, and displaying geospatial data. NSOs us ón","den":"A primitive term for the process of generating or creating data products, statistics, or maps from raw inputs. In the handbook, it is used broadly in contexts like statistical production and map production.","des":"Término primitivo para el proceso de generar o crear productos de datos, estadísticas o mapas a partir de insumos brutos. En el manual, se utiliza ampliamente en contextos como producción estadística y producción cartográfica.","lvl":0,"ord":25,"cat":"primitive","kind":"concept","src":"introduction","al":"production producción production"},{"id":"reproducible-analysis-sessions","en":"Reproducible analysis sessions","es":"Sesiones de análisis reproducibles","den":"One-click JupyterLab environments that replicate a chapter's analysis. They are pre-configured with all code, data, dependencies, and cloud credentials, ensuring that readers can verify and build upon the results.","des":"Entornos JupyterLab de un solo clic que replican el análisis de un capítulo. Están preconfigurados con todo el código, datos, dependencias y credenciales en la nube, lo que garantiza que los lectores puedan verificar y desarrollar los resultados.","lvl":0,"ord":26,"cat":"method","kind":"concept","src":"howto","al":"reproducible analysis sessions sesiones de análisis reproducibles reproducible analysis sessions"},{"id":"plot","en":"Plot","es":"Parcela","den":"A primitive term for a defined area of land, such as an agricultural field. In the handbook, it is also used as a graphical representation of data or as a verb meaning to create such a representation.","des":"Término primitivo para un área definida de tierra, como un campo agrícola. En el manual, también se utiliza como representación gráfica de datos o como verbo que significa crear dicha representación.","lvl":0,"ord":27,"cat":"primitive","kind":"concept","src":"th_parcel_extraction · ct_mexico","al":"plot parcela plot"},{"id":"cluster","en":"Cluster","es":"Clúster","den":"A set of data points (e.g., satellite i
