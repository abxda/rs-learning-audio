es synthetic samples for minority classes by interpolating between nearest neighbors in the feature space. It is used to rebalance imbalanced training datasets, reducing bias towards majority classes and improving classifier performance.","des":"Técnica de sobremuestreo sintético de minorías: un método de aumento de datos que genera muestras sintéticas para clases minoritarias mediante interpolación entre vecinos más cercanos en el espacio de atributos. Se utiliza para reequilibrar conjuntos de datos de entrenamiento desbalanceados, reduciendo el sesgo hacia las clases mayoritarias y mejorando el rendimiento del clasificador.","lvl":1,"ord":165,"cat":"method","kind":"concept","src":"th_quality_control","al":"smote smote smote técnica de sobremuestreo sintético de minorías"},{"id":"som","en":"SOM","es":"SOM","den":"Self-Organizing Map: an unsupervised neural network that reduces high-dimensional data (e.g., satellite image time series) to a two-dimensional grid while preserving topological relationships. It is used for clustering, visualizing data patterns, and detecting noisy or mislabeled training samples.","des":"Mapa autoorganizado: una red neuronal no supervisada que reduce datos de alta dimensión (por ejemplo, series temporales de imágenes satelitales) a una cuadrícula bidimensional preservando relaciones topológicas. Se utiliza para agrupamiento, visualización de patrones de datos y detección de muestras de entrenamiento ruidosas o mal etiquetadas.","lvl":7,"ord":545,"cat":"method","kind":"concept","src":"th_quality_control","al":"som som som mapa autoorganizado"},{"id":"coordinate-system","en":"Coordinate system","es":"Sistema de coordenadas","den":"A reference system used to uniquely identify the location of points on the Earth's surface. It includes geographic coordinates (latitude/longitude) as well as projected coordinate systems (e.g., UTM) that convert the Earth's curved surface to a flat map, enabling area and distance calculations.","des":"Un sistema de referencia utilizado para identificar de manera única la ubicación de puntos en la superficie de la Tierra. Incluye coordenadas geográficas (latitud/longitud), así como sistemas de coordenadas proyectadas (por ejemplo, UTM) que convierten la superficie curva de la Tierra a un mapa plano, permitiendo cálculos de área y distancia.","lvl":5,"ord":456,"cat":"other","kind":"concept","src":"th_data_sources","al":"coordinate system sistema de coordenadas coordinate system sistema de referencia de coordenadas"},{"id":"electromagnetic-spectrum","en":"Electromagnetic spectrum","es":"Espectro electromagnético","den":"The range of all types of electromagnetic radiation, from gamma rays to radio waves. Remote sensing uses specific portions of this spectrum, such as visible light, near-infrared, short-wave infrared, and microwaves, to collect information about Earth's surface features without physical contact.","des":"El rango de todos los tipos de radiación electromagnética, desde rayos gamma hasta ondas de radio. La teledetección utiliza porciones específicas de este espectro, como luz visible, infrarrojo cercano, infrarrojo de onda corta y microondas, para recopilar información sobre las características de la superficie terrestre sin contacto físico.","lvl":6,"ord":531,"cat":"phenomenon","kind":"concept","src":"th_remote_sensing","al":"electromagnetic spectrum espectro electromagnético electromagnetic spectrum"},{"id":"clustering","en":"Clustering","es":"Agrupamiento","den":"A machine learning technique that groups a set of objects (e.g., satellite image pixels or time series) into clusters such that objects within the same cluster are more similar to each other than to those in other clusters. It is used for pattern discovery, data summarization, and sample quality control.","des":"Una técnica de aprendizaje automático que agrupa un conjunto de objetos (por ejemplo, píxeles de imágenes satelitales o series temporales) en clústeres de modo que los objetos dentro del mismo clúster sean más similares entre sí que con los de otros clústeres. Se utiliza para descubrimiento de patrones, resumen de datos y control de calidad de muestras.","lvl":6,"ord":513,"cat":"method","kind":"concept","src":"th_quality_control","al":"clustering agrupamiento clustering clustering clasificación no supervisada"},{"id":"statistical-unit","en":"Statistical unit","es":"Unidad estadística","den":"An elementary unit for which data are collected or analyzed.","des":"Una unidad elemental para la cual se recopilan o analizan datos.","lvl":0,"ord":89,"cat":"primitive","kind":"primitive","src":"","al":"statistical unit unidad estadística statistical unit unidad de muestreo"},{"id":"planting","en":"Planting","es":"Siembra","den":"The agricultural activity of putting seeds or plants into the ground.","des":"La actividad agrícola de poner semillas o plantas en el suelo.","lvl":0,"ord":90,"cat":"primitive","kind":"primitive","src":"","al":"planting siembra planting plantación"},{"id":"sar-backscatter","en":"SAR backscatter","es":"retrodispersión SAR","den":"The portion of the radar signal transmitted by a Synthetic Aperture Radar (SAR) that is reflected back to the sensor from the Earth's surface. Its intensity depends on surface properties like roughness, moisture, and structure.","des":"La porción de la señal de radar transmitida por un Radar de Apertura Sintética que es reflejada de vuelta al sensor desde la superficie terrestre. Su intensidad depende de propiedades de la superficie como rugosidad, humedad y estructura.","lvl":6,"ord":526,"cat":"phenomenon","kind":"concept","src":"th_remote_sensing · th_data_sources","al":"sar backscatter retrodispersión sar sar backscatter retrodispersión de radar de apertura sintética"},{"id":"per-pixel-quality","en":"Per-pixel quality","es":"Calidad por píxel","den":"Assessment of each image pixel's reliability or clarity, often from cloud or sensor flags.","des":"Evaluación de la fiabilidad o claridad de cada píxel de una imagen, a menudo basada en banderas de nubes o del sensor.","lvl":0,"ord":91,"cat":"primitive","kind":"primitive","src":"","al":"per-pixel quality calidad por píxel per-pixel quality calidad a nivel de píxel"},{"id":"cohen-s-kappa","en":"Cohen's Kappa","es":"Kappa de Cohen","den":"A statistical measure of inter-rater agreement for categorical items. It quantifies the agreement between two raters (e.g., a classified map and reference data) while accounting for the agreement that would occur by chance alone.","des":"Una medida estadística de acuerdo entre evaluadores para elementos categóricos. Cuantifica el acuerdo entre dos evaluadores (por ejemplo, un mapa clasificado y datos de referencia) teniendo en cuenta el acuerdo que ocurriría solo por azar.","lvl":7,"ord":550,"cat":"metric","kind":"concept","src":"cy_colombia · th_validation","al":"cohen's kappa kappa de cohen cohen's kappa cohen’s kappa coeficiente kappa de cohen"},{"id":"kappa","en":"Kappa","es":"Kappa","den":"Short for Cohen's Kappa; a chance-corrected agreement statistic for categorical data.","des":"Abreviatura de Kappa de Cohen; un estadístico de acuerdo corregido por azar para datos categóricos.","lvl":0,"ord":92,"cat":"primitive","kind":"primitive","src":"","al":"kappa kappa kappa coeficiente kappa"},{"id":"unmanned-aerial-vehicle","en":"Unmanned aerial vehicle","es":"Vehículo aéreo no tripulado","den":"Aircraft without a human pilot, used to capture aerial imagery for agriculture.","des":"Aeronave sin piloto humano, utilizada para capturar imágenes aéreas en agricultura.","lvl":0,"ord":93,"cat":"primitive","kind":"primitive","src":"","al":"unmanned aerial vehicle vehículo aéreo no tripulado unmanned aerial vehicle vant"},{"id":"grid-cell","en":"Grid cell","es":"Celda de cuadrícula","den":"A single square unit in a raster data grid, representing a specific area on the ground.","des":"Una unidad cuadrada individual en una cuadrícula de datos ráster, que representa un área específica en el terreno.","lvl":0,"ord":94,"cat":"primitive","kind":"primitive","src":"","al":"grid cell celda de cuadrícula grid cell celda de malla"},{"id":"oci-artifact","en":"OCI artifact","es":"artefacto OCI","den":"A versioned, immutable snapshot of a chapter's data, packaged as a container image and stored in a registry. It is referenced by a content hash (SHA256) for exact reproducibility and mounted as a read-only volume in a Kubernetes session.","des":"Una instantánea versionada e inmutable de los datos de un capítulo, empaquetada como imagen de contenedor y almacenada en un registro. Se referencia mediante un hash de contenido (SHA256) para garantizar la reproducibilidad exacta y se monta como un volumen de solo lectura en una sesión de Kubernetes.","lvl":2,"ord":248,"cat":"phenomenon","kind":"concept","src":"howto · howto","al":"oci artifact artefacto oci oci artifact artefacto de open container initiative"},{"id":"agricultural-holding","en":"Agricultural holding","es":"Explotación agrícola","den":"An economic unit of agricultural production under single management, comprising all livestock and all land used wholly or partly for agricultural purposes, regardless of tenure or size.","des":"Unidad económica de producción agrícola bajo una sola dirección, que comprende todo el ganado y todas las tierras utilizadas total o parcialmente para la agricultura, independientemente de la tenencia o el tamaño.","lvl":9,"ord":563,"cat":"statistic","kind":"concept","src":"crop_statistics_calibration · th_alignment","al":"agricultural holding explotación agrícola agricultural holding finca agrícola"},{"id":"chlorophyll","en":"Chlorophyll","es":"Clorofila","den":"Green pigment in plants, measured via remote sensing to assess vegetation health.","des":"Pigmento verde en las plantas, medido mediante teledetección para evaluar la salud de la vegetación.","lvl":0,"ord":95,"cat":"primitive","kind":"primitive","src":"","al":"chlorophyll clorofila chlorophyll"},{"id":"oversampling","en":"Oversampling","es":"Sobremuestreo","den":"A technique to increase the number of minority class samples, often by generating synthetic data, to correct class imbalance in training sets.","des":"Técnica que incrementa el número de muestras de clases minoritarias, a menudo generando datos sintéticos, para corregir el desbalance de clases en los conjuntos de entrenamiento.","lvl":0,"ord":96,"cat":"method","kind":"concept","src":"","al":"oversampling sobremuestreo oversampling sobremuestreo"},{"id":"radiation","en":"Radiation","es":"Radiación","den":"Energy emitted or reflected as waves, including solar and thermal, sensed by instruments.","des":"Energía emitida o reflejada en forma de ondas, incluida la solar y térmica, captada por instrumentos.","lvl":0,"ord":97,"cat":"primitive","kind":"primitive","src":"","al":"radiation radiación radiation"},{"id":"inter-rater-agreement","en":"Inter-rater agreement","es":"Acuerdo entre evaluadores","den":"A statistic measuring the degree of consensus among independent annotators when labeling the same sample units.","des":"Estadístico que mide el grado de consenso entre anotadores independientes al etiquetar las mismas unidades de muestra.","lvl":1,"ord":167,"cat":"statistic","kind":"concept","src":"crop_statistics_area","al":"inter-rater agreement acuerdo entre evaluadores inter-rater agreement concordancia inter-evaluador"},{"id":"container-image","en":"Container image","es":"Imagen de contenedor","den":"A lightweight, standalone executable package that includes software and dependencies.","des":"Paquete ejecutable ligero e independiente que incluye software y dependencias.","lvl":0,"ord":98,"cat":"primitive","kind":"primitive","src":"","al":"container image imagen de contenedor container image imagen de contenedor computacional"},{"id":"content-hash","en":"Content hash","es":"Hash de contenido","den":"A fixed-size string derived from data content, used to verify integrity or uniqueness.","des":"Cadena de tamaño fijo derivada del contenido de los datos, utilizada para verificar la integridad o unicidad.","lvl":0,"ord":99,"cat":"primitive","kind":"primitive","src":"","al":"content hash hash de contenido content hash resumen de contenido"},{"id":"radar-signal","en":"Radar signal","es":"Señal de radar","den":"The microwave pulse transmitted by a radar satellite and the echo reflected back from the Earth's surface. Its intensity and polarization carry information about ground properties.","des":"El pulso de microondas transmitido por un satélite radar y el eco reflejado desde la superficie terrestre. Su intensidad y polarización contienen información sobre las propiedades del terreno.","lvl":7,"ord":551,"cat":"phenomenon","kind":"concept","src":"th_remote_sensing","al":"radar signal señal de radar radar signal señal radar"},{"id":"annotator","en":"Annotator","es":"Anotador","den":"A person who labels or marks ground truth data for training or validation.","des":"Persona que etiqueta o marca datos de verdad terreno para entrenamiento o validación.","lvl":0,"ord":100,"cat":"primitive","kind":"primitive","src":"","al":"annotator anotador annotator etiquetador"},{"id":"sample-unit","en":"Sample unit","es":"Unidad de muestra","den":"The individual element (e.g., a field or pixel) selected for measurement or analysis.","des":"El elemento individual (p. ej., un campo o píxel) seleccionado para medición o análisis.","lvl":0,"ord":101,"cat":"primitive","kind":"primitive","src":"","al":"sample unit unidad de muestra sample unit unidad de muestreo"},{"id":"consensus","en":"Consensus","es":"Consenso","den":"Agreement among multiple sources or experts on a classification or measurement.","des":"Acuerdo entre múltiples fuentes o expertos sobre una clasificación o medición.","lvl":0,"ord":102,"cat":"primitive","kind":"primitive","src":"","al":"consensus consenso consensus"},{"id":"echo","en":"Echo","es":"Eco","den":"The reflected signal received by a radar or lidar sensor after interacting with a target.","des":"La señal reflejada recibida por un sensor de radar o lidar después de interactuar con un objetivo.","lvl":0,"ord":103,"cat":"primitive","kind":"primitive","src":"","al":"echo eco echo"},{"id":"polarization","en":"Polarization","es":"Polarización","den":"The orientation of the electric field vector of an electromagnetic wave, used in sensor measurements.","des":"La orientación del vector del campo eléctrico de una onda electromagnética, utilizada en mediciones de sensores.","lvl":0,"ord":104,"cat":"primitive","kind":"primitive","src":"","al":"polarization polarización polarization"},{"id":"operational-use","en":"Operational use","es":"Uso operacional","den":"Practical application of remote sensing methods in routine agricultural monitoring and decision-making.","des":"Aplicación práctica de métodos de teledetección en el monitoreo agrícola rutinario y la toma de decisiones.","lvl":0,"ord":105,"cat":"primitive","kind":"primitive","src":"","al":"operational use uso operacional operational use"},{"id":"setup","en":"Setup","es":"Configuración","den":"General term for configuration or preparation of equipment, software, or procedures.","des":"Término general para la configuración o preparación de equipos, software o procedimientos.","lvl":0,"ord":106,"cat":"primitive","kind":"primitive","src":"","al":"setup configuración setup puesta en marcha"}],"prereq":[["data","samples","Samples are individual data points with known labels used for training or validation.","Las muestras son puntos de datos individuales con etiquetas conocidas utilizados para entrenamiento o validación."],["data","dataset","A dataset is a structured collection of data, such as satellite images or survey records.","Un conjunto de datos es una colección estructurada de datos, como imágenes satelitales o registros de encuestas."],["data","analysis","Analysis involves systematic examination of data to extract meaningful information.","El análisis implica el examen sistemático de datos para extraer información significativa."],["data","statistics","Statistics summarize and describe data, including remote sensing and survey data.","Las estadísticas resumen y describen datos, incluyendo datos de teledetección y encuestas."],["data","information","Information is meaningful data derived from processing and interpreting remote sensing data.","La información son datos significativos derivados del procesamiento e interpretación de datos de teledetección."],["data","survey","A survey systematically collects ground data, such as field visits, for validation or analysis.","Una encuesta recolecta sistemáticamente datos de campo, como visitas a campo, para validación o análisis."],["data","observation","An observation is a single data point from a sensor, e.g., a satellite image acquisition.","Una observación es un punto de datos individual de un sensor, por ejemplo, una adquisición de imagen satelital."],["data","machine-learning","Machine learning uses algorithms to learn patterns from data and make predictions or decisions.","El aprendizaje automático utiliza algoritmos para aprender patrones de datos y hacer predicciones o decisiones."],["data","feature","A feature is a measurable property or characteristic extracted from data, like spectral reflectance.","Un atributo es una propiedad o característica medible extraída de datos, como la reflectancia espectral."],["data","source","A source is the origin of data, such as a satellite mission or cloud platform providing imagery.","Una fuente es el origen de los datos, como una misión satelital o plataforma en la nube que proporciona imágenes."],["data","large-datasets","Large datasets refer to data volumes too big for traditional processing, requiring scalable methods.","Los grandes conjuntos de datos se refieren a volúmenes de datos demasiado grandes para el procesamiento tradicional, que requieren métodos escalables."],["data","chart","It displays data in a graphical format, such as bar charts or line plots.","Muestra datos en un formato gráfico, como gráficos de barras o gráficos de líneas."],["data","oci-data-artifacts","OCI data artifacts are immutable, content-hashed snapshots of chapter-specific data packaged as OCI container images.","Los artefactos de datos OCI son instantáneas inmutables con hash de contenido de datos específicos del capítulo empaquetadas como imágenes de contenedor OCI."],["data","big-data","Big data are extremely large datasets that exceed traditional processing capabilities, requiring specialized methods.","Los macrodatos son conjuntos de datos extremadamente grandes que superan las capacidades de procesamiento tradicionales, requiriendo métodos especializados."],["data","geographic-information-systems","Geographic information systems are computer systems that capture, store, analyze, and display geospatial data.","Los sistemas de información geográfica son sistemas informáticos que capturan, almacenan, analizan y muestran datos geoespaciales."],["data","cluster","Data points are grouped by a clustering algorithm into clusters based on similarity metrics.","Los puntos de datos se agrupan mediante un algoritmo de agrupamiento en clústeres basados en métricas de similitud."],["data","geospatial-data","Geospatial data is any data that includes geographic location information.","Los datos geoespaciales son cualquier dato que incluye información de ubicación geográfica."],["data","data-collection","Data collection gathers observations such as crop type and yield from the field.","La recopilación de datos reúne observaciones como el tipo de cultivo y el rendimiento del campo."],["data","metadata","Metadata is descriptive information about a dataset, such as its source and quality.","Los metadatos son información descriptiva sobre un conjunto de datos, como su fuente y calidad."],["data","input","Input is the data fed into a system or model for processing into output.","La entrada son los datos alimentados a un sistema o modelo para su procesamiento en salida."],["data","data-image","A data image is an OCI container image packaging a chapter's data files for reproducible analysis.","Una imagen de datos es una imagen de contenedor de OCI que empaqueta los archivos de datos de un capítulo para un análisis reproducible."],["data","survey-records","Data from field questionnaires or observations are stored as survey records for analysis.","Los datos de cuestionarios u observaciones de campo se registran como registros de encuesta para su análisis."],["data","satellite-data","Satellite data include imagery and other measurements used as input for Earth observation analysis.","Los datos satelitales incluyen imágenes y otras mediciones utilizadas como entrada para el análisis de observación de la Tierra."],["data","geographic-data","Geographic data is information associated with locations on the Earth's surface.","Los datos geográficos son información asociada a ubicaciones en la superficie de la Tierra."],["data","processing","By applying a series of operations to raw data, we transform it into a more useful form.","Al aplicar una serie de operaciones a los datos brutos, los transformamos en una forma más útil."],["data","data-science","Data science applies statistical and computational methods to extract insights from data.","La ciencia de datos aplica métodos estadísticos y computacionales para extraer información de los datos."],["data","table","A table organizes data into rows and columns for easy analysis.","Una tabla organiza los datos en filas y columnas para facilitar el análisis."],["data","resources","Data resources are the satellite and ground data required for analysis.","Los recursos de datos son los datos satelitales y de campo necesarios para el análisis."],["data","data-analysis","Data analysis systematically examines data to extract information, starting from raw factual information.","El análisis de datos examina sistemáticamente los datos para extraer información, partiendo de datos factuales en bruto."],["crop","agriculture","Agriculture is the practice of cultivating crops and raising livestock for food and fiber.","La agricultura es la práctica de cultivar cultivos y criar ganado para obtener alimentos y fibras."],["crop","yield","Yield is the amount of harvested crop product per unit area, typically for a specific crop.","El rendimiento es la cantidad de producto de cultivo cosechado por unidad de área, típicamente para un cultivo específico."],["crop","agricultural-statistics","Agricultural statistics quantify crop production, area, and yield using data from surveys and remote sensing.","Las estadísticas agrícolas cuantifican la producción, área y rendimiento de los cultivos utilizando datos de encuestas y teledetección."],["crop","crop-type-mapping","Crop type mapping aims to delineate the spatial distribution of different crop types.","El mapeo de tipos de cultivo busca delinear la distribución espacial de diferentes tipos de cultivos."],["crop","season","Crop development cycles are tied to seasons, affecting satellite image time series.","Los ciclos de desarrollo de los cultivos están ligados a las temporadas, lo que afecta las series temporales de imágenes satelitales."],["crop","crop-identification","Crop identification is the task of recognizing specific crop types from satellite imagery.","La identificación de cultivos es la tarea de reconocer tipos de cultivos específicos a partir de imágenes satelitales."],["crop","crop-assessment","Crop assessment evaluates the condition, area, and yield of cultivated plants using multiple data sources.","La evaluación de cultivos evalúa la condición, área y rendimiento de las plantas cultivadas utilizando múltiples fuentes de datos."],["crop","maize","Maize is a specific type of crop, a cereal grain widely cultivated for food and feed.","El maíz es un tipo específico de cultivo, un grano de cereal ampliamente cultivado para alimentación humana y animal."],["crop","growth","Growth describes how a crop increases in biomass and progresses through phenological stages.","El crecimiento describe cómo un cultivo aumenta en biomasa y progresa a través de etapas fenológicas."],["crop","crop-types","Crop types are the specific kinds of cultivated plants, such as maize or wheat, that define the output of agricultural mapping.","Los tipos de cultivos son las clases específicas de plantas cultivadas, como maíz o trigo, que definen la salida del mapeo agrícola."],["crop","planted-area","Planted area is the total land extent in hectares where a specific crop has been deliberately sown or planted.","El área sembrada es la extensión total de tierra en hectáreas donde un cultivo específico ha sido deliberadamente sembrado."],["crop","phenology","Phenology studies the timing of recurring biological events in crop life cycles, such as flowering.","La fenología estudia el momento de los eventos biológicos recurrentes en los ciclos de vida de los cultivos, como la floración."],["crop","fallow","Fallow land is temporarily without a crop, but remains part of agricultural land use.","La tierra en barbecho está temporalmente sin cultivo, pero sigue siendo parte del uso agrícola del suelo."],["crop","sowing","Sowing is the agricultural practice of planting crop seeds into prepared soil to initiate a growing season.","La siembra es la práctica agrícola de plantar semillas de cultivo en suelo preparado para iniciar una temporada de cultivo."],["crop","phenological-stage","Crop development progresses through defined phenological stages from sowing to harvest.","El desarrollo del cultivo avanza a través de etapas fenológicas definidas desde la siembra hasta la cosecha."],["crop","crop-yield","Crop yield is the yield of a cultivated plant, measured per unit area for agricultural statistics.","El rendimiento de cultivos es el rendimiento de una planta cultivada, medido por unidad de área para estadísticas agrícolas."],["crop","crop-classification-models","These models are trained to identify specific crop types from satellite imagery.","Estos modelos se entrenan para identificar tipos específicos de cultivos a partir de imágenes satelitales."],["crop","large-scale-agricultural-monitoring","It focuses on tracking crop conditions and extent across large agricultural areas.","Se enfoca en monitorear las condiciones y la extensión de cultivos en grandes áreas agrícolas."],["crop","crop-mapping","Crop mapping applies mapping techniques to identify and delineate cultivated plant species, using crop knowledge.","El mapeo de cultivos aplica técnicas de cartografía para identificar y delimitar especies de plantas cultivadas, utilizando conocimiento de cultivos."],["model","training","A model is created through training on labeled data to perform tasks like classification.","Un modelo se crea mediante entrenamiento con datos etiquetados para realizar tareas como la clasificación."],["model","classification","A trained classification model maps input data to class labels.","Un modelo de clasificación entrenado asigna datos de entrada a etiquetas de clase."],["model","performance","Performance evaluates how well a model achieves its task using metrics like accuracy.","El rendimiento evalúa qué tan bien un modelo logra su tarea utilizando métricas como la exactitud."],["model","parameters","Parameters are configurable values that control the behavior of a model, such as learning rate or tree count.","Los parámetros son valores configurables que controlan el comportamiento de un modelo, como la tasa de aprendizaje o el número de árboles."],["model","predictions","Predictions are outputs of models that estimate agricultural quantities like yield or area from satellite data.","Las predicciones son resultados de modelos que estiman cantidades agrícolas como rendimiento o área a partir de datos satelitales."],["model","machine","A machine is a trained model that maps input features to output predictions.","Una máquina es un modelo entrenado que asigna atributos de entrada a predicciones de salida."],["model","predictors","In a model, predictors are the input variables that help forecast the outcome.","En un modelo, los predictores son las variables de entrada que ayudan a pronosticar el resultado."],["model","machine-learning-models","A model is a representation that learns from features and labels to perform classification or regression.","Un modelo es una representación que aprende de atributos y etiquetas para realizar clasificación o regresión."],["model","statistical-indicators","Model performance is evaluated using statistical indicators like RMSE and R-squared.","El rendimiento del modelo se evalúa mediante indicadores estadísticos como RMSE y R²."],["model","model-generalization-capabilities","A model's generalization capability refers to its ability to perform well on new, unseen data beyond its training set.","La capacidad de generalización de un modelo se refiere a su habilidad para desempeñarse bien con datos nuevos no vistos más allá de su conjunto de entrenamiento."],["model","plsr-model","PLSR model is a statistical model that relates predictor variables to a response variable.","El modelo PLSR es un modelo estadístico que relaciona variables predictoras con una variable de respuesta."],["model","model-development","Model development is the process of creating, training, and tuning a computational model.","El desarrollo de modelos es el proceso de crear, entrenar y ajustar un modelo computacional."],["model","model-evaluation","Model evaluation assesses how well a trained model performs on unseen data.","La evaluación de modelos evalúa qué tan bien se desempeña un modelo entrenado con datos no vistos."],["model","modeling","Modeling is the process of constructing a mathematical or computational representation from data.","El modelado es el proceso de construir una representación matemática o computacional a partir de datos."],["model","model-ability","Model ability refers to the capability of a model to generalize or discriminate across tasks.","La capacidad del modelo se refiere a su habilidad para generalizar o discriminar entre tareas."],["model","satellite-derived-models","Satellite-derived models use satellite imagery as input to predict biophysical variables like crop yield or biomass.","Los modelos derivados de satélite utilizan imágenes satelitales como entrada para predecir variables biofísicas como el rendimiento de cultivos o la biomasa."],["model","transferability","Transferability is a model's ability to maintain predictive performance when applied to new regions or times.","La transferibilidad es la capacidad de un modelo para mantener el rendimiento predictivo al aplicarse a nuevas regiones o tiempos."],["area","land","Area quantifies the spatial extent of land cover classes or agricultural fields.","El área cuantifica la extensión espacial de las clases de cobertura del suelo o los campos agrícolas."],["area","map","Area can be estimated by counting pixels in a classified map or summing polygon extents.","El área puede estimarse contando píxeles en un mapa clasificado o sumando las extensiones de los polígonos."],["area","regions","Regions are geographic areas defined by boundaries, often used as study areas for mapping.","Las regiones son áreas geográficas definidas por límites, a menudo utilizadas como áreas de estudio para el mapeo."],["area","study","A study is a systematic investigation within a defined area to develop or contribute knowledge.","Un estudio es una investigación sistemática dentro de un área definida para desarrollar o contribuir al conocimiento."],["area","agricultural-statistics","Agricultural statistics include area estimates of crop cultivation derived from satellite and ground data.","Las estadísticas agrícolas incluyen estimaciones de área de cultivo derivadas de datos satelitales y de campo."],["area","area-statistics","Area statistics quantify the spatial extent of land cover classes from maps.","Las estadísticas de área cuantifican la extensión espacial de las clases de cobertura del suelo a partir de mapas."],["area","research-areas","Research areas define the spatial extent of interest for a remote sensing investigation.","Las áreas de investigación definen la extensión espacial de interés para un estudio de teledetección."],["area","area-measurements","Area measurements quantify the spatial extent of land cover or crop types, often in hectares.","Las mediciones de área cuantifican la extensión espacial de la cobertura del suelo o los tipos de cultivo, a menudo en hectáreas."],["area","planted-area","Knowing the spatial extent, planted area measures the portion of land actually sown with a crop type.","Conociendo la extensión espacial, el área sembrada mide la porción de tierra realmente sembrada con un tipo de cultivo."],["area","geographic-distribution","Geographic distribution describes how a variable's values are spread across spatial coordinates within a region.","La distribución geográfica describe cómo los valores de una variable se distribuyen entre las coordenadas espaciales dentro de una región."],["area","area-weighted-error-matrices","Area weighting adjusts confusion matrices by the spatial extent of each class to reduce bias in accuracy metrics.","La ponderación por área ajusta las matrices de confusión según la extensión espacial de cada clase para reducir el sesgo en las métricas de precisión."],["area","pixel-counting","From a classified map, pixel counting yields the area for each land cover or crop type.","A partir de un mapa clasificado, el conteo de píxeles produce el área para cada tipo de cobertura del suelo o cultivo."],["area","crop-area","Crop area is the spatial extent of land planted with a specific crop, often measured in hectares.","El área de cultivo es la extensión espacial de tierra sembrada con un cultivo específico, a menudo medida en hectáreas."],["classes","land","Classes are discrete categories assigned to land cover types in a classification scheme.","Las clases son categorías discretas asignadas a tipos de cobertura del suelo en un esquema de clasificación."],["classes","samples","Samples are assigned to classes, providing ground truth for supervised learning.","Las muestras se asignan a clases, proporcionando verdad terreno para el aprendizaje supervisado."],["classes","classification","Classification assigns one of the predefined classes to each pixel or object in imagery.","La clasificación asigna una de las clases predefinidas a cada píxel u objeto en las imágenes."],["classes","fao-land-cover-classification-system","The FAO Land Cover Classification System defines hierarchical classes and diagnostic criteria for land cover.","El Sistema de Clasificación de la Cobertura del Suelo de la FAO define clases jerárquicas y criterios diagnósticos para la cobertura del suelo."],["classes","set","A set is a collection of distinct elements, such as land cover classes or pixels.","Un conjunto es una colección de elementos distintos, como clases de cobertura del suelo o píxeles."],["classes","classification-framework","It defines how classes are structured and related in a hierarchical system.","Define cómo se estructuran y relacionan las clases en un sistema jerárquico."],["classes","land-cover-classes","Land cover classes are a specific set of classes that describe the observed biophysical material on Earth's surface.","Las clases de cobertura terrestre son un conjunto específico de clases que describen el material biofísico observado en la superficie de la Tierra."],["classes","classification-scheme","A classification scheme defines the set of classes used to label land cover features.","Un esquema de clasificación define el conjunto de clases utilizado para etiquetar las características de cobertura terrestre."],["classes","patterns","For each class, we extract a typical pattern from its training samples to represent the class signature.","Para cada clase, extraemos un patrón típico de sus muestras de entrenamiento para representar la firma de la clase."],["classes","label","A label is the specific class assignment for a pixel or sample, using the set of classes.","Una etiqueta es la asignación específica de clase para un píxel o muestra, utilizando el conjunto de clases."],["classes","land-classes","Land classes are the set of discrete categories, such as forest or cropland, assigned to geographic areas.","Las clases de tierra son el conjunto de categorías discretas, como bosque o tierras de cultivo, asignadas a áreas geográficas."],["classes","confusion-matrix","Each cell of the confusion matrix counts the number of samples for specific predicted versus actual class combinations.","Cada celda de la matriz de confusión cuenta el número de muestras para combinaciones específicas de clase predicha versus real."],["classes","land-cover","In classification, land cover is one of the classes assigned to pixels or objects.","En clasificación, la cobertura terrestre es una de las clases asignadas a píxeles u objetos."],["classes","strata","Strata are often defined by land cover classes to improve sampling efficiency.","Los estratos a menudo se definen según las clases de cobertura terrestre para mejorar la eficiencia del muestreo."],["classes","land-classification","It uses predefined classes, such as forest or cropland, to categorize land cover.","Utiliza clases predefinidas, como bosque o tierras de cultivo, para categorizar la cobertura terrestre."],["samples","classification","Labeled samples train the classification model to recognize class patterns.","Las muestras etiquetadas entrenan el modelo de clasificación para reconocer patrones de clase."],["samples","accuracy","Accuracy is computed by comparing predicted labels to known sample labels.","La exactitud se calcula comparando las etiquetas predichas con las etiquetas conocidas de las muestras."],["samples","training","Training fits a model to labeled samples so it learns to classify new data.","El entrenamiento ajusta un modelo a las muestras etiquetadas para que aprenda a clasificar nuevos datos."],["samples","label","Labels are assigned to each sample in the training set, providing known categories for classification.","Las etiquetas se asignan a cada muestra en el conjunto de entrenamiento, proporcionando categorías conocidas para la clasificación."],["samples","field-samples","Field samples are samples collected directly from agricultural fields during ground surveys.","Las muestras de campo son muestras recolectadas directamente de campos agrícolas durante encuestas de campo."],["samples","instances","Instances are individual training or validation data points, such as a single pixel's time series.","Las instancias son puntos de datos individuales de entrenamiento o validación, como la serie temporal de un solo píxel."],["samples","training-samples","Training samples are a subset of samples with known labels used to teach a machine learning model.","Las muestras de entrenamiento son un subconjunto de muestras con etiquetas conocidas que se utilizan para enseñar a un modelo de aprendizaje automático."],["samples","random-training-testing-datasets","Random training-testing datasets randomly partition samples into training and testing sets.","Los conjuntos de datos aleatorios de entrenamiento y prueba dividen las muestras aleatoriamente en conjuntos de entrenamiento y prueba."],["samples","labeled-samples","Labeled samples are observations that have been assigned a ground truth class by an expert.","Las muestras etiquetadas son observaciones a las que un experto ha asignado una clase de verdad terreno."],["samples","representativeness","Representativeness ensures that the collected samples reflect the diversity of the entire population for accurate estimates.","La representatividad asegura que las muestras recolectadas reflejen la diversidad de toda la población para obtener estimaciones precisas."],["samples","reference-samples","Reference samples are a subset of samples with known ground truth labels used for training or validating models.","Las muestras de referencia son un subconjunto de muestras con etiquetas de verdad terreno conocidas, utilizadas para entrenar o validar modelos."],["samples","sample-balancing","Sample balancing techniques (e.g., oversampling, undersampling) create a more balanced training dataset.","Las técnicas de balanceo de muestra (p. ej., sobremuestreo, submuestreo) crean un conjunto de datos de entrenamiento más equilibrado."],["samples","model-training","During model training, the algorithm learns to map input features to output classes using labeled samples.","Durante el entrenamiento del modelo, el algoritmo aprende a mapear atributos de entrada a clases de salida usando muestras etiquetadas."],["samples","reference","Labeled samples from the field form the reference dataset for training and validation.","Las muestras etiquetadas de campo conforman el conjunto de datos de referencia para entrenamiento y validación."],["samples","extensive-ground-samples","Extensive ground samples are a large number of labeled samples collected in the field.","Las muestras extensivas de campo son una gran cantidad de muestras etiquetadas recolectadas en el campo."],["classification","map","A map is the thematic output of classification, showing spatial distribution of classes.","Un mapa es el producto temático de la clasificación, que muestra la distribución espacial de las clases."],["classification","mapping","Mapping produces thematic maps by applying classification to satellite imagery.","El mapeo produce mapas temáticos aplicando clasificación a las imágenes satelitales."],["classification","large-scale-agricultural-mapping","Large-scale agricultural mapping applies classification algorithms to satellite data for regional crop maps.","La cartografía agrícola a gran escala aplica algoritmos de clasificación a datos satelitales para mapas regionales de cultivos."],["classification","crop-type-mapping","Crop type mapping is a specific classification task that identifies crop types from satellite imagery.","El mapeo de tipos de cultivo es una tarea de clasificación específica que identifica tipos de cultivos a partir de imágenes satelitales."],["classification","crop-classification","Crop classification is a type of classification that specifically assigns crop type labels using satellite imagery.","La clasificación de cultivos es un tipo de clasificación que asigna etiquetas de tipos de cultivo mediante imágenes satelitales."],["classification","classification-map","A classification map is a thematic map produced by applying a classification algorithm to satellite imagery.","Un mapa de clasificación es un mapa temático producido al aplicar un algoritmo de clasificación a imágenes satelitales."],["classification","classified-map","A classified map is produced by assigning each pixel or object to a land cover class via classification.","Un mapa clasificado se produce asignando cada píxel u objeto a una clase de cobertura del suelo mediante clasificación."],["classification","land-cover-mapping","It applies classification algorithms to satellite imagery to label land cover classes.","Aplica algoritmos de clasificación a imágenes satelitales para etiquetar clases de cobertura del suelo."],["classification","classification-task","A classification task is a specific problem where a classifier assigns labels to data.","Una tarea de clasificación es un problema específico donde un clasificador asigna etiquetas a datos."],["classification","classification-process","The classification process is the entire workflow from data preparation to label assignment.","El proceso de clasificación es el flujo de trabajo completo desde la preparación de datos hasta la asignación de etiquetas."],["classification","crop-identification","It uses classification methods to label pixels or fields with crop types.","Utiliza métodos de clasificación para etiquetar píxeles o campos con tipos de cultivos."],["classification","higher-classification-accuracy","Improving classification methods can yield higher classification accuracy compared to simpler models.","Mejorar los métodos de clasificación puede generar mayor precisión de clasificación en comparación con modelos simples."],["classification","remote-image-classification","Remote image classification applies the general classification process to satellite imagery instead of other data.","La clasificación de imágenes remotas aplica el proceso general de clasificación a imágenes satelitales en lugar de otros datos."],["classification","errors","Errors in classification are the mismatches between assigned labels and true ground labels.","Los errores en la clasificación son las discrepancias entre las etiquetas asignadas y las etiquetas reales de verdad terreno."],["classification","map-sf","After classification, each pixel of the cube receives a class label.","Tras la clasificación, cada píxel del cubo recibe una etiqueta de clase."],["classification","earth-observation-classifications","EO classifications are the labels produced by classifying satellite imagery into land cover or use categories.","Las clasificaciones EO son las etiquetas producidas al clasificar imágenes satelitales en categorías de cobertura o uso del suelo."],["classification","identification","Identification is a classification task that recognizes specific entities like crop types from satellite data.","La identificación es una tarea de clasificación que reconoce entidades específicas como tipos de cultivos a partir de datos satelitales."],["classification","land-use","Land use mapping classifies land according to its human activities, requiring classification of land cover as a basis.","El mapeo de uso del suelo clasifica la tierra según sus actividades humanas, requiriendo clasificación de cobertura del suelo como base."],["classification","accuracy-assessment","Accuracy assessment evaluates how correctly a classification assigns labels to pixels or objects.","La evaluación de precisión evalúa qué tan correctamente una clasificación asigna etiquetas a píxeles u objetos."],["classification","precision","Precision (user's accuracy) measures how many of the pixels predicted as a class truly belong to that class.","La precisión (exactitud del usuario) mide cuántos de los píxeles predichos como una clase realmente pertenecen a esa clase."],["classification","classification-workflows","Classification workflows organize the steps of classification, from data prep to map validation.","Los flujos de trabajo de clasificación organizan las etapas de clasificación, desde la preparación de datos hasta la validación del mapa."],["classification","pixel-classification","Pixel classification applies classification to each individual pixel rather than objects.","La clasificación de píxeles aplica clasificación a cada píxel individual en lugar de a objetos."],["classification","thematic-map","Classification labels are used to create a thematic map that displays the spatial distribution of a specific theme.","Las etiquetas de clasificación se utilizan para crear un mapa temático que muestra la distribución espacial de un tema específico."],["classification","confusion-matrix","A confusion matrix tabulates the agreement between predicted classes from a classification and actual reference classes.","Una matriz de confusión tabula la concordancia entre las clases predichas de una clasificación y las clases de referencia reales."],["classification","object-based-classification","Object-based classification improves upon pixel-based classification by using image objects as the unit of analysis.","La clasificación basada en objetos mejora la clasificación basada en píxeles al usar objetos de imagen como unidad de análisis."],["classification","thresholding","Thresholding is a simple classification method that separates data into two groups based on a threshold value.","La umbralización es un método de clasificación simple que separa los datos en dos grupos según un valor umbral."],["classification","omission","Omission error occurs when a pixel belonging to a class on the ground is missed in the classified map.","El error de omisión ocurre cuando un píxel perteneciente a una clase en el terreno se omite en el mapa clasificado."],["classification","commission","Commission error occurs when a pixel is incorrectly labeled as a class it does not belong to.","El error de comisión ocurre cuando un píxel se etiqueta incorrectamente como una clase a la que no pertenece."],["classification","decision-tree","In classification, a decision tree partitions the feature space into regions assigned to classes.","En clasificación, un árbol de decisión divide el espacio de atributos en regiones asignadas a clases."],["classification","time-series-classification","It applies classification algorithms to time series data to categorize each sequence.","Aplica algoritmos de clasificación a datos de series temporales para categorizar cada secuencia."],["classification","satellite-image-classification","It applies classification algorithms to satellite images to identify land cover types.","Aplica algoritmos de clasificación a imágenes satelitales para identificar tipos de cobertura del suelo."],["classification","crop-area","Crop area is estimated from classified satellite images by summing pixels per crop type.","El área de cultivo se estima a partir de imágenes satelitales clasificadas sumando píxeles por tipo de cultivo."],["classification","crop-classification-models","Crop classification models are machine learning algorithms that perform classification on image data.","Los modelos de clasificación de cultivos son algoritmos de aprendizaje automático que realizan clasificación sobre datos de imágenes."],["classification","design","It also outlines the classification scheme and validation protocols for a study.","También describe el esquema de clasificación y los protocolos de validación para un estudio."],["classification","crop-mapping","Crop mapping relies on classification methods to assign crop type labels to pixels or parcels in satellite imagery.","El mapeo de cultivos se basa en métodos de clasificación para asignar etiquetas de tipo de cultivo a píxeles o parcelas en imágenes satelitales."],["images","satellite","Images are digital representations of Earth captured by satellite sensors.","Las imágenes son representaciones digitales de la Tierra capturadas por sensores satelitales."],["images","pixels","Pixels are the smallest discrete units in satellite images, each representing a specific land area.","Los píxeles son las unidades discretas más pequeñas en imágenes satelitales, cada una representa un área de tierra específica."],["images","map","A map is produced by classifying satellite images into thematic categories.","Un mapa se produce clasificando imágenes satelitales en categorías temáticas."],["images","imagery","Imagery refers to data collected by satellite sensors, including optical and radar images.","Las imágenes se refieren a datos recolectados por sensores satelitales, incluyendo imágenes ópticas y de radar."],["images","time-series","A satellite image time series combines multiple images of the same location taken at different times.","Una serie temporal de imágenes satelitales combina múltiples imágenes de la misma ubicación tomadas en diferentes momentos."],["images","cloud","Cloud appears in satellite images as opaque areas that need to be identified and removed.","La nube aparece en imágenes satelitales como áreas opacas que deben identificarse y eliminarse."],["images","layers","Images are composed of layers, each representing a specific spectral band or derived data component.","Las imágenes se componen de capas, cada una representa una banda espectral específica o un componente de datos derivado."],["images","cube","A cube organizes a collection of satellite images into a three-dimensional array indexed by time and band.","Un cubo organiza una colección de imágenes satelitales en un arreglo tridimensional indexado por tiempo y banda."],["images","remote-image-classification","Remote image classification uses satellite images as the input data to assign class labels.","La clasificación de imágenes remotas utiliza imágenes satelitales como datos de entrada para asignar etiquetas de clase."],["images","landsat","Landsat satellites capture images that are used for land cover and crop type mapping.","Los satélites Landsat capturan imágenes que se utilizan para el mapeo de cobertura del suelo y tipos de cultivo."],["images","tiles","Tiles split large images into smaller, spatially contiguous pieces for parallel processing.","Las teselas dividen imágenes grandes en piezas más pequeñas y espacialmente contiguas para procesamiento paralelo."],["images","masking","Masking removes unwanted pixels from images, such as those affected by clouds or shadows.","El enmascaramiento elimina píxeles no deseados de las imágenes, como aquellos afectados por nubes o sombras."],["images","geometric-correction","Raw images from satellites often have distortions; geometric correction removes these to produce a georeferenced image.","Las imágenes crudas de satélites a menudo tienen distorsiones; la corrección geométrica las elimina para producir una imagen georreferenciada."],["images","cloud-masking","Cloud masking identifies and removes cloudy pixels in satellite images to ensure clear observations.","El enmascaramiento de nubes identifica y elimina píxeles nubosos en imágenes satelitales para asegurar observaciones claras."],["images","quality-flags","Satellite images often include quality bands that flag problematic pixels like clouds or shadows.","Las imágenes satelitales a menudo incluyen bandas de calidad que marcan píxeles problemáticos como nubes o sombras."],["images","orthophoto","An orthophoto is a geometrically corrected image where distortions from terrain and camera have been removed.","Una ortofoto es una imagen con corrección geométrica donde se han eliminado distorsiones del terreno y la cámara."],["images","analysis-ready-data","Analysis Ready Data (ARD) are satellite images that have been processed to a consistent, analysis-ready state.","Los Datos Listos para Análisis son imágenes satelitales procesadas a un estado consistente y listo para análisis."],["images","satellite-image-time-series-2","By stacking images over time, we create a satellite image time series that captures change.","Al apilar imágenes a lo largo del tiempo, creamos una serie temporal de imágenes satelitales que captura cambios."],["images","satellite-image-classification","Satellite image classification assigns thematic labels to pixels or objects in satellite imagery.","La clasificación de imágenes satelitales asigna etiquetas temáticas a píxeles u objetos en imágenes satelitales."],["images","processing","Raw satellite images are refined through geometric and radiometric corrections during processing.","Las imágenes satelitales crudas se refinan mediante correcciones geométricas y radiométricas durante el procesamiento."],["map","mapping","Mapping is the process of producing thematic maps from remote sensing data.","El mapeo es el proceso de producir mapas temáticos a partir de datos de teledetección."],["map","land-cover-map","Thematic maps like land cover maps represent classified satellite imagery spatially.","Los mapas temáticos, como los mapas de cobertura del suelo, representan espacialmente imágenes satelitales clasificadas."],["map","map-product","A map product is the final output, typically a thematic map derived from satellite imagery.","Un producto cartográfico es el resultado final, típicamente un mapa temático derivado de imágenes satelitales."],["map","basemap","A basemap is a georeferenced map used as a visual reference layer beneath other spatial data.","Un mapa base es un mapa georreferenciado usado como capa de referencia visual debajo de otros datos espaciales."],["map","segmentation-map","A segmentation map is a thematic map showing homogeneous regions like fields or forest patches.","Un mapa de segmentación es un mapa temático que muestra regiones homogéneas como campos o parches de bosque."],["map","map-approach","The Map approach uses only satellite-derived map predictions, without survey data, to estimate quantities.","El enfoque cartográfico utiliza solo predicciones derivadas de satélite, sin datos de encuesta, para estimar cantidades."],["map","anomaly-score-map","An anomaly score map is a thematic map where each pixel shows deviation from expected patterns.","Un mapa de puntuación de anomalías es un mapa temático donde cada píxel muestra la desviación de los patrones esperados."],["map","geographic-distribution","A map visually displays the geographic distribution by showing where each class or measurement occurs.","Un mapa muestra visualmente la distribución geográfica indicando dónde ocurre cada clase o medición."],["map","thematic-map","A map that shows the distribution of classes such as land cover or crop types is called a thematic map.","Un mapa que muestra la distribución de clases como la cobertura del suelo o tipos de cultivo se denomina mapa temático."],["map","spatial-patterns","By analyzing a classified map, one can identify spatial patterns of crop distribution or land cover.","Analizando un mapa clasificado se pueden identificar patrones espaciales de distribución de cultivos o cobertura del suelo."],["accuracy","validation","Validation assesses the accuracy of a classification by comparing its predictions against independent data.","La validación evalúa la exactitud de una clasificación comparando sus predicciones con datos independientes."],["accuracy","quality","Quality refers to how well data meet requirements for accuracy, precision, and reliability.","La calidad se refiere a cuán bien los datos cumplen con los requisitos de exactitud, precisión y fiabilidad."],["accuracy","performance","Performance measures the accuracy and reliability of a classification or estimation model.","El rendimiento mide la exactitud y fiabilidad de un modelo de clasificación o estimación."],["accuracy","classification-accuracy","Classification accuracy measures how well a classification map agrees with reference data, extending the concept of accuracy to classification tasks.","La precisión de clasificación mide cuán bien un mapa de clasificación concuerda con los datos de referencia, extendiendo el concepto de exactitud a tareas de clasificación."],["accuracy","higher-classification-accuracy","Higher classification accuracy means a classification method achieves fewer errors than a baseline, often measured by overall accuracy.","Una mayor precisión de clasificación significa que un método de clasificación tiene menos errores que una línea base, a menudo medida por la precisión general."],["accuracy","model-accuracy","Model accuracy is the accuracy metric applied specifically to a classification model's predictions.","La precisión del modelo es la métrica de exactitud aplicada específicamente a las predicciones de un modelo de clasificación."],["accuracy","reliable-statistical-analyses","They incorporate accuracy metrics to correct classification errors and provide valid confidence intervals.","Incorporan métricas de precisión para corregir errores de clasificación y proporcionar intervalos de confianza válidos."],["accuracy","metrics","Metrics are quantitative measures, such as accuracy, used to evaluate classification performance.","Las métricas son medidas cuantitativas, como la exactitud, utilizadas para evaluar el rendimiento de clasificación."],["accuracy","overall-accuracy","Overall accuracy is the proportion of correctly classified pixels or samples out of the total number.","La precisión general es la proporción de píxeles o muestras clasificados correctamente del número total."],["accuracy","accuracy-assessment","Accuracy assessment quantifies the overall accuracy of a classified map through comparison with reference.","La evaluación de precisión cuantifica la exactitud general de un mapa clasificado mediante comparación con referencia."],["accuracy","methodological-improvement","A methodological improvement targets higher accuracy, reducing errors in classification or estimation.","Una mejora metodológica apunta a mayor precisión, reduciendo errores en clasificación o estimación."],["accuracy","reliability","Reliability extends accuracy by ensuring results are consistent and dependable over repeated applications.","La fiabilidad extiende la exactitud al asegurar que los resultados sean consistentes y confiables en aplicaciones repetidas."],["accuracy","producer-s-accuracy","Producer's accuracy is the probability that a ground truth pixel is correctly classified on the map.","La precisión del productor es la probabilidad de que un píxel de verdad terreno esté correctamente clasificado en el mapa."],["accuracy","accuracy-metrics","Accuracy metrics are specific quantitative measures that evaluate how well a classification matches reality.","Las métricas de precisión son medidas cuantitativas específicas que evalúan qué tan bien una clasificación coincide con la realidad."],["accuracy","confusion-matrix","Accuracy metrics like overall accuracy are derived from the confusion matrix by comparing predictions to ground truth.","Métricas de precisión como la precisión general se derivan de la matriz de confusión al comparar predicciones con verdad terreno."],["accuracy","recall","Recall is derived from the confusion matrix as the true positives divided by the sum of true positives and false negatives.","La exhaustividad se deriva de la matriz de confusión como los verdaderos positivos divididos por la suma de verdaderos positivos y falsos negativos."],["land","earth","Earth is the planet, including its land cover and surface, as observed by satellite imagery.","La Tierra es el planeta, incluyendo su cobertura del suelo y superficie, observado mediante imágenes satelitales."],["land","field","A field is an area of land cultivated with a single crop or managed as a unit.","Un campo es un área de tierra cultivada con un solo cultivo o manejada como unidad."],["land","vegetation","Vegetation is plant cover on Earth's surface, a key land cover type monitored via remote sensing.","La vegetación es la cobertura vegetal en la superficie de la Tierra, un tipo clave de cobertura del suelo monitoreado mediante teledetección."],["land","fao-land-cover-classification-system","The FAO Land Cover Classification System provides a standardized framework to classify land cover types.","El Sistema de Clasificación de la Cobertura del Suelo de la FAO proporciona un marco estandarizado para clasificar tipos de cobertura del suelo."],["land","agriculture","Agriculture uses land as a resource for cultivation and livestock production.","La agricultura utiliza la tierra como recurso para cultivo y producción ganadera."],["land","cropland","Cropland is land that is used for growing crops, distinguishing it from other land cover types.","Las tierras de cultivo son tierras utilizadas para cultivar, distinguiéndose de otros tipos de cobertura del suelo."],["land","soil","Soil is the upper layer of the Earth's land surface that supports plant growth.","El suelo es la capa superior de la superficie terrestre que sostiene el crecimiento de las plantas."],["land","land-cover-classes","Land cover classes categorize the Earth's surface, such as forest, water, or crop, based on satellite observations.","Las clases de cobertura terrestre categorizan la superficie de la Tierra, como bosque, agua o cultivo, basándose en observaciones satelitales."],["land","cover","Land cover is the observed biophysical material on the Earth's surface.","La cobertura del suelo es el material biofísico observado en la superficie de la Tierra."],["land","environment","Land is a key component of the environment monitored through satellite imagery.","La tierra es un componente clave del medio ambiente monitoreado mediante imágenes satelitales."],["land","landscapes","Landscapes are geographic areas composed of diverse land cover types such as farm fields and forests.","Los paisajes son áreas geográficas compuestas por diversos tipos de cobertura del suelo, como campos agrícolas y bosques."],["land","land-classes","Land classes partition the Earth's surface into categories based on its cover or use.","Las clases de tierra dividen la superficie de la Tierra en categorías según su cobertura o uso."],["land","agricultural-land-areas","Land areas dedicated to farming are agricultural land areas, classified by use and cover.","Las áreas de tierras agrícolas son tierras dedicadas a la agricultura, clasificadas por uso y cobertura."],["land","land-classification","Land classification assigns labels to land cover types observed on the Earth's surface.","La clasificación de tierras asigna etiquetas a los tipos de cobertura del suelo observados en la superficie de la Tierra."],["land","land-use-mapping","Land use mapping classifies land according to its use, based on understanding the Earth's surface.","El mapeo de uso del suelo clasifica la tierra según su uso, basándose en el conocimiento de la superficie de la Tierra."],["dataset","collection","A collection is a set of datasets or satellite images sharing a common source, format, and theme.","Una colección es un conjunto de conjuntos de datos o imágenes satelitales que comparten una fuente, formato y tema común."],["dataset","spatial-datasets","Spatial datasets are datasets that include geographic location information, such as satellite images or vector boundaries.","Los conjuntos de datos espaciales son conjuntos de datos que incluyen información de ubicación geográfica, como imágenes satelitales o límites vectoriales."],["dataset","source-datasets","Source datasets are the original datasets used as inputs, such as satellite imagery or survey data.","Los conjuntos de datos fuente son los conjuntos de datos originales utilizados como entrada, como imágenes satelitales o datos de encuestas."],["dataset","public-datasets","Public datasets are openly available collections of satellite imagery or ground observations.","Los conjuntos de datos públicos son colecciones abiertamente disponibles de imágenes satelitales u observaciones de campo."],["dataset","entire-dataset","An entire dataset refers to the complete collection of all available data points.","Un conjunto de datos completo se refiere a la colección total de todos los puntos de datos disponibles."],["dataset","database","A database is a structured collection of datasets designed for efficient storage and retrieval.","Una base de datos es una colección estructurada de conjuntos de datos diseñada para un almacenamiento y recuperación eficientes."],["dataset","reference-datasets","They are curated datasets containing labeled samples for the study area.","Son conjuntos de datos seleccionados que contienen muestras etiquetadas para el área de estudio."],["dataset","uhr-cfp-dataset","The UHR CFP dataset is a labeled collection of UAV images for parcel detection and segmentation.","El conjunto de datos UHR CFP es una colección etiquetada de imágenes de UAV para detección y segmentación de parcelas."],["dataset","data-division","Data division splits a dataset into training, validation, and test subsets for model development.","La división de datos separa un conjunto de datos en subconjuntos de entrenamiento, validación y prueba para el desarrollo de modelos."],["dataset","random-training-testing-datasets","Random training-testing datasets split a dataset into subsets by random assignment for evaluation.","Los conjuntos de datos aleatorios de entrenamiento y prueba dividen un conjunto de datos en subconjuntos mediante asignación aleatoria para evaluación."],["dataset","national-datasets","National datasets are datasets covering an entire country, so they build from the general dataset concept.","Los conjuntos de datos nacionales son conjuntos de datos que cubren un país entero, por lo que se construyen a partir del concepto general de conjunto de datos."],["dataset","training-dataset","A training dataset is a labeled dataset used to train models, extending the general dataset concept.","Un conjunto de datos de entrenamiento es un conjunto de datos etiquetado utilizado para entrenar modelos, ampliando el concepto general de conjunto de datos."],["time","time-series","A time series is a sequence of data points collected at successive, often equally spaced, times.","Una serie temporal es una secuencia de puntos de datos recopilados en tiempos sucesivos, a menudo igualmente espaciados."],["time","monitoring","Monitoring involves systematic, repeated observation over time to detect changes or trends.","El monitoreo implica una observación sistemática y repetida a lo largo del tiempo para detectar cambios o tendencias."],["time","season","A season is a recurring period of time, such as a growing season for crops.","Una temporada es un período de tiempo recurrente, como una temporada de crecimiento para los cultivos."],["time","data-cube","The time dimension in a data-cube allows analysis of temporal changes across repeated satellite observations.","La dimensión temporal en un cubo de datos permite el análisis de cambios temporales a través de observaciones repetidas de satélite."],["time","growth","Growth is a temporal process observed over the growing season.","El crecimiento es un proceso temporal observado a lo largo de la temporada de crecimiento."],["time","phenology","By observing vegetation over time, phenology tracks seasonal changes in plant development stages.","Al observar la vegetación a lo largo del tiempo, la fenología rastrea los cambios estacionales en las etapas de desarrollo de las plantas."],["time","spatiotemporal-array","A spatiotemporal array organizes satellite imagery along both spatial coordinates and a time dimension, enabling analysis of change.","Un arreglo espacio-temporal organiza las imágenes satelitales a lo largo de coordenadas espaciales y una dimensión temporal, lo que permite el análisis de cambios."],["time","temporal-resolution","Temporal resolution describes how frequently a satellite revisits the same location, i.e., the time between successive images.","La resolución temporal describe con qué frecuencia un satélite vuelve a visitar la misma ubicación, es decir, el tiempo entre imágenes sucesivas."],["time","near-real-time","Near real‑time processing delivers data or results within a short delay after acquisition, enabling timely monitoring.","El procesamiento en tiempo casi real entrega datos o resultados poco después de su adquisición, permitiendo un monitoreo oportuno."],["time","time-series-analysis","Time series analysis examines sequential data over time to detect patterns and trends.","El análisis de series temporales examina datos secuenciales a lo largo del tiempo para detectar patrones y tendencias."],["analysis","analytics","Analytics is the systematic application of computational methods to extract insights from data.","La analítica es la aplicación sistemática de métodos computacionales para extraer información de los datos."],["analysis","time-series-analysis","Time series analysis is a systematic examination of temporal data to extract information.","El análisis de series temporales es un examen sistemático de datos temporales para extraer información."],["analysis","data-analysis","Data analysis is the systematic examination of data, extending the general concept of analysis to data.","El análisis de datos es el examen sistemático de los datos, extendiendo el concepto general de análisis a los datos."],["satellite","sensors","Sensors are the instruments mounted on satellites that collect imagery and other measurements.","Los sensores son los instrumentos montados en satélites que recolectan imágenes y otras mediciones."],["satellite","remote-sensing","Remote sensing obtains information about Earth's surface from a distance, often using satellites.","La teledetección obtiene información sobre la superficie de la Tierra a distancia, a menudo utilizando satélites."],["satellite","collection","A collection organizes satellite images from specific missions into usable groups.","Una colección organiza imágenes satelitales en grupos utilizables."],["satellite","source","A source can be a satellite sensor that acquires images for Earth observation.","Una fuente puede ser un sensor satelital que adquiere imágenes para la observación de la Tierra."],["satellite","large-scale-agricultural-mapping","Large-scale agricultural mapping uses satellite imagery to cover wide regions efficiently.","La cartografía agrícola a gran escala utiliza imágenes satelitales para cubrir regiones extensas de manera eficiente."],["satellite","big-data","Satellite missions generate petabytes of imagery, creating big data challenges for storage and analysis.","Las misiones satelitales generan petabytes de imágenes, creando desafíos de macrodatos para el almacenamiento y análisis."],["satellite","satellite-image-time-series","Satellite image time series are sequences of satellite images of the same location acquired at regular intervals over time.","Las series temporales de imágenes satelitales son secuencias de imágenes satelitales de la misma ubicación adquiridas a intervalos regulares a lo largo del tiempo."],["satellite","cover","Satellite sensors measure the reflected electromagnetic radiation determining surface cover.","Los sensores satelitales miden la radiación electromagnética reflejada que determina la cobertura de la superficie."],["satellite","landsat","Landsat is a series of Earth-observing satellite missions providing free multispectral imagery for land monitoring.","Landsat es una serie de misiones satelitales de observación de la Tierra que proporcionan imágenes multiespectrales gratuitas para el monitoreo."],["satellite","satellite-sensors","Satellite sensors are the instruments mounted on satellites that detect electromagnetic radiation to capture images.","Los sensores satelitales son los instrumentos montados en satélites que detectan radiación electromagnética para capturar imágenes."],["satellite","planet","Planet is a commercial satellite constellation that provides high-resolution multispectral imagery daily.","Planet es una constelación de satélites comerciales que proporciona imágenes multiespectrales de alta resolución diariamente."],["satellite","food-security","Satellite-based crop monitoring provides timely data to detect food shortages and support food security planning.","El monitoreo de cultivos basado en satélites proporciona datos oportunos para detectar escasez de alimentos y apoyar la planificación de la seguridad alimentaria."],["satellite","temporal-resolution","Temporal resolution of a satellite mission is determined by its orbit and swath, affecting the revisit frequency.","La resolución temporal de una misión satelital está determinada por su órbita y franja, afectando la frecuencia de revisita."],["satellite","sentinel-missions","The Sentinel missions are a constellation of Earth‑observing satellites developed by the European Space Agency.","Las misiones Sentinel son una constelación de satélites de observación de la Tierra desarrollados por la Agencia Espacial Europea."],["satellite","geometric-correction","Geometric correction adjusts the raw coordinates of satellite imagery to align with a reference coordinate system.","La corrección geométrica ajusta las coordenadas brutas de las imágenes satelitales para alinearlas con un sistema de referencia de coordenadas."],["satellite","gps","GPS uses a constellation of satellites to provide precise geographic coordinates for ground locations.","El GPS utiliza una constelación de satélites para proporcionar coordenadas geográficas precisas para ubicaciones en tierra."],["satellite","nasa","NASA is the U.S. space agency that jointly manages Earth-observing satellite missions like Landsat.","La NASA es la agencia espacial estadounidense que gestiona conjuntamente misiones satelitales de observación de la Tierra como Landsat."],["satellite","synthetic-aperture-radar","A SAR satellite transmits radar pulses and records the echoes to create high-resolution images of the Earth.","Un satélite SAR transmite pulsos de radar y registra los ecos para crear imágenes de alta resolución de la Tierra."],["satellite","satellite-data","Satellite data are the measurements collected by sensors aboard satellites orbiting Earth.","Los datos satelitales son las mediciones recopiladas por sensores a bordo de satélites en órbita terrestre."],["satellite","satellite-image-collections","Satellite image collections are organized archives of imagery from satellite missions.","Las colecciones de imágenes satelitales son archivos organizados de imágenes de misiones satelitales."],["satellite","space-agency","A space agency operates and launches satellites that provide Earth observation data.","Una agencia espacial opera y lanza satélites que proporcionan datos de observación de la Tierra."],["satellite","large-scale-agricultural-monitoring","Satellites provide frequent, broad-area imagery essential for large-scale monitoring.","Los satélites proporcionan imágenes frecuentes de área amplia esenciales para el monitoreo a gran escala."],["satellite","satellite-imagery","Satellite imagery is the data captured by satellite sensors, from the satellite platform concept.","Las imágenes satelitales son los datos capturados por sensores satelitales, desde el concepto de plataforma satelital."],["results","analysis","Results are the outputs of analysis, such as classified maps or accuracy metrics.","Los resultados son las salidas del análisis, como mapas clasificados o métricas de exactitud."],["results","figure","A figure visually presents results, such as a classified map or accuracy chart.","Una figura presenta visualmente los resultados, como un mapa clasificado o un gráfico de exactitud."],["results","product","A product is a results dataset, such as a crop type map or yield estimate, generated for end users.","Un producto es un conjunto de datos de resultados, como un mapa de tipos de cultivo o una estimación de rendimiento, generado para usuarios finales."],["results","classification-results","Classification results are the outputs produced by a classification algorithm.","Los resultados de clasificación son las salidas producidas por un algoritmo de clasificación."],["field","polygons","Polygons are vector boundaries delineating individual fields or parcels in geospatial data.","Los polígonos son límites vectoriales que delimitan campos o parcelas individuales en datos geoespaciales."],["field","parcels","Parcels are individual agricultural fields or plots, the fundamental spatial units for crop mapping.","Las parcelas son campos o lotes agrícolas individuales, las unidades espaciales fundamentales para el mapeo de cultivos."],["field","ground-surveys","Ground surveys visit agricultural fields to record crop types, phenology, and other attributes.","Las encuestas de campo visitan campos agrícolas para registrar tipos de cultivo, fenología y otros atributos."],["field","individual-agricultural-plot-polygons","Fields are individual cultivated areas represented as polygons in geospatial data.","Los campos son áreas agrícolas representadas como polígonos en datos geoespaciales."],["field","field-data-collection","Field data collection involves gathering ground observations such as crop type and GPS coordinates from agricultural fields.","La recolección de datos de campo implica recopilar observaciones de campo como tipo de cultivo y coordenadas GPS desde campos agrícolas."],["field","field-samples","Field samples are taken from individual fields, representing specific crop types and conditions.","Las muestras de campo se toman de campos individuales, representando tipos de cultivo y condiciones específicas."],["field","agricultural-plots","Agricultural plots are individu
